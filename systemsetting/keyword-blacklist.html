<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keyword Blacklist</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-body: #f5f5f5;
        --bg-card: #fff;
        --border-subtle: #e0e0e0;
        --primary: #8b7340;
        --primary-dark: #6f5c33;
        --text-main: #1a1a1a;
        --text-muted: #7a6a5c;
        --danger: #b23b3b;
        --danger-soft: #fbe9e9;
        --badge-green: #2f855a;
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-pill: 999px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 20px 24px 36px;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        background: var(--bg-body);
        color: var(--text-main);
      }
      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }
      .page-subtitle {
        margin: 0 0 16px;
        font-size: 13px;
        color: var(--text-muted);
        max-width: 760px;
        line-height: 1.5;
      }

      .btn {
        border-radius: var(--radius-pill);
        border: 1px solid var(--border-subtle);
        padding: 8px 14px;
        font-size: 12px;
        background: #fff;
        cursor: pointer;
        color: var(--text-main);
        display: inline-flex;
        gap: 6px;
        align-items: center;
        font-family: inherit;
        font-weight: 600;
        transition: filter 0.15s;
      }
      .btn:hover:not(:disabled) {
        filter: brightness(0.97);
      }
      .btn-primary {
        background: var(--primary);
        border-color: var(--primary-dark);
        color: #fff;
      }
      .btn-ghost {
        background: transparent;
      }
      .btn-danger {
        background: var(--danger-soft);
        border-color: var(--danger);
        color: var(--danger);
      }
      .btn-sm {
        padding: 4px 10px;
        font-size: 11px;
      }

      .lang-tabs {
        display: flex;
        flex-wrap: nowrap;
        gap: 6px;
        margin-bottom: 14px;
        overflow-x: auto;
        padding-bottom: 6px;
        -webkit-overflow-scrolling: touch;
      }
      .lang-tab {
        flex: 0 0 auto;
        border-radius: var(--radius-pill);
        border: 1px solid var(--border-subtle);
        background: #fff;
        padding: 6px 13px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
      }
      .lang-tab:hover {
        filter: brightness(0.97);
      }
      .lang-tab.active {
        background: var(--primary);
        border-color: var(--primary-dark);
        color: #fff;
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        box-shadow: 0 10px 30px rgba(60, 50, 40, 0.04);
      }
      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-subtle);
        flex-wrap: wrap;
      }
      .card-title {
        font-size: 14px;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12.5px;
      }
      thead {
        background: #f5f5f5;
      }
      th,
      td {
        padding: 9px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border-subtle);
        vertical-align: middle;
      }
      th {
        font-weight: 600;
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }
      tbody tr:hover {
        background: #faf9f7;
      }
      .col-num {
        width: 44px;
        color: var(--text-muted);
      }
      .kw {
        font-weight: 600;
      }
      .added {
        color: var(--text-muted);
      }
      .col-actions {
        text-align: right;
        white-space: nowrap;
      }
      .empty-state {
        text-align: center;
        color: var(--text-muted);
        padding: 26px;
      }

      .modal-ov {
        position: fixed;
        inset: 0;
        background: rgba(40, 32, 24, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal-ov.open {
        display: flex;
      }
      .modal {
        background: #fff;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        width: 420px;
        max-width: calc(100% - 32px);
        box-shadow: 0 16px 40px rgba(40, 32, 24, 0.25);
        overflow: hidden;
      }
      .modal-header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border-subtle);
        background: #faf9f7;
        font-size: 15px;
        font-weight: 700;
      }
      .modal-body {
        padding: 16px 18px;
      }
      .modal-body p {
        margin: 0;
        font-size: 13px;
        line-height: 1.55;
        color: var(--text-main);
      }
      .modal-footer {
        padding: 12px 18px;
        border-top: 1px solid var(--border-subtle);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        background: #f5f5f5;
      }
      .field {
        margin-bottom: 14px;
      }
      .field label {
        display: block;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 5px;
      }
      .field label .req {
        color: var(--danger);
      }
      .field input {
        width: 100%;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-subtle);
        padding: 9px 11px;
        font-size: 13px;
        background: #fff;
        color: var(--text-main);
        font-family: inherit;
        outline: none;
      }
      .field input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(139, 115, 64, 0.16);
      }
      .form-error {
        font-size: 11.5px;
        color: var(--danger);
        margin-top: -8px;
        margin-bottom: 12px;
        display: none;
      }
      .form-error.show {
        display: block;
      }

      .toast-wrap {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 1200;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .toast {
        background: #2f2a24;
        color: #fff;
        border-left: 4px solid var(--primary);
        padding: 11px 15px;
        border-radius: var(--radius-md);
        font-size: 13px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        display: flex;
        gap: 9px;
        align-items: center;
      }
      .toast.ok {
        border-left-color: var(--badge-green);
      }
      .toast.warn {
        border-left-color: var(--danger);
      }
    </style>
  </head>
  <body>
    <h1>Keyword Blacklist</h1>

    <div class="lang-tabs" id="langTabs"></div>

    <div class="card">
      <div class="card-head">
        <div class="card-title" id="tableTitle">Keywords</div>
        <button class="btn btn-primary" onclick="openAddModal()">
          <i class="fas fa-plus"></i> Add Keyword
        </button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-num">#</th>
              <th>Keyword</th>
              <th>Added date</th>
              <th style="text-align: right">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Add Keyword modal -->
    <div
      class="modal-ov"
      id="addModal"
      onclick="if (event.target === this) closeAddModal();"
    >
      <div class="modal">
        <div class="modal-header">
          Add Keyword — <span id="addModalLang">JA</span>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>Keyword <span class="req">*</span></label>
            <input
              id="addKeyword"
              type="text"
              maxlength="200"
              placeholder="Prohibited keyword"
              oninput="hideAddError()"
            />
          </div>
          <div class="form-error" id="addError">
            This keyword already exists in this language.
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeAddModal()">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="saveKeyword()">Save</button>
        </div>
      </div>
    </div>

    <!-- Delete confirmation modal -->
    <div
      class="modal-ov"
      id="deleteModal"
      onclick="if (event.target === this) closeDeleteModal();"
    >
      <div class="modal">
        <div class="modal-header">Delete keyword?</div>
        <div class="modal-body">
          <p id="deleteMsg"></p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeDeleteModal()">
            Cancel
          </button>
          <button class="btn btn-danger" onclick="confirmDelete()">
            <i class="fas fa-trash"></i> Delete
          </button>
        </div>
      </div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const esc = (s) =>
        String(s ?? "").replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      const LS_KEY = "yuushi.keywordBlacklist";
      const LS = {
        get(k, d) {
          try {
            const v = localStorage.getItem(k);
            return v ? JSON.parse(v) : d;
          } catch (e) {
            return d;
          }
        },
        set(k, v) {
          try {
            localStorage.setItem(k, JSON.stringify(v));
          } catch (e) {}
        },
      };
      function toast(msg, kind) {
        const el = document.createElement("div");
        el.className = "toast " + (kind === "warn" ? "warn" : "ok");
        const icon =
          kind === "warn" ? "fa-circle-exclamation" : "fa-circle-check";
        el.innerHTML = '<i class="fas ' + icon + '"></i> ' + esc(msg);
        $("toastWrap").appendChild(el);
        setTimeout(() => {
          el.style.opacity = "0";
          setTimeout(() => el.remove(), 200);
        }, 2600);
      }
      function nowStamp() {
        const d = new Date();
        const p = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
      }

      // 15 languages, JA first (default active), HI last.
      const LANGS = [
        "JA",
        "EN",
        "ZH-TW",
        "ZH-CN",
        "KO",
        "TH",
        "DE",
        "FR",
        "ES",
        "IT",
        "AR",
        "PT",
        "ID",
        "VI",
        "HI",
      ];

      // ---------- seed ----------
      function buildSeed() {
        const o = {};
        LANGS.forEach((l) => (o[l] = []));
        o["JA"] = ["詐欺", "偽物", "違法", "無許可", "架空"].map((k) => ({
          keyword: k,
          addedDate: "2026-05-01 09:00",
        }));
        return o;
      }
      let blacklist = LS.get(LS_KEY, null);
      if (!blacklist || typeof blacklist !== "object") {
        blacklist = buildSeed();
        LS.set(LS_KEY, blacklist);
      }
      // Backfill any missing language keys to an empty array without
      // overwriting existing keywords for other languages.
      let needsPersist = false;
      LANGS.forEach((l) => {
        if (!Array.isArray(blacklist[l])) {
          blacklist[l] = [];
          needsPersist = true;
        }
      });
      if (needsPersist) LS.set(LS_KEY, blacklist);

      function rowDate(r) {
        // Support both the current "addedDate" field and any legacy "addedAt".
        return r.addedDate || r.addedAt || "—";
      }
      function persist() {
        LS.set(LS_KEY, blacklist);
      }

      let currentLang = "JA";
      let pendingDelete = -1;

      function renderTabs() {
        $("langTabs").innerHTML = LANGS.map(
          (l) =>
            `<button class="lang-tab ${l === currentLang ? "active" : ""}" onclick="selectLang('${l}')">${esc(l)}</button>`,
        ).join("");
      }
      function selectLang(l) {
        currentLang = l;
        renderTabs();
        renderTable();
      }

      function renderTable() {
        $("tableTitle").textContent = currentLang + " keywords";
        const rows = blacklist[currentLang] || [];
        if (!rows.length) {
          $("tableBody").innerHTML =
            '<tr><td colspan="4" class="empty-state">No keywords added yet for this language.</td></tr>';
          return;
        }
        $("tableBody").innerHTML = rows
          .map(
            (r, i) => `
          <tr>
            <td class="col-num">${i + 1}</td>
            <td><span class="kw">${esc(r.keyword)}</span></td>
            <td class="added">${esc(rowDate(r))}</td>
            <td class="col-actions">
              <button class="btn btn-danger btn-sm" onclick="deleteKeyword(${i})"><i class="fas fa-trash"></i> Delete</button>
            </td>
          </tr>`,
          )
          .join("");
      }

      // ---------- delete (styled modal) ----------
      function deleteKeyword(i) {
        pendingDelete = i;
        const row = (blacklist[currentLang] || [])[i];
        if (!row) return;
        $("deleteMsg").textContent =
          `Delete the keyword "${row.keyword}" from the ${currentLang} blacklist? This action cannot be undone.`;
        $("deleteModal").classList.add("open");
      }
      function closeDeleteModal() {
        $("deleteModal").classList.remove("open");
        pendingDelete = -1;
      }
      function confirmDelete() {
        if (pendingDelete < 0) return;
        blacklist[currentLang].splice(pendingDelete, 1);
        persist();
        closeDeleteModal();
        renderTable();
        toast("Keyword deleted successfully.");
      }

      // ---------- add ----------
      function openAddModal() {
        $("addModalLang").textContent = currentLang;
        $("addKeyword").value = "";
        hideAddError();
        $("addModal").classList.add("open");
        setTimeout(() => $("addKeyword").focus(), 30);
      }
      function closeAddModal() {
        $("addModal").classList.remove("open");
      }
      function hideAddError() {
        $("addError").classList.remove("show");
      }
      function saveKeyword() {
        const kw = ($("addKeyword").value || "").trim();
        if (!kw) {
          toast("Keyword is required.", "warn");
          return;
        }
        if (kw.length > 100) {
          toast("Keyword cannot exceed 100 characters.", "warn");
          return;
        }
        const exists = (blacklist[currentLang] || []).some(
          (r) => r.keyword.toLowerCase() === kw.toLowerCase(),
        );
        if (exists) {
          $("addError").classList.add("show");
          return;
        }
        blacklist[currentLang].push({ keyword: kw, addedDate: nowStamp() });
        persist();
        closeAddModal();
        renderTable();
        toast("Keyword added successfully.");
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeAddModal();
          closeDeleteModal();
        }
      });

      renderTabs();
      renderTable();
    </script>
  </body>
</html>
