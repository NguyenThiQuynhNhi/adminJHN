<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - My Profile</title>
    <style>
      :root {
        --bg-body: #f5f3ef;
        --bg-card: #fffaf2;
        --border-subtle: #eadccd;
        --accent: #c26b41;
        --text-main: #3b2f2a;
        --text-muted: #7a6a5c;
        --badge-green: #2f855a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px 24px 32px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .page-subtitle {
        margin: 0 0 16px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .layout {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
      }

      .card {
        background-color: var(--bg-card);
        border-radius: 14px;
        border: 1px solid var(--border-subtle);
        padding: 14px 16px 16px;
        box-shadow: 0 10px 30px rgba(115, 72, 39, 0.04);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
      }

      .card-subtitle {
        font-size: 12px;
        color: var(--text-muted);
      }

      .field-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
      }

      select,
      input[type="text"],
      input[type="password"] {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 10px;
        font-size: 12px;
        background-color: #fffcf7;
        color: var(--text-main);
        outline: none;
        width: 100%;
      }

      select:focus,
      input[type="text"]:focus,
      input[type="password"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(194, 107, 65, 0.2);
      }

      input[readonly] {
        background: #f3ece4;
        color: #6f6154;
      }

      .btn {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 11px;
        font-size: 11px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 4px;
        align-items: center;
        color: var(--text-main);
      }

      .btn-ghost {
        background: transparent;
      }

      .btn-primary {
        background: linear-gradient(135deg, #c26b41, #a55232);
        border-color: #a55232;
        color: #fffaf3;
      }

      .profile-hero {
        display: flex;
        gap: 14px;
        align-items: center;
        flex-wrap: wrap;
      }

      .profile-avatar-stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
      }

      .profile-avatar {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: linear-gradient(135deg, #c26b41, #7a4a2f);
        color: #fffaf3;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        box-shadow: 0 10px 22px rgba(194, 107, 65, 0.24);
      }

      .avatar-upload {
        display: none;
      }

      .profile-name {
        margin: 0 0 4px;
        font-size: 22px;
      }

      .profile-subtitle {
        font-size: 12px;
        color: var(--text-muted);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 7px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 500;
        border: 1px solid #b7e4cc;
        background: #e6f6ef;
        color: var(--badge-green);
        white-space: nowrap;
      }

      .profile-summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .summary-tile {
        border-radius: 12px;
        border: 1px solid var(--border-subtle);
        background: #fffaf4;
        padding: 10px 12px;
      }

      .summary-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .summary-value {
        font-size: 13px;
        font-weight: 600;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 12px;
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .actions-row {
        display: flex;
        justify-content: flex-end;
        gap: 6px;
        margin-top: 10px;
      }

      .actions-row.left {
        justify-content: flex-start;
        margin-top: 0;
      }

      .activity-list,
      .permission-list {
        display: grid;
        gap: 8px;
      }

      .activity-item,
      .permission-item {
        border-radius: 12px;
        border: 1px solid var(--border-subtle);
        background: #fffaf4;
        padding: 10px 12px;
      }

      .activity-title,
      .permission-title {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .activity-meta,
      .permission-desc {
        font-size: 11px;
        color: var(--text-muted);
      }

      .permission-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
        font-size: 11px;
      }

      .permission-table th,
      .permission-table td {
        border-bottom: 1px solid #efe2d3;
        padding: 6px 5px;
        text-align: left;
      }

      .permission-table thead {
        background: #f1e4d4;
      }

      .perm-scope {
        font-weight: 600;
        color: #6b5032;
      }

      .perm-desc {
        font-size: 11px;
        color: #7c6a55;
        margin-top: 2px;
      }

      .matrix-cell {
        text-align: center;
      }

      .matrix-indicator {
        display: inline-flex;
        width: 18px;
        height: 18px;
        border-radius: 6px;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        border: 1px solid #c9b79f;
        background: #fff;
      }

      .matrix-indicator.active {
        background: #3a6b3c;
        color: #fff;
        border-color: #3a6b3c;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(34, 24, 18, 0.48);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 999;
      }

      .modal-backdrop.open {
        display: flex;
      }

      .modal {
        width: 560px;
        max-width: 100%;
        max-height: 88vh;
        overflow: auto;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 14px;
        box-shadow: 0 20px 46px rgba(60, 41, 28, 0.3);
      }

      .modal-header {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-title {
        font-size: 14px;
        font-weight: 600;
      }

      .modal-body {
        padding: 12px 14px;
      }

      .modal-footer {
        padding: 10px 14px 14px;
        border-top: 1px solid var(--border-subtle);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .close-btn {
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
      }

      .password-grid {
        display: grid;
        gap: 10px;
      }

      @media (max-width: 960px) {
        .profile-summary,
        .form-grid {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div>
      <h1>My Profile</h1>
    </div>

    <div class="layout">
      <section class="card">
        <div class="profile-hero">
          <div class="profile-avatar-stack">
            <div class="profile-avatar" id="profileAvatar">AT</div>
            <input
              id="avatarUpload"
              class="avatar-upload"
              type="file"
              accept="image/*"
            />
          </div>
          <div>
            <h2 class="profile-name" id="profileName">Admin Tanaka</h2>
            <button id="btnUploadAvatar" class="btn btn-ghost" type="button">
              Change avatar
            </button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Profile information</div>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-field">
            <label class="field-label" for="profileDisplayName"
              >Full name</label
            >
            <input
              id="profileDisplayName"
              type="text"
              value="Admin Tanaka"
              readonly
            />
          </div>
          <div class="form-field">
            <label class="field-label" for="profileEmail">Email</label>
            <input
              id="profileEmail"
              type="text"
              value="admin@company.co.jp"
              readonly
            />
          </div>
          <div class="form-field">
            <label class="field-label" for="profilePhone">Phone number</label>
            <input id="profilePhone" type="text" value="+81 90 1234 5678" />
          </div>
          <div class="form-field">
            <label class="field-label" for="profileRole">Role</label>
            <div style="flex-direction: row">
              <input
                id="profileRole"
                type="text"
                value="Super Admin"
                readonly
                style="width: fit-content"
              />
              <button
                id="btnViewPermissions"
                class="btn btn-ghost"
                type="button"
              >
                View permissions
              </button>
            </div>
          </div>
          <div class="form-field">
            <label class="field-label" for="profileLanguage">Language</label>
            <select id="profileLanguage">
              <option value="en">English</option>
              <option value="jp" selected>Japanese</option>
              <option value="vi">Vietnamese</option>
            </select>
          </div>
          <div class="form-field">
            <label class="field-label">Address</label>
            <input
              id="profileAddress"
              type="text"
              value="123 Main St, Tokyo, Japan"
            />
            <div class="actions-row left"></div>
          </div>
        </div>

        <div class="actions-row">
          <button id="btnSaveProfile" class="btn btn-primary" type="button">
            Save profile
          </button>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Security</div>
          </div>
        </div>
        <div class="actions-row left">
          <button id="btnChangePassword" class="btn btn-ghost" type="button">
            Change password
          </button>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Recent activity</div>
          </div>
        </div>
        <div class="activity-list">
          <div class="activity-item">
            <div class="activity-title">Logged in from Tokyo office</div>
            <div class="activity-meta">2026-04-21 09:12 JST</div>
          </div>
          <div class="activity-item">
            <div class="activity-title">Deleted blog #123</div>
            <div class="activity-meta">2026-04-20 17:40 JST</div>
          </div>
          <div class="activity-item">
            <div class="activity-title">Resolved support ticket #12345</div>
            <div class="activity-meta">2026-04-20 14:05 JST</div>
          </div>
        </div>
      </section>
    </div>

    <div id="permissionsModal" class="modal-backdrop">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Role permissions</div>
          <button
            class="close-btn"
            type="button"
            data-close-modal="permissionsModal"
          >
            x
          </button>
        </div>
        <div class="modal-body">
          <div class="card-subtitle" id="permissionsRoleLabel">
            Role: Super Admin
          </div>
          <table class="permission-table">
            <thead>
              <tr>
                <th style="width: 46%">Scope</th>
                <th style="width: 18%">Read</th>
                <th style="width: 18%">Write</th>
                <th style="width: 18%">Admin</th>
              </tr>
            </thead>
            <tbody id="permissionsBody"></tbody>
          </table>
        </div>
        <div class="modal-footer">
          <button
            class="btn btn-primary"
            type="button"
            data-close-modal="permissionsModal"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <div id="passwordModal" class="modal-backdrop">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Change password</div>
          <button
            class="close-btn"
            type="button"
            data-close-modal="passwordModal"
          >
            x
          </button>
        </div>
        <div class="modal-body">
          <div class="password-grid">
            <div class="form-field">
              <label class="field-label" for="currentPassword"
                >Current password</label
              >
              <input id="currentPassword" type="password" />
            </div>
            <div class="form-field">
              <label class="field-label" for="newPassword">New password</label>
              <input id="newPassword" type="password" />
            </div>
            <div class="form-field">
              <label class="field-label" for="confirmPassword"
                >Confirm new password</label
              >
              <input id="confirmPassword" type="password" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button
            class="btn btn-ghost"
            type="button"
            data-close-modal="passwordModal"
          >
            Cancel
          </button>
          <button id="btnSubmitPassword" class="btn btn-primary" type="button">
            Update password
          </button>
        </div>
      </div>
    </div>

    <script>
      const profile = {
        displayName: "Admin Tanaka",
        username: "admin_tanaka",
        role: "Super Admin",
        email: "admin@company.co.jp",
        phone: "+81 90 1234 5678",
        language: "jp",
        status: "Active",
        lastLogin: "2026-04-21 09:12 JST",
        avatarDataUrl: "",
      };

      const rolePermissions = {
        "Super Admin": {
          permissions: {
            users: { read: true, write: false, admin: false },
            leads: { read: false, write: false, admin: false },
            properties: { read: true, write: false, admin: false },
            content: { read: true, write: true, admin: false },
            support: { read: false, write: false, admin: false },
            billing: { read: false, write: false, admin: false },
            analytics: { read: true, write: false, admin: false },
            system: { read: false, write: false, admin: false },
          },
        },
      };

      const els = {
        avatar: document.getElementById("profileAvatar"),
        avatarUpload: document.getElementById("avatarUpload"),
        uploadAvatarBtn: document.getElementById("btnUploadAvatar"),
        name: document.getElementById("profileName"),
        subtitle: document.getElementById("profileSubtitle"),
        status: document.getElementById("profileStatus"),
        summaryUsername: document.getElementById("summaryUsername"),
        summaryLastLogin: document.getElementById("summaryLastLogin"),
        summaryLanguage: document.getElementById("summaryLanguage"),
        displayName: document.getElementById("profileDisplayName"),
        email: document.getElementById("profileEmail"),
        phone: document.getElementById("profilePhone"),
        role: document.getElementById("profileRole"),
        language: document.getElementById("profileLanguage"),
        save: document.getElementById("btnSaveProfile"),
        viewPermissions: document.getElementById("btnViewPermissions"),
        changePassword: document.getElementById("btnChangePassword"),
        permissionsModal: document.getElementById("permissionsModal"),
        permissionsRoleLabel: document.getElementById("permissionsRoleLabel"),
        permissionsBody: document.getElementById("permissionsBody"),
        passwordModal: document.getElementById("passwordModal"),
        currentPassword: document.getElementById("currentPassword"),
        newPassword: document.getElementById("newPassword"),
        confirmPassword: document.getElementById("confirmPassword"),
        submitPassword: document.getElementById("btnSubmitPassword"),
      };

      function initials(name) {
        return name
          .split(/\s+/)
          .filter(Boolean)
          .slice(0, 2)
          .map((part) => part[0].toUpperCase())
          .join("");
      }

      function languageLabel(code) {
        if (code === "en") return "English";
        if (code === "vi") return "Vietnamese";
        return "Japanese";
      }

      function openModal(id) {
        const modal = document.getElementById(id);
        if (modal) modal.classList.add("open");
      }

      function closeModal(id) {
        const modal = document.getElementById(id);
        if (modal) modal.classList.remove("open");
      }

      function renderProfile() {
        if (profile.avatarDataUrl) {
          els.avatar.style.backgroundImage = `url('${profile.avatarDataUrl}')`;
          els.avatar.style.backgroundSize = "cover";
          els.avatar.style.backgroundPosition = "center";
          els.avatar.textContent = "";
        } else {
          els.avatar.style.backgroundImage = "none";
          els.avatar.textContent = initials(profile.displayName);
        }

        els.name.textContent = profile.displayName;
        els.subtitle.textContent = `${profile.role} · ${profile.email}`;
        els.status.textContent = profile.status;

        els.summaryUsername.textContent = profile.username;
        els.summaryLastLogin.textContent = profile.lastLogin;
        els.summaryLanguage.textContent = languageLabel(profile.language);

        els.displayName.value = profile.displayName;
        els.email.value = profile.email;
        els.phone.value = profile.phone;
        els.role.value = profile.role;
        els.language.value = profile.language;
      }

      function saveProfile() {
        profile.phone = els.phone.value.trim() || profile.phone;
        profile.language = els.language.value;
        renderProfile();
        alert("Profile saved (demo).");
      }

      function triggerAvatarUpload() {
        els.avatarUpload.click();
      }

      function onAvatarSelected(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          profile.avatarDataUrl = String(reader.result || "");
          renderProfile();
        };
        reader.readAsDataURL(file);
      }

      function showPermissions() {
        const permissionBundle = rolePermissions[profile.role] || {
          permissions: {},
        };
        const permissionScopes = [
          {
            id: "users",
            label: "Users & accounts",
            desc: "View and manage end user / agent / internal support accounts.",
          },
          {
            id: "leads",
            label: "Leads & CRM",
            desc: "Access to lead inbox, routing, assignment and history.",
          },
          {
            id: "properties",
            label: "Property inventory",
            desc: "View and curate listings and projects.",
          },
          {
            id: "content",
            label: "Content & CMS",
            desc: "Articles, landing pages, static content blocks.",
          },
          {
            id: "support",
            label: "Messages & support",
            desc: "Tickets, routing, SLA workflows.",
          },
          {
            id: "billing",
            label: "Billing & monetisation",
            desc: "Plans, invoices, payouts configuration.",
          },
          {
            id: "analytics",
            label: "Operations & analytics",
            desc: "Funnels, cohorts, platform health dashboards.",
          },
          {
            id: "system",
            label: "System settings & integrations",
            desc: "SSO, webhooks, API keys and audit configuration.",
          },
        ];

        els.permissionsRoleLabel.textContent = `Role: ${profile.role}`;
        els.permissionsBody.innerHTML = permissionScopes
          .map((scope) => {
            const p = permissionBundle.permissions[scope.id] || {
              read: false,
              write: false,
              admin: false,
            };
            return `
              <tr>
                <td>
                  <div class="perm-scope">${scope.label}</div>
                  <div class="perm-desc">${scope.desc}</div>
                </td>
                <td class="matrix-cell">
                  <span class="matrix-indicator ${p.read ? "active" : ""}">${p.read ? "R" : "-"}</span>
                </td>
                <td class="matrix-cell">
                  <span class="matrix-indicator ${p.write ? "active" : ""}">${p.write ? "W" : "-"}</span>
                </td>
                <td class="matrix-cell">
                  <span class="matrix-indicator ${p.admin ? "active" : ""}">${p.admin ? "A" : "-"}</span>
                </td>
              </tr>
            `;
          })
          .join("");
        openModal("permissionsModal");
      }

      function openPasswordModal() {
        els.currentPassword.value = "";
        els.newPassword.value = "";
        els.confirmPassword.value = "";
        openModal("passwordModal");
      }

      function submitPasswordChange() {
        if (
          !els.currentPassword.value ||
          !els.newPassword.value ||
          !els.confirmPassword.value
        ) {
          alert("Please fill all password fields.");
          return;
        }
        if (els.newPassword.value !== els.confirmPassword.value) {
          alert("New password and confirmation do not match.");
          return;
        }
        if (els.newPassword.value.length < 8) {
          alert("New password must be at least 8 characters.");
          return;
        }
        closeModal("passwordModal");
        alert("Password updated (demo).");
      }

      function bindModalCloseButtons() {
        document.querySelectorAll("[data-close-modal]").forEach((btn) => {
          btn.addEventListener("click", () =>
            closeModal(btn.dataset.closeModal),
          );
        });
      }

      function init() {
        bindModalCloseButtons();
        els.uploadAvatarBtn.addEventListener("click", triggerAvatarUpload);
        els.avatarUpload.addEventListener("change", onAvatarSelected);
        els.save.addEventListener("click", saveProfile);
        els.viewPermissions.addEventListener("click", showPermissions);
        els.changePassword.addEventListener("click", openPasswordModal);
        els.submitPassword.addEventListener("click", submitPasswordChange);
        renderProfile();
      }

      init();
    </script>
  </body>
</html>
