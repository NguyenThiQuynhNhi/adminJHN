<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Basic Settings</title>
    <style>
      :root {
        --bg-body: #f5f3ef;
        --bg-card: #fffaf2;
        --border-subtle: #eadccd;
        --accent: #c26b41;
        --text-main: #3b2f2a;
        --text-muted: #7a6a5c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px 24px 32px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .layout {
        display: grid;
        grid-template-columns: 1.4fr 1.6fr;
        gap: 16px;
        align-items: flex-start;
      }

      .card {
        background-color: var(--bg-card);
        border-radius: 14px;
        border: 1px solid var(--border-subtle);
        padding: 14px 16px 16px;
        box-shadow: 0 10px 30px rgba(115, 72, 39, 0.04);
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 14px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
      }

      select,
      input[type="number"] {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 10px;
        font-size: 12px;
        background-color: #fffcf7;
        color: var(--text-main);
        outline: none;
      }

      select:focus,
      input[type="number"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(194, 107, 65, 0.2);
      }

      .hint-row {
        font-size: 11px;
        color: var(--text-muted);
      }

      .btn-row {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 14px;
      }

      .btn {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 7px 13px;
        font-size: 11px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 4px;
        align-items: center;
        color: var(--text-main);
      }

      .btn-primary {
        background: linear-gradient(135deg, #c26b41, #a55232);
        border-color: #a55232;
        color: #fffaf3;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Basic Setting</h1>
    </div>

    <div class="layout">
      <section class="card">
        <div class="card-title">Global defaults</div>
        <div class="field-grid">
          <div class="field-group">
            <label class="field-label" for="currencySelect">
              Default currency
            </label>
            <select id="currencySelect">
              <option value="JPY">JPY</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label" for="languageSelect">
              Default language
            </label>
            <select id="languageSelect">
              <option value="en-US">English</option>
              <option value="vi-VN">Vietnamese</option>
              <option value="ja-JP">Japanese</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label" for="timezoneSelect">Timezone</label>
            <select id="timezoneSelect">
              <option value="Asia/Tokyo">Asia/Tokyo (UTC+9)</option>
              <option value="UTC">UTC</option>
            </select>
          </div>
        </div>

        <div class="card-title" style="padding-top: 20px">
          Saved items limits (Client portal)
        </div>
        <div class="field-grid">
          <div class="field-group">
            <label class="field-label" for="maxSavedProperties">
              Max saved properties per user
            </label>
            <input id="maxSavedProperties" type="number" min="0" step="1" />
            <div class="hint-row">0 = no hard limit</div>
          </div>
          <div class="field-group">
            <label class="field-label" for="maxSavedSearches">
              Max saved searches per user
            </label>
            <input id="maxSavedSearches" type="number" min="0" step="1" />
            <div class="hint-row">0 = no hard limit</div>
          </div>
        </div>

        <div class="btn-row">
          <button id="btnReset" class="btn" type="button">Edit</button>
          <button id="btnSave" class="btn btn-primary" type="button">
            Save settings
          </button>
        </div>
      </section>
    </div>

    <script>
      const els = {
        currencySelect: document.getElementById("currencySelect"),
        languageSelect: document.getElementById("languageSelect"),
        timezoneSelect: document.getElementById("timezoneSelect"),
        areaUnitSelect: document.getElementById("areaUnitSelect"),
        maxSavedProperties: document.getElementById("maxSavedProperties"),
        maxSavedSearches: document.getElementById("maxSavedSearches"),
        btnSave: document.getElementById("btnSave"),
        btnReset: document.getElementById("btnReset"),
      };

      const defaults = {
        currency: "JPY",
        language: "en-US",
        timezone: "Asia/Tokyo",
        areaUnit: "sqm",
        maxSavedProperties: 100,
        maxSavedSearches: 50,
      };

      function applyDefaults() {
        els.currencySelect.value = defaults.currency;
        els.languageSelect.value = defaults.language;
        els.timezoneSelect.value = defaults.timezone;
        els.areaUnitSelect.value = defaults.areaUnit;
        els.maxSavedProperties.value = String(defaults.maxSavedProperties);
        els.maxSavedSearches.value = String(defaults.maxSavedSearches);
      }

      function saveSettings() {
        alert(
          "Global defaults and saved items limits saved (demo). In production this would call a backend API and be recorded in Audit Logs.",
        );
      }

      function init() {
        applyDefaults();
        els.btnSave.addEventListener("click", saveSettings);
        els.btnReset.addEventListener("click", applyDefaults);
      }

      init();
    </script>
  </body>
</html>
