<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Administrator Account Management</title>
    <style>
      :root {
        --bg-body: #f5f3ef;
        --bg-card: #fffaf2;
        --border-subtle: #eadccd;
        --accent: #c26b41;
        --text-main: #3b2f2a;
        --text-muted: #7a6a5c;
        --badge-green: #2f855a;
        --badge-gray: #4a5568;
        --badge-red: #c53030;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px 24px 32px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .page-subtitle {
        margin: 0 0 16px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .layout {
        display: grid;
        grid-template-columns: 1.7fr 1.3fr;
        gap: 16px;
        align-items: flex-start;
      }

      .card {
        background-color: var(--bg-card);
        border-radius: 14px;
        border: 1px solid var(--border-subtle);
        padding: 14px 16px 16px;
        box-shadow: 0 10px 30px rgba(115, 72, 39, 0.04);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
      }

      .card-subtitle {
        font-size: 12px;
        color: var(--text-muted);
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 140px;
      }

      .field-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
      }

      select,
      input[type="text"] {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 10px;
        font-size: 12px;
        background-color: #fffcf7;
        color: var(--text-main);
        outline: none;
      }

      select:focus,
      input[type="text"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(194, 107, 65, 0.2);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: #f7efe6;
      }

      th,
      td {
        padding: 7px 8px;
        text-align: left;
        border-bottom: 1px solid #efe0d4;
      }

      th {
        font-weight: 500;
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      tbody tr {
        cursor: pointer;
        transition: background 0.12s ease;
      }

      tbody tr:hover {
        background-color: #f8f1ea;
      }

      tbody tr.selected-row {
        background-color: #f1e3d5;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 7px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 500;
        border: 1px solid transparent;
        white-space: nowrap;
      }

      .badge-active {
        background: #e6f6ef;
        color: var(--badge-green);
        border-color: #b7e4cc;
      }

      .badge-locked {
        background: #fffaf0;
        color: #b7791f;
        border-color: #f6ad55;
      }

      .badge-disabled {
        background: #edf2f7;
        color: var(--badge-gray);
        border-color: #cbd5e0;
      }

      .detail-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 6px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
        margin-bottom: 8px;
      }

      .detail-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 2px;
      }

      .detail-value {
        font-size: 12px;
      }

      .preview-box {
        border-radius: 10px;
        border: 1px dashed #deccba;
        padding: 8px 9px;
        background: #fffaf1;
        font-size: 12px;
        color: var(--text-main);
        white-space: pre-line;
      }

      .btn {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 11px;
        font-size: 11px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 4px;
        align-items: center;
        color: var(--text-main);
      }

      .btn-ghost {
        background: transparent;
      }

      .btn-primary {
        background: linear-gradient(135deg, #c26b41, #a55232);
        border-color: #a55232;
        color: #fffaf3;
      }

      .actions-row {
        display: flex;
        justify-content: flex-end;
        gap: 6px;
        margin-top: 6px;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Administrator Account Management</h1>
    </div>
    <div class="layout">
      <section class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Admin account list</div>
          </div>
        </div>
        <div class="filters">
          <div class="field-group">
            <label class="field-label" for="roleFilter">Role</label>
            <select id="roleFilter">
              <option value="">All</option>
              <option value="superadmin">Super Admin</option>
              <option value="ops">Operations</option>
              <option value="support">Support</option>
              <option value="finance">Finance</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label" for="statusFilter">Status</label>
            <select id="statusFilter">
              <option value="">All</option>
              <option value="active">Active</option>
              <option value="locked">Locked</option>
              <option value="disabled">Disabled</option>
            </select>
          </div>
          <div class="field-group" style="flex: 1 1 220px">
            <label class="field-label" for="searchAdmin">Search account</label>
            <input
              id="searchAdmin"
              type="text"
              placeholder="e.g. ops_tanaka, support_01..."
            />
          </div>
        </div>
        <div style="overflow: auto; max-height: 280px">
          <table>
            <thead>
              <tr>
                <th>Username (demo)</th>
                <th>Role</th>
                <th>Team</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="adminTbody"></tbody>
          </table>
        </div>
      </section>
      <section class="card">
        <div id="adminEmpty">
          <div class="card-title">Account details</div>
        </div>
        <div id="adminDetail" style="display: none">
          <div class="detail-section-title">General information</div>
          <div class="detail-grid">
            <div>
              <div class="detail-label">Username (demo)</div>
              <div class="detail-value" id="dUsername"></div>
            </div>
            <div>
              <div class="detail-label">Role</div>
              <div class="detail-value" id="dRole"></div>
            </div>
            <div>
              <div class="detail-label">Team</div>
              <div class="detail-value" id="dTeam"></div>
            </div>
            <div>
              <div class="detail-label">Status</div>
              <div class="detail-value" id="dStatus"></div>
            </div>
          </div>
          <div class="detail-section-title">Module access (summary)</div>
          <div
            class="detail-grid"
            style="grid-template-columns: minmax(0, 1fr)"
          >
            <div>
              <div class="detail-label">Module list</div>
              <div class="detail-value" id="dModules"></div>
            </div>
          </div>
          <div class="detail-section-title">Recent activity (metadata)</div>
          <div
            class="detail-grid"
            style="grid-template-columns: minmax(0, 1fr)"
          >
            <div>
              <div class="detail-label">Last login (demo)</div>
              <div class="detail-value" id="dLastLogin"></div>
            </div>
            <div>
              <div class="detail-label">Internal notes</div>
              <div class="detail-value" id="dNotes"></div>
            </div>
          </div>
          <div class="detail-section-title">Role summary</div>
          <div class="preview-box" id="adminSummary"></div>
          <div class="actions-row">
            <button id="btnToggleLock" class="btn btn-ghost" type="button">
              Lock/Unlock (demo)
            </button>
            <button id="btnSaveAdmin" class="btn btn-primary" type="button">
              Save changes (demo)
            </button>
          </div>
        </div>
      </section>
    </div>
    <script>
      const admins = [
        {
          username: "superadmin_01",
          role: "superadmin",
          team: "HQ",
          status: "active",
          modules: [
            "Lead Management",
            "Property Management",
            "Content Management",
            "Monetisation & Ads",
            "Operations & Analytics",
            "System Settings",
          ],
          lastLogin: "2026-04-10 09:12 JST",
          notes:
            "Highest-privilege owner. Changing permissions requires two-step approval and is always logged to Audit Logs.",
        },
        {
          username: "ops_tanaka",
          role: "ops",
          team: "Ops Tokyo",
          status: "active",
          modules: [
            "Property Management",
            "Operations & Analytics",
            "Messages & Support",
          ],
          lastLogin: "2026-04-12 14:27 JST",
          notes: "Responsible for listing approvals and monitoring activity.",
        },
        {
          username: "support_01",
          role: "support",
          team: "CS JP",
          status: "locked",
          modules: ["Messages & Support"],
          lastLogin: "2026-04-05 18:03 JST",
          notes: "Temporarily locked due to too many failed login attempts.",
        },
        {
          username: "finance_01",
          role: "finance",
          team: "Finance",
          status: "disabled",
          modules: ["Monetisation & Ads"],
          lastLogin: "2026-03-20 11:00 JST",
          notes:
            "Legacy account, currently disabled because the staff has left.",
        },
      ];

      let selectedUsername = null;

      const els = {
        roleFilter: document.getElementById("roleFilter"),
        statusFilter: document.getElementById("statusFilter"),
        searchAdmin: document.getElementById("searchAdmin"),
        adminTbody: document.getElementById("adminTbody"),
        adminEmpty: document.getElementById("adminEmpty"),
        adminDetail: document.getElementById("adminDetail"),
        dUsername: document.getElementById("dUsername"),
        dRole: document.getElementById("dRole"),
        dTeam: document.getElementById("dTeam"),
        dStatus: document.getElementById("dStatus"),
        dModules: document.getElementById("dModules"),
        dLastLogin: document.getElementById("dLastLogin"),
        dNotes: document.getElementById("dNotes"),
        adminSummary: document.getElementById("adminSummary"),
        btnToggleLock: document.getElementById("btnToggleLock"),
        btnSaveAdmin: document.getElementById("btnSaveAdmin"),
      };

      function statusBadge(status) {
        const span = document.createElement("span");
        span.classList.add("badge");
        if (status === "active") {
          span.classList.add("badge-active");
          span.textContent = "Active";
        } else if (status === "locked") {
          span.classList.add("badge-locked");
          span.textContent = "Locked";
        } else {
          span.classList.add("badge-disabled");
          span.textContent = "Disabled";
        }
        return span;
      }

      function roleLabel(r) {
        if (r === "superadmin") return "Super Admin";
        if (r === "ops") return "Operations";
        if (r === "support") return "Support";
        return "Finance";
      }

      function applyFilters() {
        const role = els.roleFilter.value;
        const status = els.statusFilter.value;
        const q = els.searchAdmin.value.trim().toLowerCase();
        return admins.filter((a) => {
          if (role && a.role !== role) return false;
          if (status && a.status !== status) return false;
          if (!q) return true;
          const text = (a.username + " " + a.role + " " + a.team).toLowerCase();
          return text.includes(q);
        });
      }

      function renderTable() {
        const list = applyFilters();
        els.adminTbody.innerHTML = "";
        list.forEach((a) => {
          const tr = document.createElement("tr");
          if (a.username === selectedUsername) tr.classList.add("selected-row");

          const tdUser = document.createElement("td");
          tdUser.textContent = a.username;
          const tdRole = document.createElement("td");
          tdRole.textContent = roleLabel(a.role);
          const tdTeam = document.createElement("td");
          tdTeam.textContent = a.team;
          const tdStatus = document.createElement("td");
          tdStatus.appendChild(statusBadge(a.status));

          tr.appendChild(tdUser);
          tr.appendChild(tdRole);
          tr.appendChild(tdTeam);
          tr.appendChild(tdStatus);

          tr.addEventListener("click", () => selectAdmin(a.username));
          els.adminTbody.appendChild(tr);
        });
      }

      function selectAdmin(username) {
        const a = admins.find((x) => x.username === username);
        if (!a) return;
        selectedUsername = username;
        els.adminEmpty.style.display = "none";
        els.adminDetail.style.display = "";

        els.dUsername.textContent = a.username;
        els.dRole.textContent = roleLabel(a.role);
        els.dTeam.textContent = a.team;
        els.dStatus.textContent =
          a.status === "active"
            ? "Active"
            : a.status === "locked"
              ? "Locked"
              : "Disabled";
        els.dModules.textContent = a.modules.join(", ");
        els.dLastLogin.textContent = a.lastLogin;
        els.dNotes.textContent = a.notes;

        renderSummary(a);
        renderTable();
      }

      function renderSummary(a) {
        const lines = [];
        lines.push(
          `Account ${a.username} (${roleLabel(a.role)}) belongs to team ${a.team}.`,
        );
        lines.push(`Has access to modules: ${a.modules.join(", ")}.`);
        lines.push(
          `Current status: ${
            a.status === "active"
              ? "Active"
              : a.status === "locked"
                ? "Locked"
                : "Disabled"
          }, last login (demo): ${a.lastLogin}.`,
        );
        lines.push(
          "\nThis screen only shows internal account metadata (role, module access, status). Passwords, secrets, session details and the exact content of actions are stored in the authentication system + Audit Logs, not displayed here.",
        );
        if (a.notes.trim()) {
          lines.push("\nAdditional notes:");
          lines.push(a.notes.trim());
        }
        els.adminSummary.textContent = lines.join("\n");
      }

      function toggleLock() {
        if (!selectedUsername) return;
        const a = admins.find((x) => x.username === selectedUsername);
        if (!a) return;
        if (a.status === "active") a.status = "locked";
        else if (a.status === "locked") a.status = "active";
        renderSummary(a);
        selectAdmin(a.username);
        alert(
          "Toggled lock/unlock status (demo). In production this would require approval and be written to Audit Logs.",
        );
      }

      function saveAdmin() {
        if (!selectedUsername) return;
        const a = admins.find((x) => x.username === selectedUsername);
        if (!a) return;
        renderSummary(a);
        alert(
          "Saved account metadata changes (demo). In production you cannot modify passwords here, only role/module access, and every change is written to Audit Logs.",
        );
      }

      function init() {
        els.roleFilter.addEventListener("change", renderTable);
        els.statusFilter.addEventListener("change", renderTable);
        els.searchAdmin.addEventListener("input", renderTable);
        els.btnToggleLock.addEventListener("click", toggleLock);
        els.btnSaveAdmin.addEventListener("click", saveAdmin);
        renderTable();
      }

      init();
    </script>
  </body>
</html>
