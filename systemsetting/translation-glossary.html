<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Translation Glossary</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-body: #f5f5f5;
        --bg-card: #ffffff;
        --border-subtle: #e0e0e0;
        --accent: #8B7340;
        --accent-dark: #6d5a32;
        --gold: #c9a85c;
        --text-main: #1a1a1a;
        --text-muted: #7a6a5c;
        --badge-green: #2f855a;
        --badge-gray: #4a5568;
        --badge-red: #c53030;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 20px 24px 36px;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        background: var(--bg-body);
        color: var(--text-main);
      }
      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }
      .page-subtitle {
        margin: 0 0 16px;
        font-size: 13px;
        color: var(--text-muted);
        max-width: 760px;
      }

      .btn {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 8px 14px;
        font-size: 12px;
        background: #fff;
        cursor: pointer;
        color: var(--text-main);
        display: inline-flex;
        gap: 6px;
        align-items: center;
        font-family: inherit;
        font-weight: 600;
        transition: filter 0.15s;
      }
      .btn:hover:not(:disabled) {
        filter: brightness(0.97);
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        border-color: var(--accent-dark);
        color: #fffaf3;
      }
      .btn-ghost {
        background: transparent;
      }
      .btn-danger {
        background: #fff5f5;
        border-color: #feb2b2;
        color: #c53030;
      }
      .btn-sm {
        padding: 4px 10px;
        font-size: 11px;
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(115, 72, 39, 0.04);
      }
      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-subtle);
        flex-wrap: wrap;
      }
      .card-title {
        font-size: 14px;
        font-weight: 600;
      }

      /* search bar */
      .filter-bar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-subtle);
      }
      .search-box {
        position: relative;
        flex: 1;
        min-width: 220px;
        max-width: 360px;
      }
      .search-box i {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 12px;
      }
      .search-box input {
        width: 100%;
        height: 34px;
        padding: 0 10px 0 32px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        font-size: 12.5px;
        background: #ffffff;
        color: var(--text-main);
        font-family: inherit;
        outline: none;
      }
      .search-box input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(139, 115, 64, 0.18);
      }
      .result-count {
        font-size: 12px;
        color: var(--text-muted);
      }

      .table-wrap {
        overflow-x: auto;
      }
      table {
        border-collapse: collapse;
        font-size: 12.5px;
        min-width: 2000px;
      }
      thead {
        background: #faf6ee;
      }
      th,
      td {
        padding: 9px 12px;
        text-align: left;
        border-bottom: 1px solid #e0e0e0;
        vertical-align: middle;
        white-space: nowrap;
      }
      th {
        font-weight: 600;
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      tbody tr:hover {
        background: #fafafa;
      }
      .col-num {
        width: 44px;
        color: var(--text-muted);
      }
      .jp-term {
        font-weight: 600;
      }
      /* sticky first two columns so JP term stays visible while scrolling */
      th.sticky-1,
      td.sticky-1 {
        position: sticky;
        left: 0;
        background: #ffffff;
        z-index: 2;
      }
      thead th.sticky-1 {
        background: #faf6ee;
      }
      th.sticky-2,
      td.sticky-2 {
        position: sticky;
        left: 44px;
        background: #ffffff;
        z-index: 2;
        box-shadow: 1px 0 0 #e0e0e0;
      }
      thead th.sticky-2 {
        background: #faf6ee;
      }
      .col-actions {
        text-align: right;
      }
      .row-actions {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
      }
      .cell-input {
        width: 100%;
        min-width: 130px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 5px 8px;
        font-size: 12.5px;
        background: #ffffff;
        color: var(--text-main);
        font-family: inherit;
        outline: none;
      }
      .cell-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(139, 115, 64, 0.18);
      }
      .empty-state {
        text-align: center;
        color: var(--text-muted);
        padding: 26px;
      }

      /* modal */
      .modal-ov {
        position: fixed;
        inset: 0;
        background: rgba(44, 24, 16, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal-ov.open {
        display: flex;
      }
      .modal {
        background: #fff;
        border: 1px solid var(--border-subtle);
        border-radius: 14px;
        width: 680px;
        max-width: calc(100% - 32px);
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 16px 40px rgba(44, 24, 16, 0.25);
        overflow: hidden;
      }
      .modal-header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border-subtle);
        background: #faf6ee;
        font-size: 15px;
        font-weight: 700;
      }
      .modal-body {
        padding: 16px 18px;
        overflow: auto;
      }
      .modal-footer {
        padding: 12px 18px;
        border-top: 1px solid var(--border-subtle);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        background: #faf6ee;
      }
      .field {
        margin-bottom: 14px;
      }
      .field label {
        display: block;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 5px;
      }
      .field label .req {
        color: var(--badge-red);
      }
      .field input {
        width: 100%;
        border-radius: 9px;
        border: 1px solid var(--border-subtle);
        padding: 9px 11px;
        font-size: 13px;
        background: #ffffff;
        color: var(--text-main);
        font-family: inherit;
        outline: none;
      }
      .field input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(139, 115, 64, 0.16);
      }
      .lang-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 16px;
      }
      .lang-helper {
        margin: 0 0 12px;
        font-size: 11.5px;
        color: var(--text-muted);
      }
      .form-error {
        font-size: 11.5px;
        color: var(--badge-red);
        margin-top: 4px;
        display: none;
      }
      .form-error.show {
        display: block;
      }

      .toast-wrap {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 1200;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .toast {
        background: #2f2a24;
        color: #fff;
        border-left: 4px solid var(--gold);
        padding: 11px 15px;
        border-radius: 9px;
        font-size: 13px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        display: flex;
        gap: 9px;
        align-items: center;
      }
      .toast.ok {
        border-left-color: var(--badge-green);
      }
    </style>
  </head>
  <body>
    <h1>Translation Glossary</h1>

    <div class="card">
      <div class="card-head">
        <div class="card-title">Glossary terms</div>
        <button class="btn btn-primary" onclick="openAddModal()">
          <i class="fas fa-plus"></i> Add Term
        </button>
      </div>
      <div class="filter-bar">
        <div class="search-box">
          <i class="fas fa-magnifying-glass"></i>
          <input
            id="searchInput"
            type="text"
            placeholder="Search JP term or any translation…"
            oninput="renderTable()"
          />
        </div>
        <span class="result-count" id="resultCount"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Add Term modal -->
    <div
      class="modal-ov"
      id="addModal"
      onclick="if (event.target === this) closeAddModal();"
    >
      <div class="modal">
        <div class="modal-header">Add Term</div>
        <div class="modal-body">
          <div class="field">
            <label>JP Term</label>
            <input
              id="add-jp"
              type="text"
              placeholder="e.g. マンション"
              oninput="hideAddError()"
            />
            <div class="form-error" id="addError">
              This JP term already exists.
            </div>
          </div>
          <p class="lang-helper">Fill in at least 2 language values.</p>
          <div class="lang-grid" id="addLangGrid"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeAddModal()">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="saveTerm()">Save</button>
        </div>
      </div>
    </div>

    <!-- Delete confirm modal -->
    <div
      class="modal-ov"
      id="deleteModal"
      onclick="if (event.target === this) closeDeleteModal();"
    >
      <div class="modal" style="width: 420px">
        <div class="modal-header">Delete term?</div>
        <div class="modal-body">
          <p id="deleteMsg" style="margin: 0; font-size: 13px"></p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeDeleteModal()">
            Cancel
          </button>
          <button class="btn btn-danger" onclick="confirmDelete()">
            Delete
          </button>
        </div>
      </div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const esc = (s) =>
        String(s ?? "").replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      const LS_KEY = "yuushi.translationGlossary";
      const LS = {
        get(k, d) {
          try {
            const v = localStorage.getItem(k);
            return v ? JSON.parse(v) : d;
          } catch (e) {
            return d;
          }
        },
        set(k, v) {
          try {
            localStorage.setItem(k, JSON.stringify(v));
          } catch (e) {}
        },
      };
      function toast(msg) {
        const el = document.createElement("div");
        el.className = "toast ok";
        el.innerHTML = '<i class="fas fa-circle-check"></i> ' + esc(msg);
        $("toastWrap").appendChild(el);
        setTimeout(() => {
          el.style.opacity = "0";
          setTimeout(() => el.remove(), 200);
        }, 2600);
      }

      // 14 target languages (column key + header label). All optional; at least
      // 2 of the 15 language values (JP Term + these 14) must be provided.
      const LANG_COLS = [
        { key: "en", label: "EN" },
        { key: "zh-tw", label: "ZH-TW" },
        { key: "zh-cn", label: "ZH-CN" },
        { key: "ko", label: "KO" },
        { key: "th", label: "TH" },
        { key: "de", label: "DE" },
        { key: "fr", label: "FR" },
        { key: "es", label: "ES" },
        { key: "it", label: "IT" },
        { key: "ar", label: "AR" },
        { key: "pt", label: "PT" },
        { key: "id", label: "ID" },
        { key: "vi", label: "VI" },
        { key: "hi", label: "HI" },
      ];

      // ---------- seed (flat rows: one JP term + all 14 translations) ----------
      function buildSeed() {
        return [
          {
            jp: "マンション",
            en: "Apartment (Reinforced Concrete)",
            "zh-tw": "公寓（鋼筋混凝土）",
            "zh-cn": "公寓（钢筋混凝土）",
            ko: "아파트（철근콘크리트）",
            th: "",
            de: "Apartment (Stahlbeton)",
            fr: "Appartement (béton armé)",
            es: "Apartamento (hormigón armado)",
            it: "Appartamento (cemento armato)",
            ar: "شقة (خرسانة مسلحة)",
            pt: "Apartamento (concreto armado)",
            id: "Apartemen (beton bertulang)",
            vi: "Căn hộ (bê tông cốt thép)",
            hi: "अपार्टमेंट (प्रबलित कंक्रीट)",
          },
          {
            jp: "一戸建て",
            en: "Detached House",
            "zh-tw": "獨棟住宅",
            "zh-cn": "独栋住宅",
            ko: "단독주택",
            th: "",
            de: "Einfamilienhaus",
            fr: "Maison individuelle",
            es: "Casa unifamiliar",
            it: "Casa indipendente",
            ar: "منزل مستقل",
            pt: "Casa independente",
            id: "Rumah terpisah",
            vi: "Nhà riêng lẻ",
            hi: "अलग मकान",
          },
          {
            jp: "土地",
            en: "Land",
            "zh-tw": "土地",
            "zh-cn": "土地",
            ko: "토지",
            th: "",
            de: "Grundstück",
            fr: "Terrain",
            es: "Terreno",
            it: "Terreno",
            ar: "أرض",
            pt: "Terreno",
            id: "Tanah",
            vi: "Đất",
            hi: "भूमि",
          },
          {
            jp: "アパート",
            en: "Apartment (Wooden/Light Steel)",
            "zh-tw": "公寓（木造/輕鋼）",
            "zh-cn": "公寓（木造/轻钢）",
            ko: "아파트（목조/경량철골）",
            th: "",
            de: "Apartment (Holz/Leichtstahl)",
            fr: "Appartement (bois/acier léger)",
            es: "Apartamento (madera/acero ligero)",
            it: "Appartamento (legno/acciaio leggero)",
            ar: "شقة (خشب/فولاذ خفيف)",
            pt: "Apartamento (madeira/aço leve)",
            id: "Apartemen (kayu/baja ringan)",
            vi: "Căn hộ (gỗ/thép nhẹ)",
            hi: "अपार्टमेंट (लकड़ी/हल्का स्टील)",
          },
          {
            jp: "店舗",
            en: "Retail/Shop Space",
            "zh-tw": "店面",
            "zh-cn": "店面",
            ko: "상가",
            th: "",
            de: "Ladenlokal",
            fr: "Local commercial",
            es: "Local comercial",
            it: "Locale commerciale",
            ar: "محل تجاري",
            pt: "Espaço comercial",
            id: "Toko/Ruang ritel",
            vi: "Mặt bằng bán lẻ",
            hi: "खुदरा/दुकान स्थान",
          },
        ];
      }
      // Migrate the old tab-per-language shape (object keyed by language) if present.
      let glossary = LS.get(LS_KEY, null);
      if (!Array.isArray(glossary)) {
        glossary = buildSeed();
        LS.set(LS_KEY, glossary);
      }
      function persist() {
        LS.set(LS_KEY, glossary);
      }

      let editIdx = null;

      function renderHead() {
        $("tableHead").innerHTML =
          "<tr>" +
          '<th class="col-num sticky-1">#</th>' +
          '<th class="sticky-2">JP Term</th>' +
          LANG_COLS.map((c) => `<th>${esc(c.label)}</th>`).join("") +
          '<th style="text-align:right">Actions</th></tr>';
      }

      function renderTable() {
        const q = ($("searchInput").value || "").toLowerCase().trim();
        const colCount = 3 + LANG_COLS.length;
        const body = $("tableBody");
        let shown = 0;
        let html = "";
        glossary.forEach((r, idx) => {
          const hay = (
            r.jp +
            " " +
            LANG_COLS.map((c) => r[c.key] || "").join(" ")
          ).toLowerCase();
          if (q && !hay.includes(q)) return;
          shown++;
          const editing = editIdx === idx;
          const cells = LANG_COLS.map((c) => {
            if (editing)
              return `<td><input class="cell-input" id="et-${idx}-${c.key}" value="${esc(r[c.key] || "")}"></td>`;
            return `<td>${esc(r[c.key] || "—")}</td>`;
          }).join("");
          const actions = editing
            ? `<button class="btn btn-primary btn-sm" onclick="saveEdit(${idx})"><i class="fas fa-floppy-disk"></i> Save</button>
               <button class="btn btn-ghost btn-sm" onclick="cancelEdit()">Cancel</button>`
            : `<button class="btn btn-sm" onclick="openEdit(${idx})"><i class="fas fa-pen"></i> Edit</button>
               <button class="btn btn-danger btn-sm" onclick="deleteTerm(${idx})"><i class="fas fa-trash"></i> Delete</button>`;
          html += `<tr>
            <td class="col-num sticky-1">${idx + 1}</td>
            <td class="sticky-2"><span class="jp-term">${esc(r.jp)}</span></td>
            ${cells}
            <td class="col-actions"><div class="row-actions">${actions}</div></td>
          </tr>`;
        });
        body.innerHTML =
          html ||
          `<tr><td colspan="${colCount}" class="empty-state">${glossary.length ? "No terms match your search." : "No terms added yet."}</td></tr>`;
        $("resultCount").textContent =
          "Showing " + shown + " of " + glossary.length + " terms";
      }

      // ---------- inline edit (all 14 translation cells; JP not editable) ----------
      function openEdit(idx) {
        editIdx = idx;
        renderTable();
        const el = $("et-" + idx + "-en");
        if (el) el.focus();
      }
      function cancelEdit() {
        editIdx = null;
        renderTable();
      }
      function saveEdit(idx) {
        const values = LANG_COLS.map((c) =>
          ($("et-" + idx + "-" + c.key).value || "").trim(),
        );
        // JP Term is not editable here; count it among the 15 if non-empty.
        let filled = (glossary[idx].jp || "").trim() ? 1 : 0;
        filled += values.filter((v) => v).length;
        if (filled < 2) {
          toast("Please fill in at least 2 language values.");
          return;
        }
        LANG_COLS.forEach((c, i) => {
          glossary[idx][c.key] = values[i];
        });
        persist();
        editIdx = null;
        renderTable();
        toast("Term updated successfully.");
      }
      let deleteIdx = null;
      function deleteTerm(idx) {
        deleteIdx = idx;
        $("deleteMsg").innerHTML =
          'Permanently delete the term "' +
          esc(glossary[idx].jp) +
          '"? This action cannot be undone.';
        $("deleteModal").classList.add("open");
      }
      function closeDeleteModal() {
        $("deleteModal").classList.remove("open");
        deleteIdx = null;
      }
      function confirmDelete() {
        if (deleteIdx === null) return;
        glossary.splice(deleteIdx, 1);
        persist();
        deleteIdx = null;
        editIdx = null;
        $("deleteModal").classList.remove("open");
        renderTable();
        toast("Term deleted successfully.");
      }

      // ---------- add modal ----------
      function buildAddGrid() {
        $("addLangGrid").innerHTML = LANG_COLS.map(
          (c) => `
          <div class="field" style="margin-bottom:0">
            <label>${esc(c.label)}</label>
            <input id="add-${c.key}" type="text" oninput="hideAddError()" />
          </div>`,
        ).join("");
      }
      function openAddModal() {
        buildAddGrid();
        $("add-jp").value = "";
        hideAddError();
        $("addModal").classList.add("open");
        setTimeout(() => $("add-jp").focus(), 30);
      }
      function closeAddModal() {
        $("addModal").classList.remove("open");
      }
      function hideAddError() {
        $("addError").classList.remove("show");
      }
      function saveTerm() {
        const jp = ($("add-jp").value || "").trim();
        const values = LANG_COLS.map((c) =>
          ($("add-" + c.key).value || "").trim(),
        );
        // Count non-empty across all 15 columns (JP Term + 14 languages).
        let filled = jp ? 1 : 0;
        filled += values.filter((v) => v).length;
        if (filled < 2) {
          toast("Please fill in at least 2 language values.");
          return;
        }
        if (
          jp &&
          glossary.some((r) => r.jp.toLowerCase() === jp.toLowerCase())
        ) {
          $("addError").classList.add("show");
          return;
        }
        const row = { jp };
        LANG_COLS.forEach((c, i) => {
          row[c.key] = values[i];
        });
        glossary.push(row);
        persist();
        closeAddModal();
        renderTable();
        toast("Term saved successfully.");
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeAddModal();
          closeDeleteModal();
        }
      });

      renderHead();
      renderTable();
    </script>
  </body>
</html>
