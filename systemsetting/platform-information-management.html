<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Platform Information Management</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-body: #f5f3ef;
        --bg-card: #fffaf2;
        --border-subtle: #eadccd;
        --accent: #c26b41;
        --text-main: #3b2f2a;
        --text-muted: #7a6a5c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px 24px 32px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: flex-start;
      }

      .card {
        background-color: var(--bg-card);
        border-radius: 14px;
        border: 1px solid var(--border-subtle);
        padding: 14px 16px 16px;
        box-shadow: 0 10px 30px rgba(115, 72, 39, 0.04);
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 14px;
      }

      .field-grid.full {
        grid-template-columns: 1fr;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
      }

      input[type="text"],
      input[type="email"],
      input[type="tel"],
      textarea,
      select {
        border-radius: 8px;
        border: 1px solid var(--border-subtle);
        padding: 8px 10px;
        font-size: 12px;
        background-color: #fffcf7;
        color: var(--text-main);
        outline: none;
        font-family: inherit;
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="tel"]:focus,
      textarea:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(194, 107, 65, 0.2);
      }

      textarea {
        resize: vertical;
        min-height: 80px;
      }

      .logo-section {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }

      .logo-preview {
        width: 80px;
        height: 80px;
        border-radius: 8px;
        border: 2px dashed var(--border-subtle);
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f9f6f0;
        overflow: hidden;
      }

      .logo-preview img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .logo-preview.empty {
        color: var(--text-muted);
        font-size: 24px;
      }

      .logo-upload {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .file-input-wrapper {
        position: relative;
      }

      input[type="file"] {
        display: none;
      }

      .btn-upload {
        border-radius: 8px;
        border: 1px solid var(--border-subtle);
        padding: 8px 12px;
        font-size: 12px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        color: var(--text-main);
        width: 100%;
      }

      .btn-upload:hover {
        background-color: #f9f6f0;
      }

      .hint-text {
        font-size: 11px;
        color: var(--text-muted);
      }

      .btn-row {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 14px;
      }

      .btn {
        border-radius: 8px;
        border: 1px solid var(--border-subtle);
        padding: 8px 14px;
        font-size: 12px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        color: var(--text-main);
      }

      .btn:hover {
        background-color: #f9f6f0;
      }

      .btn-primary {
        background: linear-gradient(135deg, #c26b41, #a55232);
        border-color: #a55232;
        color: #fffaf3;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #b5603a, #9a482d);
      }

      .btn-secondary {
        background-color: #f9f6f0;
      }

      .branch-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .branch-item {
        background-color: #f9f6f0;
        border: 1px solid var(--border-subtle);
        border-radius: 10px;
        padding: 12px 14px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        font-size: 12px;
      }

      .branch-item.editing {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(194, 107, 65, 0.15);
      }

      .branch-info {
        flex: 1;
        min-width: 0;
      }

      .branch-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 4px;
      }

      .branch-meta {
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.5;
        word-break: break-word;
      }

      .branch-meta-label {
        display: inline-block;
        min-width: 56px;
        color: var(--text-muted);
        font-weight: 500;
      }

      .branch-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      .btn-icon {
        background: none;
        border: 1px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        color: var(--text-muted);
        padding: 6px 8px;
        font-size: 12px;
        line-height: 1;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s;
      }

      .btn-icon:hover {
        color: var(--accent);
        background: #fff;
        border-color: var(--border-subtle);
      }

      .add-branch-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        background: #fffaf2;
        border: 1px dashed var(--border-subtle);
        border-radius: 10px;
        padding: 12px;
      }

      .add-branch-group .full-row {
        grid-column: 1 / -1;
      }

      .add-branch-group input {
        width: 100%;
      }

      .add-branch-actions {
        grid-column: 1 / -1;
        display: flex;
        justify-content: flex-end;
        gap: 6px;
      }

      @media (max-width: 600px) {
        .add-branch-group {
          grid-template-columns: 1fr;
        }
        .branch-item {
          flex-direction: column;
        }
        .branch-actions {
          align-self: flex-end;
        }
      }

      .export-btn {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <style id="uxBaselinePolish">
/* Baseline UI polish — applies only where file CSS doesn't override */
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Pointer cursor on interactive */
button, .btn, [role="button"], select,
input[type="checkbox"], input[type="radio"], input[type="submit"],
input[type="button"], a[href], label[for] {
  cursor: pointer;
}

/* Disabled state */
button:disabled, .btn:disabled, input:disabled, select:disabled, textarea:disabled {
  cursor: not-allowed;
  opacity: 0.6;
}

/* Focus-visible outline (a11y) */
button:focus-visible, .btn:focus-visible,
a:focus-visible, [role="button"]:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid #c4a25f;
  outline-offset: 2px;
}

/* Inherit font family for form controls (fixes browser-default) */
input, select, textarea, button {
  font-family: inherit;
}

/* Responsive media */
img, svg, video {
  max-width: 100%;
  height: auto;
}

/* Subtle hover for buttons (only if no transition already set, gentle filter) */
button:hover:not(:disabled), .btn:hover:not(:disabled) {
  filter: brightness(0.96);
  transition: filter 0.15s ease;
}

/* Smooth scrollbar on Webkit */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: #f5ece0;
}
::-webkit-scrollbar-thumb {
  background: #d9c8b4;
  border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover {
  background: #c4a25f;
}

/* Selection highlight on-brand */
::selection {
  background: #c4a25f;
  color: #fff;
}

/* HR baseline */
hr {
  border: none;
  border-top: 1px solid #eadccd;
  margin: 12px 0;
}

/* Anchor baseline color matches brand (no underline by default to match flat UI) */
a {
  color: #8a5a3b;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
  <body>
    <div>
      <h1>Platform Information</h1>
    </div>

    <div class="layout">
      <!-- Basic Information -->
      <section class="card">
        <div class="card-title">Basic Information</div>
        <div class="field-grid full">
          <div class="field-group">
            <label class="field-label" for="platformName">Platform Name</label>
            <input
              id="platformName"
              type="text"
              placeholder="e.g., AnnaJapan"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="companyName">Company Name</label>
            <input
              id="companyName"
              type="text"
              placeholder="e.g., Anna Japan Inc."
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="hotline">Hotline</label>
            <input
              id="hotline"
              type="tel"
              placeholder="e.g., +81-800-123-4567"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="email">Email</label>
            <input
              id="email"
              type="email"
              placeholder="e.g., support@annajapan.jp"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="legalRepresentative">
              Legal Representative
            </label>
            <input
              id="legalRepresentative"
              type="text"
              placeholder="e.g., John Tanaka"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="headOfficeAddress"
              >Head Office Address</label
            >
            <textarea
              id="headOfficeAddress"
              placeholder="Street address, building, etc."
            ></textarea>
          </div>
        </div>

        <div class="btn-row">
          <button id="btnSave" class="btn btn-primary" type="button">
            <i class="fas fa-check"></i> Save
          </button>
        </div>
      </section>

      <!-- Logo & Branches -->
      <section class="card">
        <div class="card-title">Platform Logo</div>
        <div class="logo-section">
          <div class="logo-preview empty" id="logoPreview">
            <i class="fas fa-image"></i>
          </div>
          <div class="logo-upload">
            <div class="file-input-wrapper">
              <input id="logoFile" type="file" accept="image/*" />
              <button
                class="btn-upload"
                onclick="document.getElementById('logoFile').click()"
              >
                <i class="fas fa-upload"></i> Upload Logo
              </button>
            </div>
          </div>
        </div>

        <div
          style="
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid var(--border-subtle);
          "
        >
          <div class="card-title" style="margin-top: 0">Branches</div>
          <div class="branch-list" id="branchList"></div>

          <div class="add-branch-group" style="margin-top: 10px">
            <input
              id="newBranchName"
              type="text"
              placeholder="Branch name (e.g., Branch Saitama)"
              class="full-row"
            />
            <input
              id="newBranchPhone"
              type="tel"
              placeholder="Phone (e.g., +81 3-6427-8451)"
            />
            <input
              id="newBranchAddress"
              type="text"
              placeholder="Address"
            />
            <div class="add-branch-actions">
              <button
                id="btnCancelEdit"
                class="btn"
                type="button"
                style="display: none"
              >
                Cancel
              </button>
              <button id="btnAddBranch" class="btn btn-secondary" type="button">
                <i class="fas fa-plus"></i> Add branch
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      // Elements
      const els = {
        platformName: document.getElementById("platformName"),
        companyName: document.getElementById("companyName"),
        hotline: document.getElementById("hotline"),
        email: document.getElementById("email"),
        legalRepresentative: document.getElementById("legalRepresentative"),
        headOfficeAddress: document.getElementById("headOfficeAddress"),
        logoFile: document.getElementById("logoFile"),
        logoPreview: document.getElementById("logoPreview"),
        newBranchName: document.getElementById("newBranchName"),
        newBranchPhone: document.getElementById("newBranchPhone"),
        newBranchAddress: document.getElementById("newBranchAddress"),
        btnAddBranch: document.getElementById("btnAddBranch"),
        btnCancelEdit: document.getElementById("btnCancelEdit"),
        branchList: document.getElementById("branchList"),
        btnSave: document.getElementById("btnSave"),
      };

      let editingIndex = null;

      // Default data
      const defaults = {
        platformName: "AnnaJapan",
        companyName: "Anna Japan Inc.",
        hotline: "+81-800-123-4567",
        email: "support@annajapan.jp",
        legalRepresentative: "Admin Tanaka",
        headOfficeAddress: "Tokyo, Japan",
        branches: [
          {
            name: "Branch Tokyo",
            phone: "+81 3-1234-5678",
            address: "1-1-1 Marunouchi, Chiyoda-ku, Tokyo 100-0005, Japan",
          },
          {
            name: "Branch Saitama",
            phone: "+81 3-6427-8451",
            address: "3-12-7 Shibuya, Shibuya-ku Saitama 150-0002, Japan",
          },
          {
            name: "Branch Osaka",
            phone: "+81 6-1234-5678",
            address: "1-2-3 Umeda, Kita-ku, Osaka 530-0001, Japan",
          },
        ],
        logo: null,
      };

      let currentData = JSON.parse(JSON.stringify(defaults));

      // Initialize
      function init() {
        applyDefaults();
        renderBranches();
        setupEventListeners();
      }

      function applyDefaults() {
        els.platformName.value = currentData.platformName;
        els.companyName.value = currentData.companyName;
        els.hotline.value = currentData.hotline;
        els.email.value = currentData.email;
        els.legalRepresentative.value = currentData.legalRepresentative;
        els.headOfficeAddress.value = currentData.headOfficeAddress;
      }

      function escapeHtml(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderBranches() {
        if (!currentData.branches.length) {
          els.branchList.innerHTML =
            '<div class="branch-meta" style="padding: 8px 4px">No branches configured yet.</div>';
          return;
        }
        els.branchList.innerHTML = currentData.branches
          .map(
            (branch, idx) => `
          <div class="branch-item ${editingIndex === idx ? "editing" : ""}">
            <div class="branch-info">
              <div class="branch-name">${escapeHtml(branch.name)}</div>
              <div class="branch-meta">
                <span class="branch-meta-label">Phone:</span>
                ${escapeHtml(branch.phone) || "<em>—</em>"}
              </div>
              <div class="branch-meta">
                <span class="branch-meta-label">Address:</span>
                ${escapeHtml(branch.address) || "<em>—</em>"}
              </div>
            </div>
            <div class="branch-actions">
              <button
                class="btn-icon"
                onclick="editBranch(${idx})"
                title="Edit"
              >
                <i class="fas fa-edit"></i>
              </button>
              <button
                class="btn-icon"
                onclick="removeBranch(${idx})"
                title="Remove"
              >
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        `,
          )
          .join("");
      }

      function readBranchForm() {
        return {
          name: els.newBranchName.value.trim(),
          phone: els.newBranchPhone.value.trim(),
          address: els.newBranchAddress.value.trim(),
        };
      }

      function clearBranchForm() {
        els.newBranchName.value = "";
        els.newBranchPhone.value = "";
        els.newBranchAddress.value = "";
      }

      function setEditMode(idx) {
        editingIndex = idx;
        const b = currentData.branches[idx];
        els.newBranchName.value = b.name;
        els.newBranchPhone.value = b.phone;
        els.newBranchAddress.value = b.address;
        els.btnAddBranch.innerHTML =
          '<i class="fas fa-check"></i> Save changes';
        els.btnCancelEdit.style.display = "";
        els.newBranchName.focus();
        renderBranches();
      }

      function exitEditMode() {
        editingIndex = null;
        clearBranchForm();
        els.btnAddBranch.innerHTML = '<i class="fas fa-plus"></i> Add branch';
        els.btnCancelEdit.style.display = "none";
        renderBranches();
      }

      function addBranch() {
        const data = readBranchForm();
        if (!data.name) {
          alert("Branch name is required.");
          els.newBranchName.focus();
          return;
        }
        if (editingIndex !== null) {
          currentData.branches[editingIndex] = data;
          exitEditMode();
        } else {
          currentData.branches.push(data);
          clearBranchForm();
          renderBranches();
        }
      }

      function removeBranch(idx) {
        if (!confirm(`Remove "${currentData.branches[idx].name}"?`)) return;
        currentData.branches.splice(idx, 1);
        if (editingIndex === idx) exitEditMode();
        else renderBranches();
      }

      function editBranch(idx) {
        setEditMode(idx);
      }

      function setupEventListeners() {
        els.logoFile.addEventListener("change", handleLogoUpload);
        els.btnAddBranch.addEventListener("click", addBranch);
        els.btnCancelEdit.addEventListener("click", exitEditMode);
        els.btnSave.addEventListener("click", savePlatformInfo);
      }

      function handleLogoUpload(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            currentData.logo = event.target.result;
            updateLogoPreview();
          };
          reader.readAsDataURL(file);
        }
      }

      function updateLogoPreview() {
        if (currentData.logo) {
          els.logoPreview.innerHTML = `<img src="${currentData.logo}" alt="Platform logo" />`;
          els.logoPreview.classList.remove("empty");
        }
      }

      function savePlatformInfo() {
        currentData.platformName = els.platformName.value;
        currentData.companyName = els.companyName.value;
        currentData.hotline = els.hotline.value;
        currentData.email = els.email.value;
        currentData.legalRepresentative = els.legalRepresentative.value;
        currentData.headOfficeAddress = els.headOfficeAddress.value;

        alert(
          "Platform information saved successfully!\n\n" +
            "Platform: " +
            currentData.platformName +
            "\n" +
            "Company: " +
            currentData.companyName +
            "\n" +
            "Email: " +
            currentData.email +
            "\n" +
            "Legal Rep: " +
            currentData.legalRepresentative +
            "\n" +
            "Branches: " +
            currentData.branches.map((b) => b.name).join(", ") +
            "\n\nIn production, this would be saved to the backend and recorded in Audit Logs.",
        );
      }

      // Init on page load
      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
