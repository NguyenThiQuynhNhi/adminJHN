<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Platform Information Management</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-body: #f5f3ef;
        --bg-card: #fffaf2;
        --border-subtle: #eadccd;
        --accent: #c26b41;
        --text-main: #3b2f2a;
        --text-muted: #7a6a5c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px 24px 32px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: flex-start;
      }

      .card {
        background-color: var(--bg-card);
        border-radius: 14px;
        border: 1px solid var(--border-subtle);
        padding: 14px 16px 16px;
        box-shadow: 0 10px 30px rgba(115, 72, 39, 0.04);
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 14px;
      }

      .field-grid.full {
        grid-template-columns: 1fr;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
      }

      input[type="text"],
      input[type="email"],
      input[type="tel"],
      textarea,
      select {
        border-radius: 8px;
        border: 1px solid var(--border-subtle);
        padding: 8px 10px;
        font-size: 12px;
        background-color: #fffcf7;
        color: var(--text-main);
        outline: none;
        font-family: inherit;
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="tel"]:focus,
      textarea:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(194, 107, 65, 0.2);
      }

      textarea {
        resize: vertical;
        min-height: 80px;
      }

      .logo-section {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }

      .logo-preview {
        width: 80px;
        height: 80px;
        border-radius: 8px;
        border: 2px dashed var(--border-subtle);
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f9f6f0;
        overflow: hidden;
      }

      .logo-preview img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .logo-preview.empty {
        color: var(--text-muted);
        font-size: 24px;
      }

      .logo-upload {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .file-input-wrapper {
        position: relative;
      }

      input[type="file"] {
        display: none;
      }

      .btn-upload {
        border-radius: 8px;
        border: 1px solid var(--border-subtle);
        padding: 8px 12px;
        font-size: 12px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        color: var(--text-main);
        width: 100%;
      }

      .btn-upload:hover {
        background-color: #f9f6f0;
      }

      .hint-text {
        font-size: 11px;
        color: var(--text-muted);
      }

      .btn-row {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 14px;
      }

      .btn {
        border-radius: 8px;
        border: 1px solid var(--border-subtle);
        padding: 8px 14px;
        font-size: 12px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        color: var(--text-main);
      }

      .btn:hover {
        background-color: #f9f6f0;
      }

      .btn-primary {
        background: linear-gradient(135deg, #c26b41, #a55232);
        border-color: #a55232;
        color: #fffaf3;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #b5603a, #9a482d);
      }

      .btn-secondary {
        background-color: #f9f6f0;
      }

      .branch-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .branch-item {
        background-color: #f9f6f0;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
      }

      .branch-actions {
        display: flex;
        gap: 6px;
      }

      .btn-icon {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        padding: 2px 6px;
        font-size: 12px;
      }

      .btn-icon:hover {
        color: var(--accent);
      }

      .add-branch-group {
        display: flex;
        gap: 8px;
      }

      .add-branch-group input {
        flex: 1;
      }

      .add-branch-group button {
        min-width: fit-content;
      }

      .export-btn {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div>
      <h1>YUUSHI Setting</h1>
    </div>

    <div class="layout">
      <!-- Basic Information -->
      <section class="card">
        <div class="card-title">Basic Information</div>
        <div class="field-grid full">
          <div class="field-group">
            <label class="field-label" for="platformName">Platform Name</label>
            <input
              id="platformName"
              type="text"
              placeholder="e.g., AnnaJapan"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="companyName">Company Name</label>
            <input
              id="companyName"
              type="text"
              placeholder="e.g., Anna Japan Inc."
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="hotline">Hotline</label>
            <input
              id="hotline"
              type="tel"
              placeholder="e.g., +81-800-123-4567"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="email">Email</label>
            <input
              id="email"
              type="email"
              placeholder="e.g., support@annajapan.jp"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="legalRepresentative">
              Legal Representative
            </label>
            <input
              id="legalRepresentative"
              type="text"
              placeholder="e.g., John Tanaka"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="headOfficeAddress"
              >Head Office Address</label
            >
            <textarea
              id="headOfficeAddress"
              placeholder="Street address, building, etc."
            ></textarea>
          </div>

          <div class="btn-row">
            <button id="btnSave" class="btn btn-primary" type="button">
              <i class="fas fa-check"></i> Save
            </button>
          </div>
        </div>
      </section>

      <!-- Logo & Branches -->
      <section class="card">
        <div class="card-title">Platform Logo</div>
        <div class="logo-section">
          <div class="logo-preview empty" id="logoPreview">
            <i class="fas fa-image"></i>
          </div>
          <div class="logo-upload">
            <div class="file-input-wrapper">
              <input id="logoFile" type="file" accept="image/*" />
              <button
                class="btn-upload"
                onclick="document.getElementById('logoFile').click()"
              >
                <i class="fas fa-upload"></i> Upload Logo
              </button>
            </div>
          </div>
        </div>

        <div
          style="
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid var(--border-subtle);
          "
        >
          <div class="card-title" style="margin-top: 0">Branches</div>
          <div class="branch-list" id="branchList"></div>

          <div class="add-branch-group" style="margin-top: 10px">
            <input
              id="newBranchInput"
              type="text"
              placeholder="Add a branch name..."
            />
            <button id="btnAddBranch" class="btn btn-secondary" type="button">
              <i class="fas fa-plus"></i> Add
            </button>
          </div>
        </div>
      </section>
    </div>

    <script>
      // Elements
      const els = {
        platformName: document.getElementById("platformName"),
        companyName: document.getElementById("companyName"),
        hotline: document.getElementById("hotline"),
        email: document.getElementById("email"),
        legalRepresentative: document.getElementById("legalRepresentative"),
        headOfficeAddress: document.getElementById("headOfficeAddress"),
        logoFile: document.getElementById("logoFile"),
        logoPreview: document.getElementById("logoPreview"),
        newBranchInput: document.getElementById("newBranchInput"),
        btnAddBranch: document.getElementById("btnAddBranch"),
        branchList: document.getElementById("branchList"),
        btnSave: document.getElementById("btnSave"),
        btnReset: document.getElementById("btnReset"),
        btnExport: document.getElementById("btnExport"),
      };

      // Default data
      const defaults = {
        platformName: "AnnaJapan",
        companyName: "Anna Japan Inc.",
        hotline: "+81-800-123-4567",
        email: "support@annajapan.jp",
        legalRepresentative: "Admin Tanaka",
        headOfficeAddress: "Tokyo, Japan",
        branches: ["Tokyo", "Osaka", "Kyoto"],
        logo: null,
      };

      let currentData = JSON.parse(JSON.stringify(defaults));

      // Initialize
      function init() {
        applyDefaults();
        renderBranches();
        setupEventListeners();
      }

      function applyDefaults() {
        els.platformName.value = currentData.platformName;
        els.companyName.value = currentData.companyName;
        els.hotline.value = currentData.hotline;
        els.email.value = currentData.email;
        els.legalRepresentative.value = currentData.legalRepresentative;
        els.headOfficeAddress.value = currentData.headOfficeAddress;
      }

      function renderBranches() {
        els.branchList.innerHTML = currentData.branches
          .map(
            (branch, idx) => `
          <div class="branch-item">
            <span>${branch}</span>
            <div class="branch-actions">
              <button class="btn-icon" onclick="editBranch(${idx})">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn-icon" onclick="removeBranch(${idx})">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        `,
          )
          .join("");
      }

      function addBranch() {
        const value = els.newBranchInput.value.trim();
        if (value) {
          currentData.branches.push(value);
          els.newBranchInput.value = "";
          renderBranches();
        }
      }

      function removeBranch(idx) {
        currentData.branches.splice(idx, 1);
        renderBranches();
      }

      function editBranch(idx) {
        const newName = prompt("Edit branch name:", currentData.branches[idx]);
        if (newName !== null && newName.trim()) {
          currentData.branches[idx] = newName.trim();
          renderBranches();
        }
      }

      function setupEventListeners() {
        els.logoFile.addEventListener("change", handleLogoUpload);
        els.btnAddBranch.addEventListener("click", addBranch);
        els.newBranchInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") addBranch();
        });
        els.btnSave.addEventListener("click", savePlatformInfo);
        els.btnReset.addEventListener("click", resetToDefaults);
        els.btnExport.addEventListener("click", exportData);
      }

      function handleLogoUpload(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            currentData.logo = event.target.result;
            updateLogoPreview();
          };
          reader.readAsDataURL(file);
        }
      }

      function updateLogoPreview() {
        if (currentData.logo) {
          els.logoPreview.innerHTML = `<img src="${currentData.logo}" alt="Platform logo" />`;
          els.logoPreview.classList.remove("empty");
        }
      }

      function savePlatformInfo() {
        currentData.platformName = els.platformName.value;
        currentData.companyName = els.companyName.value;
        currentData.hotline = els.hotline.value;
        currentData.email = els.email.value;
        currentData.legalRepresentative = els.legalRepresentative.value;
        currentData.headOfficeAddress = els.headOfficeAddress.value;

        alert(
          "Platform information saved successfully! (demo)\n\n" +
            "Platform: " +
            currentData.platformName +
            "\n" +
            "Company: " +
            currentData.companyName +
            "\n" +
            "Email: " +
            currentData.email +
            "\n" +
            "Legal Rep: " +
            currentData.legalRepresentative +
            "\n" +
            "Branches: " +
            currentData.branches.join(", ") +
            "\n\nIn production, this would be saved to the backend and recorded in Audit Logs.",
        );
      }

      function resetToDefaults() {
        if (confirm("Reset all platform information to defaults?")) {
          currentData = JSON.parse(JSON.stringify(defaults));
          applyDefaults();
          renderBranches();
          els.logoPreview.innerHTML = '<i class="fas fa-image"></i>';
          els.logoPreview.classList.add("empty");
        }
      }

      function exportData() {
        const csvContent = [
          ["Field", "Value"],
          ["Platform Name", currentData.platformName],
          ["Company Name", currentData.companyName],
          ["Hotline", currentData.hotline],
          ["Email", currentData.email],
          ["Legal Representative", currentData.legalRepresentative],
          ["Head Office Address", currentData.headOfficeAddress],
          ["Branches", currentData.branches.join("; ")],
        ]
          .map((row) => row.map((cell) => `"${cell}"`).join(","))
          .join("\n");

        const blob = new Blob([csvContent], {
          type: "text/csv;charset=utf-8;",
        });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);

        link.setAttribute("href", url);
        link.setAttribute("download", "platform-information.csv");
        link.style.visibility = "hidden";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      // Init on page load
      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
