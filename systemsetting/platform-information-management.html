<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Platform Information Management</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-body: #f5f5f5;
        --bg-card: #ffffff;
        --border-subtle: #e0e0e0;
        --accent: #8B7340;
        --text-main: #1a1a1a;
        --text-muted: #7a6a5c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px 24px 32px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: flex-start;
      }

      .card {
        background-color: var(--bg-card);
        border-radius: 14px;
        border: 1px solid var(--border-subtle);
        padding: 14px 16px 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px 14px;
      }

      .field-grid.full {
        grid-template-columns: 1fr;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
      }

      .req {
        color: var(--accent);
      }

      input[type="text"],
      input[type="email"],
      input[type="tel"],
      textarea,
      select {
        border-radius: 8px;
        border: 1px solid var(--border-subtle);
        padding: 8px 10px;
        font-size: 12px;
        background-color: #ffffff;
        color: var(--text-main);
        outline: none;
        font-family: inherit;
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="tel"]:focus,
      textarea:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(139, 115, 64, 0.2);
      }

      input.invalid,
      textarea.invalid {
        border-color: #b23b3b;
        box-shadow: 0 0 0 1px rgba(178, 59, 59, 0.2);
      }

      .field-error {
        font-size: 11px;
        color: #b23b3b;
        min-height: 0;
        display: none;
      }

      .field-error.show {
        display: block;
      }

      textarea {
        resize: vertical;
        min-height: 80px;
      }

      .logo-section {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }

      .logo-preview {
        width: 80px;
        height: 80px;
        border-radius: 8px;
        border: 2px dashed var(--border-subtle);
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #faf6ee;
        overflow: hidden;
        flex-shrink: 0;
      }

      .logo-preview img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .logo-preview.empty {
        color: var(--text-muted);
        font-size: 24px;
      }

      .logo-upload {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .logo-btn-row {
        display: flex;
        gap: 6px;
      }

      .file-input-wrapper {
        position: relative;
        flex: 1;
      }

      input[type="file"] {
        display: none;
      }

      .btn-upload {
        border-radius: 8px;
        border: 1px solid var(--border-subtle);
        padding: 8px 12px;
        font-size: 12px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        width: 100%;
      }

      .btn-upload:hover {
        background-color: #faf6ee;
      }

      .btn-remove-logo {
        border-radius: 8px;
        border: 1px solid #f0c9c9;
        padding: 8px 12px;
        font-size: 12px;
        background-color: #fbe9e9;
        color: #b23b3b;
        cursor: pointer;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        white-space: nowrap;
      }

      .btn-remove-logo:hover {
        background-color: #f7dede;
      }

      .hint-text {
        font-size: 11px;
        color: var(--text-muted);
      }

      .btn {
        border-radius: 8px;
        border: 1px solid var(--border-subtle);
        padding: 8px 14px;
        font-size: 12px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        color: var(--text-main);
      }

      .btn:hover {
        background-color: #faf6ee;
      }

      .btn-primary {
        background: linear-gradient(135deg, #8B7340, #6d5a32);
        border-color: #6d5a32;
        color: #ffffff;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #6d5a32, #5a4a29);
      }

      .btn-secondary {
        background-color: #faf6ee;
      }

      .btn-danger {
        background-color: #b23b3b;
        border-color: #b23b3b;
        color: #fff;
      }

      .btn-danger:hover {
        background-color: #9c3232;
      }

      /* Bottom page-wide action bar */
      .page-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 18px;
      }

      .branch-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .branch-item {
        background-color: #faf6ee;
        border: 1px solid var(--border-subtle);
        border-radius: 10px;
        padding: 12px 14px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        font-size: 12px;
      }

      .branch-item.editing {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(139, 115, 64, 0.15);
      }

      .branch-item.pending-delete {
        opacity: 0.6;
        background-color: #fbe9e9;
        border-color: #f0c9c9;
      }

      .branch-item.pending-delete .branch-name,
      .branch-item.pending-delete .branch-meta {
        text-decoration: line-through;
        text-decoration-color: #b23b3b;
      }

      .branch-info {
        flex: 1;
        min-width: 0;
      }

      .branch-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 4px;
      }

      .branch-meta {
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.5;
        word-break: break-word;
      }

      .branch-meta-label {
        display: inline-block;
        min-width: 56px;
        color: var(--text-muted);
        font-weight: 500;
      }

      .branch-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      /* Inline branch edit form inside a row */
      .branch-edit-form {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .branch-edit-form .full-row {
        grid-column: 1 / -1;
      }

      .branch-edit-form input {
        width: 100%;
      }

      .branch-edit-actions {
        grid-column: 1 / -1;
        display: flex;
        justify-content: flex-end;
        gap: 6px;
      }

      .btn-icon {
        background: none;
        border: 1px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        color: var(--text-muted);
        padding: 6px 8px;
        font-size: 12px;
        line-height: 1;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s;
      }

      .btn-icon:hover {
        color: var(--accent);
        background: #fff;
        border-color: var(--border-subtle);
      }

      .btn-icon.danger:hover {
        color: #b23b3b;
      }

      .add-branch-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        background: #ffffff;
        border: 1px dashed var(--border-subtle);
        border-radius: 10px;
        padding: 12px;
      }

      .add-branch-group .full-row {
        grid-column: 1 / -1;
      }

      .add-branch-group input {
        width: 100%;
      }

      .add-branch-actions {
        grid-column: 1 / -1;
        display: flex;
        justify-content: flex-end;
        gap: 6px;
      }

      @media (max-width: 600px) {
        .add-branch-group,
        .branch-edit-form {
          grid-template-columns: 1fr;
        }
        .branch-item {
          flex-direction: column;
        }
        .branch-actions {
          align-self: flex-end;
        }
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background-color: #d4f0d4;
        color: #2a7a2a;
        border: 1px solid #b6e0b6;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 13px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        display: flex;
        gap: 8px;
        align-items: center;
        z-index: 1100;
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(26, 26, 26, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
      }

      .modal-overlay.show {
        display: flex;
      }

      .modal {
        background: #ffffff;
        border-radius: 12px;
        border: 1px solid var(--border-subtle);
        max-width: 380px;
        width: 100%;
        padding: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }

      .modal-title {
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 8px;
        color: var(--text-main);
      }

      .modal-message {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.5;
        margin: 0 0 18px;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
    </style>
    <style id="uxBaselinePolish">
      /* Baseline UI polish — applies only where file CSS doesn't override */
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* Pointer cursor on interactive */
      button,
      .btn,
      [role="button"],
      select,
      input[type="checkbox"],
      input[type="radio"],
      input[type="submit"],
      input[type="button"],
      a[href],
      label[for] {
        cursor: pointer;
      }

      /* Disabled state */
      button:disabled,
      .btn:disabled,
      input:disabled,
      select:disabled,
      textarea:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      /* Focus-visible outline (a11y) */
      button:focus-visible,
      .btn:focus-visible,
      a:focus-visible,
      [role="button"]:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 2px solid #c9a85c;
        outline-offset: 2px;
      }

      /* Inherit font family for form controls (fixes browser-default) */
      input,
      select,
      textarea,
      button {
        font-family: inherit;
      }

      /* Responsive media */
      img,
      svg,
      video {
        max-width: 100%;
        height: auto;
      }

      /* Subtle hover for buttons (only if no transition already set, gentle filter) */
      button:hover:not(:disabled),
      .btn:hover:not(:disabled) {
        filter: brightness(0.96);
        transition: filter 0.15s ease;
      }

      /* Smooth scrollbar on Webkit */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #f5f5f5;
      }
      ::-webkit-scrollbar-thumb {
        background: #d0d0d0;
        border-radius: 6px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #c9a85c;
      }

      /* Selection highlight on-brand */
      ::selection {
        background: #c9a85c;
        color: #fff;
      }

      /* HR baseline */
      hr {
        border: none;
        border-top: 1px solid #e0e0e0;
        margin: 12px 0;
      }

      /* Anchor baseline color matches brand (no underline by default to match flat UI) */
      a {
        color: #8a5a3b;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Platform Information</h1>
    </div>

    <div class="layout">
      <!-- Basic Information -->
      <section class="card">
        <div class="card-title">Basic Information</div>
        <div class="field-grid full">
          <div class="field-group">
            <label class="field-label" for="platformName"
              >Platform Name <span class="req">*</span></label
            >
            <input
              id="platformName"
              type="text"
              maxlength="255"
              placeholder="e.g., AnnaJapan"
            />
            <div class="field-error" id="err-platformName"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="companyName"
              >Company Name <span class="req">*</span></label
            >
            <input
              id="companyName"
              type="text"
              maxlength="255"
              placeholder="e.g., Anna Japan Inc."
            />
            <div class="field-error" id="err-companyName"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="hotline">Hotline</label>
            <input
              id="hotline"
              type="tel"
              placeholder="e.g., +81-800-123-4567"
            />
            <div class="field-error" id="err-hotline"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="email"
              >Email <span class="req">*</span></label
            >
            <input
              id="email"
              type="email"
              placeholder="e.g., support@annajapan.jp"
            />
            <div class="field-error" id="err-email"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="legalRepresentative">
              Legal Representative
            </label>
            <input
              id="legalRepresentative"
              type="text"
              maxlength="255"
              placeholder="e.g., John Tanaka"
            />
            <div class="field-error" id="err-legalRepresentative"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="headOfficeAddress"
              >Head Office Address</label
            >
            <textarea
              id="headOfficeAddress"
              maxlength="500"
              placeholder="Street address, building, etc."
            ></textarea>
            <div class="field-error" id="err-headOfficeAddress"></div>
          </div>
        </div>
      </section>

      <!-- Logo & Branches -->
      <section class="card">
        <div class="card-title">Platform Logo</div>
        <div class="logo-section">
          <div class="logo-preview empty" id="logoPreview">
            <i class="fas fa-image"></i>
          </div>
          <div class="logo-upload">
            <div class="logo-btn-row">
              <div class="file-input-wrapper">
                <input
                  id="logoFile"
                  type="file"
                  accept="image/jpeg,image/png,image/webp"
                />
                <button id="btnUploadLogo" class="btn-upload" type="button">
                  <i class="fas fa-upload"></i> Upload Logo
                </button>
              </div>
              <button
                id="btnRemoveLogo"
                class="btn-remove-logo"
                type="button"
                style="display: none"
              >
                <i class="fas fa-trash"></i> Remove logo
              </button>
            </div>
            <div class="hint-text">JPG, JPEG, PNG or WEBP. Max 5MB.</div>
            <div class="field-error" id="err-logo"></div>
          </div>
        </div>

        <div
          style="
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid var(--border-subtle);
          "
        >
          <div class="card-title" style="margin-top: 0">Branches</div>
          <div class="branch-list" id="branchList"></div>

          <div
            class="add-branch-group"
            id="addBranchGroup"
            style="margin-top: 10px"
          >
            <input
              id="newBranchName"
              type="text"
              maxlength="255"
              placeholder="Branch name (e.g., Branch Saitama)"
              class="full-row"
            />
            <div class="field-error full-row" id="err-newBranchName"></div>
            <input
              id="newBranchPhone"
              type="tel"
              placeholder="Phone (e.g., +81 3-6427-8451)"
            />
            <input
              id="newBranchAddress"
              type="text"
              maxlength="500"
              placeholder="Address"
            />
            <div class="add-branch-actions">
              <button id="btnAddBranch" class="btn btn-secondary" type="button">
                <i class="fas fa-plus"></i> Add branch
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- Single page-wide action bar -->
    <div class="page-actions">
      <button id="btnEdit" class="btn btn-primary" type="button">
        <i class="fas fa-pen"></i> Edit
      </button>
      <button id="btnCancel" class="btn" type="button" style="display: none">
        Cancel
      </button>
      <button
        id="btnSave"
        class="btn btn-primary"
        type="button"
        style="display: none"
      >
        <i class="fas fa-check"></i> Save settings
      </button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite">
      <i class="fas fa-check-circle"></i>
      <span id="toastMsg"></span>
    </div>

    <!-- Generic confirm modal (discard / remove branch) -->
    <div
      class="modal-overlay"
      id="confirmModal"
      role="dialog"
      aria-modal="true"
    >
      <div class="modal">
        <h2 class="modal-title" id="confirmTitle">Confirm</h2>
        <p class="modal-message" id="confirmMessage"></p>
        <div class="modal-actions">
          <button class="btn" type="button" id="confirmCancel">Cancel</button>
          <button class="btn btn-danger" type="button" id="confirmOk">
            Confirm
          </button>
        </div>
      </div>
    </div>

    <script>
      // ---- Elements ----
      const els = {
        platformName: document.getElementById("platformName"),
        companyName: document.getElementById("companyName"),
        hotline: document.getElementById("hotline"),
        email: document.getElementById("email"),
        legalRepresentative: document.getElementById("legalRepresentative"),
        headOfficeAddress: document.getElementById("headOfficeAddress"),
        logoFile: document.getElementById("logoFile"),
        logoPreview: document.getElementById("logoPreview"),
        btnUploadLogo: document.getElementById("btnUploadLogo"),
        btnRemoveLogo: document.getElementById("btnRemoveLogo"),
        newBranchName: document.getElementById("newBranchName"),
        newBranchPhone: document.getElementById("newBranchPhone"),
        newBranchAddress: document.getElementById("newBranchAddress"),
        btnAddBranch: document.getElementById("btnAddBranch"),
        addBranchGroup: document.getElementById("addBranchGroup"),
        branchList: document.getElementById("branchList"),
        btnEdit: document.getElementById("btnEdit"),
        btnCancel: document.getElementById("btnCancel"),
        btnSave: document.getElementById("btnSave"),
        toast: document.getElementById("toast"),
        toastMsg: document.getElementById("toastMsg"),
        confirmModal: document.getElementById("confirmModal"),
        confirmTitle: document.getElementById("confirmTitle"),
        confirmMessage: document.getElementById("confirmMessage"),
        confirmCancel: document.getElementById("confirmCancel"),
        confirmOk: document.getElementById("confirmOk"),
      };

      const STORAGE_KEY = "platformInfo";
      const MAX_LOGO_BYTES = 5 * 1024 * 1024;

      // ---- Default data ----
      const defaults = {
        platformName: "AnnaJapan",
        companyName: "Anna Japan Inc.",
        hotline: "+81-800-123-4567",
        email: "support@annajapan.jp",
        legalRepresentative: "Admin Tanaka",
        headOfficeAddress: "Tokyo, Japan",
        branches: [
          {
            name: "Branch Tokyo",
            phone: "+81 3-1234-5678",
            address: "1-1-1 Marunouchi, Chiyoda-ku, Tokyo 100-0005, Japan",
          },
          {
            name: "Branch Saitama",
            phone: "+81 3-6427-8451",
            address: "3-12-7 Shibuya, Shibuya-ku Saitama 150-0002, Japan",
          },
          {
            name: "Branch Osaka",
            phone: "+81 6-1234-5678",
            address: "1-2-3 Umeda, Kita-ku, Osaka 530-0001, Japan",
          },
        ],
        logo: null,
      };

      // savedData = the committed/persisted state
      // draft = the in-progress editable copy while in edit mode
      let savedData = JSON.parse(JSON.stringify(defaults));
      let draft = JSON.parse(JSON.stringify(savedData));
      let editMode = false;

      // Branch draft uses status markers so we can mark pending deletes visually.
      // Each branch in draft.branches may carry: _editing (bool), _delete (bool).
      let branchEditingIndex = null;

      // ---- Persistence (preserve existing localStorage key/schema) ----
      function loadFromStorage() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (parsed && typeof parsed === "object") {
              savedData = Object.assign(
                JSON.parse(JSON.stringify(defaults)),
                parsed,
              );
              if (!Array.isArray(savedData.branches)) {
                savedData.branches = JSON.parse(
                  JSON.stringify(defaults.branches),
                );
              }
            }
          }
        } catch (e) {
          // ignore corrupt storage, fall back to defaults
        }
      }

      function persist() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(savedData));
        } catch (e) {
          // storage may be unavailable; demo screen tolerates this
        }
      }

      // ---- Init ----
      function init() {
        loadFromStorage();
        draft = cloneSaved();
        applyToForm(savedData);
        renderBranches();
        setupEventListeners();
        setEditMode(false);
      }

      function cloneSaved() {
        const d = JSON.parse(JSON.stringify(savedData));
        d.branches = d.branches.map((b) => ({
          name: b.name,
          phone: b.phone,
          address: b.address,
          _editing: false,
          _delete: false,
        }));
        return d;
      }

      function applyToForm(data) {
        els.platformName.value = data.platformName || "";
        els.companyName.value = data.companyName || "";
        els.hotline.value = data.hotline || "";
        els.email.value = data.email || "";
        els.legalRepresentative.value = data.legalRepresentative || "";
        els.headOfficeAddress.value = data.headOfficeAddress || "";
        updateLogoPreview(data.logo);
      }

      function escapeHtml(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ---- Edit / View mode ----
      function setEditMode(on) {
        editMode = on;
        const fields = [
          els.platformName,
          els.companyName,
          els.hotline,
          els.email,
          els.legalRepresentative,
          els.headOfficeAddress,
        ];
        fields.forEach((f) => (f.disabled = !on));

        els.btnUploadLogo.disabled = !on;
        els.btnRemoveLogo.disabled = !on;

        // Branch add form only usable in edit mode
        els.newBranchName.disabled = !on;
        els.newBranchPhone.disabled = !on;
        els.newBranchAddress.disabled = !on;
        els.btnAddBranch.disabled = !on;
        els.addBranchGroup.style.display = on ? "" : "none";

        els.btnEdit.style.display = on ? "none" : "";
        els.btnCancel.style.display = on ? "" : "none";
        els.btnSave.style.display = on ? "" : "none";

        updateLogoButtons();
        renderBranches();
        if (!on) clearAllErrors();
      }

      function enterEditMode() {
        draft = cloneSaved();
        applyToForm(draft);
        branchEditingIndex = null;
        clearBranchForm();
        clearAllErrors();
        setEditMode(true);
      }

      function hasPendingChanges() {
        // Compare basic fields
        if (els.platformName.value !== savedData.platformName) return true;
        if (els.companyName.value !== savedData.companyName) return true;
        if (els.hotline.value !== savedData.hotline) return true;
        if (els.email.value !== savedData.email) return true;
        if (els.legalRepresentative.value !== savedData.legalRepresentative)
          return true;
        if (els.headOfficeAddress.value !== savedData.headOfficeAddress)
          return true;
        if ((draft.logo || null) !== (savedData.logo || null)) return true;
        // Branches: ignore markers, compare committed projection
        const projected = projectBranches();
        if (projected.length !== savedData.branches.length) return true;
        for (let i = 0; i < projected.length; i++) {
          const a = projected[i];
          const b = savedData.branches[i];
          if (
            !b ||
            a.name !== b.name ||
            a.phone !== b.phone ||
            a.address !== b.address
          )
            return true;
        }
        // Also if any branch is mid-edit with unsaved row changes
        if (draft.branches.some((b) => b._editing)) return true;
        return false;
      }

      function projectBranches() {
        // The list as it would look after commit: drop pending deletes,
        // strip markers.
        return draft.branches
          .filter((b) => !b._delete)
          .map((b) => ({ name: b.name, phone: b.phone, address: b.address }));
      }

      // ---- Logo (pending until save) ----
      function updateLogoPreview(logo) {
        if (logo) {
          els.logoPreview.innerHTML = `<img src="${logo}" alt="Platform logo" />`;
          els.logoPreview.classList.remove("empty");
        } else {
          els.logoPreview.innerHTML = '<i class="fas fa-image"></i>';
          els.logoPreview.classList.add("empty");
        }
      }

      function updateLogoButtons() {
        // Remove logo button only in edit mode AND when a logo exists in draft
        if (editMode && draft.logo) {
          els.btnRemoveLogo.style.display = "";
        } else {
          els.btnRemoveLogo.style.display = "none";
        }
      }

      function handleLogoUpload(e) {
        const file = e.target.files[0];
        clearError("logo");
        if (!file) return;
        const okTypes = ["image/jpeg", "image/png", "image/webp"];
        if (!okTypes.includes(file.type)) {
          showError("logo", "Please upload a JPG, JPEG, PNG or WEBP image.");
          els.logoFile.value = "";
          return;
        }
        if (file.size > MAX_LOGO_BYTES) {
          showError("logo", "File size must not exceed 5MB.");
          els.logoFile.value = "";
          return;
        }
        const reader = new FileReader();
        reader.onload = (event) => {
          draft.logo = event.target.result; // pending, not committed
          updateLogoPreview(draft.logo);
          updateLogoButtons();
        };
        reader.readAsDataURL(file);
        els.logoFile.value = "";
      }

      function removeLogoPending() {
        draft.logo = null;
        updateLogoPreview(null);
        updateLogoButtons();
        clearError("logo");
      }

      // ---- Branches ----
      function renderBranches() {
        const branches = draft.branches;
        if (!branches.length) {
          els.branchList.innerHTML =
            '<div class="branch-meta" style="padding: 8px 4px">No branches configured yet.</div>';
          return;
        }
        els.branchList.innerHTML = branches
          .map((branch, idx) => renderBranchRow(branch, idx))
          .join("");
        // Wire inline edit-form handlers for any editing row
        branches.forEach((branch, idx) => {
          if (branch._editing) wireInlineEdit(idx);
        });
      }

      function renderBranchRow(branch, idx) {
        if (branch._editing && editMode) {
          return `
            <div class="branch-item editing">
              <div class="branch-edit-form">
                <input
                  type="text"
                  class="full-row"
                  id="editBranchName-${idx}"
                  maxlength="255"
                  value="${escapeHtml(branch.name)}"
                  placeholder="Branch name"
                />
                <div class="field-error full-row" id="err-editBranchName-${idx}"></div>
                <input
                  type="tel"
                  id="editBranchPhone-${idx}"
                  value="${escapeHtml(branch.phone)}"
                  placeholder="Phone"
                />
                <input
                  type="text"
                  id="editBranchAddress-${idx}"
                  maxlength="500"
                  value="${escapeHtml(branch.address)}"
                  placeholder="Address"
                />
                <div class="branch-edit-actions">
                  <button class="btn" type="button" data-cancel-edit="${idx}">
                    Cancel
                  </button>
                  <button class="btn btn-secondary" type="button" data-save-edit="${idx}">
                    <i class="fas fa-check"></i> Done
                  </button>
                </div>
              </div>
            </div>`;
        }

        const actions =
          editMode && !branch._delete
            ? `
            <div class="branch-actions">
              <button class="btn-icon" type="button" data-edit-branch="${idx}" title="Edit">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn-icon danger" type="button" data-remove-branch="${idx}" title="Remove">
                <i class="fas fa-trash"></i>
              </button>
            </div>`
            : editMode && branch._delete
              ? `
            <div class="branch-actions">
              <button class="btn-icon" type="button" data-undo-delete="${idx}" title="Undo remove">
                <i class="fas fa-rotate-left"></i>
              </button>
            </div>`
              : "";

        return `
          <div class="branch-item ${branch._delete ? "pending-delete" : ""}">
            <div class="branch-info">
              <div class="branch-name">${escapeHtml(branch.name)}</div>
              <div class="branch-meta">
                <span class="branch-meta-label">Phone:</span>
                ${branch.phone ? escapeHtml(branch.phone) : "<em>—</em>"}
              </div>
              <div class="branch-meta">
                <span class="branch-meta-label">Address:</span>
                ${branch.address ? escapeHtml(branch.address) : "<em>—</em>"}
              </div>
            </div>
            ${actions}
          </div>`;
      }

      function wireInlineEdit(idx) {
        const saveBtn = els.branchList.querySelector(
          `[data-save-edit="${idx}"]`,
        );
        const cancelBtn = els.branchList.querySelector(
          `[data-cancel-edit="${idx}"]`,
        );
        if (saveBtn)
          saveBtn.addEventListener("click", () => commitInlineEdit(idx));
        if (cancelBtn)
          cancelBtn.addEventListener("click", () => cancelInlineEdit(idx));
      }

      function startEditBranch(idx) {
        // Only one row editable at a time; cancel any other in-progress edit
        draft.branches.forEach((b, i) => {
          if (i !== idx) b._editing = false;
        });
        draft.branches[idx]._editing = true;
        branchEditingIndex = idx;
        renderBranches();
        const nameInput = document.getElementById(`editBranchName-${idx}`);
        if (nameInput) nameInput.focus();
      }

      function commitInlineEdit(idx) {
        const nameInput = document.getElementById(`editBranchName-${idx}`);
        const phoneInput = document.getElementById(`editBranchPhone-${idx}`);
        const addrInput = document.getElementById(`editBranchAddress-${idx}`);
        const name = nameInput.value.trim();
        const phone = phoneInput.value.trim();
        const address = addrInput.value.trim();
        const errEl = document.getElementById(`err-editBranchName-${idx}`);
        if (!name) {
          nameInput.classList.add("invalid");
          if (errEl) {
            errEl.textContent = "Branch name is required.";
            errEl.classList.add("show");
          }
          nameInput.focus();
          return;
        }
        draft.branches[idx] = {
          name: name.slice(0, 255),
          phone: phone,
          address: address.slice(0, 500),
          _editing: false,
          _delete: false,
        };
        branchEditingIndex = null;
        renderBranches();
      }

      function cancelInlineEdit(idx) {
        draft.branches[idx]._editing = false;
        branchEditingIndex = null;
        renderBranches();
      }

      function requestRemoveBranch(idx) {
        const name = draft.branches[idx].name;
        openConfirm({
          title: "Remove branch?",
          message: `Remove branch "${name}"? It will be removed when you save.`,
          okLabel: "Remove",
          danger: true,
          onOk: () => {
            draft.branches[idx]._delete = true;
            draft.branches[idx]._editing = false;
            renderBranches();
          },
        });
      }

      function undoRemoveBranch(idx) {
        draft.branches[idx]._delete = false;
        renderBranches();
      }

      function readBranchForm() {
        return {
          name: els.newBranchName.value.trim(),
          phone: els.newBranchPhone.value.trim(),
          address: els.newBranchAddress.value.trim(),
        };
      }

      function clearBranchForm() {
        els.newBranchName.value = "";
        els.newBranchPhone.value = "";
        els.newBranchAddress.value = "";
        clearError("newBranchName");
      }

      function addBranch() {
        const data = readBranchForm();
        clearError("newBranchName");
        if (!data.name) {
          els.newBranchName.classList.add("invalid");
          showError("newBranchName", "Branch name is required.");
          els.newBranchName.focus();
          return;
        }
        draft.branches.push({
          name: data.name.slice(0, 255),
          phone: data.phone,
          address: data.address.slice(0, 500),
          _editing: false,
          _delete: false,
        });
        clearBranchForm();
        renderBranches();
      }

      // ---- Inline field errors ----
      function showError(field, msg) {
        const el = document.getElementById("err-" + field);
        if (el) {
          el.textContent = msg;
          el.classList.add("show");
        }
      }

      function clearError(field) {
        const el = document.getElementById("err-" + field);
        if (el) {
          el.textContent = "";
          el.classList.remove("show");
        }
        const input = els[field];
        if (input && input.classList) input.classList.remove("invalid");
      }

      function clearAllErrors() {
        [
          "platformName",
          "companyName",
          "hotline",
          "email",
          "legalRepresentative",
          "headOfficeAddress",
          "logo",
          "newBranchName",
        ].forEach(clearError);
      }

      function isValidEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
      }

      function validateBasic() {
        let ok = true;
        clearAllErrors();

        const pName = els.platformName.value.trim();
        if (!pName) {
          showError("platformName", "Platform name is required.");
          els.platformName.classList.add("invalid");
          ok = false;
        } else if (pName.length > 255) {
          showError("platformName", "Must not exceed 255 characters.");
          els.platformName.classList.add("invalid");
          ok = false;
        }

        const cName = els.companyName.value.trim();
        if (!cName) {
          showError("companyName", "Company name is required.");
          els.companyName.classList.add("invalid");
          ok = false;
        } else if (cName.length > 255) {
          showError("companyName", "Must not exceed 255 characters.");
          els.companyName.classList.add("invalid");
          ok = false;
        }

        const email = els.email.value.trim();
        if (!email || !isValidEmail(email)) {
          showError("email", "Please enter a valid email address.");
          els.email.classList.add("invalid");
          ok = false;
        }

        if (els.legalRepresentative.value.trim().length > 255) {
          showError("legalRepresentative", "Must not exceed 255 characters.");
          els.legalRepresentative.classList.add("invalid");
          ok = false;
        }

        if (els.headOfficeAddress.value.trim().length > 500) {
          showError("headOfficeAddress", "Must not exceed 500 characters.");
          els.headOfficeAddress.classList.add("invalid");
          ok = false;
        }

        return ok;
      }

      // ---- Save / Cancel (single, atomic) ----
      function saveSettings() {
        // Block save if a branch row is still mid inline-edit
        const editingIdx = draft.branches.findIndex((b) => b._editing);
        if (editingIdx !== -1) {
          commitInlineEdit(editingIdx);
          // if still editing (validation failed), abort
          if (draft.branches[editingIdx]._editing) return;
        }
        if (!validateBasic()) return;

        savedData = {
          platformName: els.platformName.value.trim(),
          companyName: els.companyName.value.trim(),
          hotline: els.hotline.value.trim(),
          email: els.email.value.trim(),
          legalRepresentative: els.legalRepresentative.value.trim(),
          headOfficeAddress: els.headOfficeAddress.value.trim(),
          branches: projectBranches(),
          logo: draft.logo || null,
        };

        persist();
        draft = cloneSaved();
        applyToForm(savedData);
        renderBranches();
        setEditMode(false);
        showToast("Platform information updated successfully.");
      }

      function cancelEditing() {
        if (hasPendingChanges()) {
          openConfirm({
            title: "Discard changes?",
            message:
              "You have unsaved changes. Are you sure you want to discard them?",
            okLabel: "Discard",
            danger: true,
            onOk: discardChanges,
          });
        } else {
          discardChanges();
        }
      }

      function discardChanges() {
        draft = cloneSaved();
        branchEditingIndex = null;
        clearBranchForm();
        applyToForm(savedData);
        renderBranches();
        setEditMode(false);
      }

      // ---- Toast ----
      let toastTimer = null;
      function showToast(msg) {
        els.toastMsg.textContent = msg;
        els.toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          els.toast.classList.remove("show");
        }, 3000);
      }

      // ---- Confirm modal ----
      let confirmCallback = null;
      function openConfirm({ title, message, okLabel, danger, onOk }) {
        els.confirmTitle.textContent = title;
        els.confirmMessage.textContent = message;
        els.confirmOk.textContent = okLabel || "Confirm";
        els.confirmOk.classList.toggle("btn-danger", !!danger);
        els.confirmOk.classList.toggle("btn-primary", !danger);
        confirmCallback = onOk;
        els.confirmModal.classList.add("show");
      }

      function closeConfirm() {
        els.confirmModal.classList.remove("show");
        confirmCallback = null;
      }

      // ---- Event delegation for branch rows ----
      function onBranchListClick(e) {
        const editBtn = e.target.closest("[data-edit-branch]");
        if (editBtn) {
          startEditBranch(Number(editBtn.dataset.editBranch));
          return;
        }
        const removeBtn = e.target.closest("[data-remove-branch]");
        if (removeBtn) {
          requestRemoveBranch(Number(removeBtn.dataset.removeBranch));
          return;
        }
        const undoBtn = e.target.closest("[data-undo-delete]");
        if (undoBtn) {
          undoRemoveBranch(Number(undoBtn.dataset.undoDelete));
          return;
        }
      }

      // ---- Wiring ----
      function setupEventListeners() {
        els.logoFile.addEventListener("change", handleLogoUpload);
        els.btnUploadLogo.addEventListener("click", () => {
          if (!editMode) return;
          els.logoFile.click();
        });
        els.btnRemoveLogo.addEventListener("click", removeLogoPending);

        els.btnAddBranch.addEventListener("click", addBranch);
        els.branchList.addEventListener("click", onBranchListClick);

        els.btnEdit.addEventListener("click", enterEditMode);
        els.btnCancel.addEventListener("click", cancelEditing);
        els.btnSave.addEventListener("click", saveSettings);

        els.confirmCancel.addEventListener("click", closeConfirm);
        els.confirmOk.addEventListener("click", () => {
          const cb = confirmCallback;
          closeConfirm();
          if (cb) cb();
        });
        els.confirmModal.addEventListener("click", (e) => {
          if (e.target === els.confirmModal) closeConfirm();
        });

        // Clear errors as user fixes fields
        els.platformName.addEventListener("input", () =>
          clearError("platformName"),
        );
        els.companyName.addEventListener("input", () =>
          clearError("companyName"),
        );
        els.email.addEventListener("input", () => clearError("email"));
        els.legalRepresentative.addEventListener("input", () =>
          clearError("legalRepresentative"),
        );
        els.headOfficeAddress.addEventListener("input", () =>
          clearError("headOfficeAddress"),
        );
        els.newBranchName.addEventListener("input", () =>
          clearError("newBranchName"),
        );
      }

      // Init on page load
      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
