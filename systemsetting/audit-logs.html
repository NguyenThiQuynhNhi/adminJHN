<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Audit Logs</title>
    <style>
      :root {
        --bg-body: #f5f3ef;
        --bg-card: #fffaf2;
        --border-subtle: #eadccd;
        --accent: #c26b41;
        --text-main: #3b2f2a;
        --text-muted: #7a6a5c;
        --badge-green: #2f855a;
        --badge-gray: #4a5568;
        --badge-red: #c53030;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px 24px 32px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .page-subtitle {
        margin: 0 0 16px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .layout {
        display: grid;
        grid-template-columns: 1.7fr 1.3fr;
        gap: 16px;
        align-items: flex-start;
      }

      .card {
        background-color: var(--bg-card);
        border-radius: 14px;
        border: 1px solid var(--border-subtle);
        padding: 14px 16px 16px;
        box-shadow: 0 10px 30px rgba(115, 72, 39, 0.04);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
      }

      .card-subtitle {
        font-size: 12px;
        color: var(--text-muted);
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 140px;
      }

      .field-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
      }

      select,
      input[type="text"] {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 10px;
        font-size: 12px;
        background-color: #fffcf7;
        color: var(--text-main);
        outline: none;
      }

      select:focus,
      input[type="text"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(194, 107, 65, 0.2);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: #f7efe6;
      }

      th,
      td {
        padding: 7px 8px;
        text-align: left;
        border-bottom: 1px solid #efe0d4;
      }

      th {
        font-weight: 500;
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      tbody tr {
        cursor: pointer;
        transition: background 0.12s ease;
      }

      tbody tr:hover {
        background-color: #f8f1ea;
      }

      tbody tr.selected-row {
        background-color: #f1e3d5;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 7px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 500;
        border: 1px solid transparent;
        white-space: nowrap;
      }

      .badge-info {
        background: #edf2f7;
        color: var(--badge-gray);
        border-color: #cbd5e0;
      }

      .badge-success {
        background: #e6f6ef;
        color: var(--badge-green);
        border-color: #b7e4cc;
      }

      .badge-danger {
        background: #fff5f5;
        color: var(--badge-red);
        border-color: #fed7d7;
      }

      .detail-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 6px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
        margin-bottom: 8px;
      }

      .detail-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 2px;
      }

      .detail-value {
        font-size: 12px;
      }

      .preview-box {
        border-radius: 10px;
        border: 1px dashed #deccba;
        padding: 8px 9px;
        background: #fffaf1;
        font-size: 12px;
        color: var(--text-main);
        white-space: pre-line;
      }

      .btn {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 11px;
        font-size: 11px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 4px;
        align-items: center;
        color: var(--text-main);
      }

      .btn-ghost {
        background: transparent;
      }

      .btn-primary {
        background: linear-gradient(135deg, #c26b41, #a55232);
        border-color: #a55232;
        color: #fffaf3;
      }

      .actions-row {
        display: flex;
        justify-content: flex-end;
        gap: 6px;
        margin-top: 6px;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Audit Logs</h1>
    </div>

    <div class="layout">
      <section class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Audit log table</div>
          </div>
          <div class="actions-row">
            <button id="btnExportCsv" class="btn btn-ghost" type="button">
              Export CSV (demo)
            </button>
          </div>
        </div>

        <div class="filters">
          <div class="field-group">
            <label class="field-label" for="actorFilter">Actor (demo)</label>
            <select id="actorFilter">
              <option value="">All</option>
              <option value="superadmin_01">superadmin_01</option>
              <option value="ops_tanaka">ops_tanaka</option>
              <option value="support_01">support_01</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label" for="actionFilter">Action type</label>
            <select id="actionFilter">
              <option value="">All</option>
              <option value="config_change">Config change</option>
              <option value="security">Security</option>
              <option value="billing">Billing</option>
              <option value="integration">Integration</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label" for="severityFilter">Severity</label>
            <select id="severityFilter">
              <option value="">All</option>
              <option value="info">Info</option>
              <option value="success">Success</option>
              <option value="danger">Danger</option>
            </select>
          </div>
          <div class="field-group" style="flex: 1 1 220px">
            <label class="field-label" for="searchLog"
              >Search by resource</label
            >
            <input
              id="searchLog"
              type="text"
              placeholder="e.g. security_policy, billing_contract..."
            />
          </div>
        </div>

        <div style="overflow: auto; max-height: 280px">
          <table>
            <thead>
              <tr>
                <th>Time (demo)</th>
                <th>Actor</th>
                <th>Action</th>
                <th>Resource</th>
                <th>Severity</th>
              </tr>
            </thead>
            <tbody id="logTbody"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <div id="logEmpty">
          <div class="card-title">Log details</div>
        </div>
        <div id="logDetail" style="display: none">
          <div class="detail-section-title">General information</div>
          <div class="detail-grid">
            <div>
              <div class="detail-label">Time (demo)</div>
              <div class="detail-value" id="dTime"></div>
            </div>
            <div>
              <div class="detail-label">Actor</div>
              <div class="detail-value" id="dActor"></div>
            </div>
            <div>
              <div class="detail-label">Action</div>
              <div class="detail-value" id="dAction"></div>
            </div>
            <div>
              <div class="detail-label">Resource</div>
              <div class="detail-value" id="dResource"></div>
            </div>
          </div>

          <div class="detail-section-title">Context & result</div>
          <div
            class="detail-grid"
            style="grid-template-columns: minmax(0, 1fr)"
          >
            <div>
              <div class="detail-label">Severity</div>
              <div class="detail-value" id="dSeverity"></div>
            </div>
            <div>
              <div class="detail-label">Summary</div>
              <div class="detail-value" id="dSummary"></div>
            </div>
          </div>

          <div class="detail-section-title">Privacy explanation</div>
          <div class="preview-box" id="privacyNote"></div>
        </div>
      </section>
    </div>

    <script>
      const logs = [
        {
          id: "L1",
          time: "2026-04-10 09:15 JST",
          actor: "superadmin_01",
          action: "UPDATE_SECURITY_POLICY",
          actionType: "security",
          resource: "security_policy",
          severity: "success",
          summary:
            "Updated password & 2FA policy for production admins, approved by two reviewers.",
        },
        {
          id: "L2",
          time: "2026-04-10 09:20 JST",
          actor: "superadmin_01",
          action: "UPDATE_INTEGRATION",
          actionType: "integration",
          resource: "INT-PAY-STRIPE-JP",
          severity: "info",
          summary:
            "Changed metadata description for Stripe JP integration. Real secret rotated in a separate vault.",
        },
        {
          id: "L3",
          time: "2026-04-12 14:35 JST",
          actor: "ops_tanaka",
          action: "UPDATE_BILLING_CONTRACT",
          actionType: "billing",
          resource: "CONTRACT-AGENT-TOKYO-01",
          severity: "success",
          summary:
            "Adjusted billing cycle from monthly to quarterly for an agent in Tokyo.",
        },
        {
          id: "L4",
          time: "2026-04-05 18:05 JST",
          actor: "support_01",
          action: "LOGIN_FAILED_LOCKOUT",
          actionType: "security",
          resource: "support_01",
          severity: "danger",
          summary:
            "Account support_01 was locked due to exceeding allowed failed login attempts.",
        },
      ];

      let selectedId = null;

      const els = {
        actorFilter: document.getElementById("actorFilter"),
        actionFilter: document.getElementById("actionFilter"),
        severityFilter: document.getElementById("severityFilter"),
        searchLog: document.getElementById("searchLog"),
        logTbody: document.getElementById("logTbody"),
        logEmpty: document.getElementById("logEmpty"),
        logDetail: document.getElementById("logDetail"),
        dTime: document.getElementById("dTime"),
        dActor: document.getElementById("dActor"),
        dAction: document.getElementById("dAction"),
        dResource: document.getElementById("dResource"),
        dSeverity: document.getElementById("dSeverity"),
        dSummary: document.getElementById("dSummary"),
        privacyNote: document.getElementById("privacyNote"),
        btnExportCsv: document.getElementById("btnExportCsv"),
      };

      function severityBadge(sev) {
        const span = document.createElement("span");
        span.classList.add("badge");
        if (sev === "success") {
          span.classList.add("badge-success");
          span.textContent = "Success";
        } else if (sev === "danger") {
          span.classList.add("badge-danger");
          span.textContent = "Danger";
        } else {
          span.classList.add("badge-info");
          span.textContent = "Info";
        }
        return span;
      }

      function applyFilters() {
        const actor = els.actorFilter.value;
        const actionType = els.actionFilter.value;
        const severity = els.severityFilter.value;
        const q = els.searchLog.value.trim().toLowerCase();
        return logs.filter((l) => {
          if (actor && l.actor !== actor) return false;
          if (actionType && l.actionType !== actionType) return false;
          if (severity && l.severity !== severity) return false;
          if (!q) return true;
          const text = (l.action + " " + l.resource).toLowerCase();
          return text.includes(q);
        });
      }

      function renderTable() {
        const list = applyFilters();
        els.logTbody.innerHTML = "";
        list.forEach((l) => {
          const tr = document.createElement("tr");
          if (l.id === selectedId) tr.classList.add("selected-row");

          const tdTime = document.createElement("td");
          tdTime.textContent = l.time;
          const tdActor = document.createElement("td");
          tdActor.textContent = l.actor;
          const tdAction = document.createElement("td");
          tdAction.textContent = l.action;
          const tdResource = document.createElement("td");
          tdResource.textContent = l.resource;
          const tdSeverity = document.createElement("td");
          tdSeverity.appendChild(severityBadge(l.severity));

          tr.appendChild(tdTime);
          tr.appendChild(tdActor);
          tr.appendChild(tdAction);
          tr.appendChild(tdResource);
          tr.appendChild(tdSeverity);

          tr.addEventListener("click", () => selectLog(l.id));
          els.logTbody.appendChild(tr);
        });
      }

      function selectLog(id) {
        const l = logs.find((x) => x.id === id);
        if (!l) return;
        selectedId = id;
        els.logEmpty.style.display = "none";
        els.logDetail.style.display = "";

        els.dTime.textContent = l.time;
        els.dActor.textContent = l.actor;
        els.dAction.textContent = l.action;
        els.dResource.textContent = l.resource;
        els.dSeverity.textContent =
          l.severity === "success"
            ? "Success"
            : l.severity === "danger"
              ? "Danger"
              : "Info";
        els.dSummary.textContent = l.summary;

        renderPrivacyNote(l);
        renderTable();
      }

      function renderPrivacyNote(l) {
        const lines = [];
        lines.push(
          `This log records action ${l.action} by ${l.actor} on resource ${l.resource} at ${l.time}.`,
        );
        lines.push(
          "Only metadata is shown here (who, what action, on which resource, when, and outcome).",
        );
        lines.push(
          "Detailed payloads (request body, personal data, message/call content...) are not visible in the admin view and are kept in a dedicated logging system with strict access control.",
        );
        els.privacyNote.textContent = lines.join("\n");
      }

      function exportCsv() {
        const list = applyFilters();
        const header = [
          "time",
          "actor",
          "action",
          "actionType",
          "resource",
          "severity",
        ];
        const rows = list.map((l) => [
          l.time,
          l.actor,
          l.action,
          l.actionType,
          l.resource,
          l.severity,
        ]);
        const csv = [header.join(","), ...rows.map((r) => r.join(","))].join(
          "\n",
        );
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "audit-logs-demo.csv";
        a.click();
        URL.revokeObjectURL(url);
      }

      function init() {
        els.actorFilter.addEventListener("change", renderTable);
        els.actionFilter.addEventListener("change", renderTable);
        els.severityFilter.addEventListener("change", renderTable);
        els.searchLog.addEventListener("input", renderTable);
        els.btnExportCsv.addEventListener("click", exportCsv);
        renderTable();
      }

      init();
    </script>
  </body>
</html>
