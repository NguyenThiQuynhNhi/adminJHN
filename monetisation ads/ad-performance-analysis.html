<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Ad Performance Analysis</title>
    <style>
      :root {
        --bg-body: #f5f3ef;
        --bg-card: #fffaf2;
        --border-subtle: #eadccd;
        --accent: #c26b41;
        --accent-soft: #f3d7c6;
        --text-main: #3b2f2a;
        --text-muted: #7a6a5c;
        --badge-green: #2f855a;
        --badge-gray: #4a5568;
        --badge-orange: #b7791f;
        --badge-blue: #2b6cb0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px 24px 32px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .page-subtitle {
        margin: 0 0 16px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .layout {
        display: grid;
        grid-template-columns: 1.3fr 1.7fr;
        gap: 16px;
        align-items: flex-start;
      }

      .card {
        background-color: var(--bg-card);
        border-radius: 14px;
        border: 1px solid var(--border-subtle);
        padding: 14px 16px 16px;
        box-shadow: 0 10px 30px rgba(115, 72, 39, 0.04);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
      }

      .card-subtitle {
        font-size: 12px;
        color: var(--text-muted);
      }

      .toolbar-right {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .btn {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 11px;
        font-size: 11px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 4px;
        align-items: center;
        color: var(--text-main);
      }

      .btn-ghost {
        background: transparent;
      }

      .btn-primary {
        background: linear-gradient(135deg, #c26b41, #a55232);
        border-color: #a55232;
        color: #fffaf3;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 120px;
      }

      .field-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
      }

      input[type="text"],
      select {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 10px;
        font-size: 12px;
        background-color: #fffcf7;
        color: var(--text-main);
        outline: none;
      }

      input[type="text"]:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(194, 107, 65, 0.2);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: #f7efe6;
      }

      th,
      td {
        padding: 7px 8px;
        text-align: left;
        border-bottom: 1px solid #efe0d4;
      }

      th {
        font-weight: 500;
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      tbody tr {
        cursor: pointer;
        transition: background 0.12s ease;
      }

      tbody tr:hover {
        background-color: #f8f1ea;
      }

      tbody tr.selected-row {
        background-color: #f1e3d5;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 7px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 500;
        border: 1px solid transparent;
        white-space: nowrap;
      }

      .badge-green {
        background: #e6f6ef;
        color: var(--badge-green);
        border-color: #b7e4cc;
      }

      .badge-gray {
        background: #f7f7f8;
        color: var(--badge-gray);
        border-color: #d2d6dc;
      }

      .badge-orange {
        background: #fffaf0;
        color: var(--badge-orange);
        border-color: #fbd38d;
      }

      .badge-blue {
        background: #ebf8ff;
        color: var(--badge-blue);
        border-color: #90cdf4;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      .kpi-card {
        border-radius: 10px;
        border: 1px dashed var(--border-subtle);
        padding: 7px 8px;
        background: #fffdf7;
        font-size: 12px;
      }

      .kpi-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 2px;
      }

      .kpi-value {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .kpi-subtext {
        font-size: 11px;
        color: var(--text-muted);
      }

      .detail-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .detail-block {
        margin-bottom: 8px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px 10px;
      }

      .detail-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 2px;
      }

      .detail-value {
        font-size: 12px;
      }

      .detail-value-strong {
        font-size: 12px;
        font-weight: 600;
      }

      .preview-box {
        border-radius: 10px;
        border: 1px dashed #deccba;
        padding: 8px 9px;
        background: #fffaf1;
        font-size: 12px;
        color: var(--text-main);
        white-space: pre-line;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Ad Performance Analysis</h1>
    </div>
    <section class="card" style="margin-top: 12px">
      <div class="card-header">
        <div>
          <div class="card-title">Property ad and banner ad analysis</div>
        </div>
        <div class="toolbar-right">
          <button class="btn btn-ghost" type="button" id="resetSortBtn">
            Reset sort
          </button>
          <button class="btn btn-primary" type="button" id="exportCsvBtn">
            Export CSV
          </button>
        </div>
      </div>

      <div class="filters">
        <div class="field-group" style="flex: 1 1 220px">
          <label class="field-label" for="searchInput">Search surface</label>
          <input
            id="searchInput"
            type="text"
            placeholder="Surface or campaign name"
          />
        </div>
        <div class="field-group">
          <label class="field-label" for="typeFilter">Ad type</label>
          <select id="typeFilter">
            <option value="">All</option>
            <option value="property">Property ad</option>
            <option value="banner">Banner ad</option>
          </select>
        </div>
      </div>

      <div style="overflow: auto; max-height: 340px">
        <table>
          <thead>
            <tr>
              <th style="width: 28px">
                <input type="checkbox" id="selectAll" />
              </th>
              <th data-sort-key="name">Surface</th>
              <th data-sort-key="type">Type</th>
              <th data-sort-key="impAds">IMP (ads)</th>
              <th data-sort-key="clAds">CL (ads)</th>
              <th data-sort-key="ctrAds">CTR (ads)</th>
              <th data-sort-key="cvAds">CV (ads)</th>
              <th data-sort-key="cvrAds">CVR (ads)</th>
              <th data-sort-key="ctrDiff">CTR vs general</th>
              <th data-sort-key="cvrDiff">CVR vs general</th>
            </tr>
          </thead>
          <tbody id="perfBody"></tbody>
        </table>
      </div>
    </section>

    <script>
      const surfaces = [
        {
          id: "surf_new_dev",
          name: "New development properties surface",
          type: "property",
          impAds: 90000,
          clAds: 5400,
          cvAds: 430,
          impGeneral: 60000,
          clGeneral: 2400,
          cvGeneral: 180,
        },
        {
          id: "surf_property_list",
          name: "Property list sponsored slots",
          type: "property",
          impAds: 65000,
          clAds: 3700,
          cvAds: 310,
          impGeneral: 52000,
          clGeneral: 2100,
          cvGeneral: 150,
        },
        {
          id: "surf_home_banner",
          name: "Homepage banner",
          type: "banner",
          impAds: 120000,
          clAds: 3600,
          cvAds: 260,
          impGeneral: 95000,
          clGeneral: 2500,
          cvGeneral: 190,
        },
        {
          id: "surf_detail_banner",
          name: "Listing detail banner",
          type: "banner",
          impAds: 48000,
          clAds: 1900,
          cvAds: 150,
          impGeneral: 41000,
          clGeneral: 1500,
          cvGeneral: 120,
        },
      ];

      const state = {
        search: "",
        type: "",
        sortKey: "name",
        sortDir: "asc",
        selected: new Set(),
      };

      function pct(num, den) {
        if (!den) return 0;
        return (num / den) * 100;
      }

      function fmtPct(x) {
        const v = x || 0;
        const sign = v > 0 ? "+" : v < 0 ? "" : "";
        return sign + v.toFixed(1) + "%";
      }

      function fmtPctPlain(x) {
        const v = x || 0;
        return v.toFixed(1) + "%";
      }

      function applyFilters() {
        const q = state.search.toLowerCase();
        return surfaces.filter((s) => {
          if (state.type && s.type !== state.type) return false;
          if (!q) return true;
          return (
            s.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q)
          );
        });
      }

      function withMetrics(row) {
        const ctrAds = pct(row.clAds, row.impAds);
        const cvrAds = pct(row.cvAds, row.clAds);
        const ctrGen = pct(row.clGeneral, row.impGeneral);
        const cvrGen = pct(row.cvGeneral, row.clGeneral);
        return {
          ...row,
          ctrAds,
          cvrAds,
          ctrGen,
          cvrGen,
          ctrDiff: ctrAds - ctrGen,
          cvrDiff: cvrAds - cvrGen,
        };
      }

      function sortList(list) {
        const { sortKey, sortDir } = state;
        const sorted = [...list].sort((a, b) => {
          const am = withMetrics(a);
          const bm = withMetrics(b);
          let va = am[sortKey];
          let vb = bm[sortKey];
          if (typeof va === "string") {
            va = va.toLowerCase();
            vb = vb.toLowerCase();
          }
          if (va < vb) return sortDir === "asc" ? -1 : 1;
          if (va > vb) return sortDir === "asc" ? 1 : -1;
          return 0;
        });
        return sorted.map(withMetrics);
      }

      function renderTable() {
        const body = document.getElementById("perfBody");
        const selectAll = document.getElementById("selectAll");
        const filtered = applyFilters();
        const rows = sortList(filtered);

        body.innerHTML = "";

        rows.forEach((r) => {
          const tr = document.createElement("tr");
          const checked = state.selected.has(r.id);
          tr.innerHTML = `
            <td>
              <input
                type="checkbox"
                class="row-select"
                data-id="${r.id}"
                ${checked ? "checked" : ""}
              />
            </td>
            <td>${r.name}</td>
            <td>${r.type === "property" ? "Property ad" : "Banner ad"}</td>
            <td>${r.impAds.toLocaleString("ja-JP")}</td>
            <td>${r.clAds.toLocaleString("ja-JP")}</td>
            <td>${fmtPctPlain(r.ctrAds)}</td>
            <td>${r.cvAds.toLocaleString("ja-JP")}</td>
            <td>${fmtPctPlain(r.cvrAds)}</td>
            <td>${fmtPct(r.ctrDiff)}</td>
            <td>${fmtPct(r.cvrDiff)}</td>
          `;
          body.appendChild(tr);
        });

        if (!rows.length) {
          selectAll.checked = false;
          selectAll.indeterminate = false;
        } else {
          const allIds = rows.map((r) => r.id);
          const selectedInView = allIds.filter((id) => state.selected.has(id));
          if (selectedInView.length === 0) {
            selectAll.checked = false;
            selectAll.indeterminate = false;
          } else if (selectedInView.length === allIds.length) {
            selectAll.checked = true;
            selectAll.indeterminate = false;
          } else {
            selectAll.indeterminate = true;
          }
        }
      }

      function handleHeaderClick(e) {
        const th = e.target.closest("th[data-sort-key]");
        if (!th) return;
        const key = th.getAttribute("data-sort-key");
        if (!key) return;
        if (state.sortKey === key) {
          state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
        } else {
          state.sortKey = key;
          state.sortDir = "asc";
        }
        renderTable();
      }

      function handleRowSelect(e) {
        const cb = e.target.closest(".row-select");
        if (!cb) return;
        const id = cb.getAttribute("data-id");
        if (!id) return;
        if (cb.checked) {
          state.selected.add(id);
        } else {
          state.selected.delete(id);
        }
        renderTable();
      }

      function handleSelectAll(e) {
        const checked = e.target.checked;
        const filtered = applyFilters();
        if (checked) {
          filtered.forEach((r) => state.selected.add(r.id));
        } else {
          filtered.forEach((r) => state.selected.delete(r.id));
        }
        renderTable();
      }

      function exportCsv() {
        const filtered = applyFilters();
        const rowsWithMetrics = sortList(filtered);
        const targetRows = rowsWithMetrics.filter(
          (r) => state.selected.size === 0 || state.selected.has(r.id),
        );

        const header = [
          "surface_id",
          "surface_name",
          "type",
          "imp_ads",
          "cl_ads",
          "ctr_ads_pct",
          "cv_ads",
          "cvr_ads_pct",
          "imp_general",
          "cl_general",
          "ctr_general_pct",
          "cv_general",
          "cvr_general_pct",
          "ctr_diff_pct",
          "cvr_diff_pct",
        ];

        const rows = targetRows.map((r) => [
          r.id,
          r.name,
          r.type,
          r.impAds,
          r.clAds,
          r.ctrAds.toFixed(3),
          r.cvAds,
          r.cvrAds.toFixed(3),
          r.impGeneral,
          r.clGeneral,
          r.ctrGen.toFixed(3),
          r.cvGeneral,
          r.cvrGen.toFixed(3),
          r.ctrDiff.toFixed(3),
          r.cvrDiff.toFixed(3),
        ]);

        const escapeCsv = (value) => {
          if (value == null) return "";
          const str = String(value);
          if (/[",\n]/.test(str)) {
            return '"' + str.replace(/"/g, '""') + '"';
          }
          return str;
        };

        const csv = [header, ...rows]
          .map((row) => row.map(escapeCsv).join(","))
          .join("\n");

        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "yuushi_ad_property_banner_analysis.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function init() {
        const head = document.querySelector("table thead");
        const body = document.getElementById("perfBody");
        document
          .getElementById("searchInput")
          .addEventListener("input", (e) => {
            state.search = e.target.value;
            renderTable();
          });
        document
          .getElementById("typeFilter")
          .addEventListener("change", (e) => {
            state.type = e.target.value;
            renderTable();
          });
        head.addEventListener("click", handleHeaderClick);
        body.addEventListener("change", handleRowSelect);
        document
          .getElementById("selectAll")
          .addEventListener("change", handleSelectAll);
        document
          .getElementById("exportCsvBtn")
          .addEventListener("click", exportCsv);
        document
          .getElementById("resetSortBtn")
          .addEventListener("click", () => {
            state.sortKey = "name";
            state.sortDir = "asc";
            renderTable();
          });
        renderTable();
      }

      init();
    </script>
  </body>
</html>
