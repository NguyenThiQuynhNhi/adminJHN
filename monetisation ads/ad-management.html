<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Ad Management</title>
    <style>
      :root {
        --bg-body: #f5f3ef;
        --bg-card: #fffaf2;
        --border-subtle: #eadccd;
        --accent: #c26b41;
        --accent-soft: #f3d7c6;
        --text-main: #3b2f2a;
        --text-muted: #7a6a5c;
        --badge-green: #2f855a;
        --badge-gray: #4a5568;
        --badge-orange: #b7791f;
        --badge-red: #c53030;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px 24px 32px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .page-subtitle {
        margin: 0 0 16px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 7fr) minmax(0, 6fr);
        gap: 16px;
        align-items: flex-start;
      }

      .card {
        background-color: var(--bg-card);
        border-radius: 14px;
        border: 1px solid var(--border-subtle);
        padding: 14px 16px 16px;
        box-shadow: 0 10px 30px rgba(115, 72, 39, 0.04);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
      }

      .card-subtitle {
        font-size: 12px;
        color: var(--text-muted);
      }

      .toolbar-right {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .btn {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 11px;
        font-size: 11px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 4px;
        align-items: center;
        color: var(--text-main);
      }

      .btn-primary {
        background: linear-gradient(135deg, #c26b41, #a55232);
        border-color: #a55232;
        color: #fffaf3;
      }

      .btn-ghost {
        background: transparent;
      }

      .btn-danger {
        background: #fff5f5;
        border-color: #feb2b2;
        color: var(--badge-red);
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 120px;
      }

      .field-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
      }

      input[type="text"],
      select {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 10px;
        font-size: 12px;
        background-color: #fffcf7;
        color: var(--text-main);
        outline: none;
      }

      input[type="text"]:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(194, 107, 65, 0.2);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: #f7efe6;
      }

      th,
      td {
        padding: 7px 8px;
        text-align: left;
        border-bottom: 1px solid #efe0d4;
      }

      th {
        font-weight: 500;
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      tbody tr {
        cursor: pointer;
        transition: background 0.12s ease;
      }

      tbody tr:hover {
        background-color: #f8f1ea;
      }

      tbody tr.selected-row {
        background-color: #f1e3d5;
      }

      .ad-name {
        font-weight: 600;
      }

      .ad-meta {
        font-size: 11px;
        color: var(--text-muted);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 7px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 500;
        border: 1px solid transparent;
        white-space: nowrap;
      }

      .badge-status-active {
        background: #e6f6ef;
        color: var(--badge-green);
        border-color: #b7e4cc;
      }

      .badge-status-paused {
        background: #fffaf0;
        color: var(--badge-orange);
        border-color: #fbd38d;
      }

      .badge-status-ended {
        background: #f7f7f8;
        color: var(--badge-gray);
        border-color: #d2d6dc;
      }

      .badge-status-pending {
        background: #ebf8ff;
        color: #2c5282;
        border-color: #90cdf4;
      }

      .badge-type {
        background: #edf2f7;
        color: #2c5282;
        border-color: #cbd5e0;
      }

      .badge-placement {
        background: #f0e3d7;
        color: #744210;
        border-color: #e2c6a8;
      }

      .badge-risk {
        background: #fff5f5;
        color: var(--badge-red);
        border-color: #fed7d7;
      }

      .detail-layout {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .detail-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .detail-title-block h2 {
        margin: 0 0 4px;
        font-size: 16px;
      }

      .detail-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .detail-meta span + span::before {
        content: "· ";
        margin: 0 2px;
      }

      .detail-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
        margin-bottom: 4px;
      }

      .detail-field-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 2px;
      }

      .detail-input,
      .detail-select,
      textarea {
        width: 100%;
        border-radius: 9px;
        border: 1px solid var(--border-subtle);
        padding: 5px 8px;
        font-size: 12px;
        background-color: #fffcf7;
        color: var(--text-main);
        outline: none;
      }

      .detail-input:focus,
      .detail-select:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(194, 107, 65, 0.2);
      }

      textarea {
        min-height: 70px;
        resize: vertical;
        font-family: inherit;
      }

      .preview-box {
        border-radius: 10px;
        border: 1px dashed #deccba;
        padding: 8px 9px;
        background: #fffaf1;
        font-size: 12px;
        color: var(--text-main);
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Ads management</h1>
    </div>

    <div class="layout">
      <section class="card">
        <div class="card-header">
          <div>
            <div class="card-title">New development properties</div>
            <div class="card-subtitle">
              Section for newly launched developments.
            </div>
          </div>
          <div class="toolbar-right">
            <button
              class="btn btn-primary"
              type="button"
              onclick="handleSaveSurface('new_development')"
            >
              Save
            </button>
            <button
              class="btn btn-ghost"
              type="button"
              onclick="handleCustomizeSurface('new_development')"
            >
              Customize selection
            </button>
          </div>
        </div>
      </section>

      <!-- 2. New properties (last 30 days) -->
      <section class="card">
        <div class="card-header">
          <div>
            <div class="card-title">New properties</div>
            <div class="card-subtitle">Properties in system</div>
          </div>
          <div class="toolbar-right">
            <button
              class="btn btn-primary"
              type="button"
              onclick="handleSaveSurface('new_properties')"
            >
              Save
            </button>
            <button
              class="btn btn-ghost"
              type="button"
              onclick="handleCustomizeSurface('new_properties')"
            >
              Customize selection
            </button>
          </div>
        </div>
      </section>
    </div>

    <div class="layout" style="margin-top: 16px">
      <!-- 3. Agent info surface -->
      <section class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Agent info</div>
          </div>
          <div class="toolbar-right">
            <button
              class="btn btn-primary"
              type="button"
              onclick="handleSaveSurface('agent_info')"
            >
              Save
            </button>
            <button
              class="btn btn-ghost"
              type="button"
              onclick="handleCustomizeSurface('agent_info')"
            >
              Customize selection
            </button>
          </div>
        </div>
      </section>
    </div>

    <script>
      function handleSaveSurface(key) {
        alert("Save surface configuration (" + key + ") — demo only.");
      }

      function handleCustomizeSurface(key) {
        alert(
          "Open 'Customize selection' for surface (" + key + ") — demo only.",
        );
      }
    </script>
  </body>
</html>
