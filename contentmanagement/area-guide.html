<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Area Guides</title>
    <style id="uxTableOverflowFix">
/* Table overflow handling: keep text intact, only enable horizontal scroll on narrow viewport */
@media (max-width: 1199px) {
  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
}
</style>
  <style id="uxBaselinePolish">
/* Baseline UI polish — applies only where file CSS doesn't override */
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Pointer cursor on interactive */
button, .btn, [role="button"], select,
input[type="checkbox"], input[type="radio"], input[type="submit"],
input[type="button"], a[href], label[for] {
  cursor: pointer;
}

/* Disabled state */
button:disabled, .btn:disabled, input:disabled, select:disabled, textarea:disabled {
  cursor: not-allowed;
  opacity: 0.6;
}

/* Focus-visible outline (a11y) */
button:focus-visible, .btn:focus-visible,
a:focus-visible, [role="button"]:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid #c4a25f;
  outline-offset: 2px;
}

/* Inherit font family for form controls (fixes browser-default) */
input, select, textarea, button {
  font-family: inherit;
}

/* Responsive media */
img, svg, video {
  max-width: 100%;
  height: auto;
}

/* Subtle hover for buttons (only if no transition already set, gentle filter) */
button:hover:not(:disabled), .btn:hover:not(:disabled) {
  filter: brightness(0.96);
  transition: filter 0.15s ease;
}

/* Smooth scrollbar on Webkit */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: #f5ece0;
}
::-webkit-scrollbar-thumb {
  background: #d9c8b4;
  border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover {
  background: #c4a25f;
}

/* Selection highlight on-brand */
::selection {
  background: #c4a25f;
  color: #fff;
}

/* HR baseline */
hr {
  border: none;
  border-top: 1px solid #eadccd;
  margin: 12px 0;
}

/* Anchor baseline color matches brand (no underline by default to match flat UI) */
a {
  color: #8a5a3b;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
  <body>
    <div class="cms-filter-bar">
      <select id="areaGuideLevelFilter" class="filter-select">
        <option value="all">All level</option>
        <option value="city">City guides</option>
        <option value="area">Area guides</option>
      </select>
      <select id="areaGuideStatusFilter" class="filter-select">
        <option value="all">All status</option>
        <option value="published">Published</option>
        <option value="draft">Draft</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Level</th>
            <th>Location</th>
            <th>Status</th>
            <th>Author</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="areaGuidesBody">
          <tr>
            <td colspan="6" class="empty-state">Loading area guides...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div style="margin-top: 10px" class="cms-inline-actions">
      <button
        class="btn btn-primary"
        type="button"
        onclick="openCityGuideEditor()"
      >
        New city guide
      </button>
      <button
        class="btn btn-secondary"
        type="button"
        onclick="openAreaGuideEditor()"
      >
        New area guide
      </button>
    </div>

    <script>
      (function () {
        function renderAreaGuides() {
          const tbody = document.getElementById('areaGuidesBody');
          if (!tbody) return;
          const sampleGuides = [
            { id: 1, title: 'Tokyo City', level: 'City Guide', location: 'Tokyo', status: 'Published', author: 'Michael' },
            { id: 2, title: 'Shibuya District', level: 'Area Guide', location: 'Tokyo/Shibuya', status: 'Draft', author: 'Alice' },
            { id: 3, title: 'Osaka City', level: 'City Guide', location: 'Osaka', status: 'Published', author: 'Anna' },
            { id: 4, title: 'Namba Area', level: 'Area Guide', location: 'Osaka/Namba', status: 'Published', author: 'Bob' },
          ];
          tbody.innerHTML = sampleGuides.map(guide => `
            <tr>
              <td>${guide.title}</td>
              <td>${guide.level}</td>
              <td>${guide.location}</td>
              <td><span class="badge ${guide.status === 'Published' ? 'badge-success' : 'badge-warning'}">${guide.status}</span></td>
              <td>${guide.author}</td>
              <td style="text-align: right; display: flex; gap: 6px; justify-content: flex-end">
                <button class="btn btn-ghost" type="button" title="Edit guide">✎</button>
                <button class="btn btn-ghost btn-danger" type="button" title="Delete guide" onclick="if(confirm('Delete this guide?')) alert('Deleted')">🗑</button>
              </td>
            </tr>
          `).join('');
        }

        function initAreaGuidePane() {
          const searchEl = document.getElementById("areaGuideSearchInput");
          const levelFilterEl = document.getElementById("areaGuideLevelFilter");
          const statusFilterEl = document.getElementById(
            "areaGuideStatusFilter",
          );

          if (searchEl) searchEl.addEventListener("input", renderAreaGuides);
          if (levelFilterEl)
            levelFilterEl.addEventListener("change", renderAreaGuides);
          if (statusFilterEl)
            statusFilterEl.addEventListener("change", renderAreaGuides);

          renderAreaGuides();
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initAreaGuidePane);
        } else {
          initAreaGuidePane();
        }
      })();
    </script>
      </table>
    </div>
  </body>
</html>
