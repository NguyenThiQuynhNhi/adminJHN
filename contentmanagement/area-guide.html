<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Area Guides</title>
  </head>
  <body>
    <div class="cms-filter-bar">
      <input
        type="text"
        id="areaGuideSearchInput"
        class="cms-filter-input"
        placeholder="Search guides by title, prefecture, city, area or author"
      />
      <select id="areaGuideLevelFilter" class="filter-select">
        <option value="all">All levels</option>
        <option value="city">City guides</option>
        <option value="area">Area guides</option>
      </select>
      <select id="areaGuideStatusFilter" class="filter-select">
        <option value="all">All statuses</option>
        <option value="published">Published</option>
        <option value="draft">Draft</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Level</th>
            <th>Location</th>
            <th>Status</th>
            <th>Author</th>
            <th style="text-align: right">Actions</th>
          </tr>
        </thead>
        <tbody id="areaGuidesBody">
          <tr>
            <td colspan="6" class="empty-state">Loading area guides...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div style="margin-top: 10px" class="cms-inline-actions">
      <button
        class="btn btn-primary"
        type="button"
        onclick="openCityGuideEditor()"
      >
        New city guide
      </button>
      <button
        class="btn btn-secondary"
        type="button"
        onclick="openAreaGuideEditor()"
      >
        New area guide
      </button>
    </div>

    <script>
      (function () {
        function renderAreaGuides() {
          const tbody = document.getElementById('areaGuidesBody');
          if (!tbody) return;
          const sampleGuides = [
            { id: 1, title: 'Tokyo Central', level: 'City', location: 'Tokyo', status: 'Published', author: 'Editor Sato' },
            { id: 2, title: 'Shibuya District', level: 'Area', location: 'Tokyo', status: 'Draft', author: 'Content Team' }
          ];
          tbody.innerHTML = sampleGuides.map(guide => `
            <tr>
              <td>${guide.title}</td>
              <td>${guide.level}</td>
              <td>${guide.location}</td>
              <td><span class="badge ${guide.status === 'Published' ? 'badge-success' : 'badge-warning'}">${guide.status}</span></td>
              <td>${guide.author}</td>
              <td style="text-align: right; display: flex; gap: 6px; justify-content: flex-end">
                <button class="btn btn-ghost" type="button" title="Edit guide">✎ Edit</button>
                <button class="btn btn-ghost" type="button" title="Delete guide" onclick="if(confirm('Delete this guide?')) alert('Deleted (demo)')">🗑 Delete</button>
              </td>
            </tr>
          `).join('');
        }

        function initAreaGuidePane() {
          const searchEl = document.getElementById("areaGuideSearchInput");
          const levelFilterEl = document.getElementById("areaGuideLevelFilter");
          const statusFilterEl = document.getElementById(
            "areaGuideStatusFilter",
          );

          if (searchEl) searchEl.addEventListener("input", renderAreaGuides);
          if (levelFilterEl)
            levelFilterEl.addEventListener("change", renderAreaGuides);
          if (statusFilterEl)
            statusFilterEl.addEventListener("change", renderAreaGuides);

          renderAreaGuides();
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initAreaGuidePane);
        } else {
          initAreaGuidePane();
        }
      })();
    </script>
      </table>
    </div>
  </body>
</html>
