<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Area Guides</title>
    <style id="uxTableOverflowFix">
/* Table overflow handling: keep text intact, only enable horizontal scroll on narrow viewport */
@media (max-width: 1199px) {
  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
}
</style>
  <style id="uxBaselinePolish">
/* Baseline UI polish — applies only where file CSS doesn't override */
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Pointer cursor on interactive */
button, .btn, [role="button"], select,
input[type="checkbox"], input[type="radio"], input[type="submit"],
input[type="button"], a[href], label[for] {
  cursor: pointer;
}

/* Disabled state */
button:disabled, .btn:disabled, input:disabled, select:disabled, textarea:disabled {
  cursor: not-allowed;
  opacity: 0.6;
}

/* Focus-visible outline (a11y) */
button:focus-visible, .btn:focus-visible,
a:focus-visible, [role="button"]:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid #c4a25f;
  outline-offset: 2px;
}

/* Inherit font family for form controls (fixes browser-default) */
input, select, textarea, button {
  font-family: inherit;
}

/* Responsive media */
img, svg, video {
  max-width: 100%;
  height: auto;
}

/* Subtle hover for buttons (only if no transition already set, gentle filter) */
button:hover:not(:disabled), .btn:hover:not(:disabled) {
  filter: brightness(0.96);
  transition: filter 0.15s ease;
}

/* Smooth scrollbar on Webkit */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: #f5ece0;
}
::-webkit-scrollbar-thumb {
  background: #d9c8b4;
  border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover {
  background: #c4a25f;
}

/* Selection highlight on-brand */
::selection {
  background: #c4a25f;
  color: #fff;
}

/* HR baseline */
hr {
  border: none;
  border-top: 1px solid #eadccd;
  margin: 12px 0;
}

/* Anchor baseline color matches brand (no underline by default to match flat UI) */
a {
  color: #8a5a3b;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
  <body>
    <div class="cms-filter-bar">
      <button class="btn btn-primary" type="button" onclick="openCityGuideEditor()">New city guide</button>
      <button class="btn btn-secondary" type="button" onclick="openAreaGuideEditor()">New area guide</button>
      <select id="areaGuideLevelFilter" class="filter-select">
        <option value="all">All level</option>
        <option value="city">City guides</option>
        <option value="area">Area guides</option>
      </select>
      <select id="areaGuideStatusFilter" class="filter-select">
        <option value="all">All status</option>
        <option value="published">Published</option>
        <option value="draft">Draft</option>
      </select>
    </div>

    <div id="areaGuideResultCount" class="list-result-count"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Level</th>
            <th>Location</th>
            <th>Status</th>
            <th>Featured</th>
            <th>Author</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="areaGuidesBody">
          <tr>
            <td colspan="7" class="empty-state">Loading area guides...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="areaGuidePagination" class="pagination"></div>


    <script>
      // This pane is loaded inside blog.html (Insight Management). The actual data
      // store + rendering (incl. the Featured toggle column) lives in blog.html as a
      // global `renderAreaGuides()` reading from yuushi.areaGuides. Here we only wire
      // this fragment's filters to that global renderer so there is a single source
      // of truth.
      (function () {
        function render() {
          // Reset to page 1 on any filter/search change, then re-render.
          if (typeof window.resetAreaGuidePage === "function") {
            window.resetAreaGuidePage();
          }
          if (typeof window.renderAreaGuides === "function") {
            window.renderAreaGuides();
          }
        }
        function initAreaGuidePane() {
          ["areaGuideLevelFilter", "areaGuideStatusFilter"].forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.addEventListener("change", render);
          });
          const searchEl = document.getElementById("areaGuideSearchInput");
          if (searchEl) searchEl.addEventListener("input", render);
          render();
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initAreaGuidePane);
        } else {
          initAreaGuidePane();
        }
      })();
    </script>
  </body>
</html>
