<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Category Search — YUUSHI Admin</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      :root {
        --bg-page: #f5f5f5;
        --bg-card: #ffffff;
        --bg-card-warm: #fffaf2;
        --bg-row-hover: #faf6ee;
        --bg-header-soft: #faf6ee;
        --text-primary: #1a1a1a;
        --text-muted: #7a6a5c;
        --text-label: #888;
        --text-link: #8a5a3b;
        --border-default: #e0e0e0;
        --border-warm: #eadccd;
        --border-soft: #f0f0f0;
        --color-primary: #8b7340;
        --color-primary-hover: #6d5a32;
        --color-primary-light: #c9a85c;
        --status-success-text: #2a7a2a;
        --status-success-bg: #d4f0d4;
        --status-warning-text: #c87a2a;
        --status-warning-bg: #fff3d4;
        --status-danger-text: #b23b3b;
        --status-danger-bg: #fbe9e9;
        --status-neutral-text: #666;
        --status-neutral-bg: #e8e8e8;
        --r-sm: 6px;
        --r-md: 8px;
        --r-lg: 12px;
        --r-full: 999px;
        --shadow-card: 0 10px 30px rgba(115, 72, 39, 0.05);
        --shadow-toast: 0 8px 24px rgba(0, 0, 0, 0.3);
        --shadow-modal: 0 18px 50px rgba(59, 47, 42, 0.28);
        --font-stack:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        /* legacy aliases mapped to the token palette */
        --bg: var(--bg-page);
        --card: var(--bg-card);
        --soft: var(--bg-card-warm);
        --accent: var(--color-primary);
        --accent-dark: var(--color-primary-hover);
        --gold: var(--color-primary-light);
        --border: var(--border-default);
        --border-strong: var(--border-warm);
        --text: var(--text-primary);
        --muted: var(--text-muted);
        --green: var(--status-success-text);
        --red: var(--status-danger-text);
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-stack);
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        padding: 22px 26px 40px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        font-weight: 800;
      }
      .page-sub {
        margin: 0 0 18px;
        font-size: 13px;
        color: var(--muted);
      }
      .muted {
        color: var(--muted);
      }

      /* Layout */
      .cs-layout {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 18px;
        align-items: start;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        box-shadow: var(--shadow-card);
      }
      .card-pad {
        padding: 16px 18px;
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }
      .panel-head h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
      }
      .panel-head h2 i {
        color: var(--accent);
        margin-right: 7px;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border-strong);
        background: var(--card);
        color: var(--text);
        border-radius: var(--r-md);
        padding: 7px 12px;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      .btn:hover {
        background: var(--bg-row-hover);
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        border-color: var(--accent-dark);
        color: var(--card);
      }
      .btn-primary:hover {
        filter: brightness(0.97);
      }
      .btn-sm {
        padding: 4px 9px;
        font-size: 11.5px;
        border-radius: var(--r-sm);
      }
      .btn-ghost {
        background: transparent;
        border-color: transparent;
      }
      .btn-ghost:hover {
        background: var(--bg-row-hover);
      }
      .icon-btn {
        width: 28px;
        height: 28px;
        padding: 0;
        border-radius: var(--r-sm);
        justify-content: center;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--muted);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        font-size: 12px;
      }
      .icon-btn:hover {
        background: var(--bg-row-hover);
        color: var(--accent-dark);
      }
      .icon-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .icon-btn.danger:hover {
        color: var(--status-danger-text);
        border-color: var(--status-danger-bg);
        background: var(--status-danger-bg);
      }

      /* Tabs list (left) */
      .tab-list {
        padding: 8px;
      }
      .tab-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 8px;
        border-radius: var(--r-md);
        cursor: pointer;
        border: 1px solid transparent;
      }
      .tab-row:hover {
        background: var(--bg-row-hover);
      }
      .tab-row.active {
        background: var(--bg-card-warm);
        border-color: var(--gold);
      }
      .tab-row .reorder {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .tab-row .reorder .icon-btn {
        width: 20px;
        height: 16px;
        border: none;
        background: transparent;
      }
      .tab-label {
        flex: 1;
        min-width: 0;
        font-weight: 600;
        font-size: 13px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tab-row.hidden-row .tab-label {
        color: var(--muted);
      }
      .tab-actions {
        display: flex;
        gap: 3px;
      }

      /* Switch */
      .sw {
        position: relative;
        display: inline-flex;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
        cursor: pointer;
      }
      .sw input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .sw-s {
        position: absolute;
        inset: 0;
        background: var(--status-neutral-text);
        border-radius: var(--r-full);
        transition: 0.2s;
      }
      .sw-s:before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        left: 3px;
        top: 3px;
        background: var(--card);
        border-radius: 50%;
        transition: 0.2s;
      }
      .sw input:checked + .sw-s {
        background: var(--green);
      }
      .sw input:checked + .sw-s:before {
        transform: translateX(16px);
      }

      /* Right content */
      .content-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .content-head .ttl {
        font-size: 17px;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .content-head .ttl .hide-badge {
        font-size: 10.5px;
        font-weight: 700;
        color: var(--status-neutral-text);
        background: var(--status-neutral-bg);
        border: 1px solid var(--border);
        padding: 2px 8px;
        border-radius: var(--r-full);
      }

      .section-block {
        padding: 12px 18px 4px;
      }
      .section-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0 8px;
        padding: 8px 10px;
        background: var(--bg-header-soft);
        border: 1px solid var(--border);
        border-radius: var(--r-md);
      }
      .section-head.is-default {
        background: var(--bg-card-warm);
        border-style: dashed;
      }
      .section-title {
        flex: 1;
        font-weight: 800;
        font-size: 14px;
        color: var(--accent-dark);
      }
      .section-head.is-default .section-title {
        color: var(--muted);
        font-weight: 600;
        font-style: italic;
      }
      .section-ctrls {
        display: flex;
        gap: 3px;
        align-items: center;
      }

      table.items {
        width: 100%;
        border-collapse: collapse;
        font-size: 12.5px;
        margin-bottom: 14px;
      }
      table.items thead {
        background: var(--bg-header-soft);
      }
      table.items th,
      table.items td {
        padding: 9px 10px;
        text-align: left;
        border-bottom: 1px solid var(--border-soft);
        vertical-align: middle;
      }
      table.items th {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        font-weight: 700;
      }
      table.items th.c,
      table.items td.c {
        text-align: center;
      }
      table.items tbody tr:hover {
        background: var(--bg-row-hover);
      }
      .item-label {
        font-weight: 600;
        font-size: 13.5px;
      }
      .ord-cell {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .ord-num {
        width: 18px;
        text-align: center;
        color: var(--muted);
        font-weight: 700;
      }

      /* chips */
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        max-width: 360px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        background: var(--status-neutral-bg);
        border: 1px solid var(--border);
        color: var(--status-neutral-text);
        border-radius: var(--r-full);
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
      }
      .chip.tx {
        background: var(--bg-card-warm);
        border-color: var(--border-warm);
        color: var(--accent-dark);
      }
      .pop-chip {
        background: var(--status-warning-bg);
        border: 1px solid var(--status-warning-text);
        color: var(--status-warning-text);
        border-radius: var(--r-full);
        padding: 2px 9px;
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
      }
      .count-cell {
        white-space: nowrap;
      }
      .count-num {
        font-weight: 700;
      }
      .auto-tag {
        font-size: 9.5px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--gold);
        background: var(--bg-card-warm);
        border: 1px solid var(--border-warm);
        border-radius: var(--r-sm);
        padding: 1px 4px;
        margin-left: 5px;
        cursor: help;
      }
      .empty {
        text-align: center;
        color: var(--muted);
        padding: 26px 12px;
        font-size: 13px;
      }
      .add-item-row {
        padding: 0 0 12px;
      }

      /* Drawer */
      .ov {
        position: fixed;
        inset: 0;
        background: rgba(40, 30, 20, 0.4);
        opacity: 0;
        visibility: hidden;
        transition: 0.2s;
        z-index: 80;
      }
      .ov.open {
        opacity: 1;
        visibility: visible;
      }
      .drawer {
        position: fixed;
        top: 0;
        right: 0;
        height: 100vh;
        width: 540px;
        max-width: 96vw;
        background: var(--bg);
        box-shadow: -8px 0 30px rgba(0, 0, 0, 0.18);
        transform: translateX(100%);
        transition: transform 0.25s ease;
        z-index: 90;
        display: flex;
        flex-direction: column;
      }
      .drawer.open {
        transform: translateX(0);
      }
      .drawer-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--card);
      }
      .drawer-head h3 {
        margin: 0;
        font-size: 17px;
        font-weight: 800;
      }
      .drawer-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px 40px;
      }
      .drawer-foot {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        padding: 14px 20px;
        border-top: 1px solid var(--border);
        background: var(--card);
      }

      fieldset.fb {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px 14px;
        margin: 0 0 14px;
        background: var(--card);
      }
      fieldset.fb > legend {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--accent-dark);
        padding: 0 6px;
      }
      .fb label.fl {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.03em;
        margin: 0 0 4px;
      }
      .req {
        color: var(--red);
        font-weight: 700;
        margin-left: 2px;
      }
      .fb input[type="text"],
      .fb input[type="number"],
      .fb select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        font-size: 13px;
        background: #fff;
        color: var(--text);
        font-family: inherit;
      }
      .fb input:focus,
      .fb select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(196, 113, 74, 0.16);
      }
      .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .grid3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }
      .field {
        margin-bottom: 10px;
      }
      .field:last-child {
        margin-bottom: 0;
      }
      .radio-row {
        display: flex;
        gap: 8px;
      }
      .radio-row label {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        padding: 7px;
        cursor: pointer;
        font-weight: 600;
        font-size: 12.5px;
        background: #fff;
      }
      .radio-row label:has(input:checked) {
        background: #fdeee6;
        border-color: var(--accent);
        color: var(--accent-dark);
      }
      .radio-row input {
        display: none;
      }

      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        padding: 5px 11px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: #fff;
        color: var(--text);
      }
      .pill input {
        display: none;
      }
      .pill:has(input:checked),
      .pill.on {
        background: #fdeee6;
        border-color: var(--accent);
        color: var(--accent-dark);
      }

      .tree {
        max-height: 200px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        background: #fff;
      }
      .tree-group {
        margin-bottom: 8px;
      }
      .tree-node {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12.5px;
        padding: 3px 0;
      }
      .tree-node b {
        font-weight: 700;
      }
      .tree-children {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px 8px;
        padding: 2px 0 4px 18px;
      }
      .tree-leaf {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12.5px;
        padding: 2px 0;
      }
      .tree-sub {
        padding-left: 14px;
      }
      .tree-line {
        font-size: 11.5px;
        font-weight: 700;
        color: var(--accent-dark);
        padding: 3px 0 1px;
      }

      .pop-grid {
        display: grid;
        grid-template-columns: auto 1fr 1fr;
        gap: 10px;
        align-items: end;
      }
      .inline-check {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
      }

      /* Modal (rename / confirm) */
      .modal-ov {
        position: fixed;
        inset: 0;
        background: rgba(40, 30, 20, 0.42);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 120;
      }
      .modal-ov.open {
        display: flex;
      }
      .modal {
        background: #fff;
        border-radius: 14px;
        padding: 22px 24px;
        width: 400px;
        max-width: calc(100% - 32px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }
      .modal-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
        margin: 0 0 12px;
      }
      .modal-head h3 {
        margin: 0;
      }
      .modal h3 {
        margin: 0 0 12px;
        font-size: 16px;
      }
      .modal p {
        margin: 0 0 16px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.5;
      }
      .modal input {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        margin-bottom: 16px;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .modal-actions .btn.danger {
        background: var(--red);
        border-color: var(--red);
        color: #fff;
      }

      /* Toast */
      .toast-wrap {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 200;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .toast {
        background: #2f2a24;
        color: #fff;
        padding: 10px 16px;
        border-radius: 10px;
        font-size: 13px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
        opacity: 0;
        transform: translateY(8px);
        transition: 0.2s;
      }
      .toast.show {
        opacity: 1;
        transform: none;
      }

      @media (max-width: 900px) {
        .cs-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Category Search</h1>

    <div class="cs-layout">
      <!-- LEFT: Tabs -->
      <div class="card">
        <div class="panel-head">
          <h2><i class="fas fa-folder-tree"></i> Tabs</h2>
          <button class="btn btn-primary btn-sm" onclick="addTab()">
            <i class="fas fa-plus"></i> Add Tab
          </button>
        </div>
        <div class="tab-list" id="tabList"></div>
      </div>

      <!-- RIGHT: Selected tab content -->
      <div class="card">
        <div class="content-head">
          <div class="ttl" id="contentTitle">—</div>
          <button class="btn btn-sm" onclick="addSection()">
            <i class="fas fa-plus"></i> Add Section
          </button>
        </div>
        <div id="contentBody"></div>
      </div>
    </div>

    <!-- Filter Builder drawer -->
    <div class="ov" id="fbOverlay" onclick="closeDrawer()"></div>
    <aside class="drawer" id="fbDrawer" aria-hidden="true">
      <div class="drawer-head">
        <h3 id="fbTitle">Item</h3>
        <button class="icon-btn" onclick="closeDrawer()" title="Close">
          <i class="fas fa-xmark"></i>
        </button>
      </div>
      <div class="drawer-body" id="fbBody"></div>
      <div class="drawer-foot">
        <button class="btn" onclick="closeDrawer()">Cancel</button>
        <button class="btn btn-primary" onclick="saveItem()">
          <i class="fas fa-check"></i> Save Item
        </button>
      </div>
    </aside>

    <!-- Rename / prompt modal -->
    <div class="modal-ov" id="pmModal">
      <div class="modal">
        <div class="modal-head">
          <h3 id="pmTitle">Rename</h3>
          <button class="icon-btn" onclick="pmCancel()" title="Close">
            <i class="fas fa-xmark"></i>
          </button>
        </div>
        <input type="text" id="pmInput" autocomplete="off" />
        <div class="modal-actions">
          <button class="btn" onclick="pmCancel()">Cancel</button>
          <button class="btn btn-primary" onclick="pmOk()">Save</button>
        </div>
      </div>
    </div>

    <!-- Confirm modal -->
    <div class="modal-ov" id="cfModal">
      <div class="modal">
        <div class="modal-head">
          <h3 id="cfTitle">Confirm</h3>
          <button class="icon-btn" onclick="cfCancel()" title="Close">
            <i class="fas fa-xmark"></i>
          </button>
        </div>
        <p id="cfMsg"></p>
        <div class="modal-actions">
          <button class="btn" onclick="cfCancel()">Cancel</button>
          <button class="btn danger" id="cfOk">Delete</button>
        </div>
      </div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>

    <script>
      "use strict";
      const $ = (s, r = document) => r.querySelector(s);
      const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
      const LS_KEY = "yuushi.categorySearchConfig";
      const esc = (s) =>
        String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");

      /* ============ VOCABULARY (sourced from property schema OPT) ============ */
      // Region tree (small seed): Prefecture -> Cities
      const REGION_TREE = {
        Tokyo: ["Shibuya", "Shinjuku", "Minato", "Setagaya", "Chuo"],

        let c = null;
        try {

          if (raw) c = JSON.parse(raw);
        } catch (e) {}
        if (!c || !Array.isArray(c.tabs)) {
          c = seedConfig();
        }
        c.items.forEach((i) => {
          i.filterSet = normalizeFilter(i.filterSet);
        });
        config = c;
        save();
      }
      function save() {
        try {
          localStorage.setItem(LS_KEY, JSON.stringify(config));
        } catch (e) {}
      }
      const byOrder = (a, b) => a.order - b.order;
      const tabsSorted = () => config.tabs.slice().sort(byOrder);
      const sectionsOf = (tabId) =>
        config.sections.filter((s) => s.tabId === tabId).sort(byOrder);
      const itemsOf = (secId) =>
        config.items.filter((i) => i.sectionId === secId).sort(byOrder);
      const nextOrder = (arr) =>
        arr.length ? Math.max(...arr.map((x) => x.order)) + 1 : 1;
      const uid = (p) =>
        p +
        "-" +
        Date.now().toString(36) +
        Math.floor(Math.random() * 1e4).toString(36);

      /* ============ SUMMARY / CHIPS ============ */
      function yenM(n) {
        return "¥" + Number(n) / 1e6 + "M";
      }
      function priceLabel(min, max) {
        if (min && max) return yenM(min) + "–" + Number(max) / 1e6 + "M";
        if (min) return yenM(min) + "+";
        if (max) return "≤" + yenM(max);
        return "";
      }
      function rangeLabel(min, max, unit) {
        if (min && max) return min + "–" + max + unit;
        if (min) return "≥" + min + unit;
        if (max) return "≤" + max + unit;
        return "";
      }
      function summarizeFilter(fRaw) {
        const f = normalizeFilter(fRaw);
        const c = [];
        if (f.txType) c.push({ t: f.txType, cls: "tx" });
        if (f.keyword) c.push({ t: "“" + f.keyword + "”" });
        if (f.regions.length) {
          const labs = f.regions.map((r) => r.city || r.pref);
          c.push({
            t:
              labs.slice(0, 2).join(", ") +
              (labs.length > 2 ? " +" + (labs.length - 2) : ""),
          });
        }
        if (f.stations.length) {
          const labs = f.stations.map((s) => s.station);
          c.push({
            t:
              "🚉 " +
              labs.slice(0, 2).join(", ") +
              (labs.length > 2 ? " +" + (labs.length - 2) : ""),
          });
        }
        if (f.walk) c.push({ t: "≤" + f.walk + "min walk" });
        if (f.propTypes.length) {
          const labs = f.propTypes.map(short);
          c.push({
            t:
              labs.slice(0, 2).join(", ") +
              (labs.length > 2 ? " +" + (labs.length - 2) : ""),
          });
        }
        if (f.saleUnit) c.push({ t: f.saleUnit });
        if (f.layoutMin) c.push({ t: "≥" + f.layoutMin.replace("+", "") });
        if (f.layouts.length) c.push({ t: f.layouts.join("/") });
        if (f.bedrooms.length) c.push({ t: f.bedrooms.join(",") + "BR" });
        const sr = rangeLabel(f.sizeMin, f.sizeMax, "m²");
        if (sr) c.push({ t: sr });
        const pr = priceLabel(f.priceMin, f.priceMax);
        if (pr) c.push({ t: pr });
        if (f.age) c.push({ t: AGE_SHORT[f.age] || f.age });
        if (f.recency)
          c.push({ t: f.recency === "1week" ? "≤1wk new" : "≤1mo new" });
        if (f.yieldMin !== "" && f.yieldMin != null)
          c.push({ t: "Yield ≥" + f.yieldMin + "%" });
        if (f.floors === "le5") c.push({ t: "≤5F" });
        if (f.occupancy === "fully_occupied") c.push({ t: "Fully Occupied" });
        f.condition.forEach((x) => c.push({ t: x }));
        f.areaType.forEach((x) => c.push({ t: x }));
        Object.keys(f.features).forEach((k) => {
          if (f.features[k]) c.push({ t: FEAT_SHORT[k] || k });
        });
        return c;
      }
      function chipsHtml(fs) {
        const chips = summarizeFilter(fs);
        if (!chips.length) return '<span class="muted">No filter</span>';
        return (
          '<div class="chips">' +
          chips
            .map((c) => `<span class="chip ${c.cls || ""}">${esc(c.t)}</span>`)
            .join("") +
          "</div>"
        );
      }
      function popChipHtml(rule) {
        if (!rule || !rule.enabled) return '<span class="muted">—</span>';
        const m =
          rule.metric === "keep"
            ? "Keep"
            : rule.metric === "cv"
              ? "CV"
              : "Clicks";
        return `<span class="pop-chip">${m} ≥ ${rule.value}</span>`;
      }

      /* ============ RENDER ============ */
      function render() {
        renderTabs();
        renderContent();

      function renderTabs() {
        const list = tabsSorted();
        const el = $("#tabList");
        if (!list.length) {
          el.innerHTML = '<div class="empty">No tabs. Click "Add Tab".</div>';
          return;
        }
        el.innerHTML = list
          .map(
            (t, idx) => `
          <div class="tab-row ${t.id === currentTabId ? "active" : ""} ${t.visible ? "" : "hidden-row"}" onclick="selectTab('${t.id}')">
            <div class="reorder" onclick="event.stopPropagation()">
              <button class="icon-btn" ${idx === 0 ? "disabled" : ""} onclick="moveTab('${t.id}',-1)" title="Move up"><i class="fas fa-chevron-up"></i></button>
              <button class="icon-btn" ${idx === list.length - 1 ? "disabled" : ""} onclick="moveTab('${t.id}',1)" title="Move down"><i class="fas fa-chevron-down"></i></button>
            </div>
            <span class="tab-label" title="${esc(t.label)}">${esc(t.label)}</span>
            <div class="tab-actions" onclick="event.stopPropagation()">
              <label class="sw" title="Visible"><input type="checkbox" ${t.visible ? "checked" : ""} onchange="toggleTabVisible('${t.id}')"><span class="sw-s"></span></label>
              <button class="icon-btn" onclick="renameTab('${t.id}')" title="Rename"><i class="fas fa-pen"></i></button>
              <button class="icon-btn danger" onclick="deleteTab('${t.id}')" title="Delete"><i class="fas fa-trash"></i></button>
            </div>
          </div>`,
          )
          .join("");
      }

      function renderContent() {
        const tab = config.tabs.find((t) => t.id === currentTabId);
        const title = $("#contentTitle");

        if (!tab) {
          title.innerHTML = "—";
          body.innerHTML =
            '<div class="empty">Select a tab on the left to manage its sections and items.</div>';
          return;
        }
        title.innerHTML = `<i class="fas fa-table-list" style="color:var(--accent)"></i> ${esc(tab.label)} ${tab.visible ? "" : '<span class="hide-badge">HIDDEN</span>'}`;
        const secs = sectionsOf(tab.id);
        if (!secs.length) {
          body.innerHTML = '<div class="empty">No sections.</div>';
          return;
        }
        body.innerHTML = secs
          .map((s, si) => sectionHtml(s, si, secs.length))
          .join("");
      }

      function sectionHtml(s, idx, total) {
        const items = itemsOf(s.id);
        const headLabel =
          s.isDefault || !s.label
            ? '<span class="section-title">General</span>'
            : `<span class="section-title">${esc(s.label)} ${s.visible ? "" : '<span class="hide-badge">HIDDEN</span>'}</span>`;
        const head = `
          <div class="section-head ${s.isDefault || !s.label ? "is-default" : ""}">
            ${headLabel}
            <div class="section-ctrls" onclick="event.stopPropagation()">
              <button class="icon-btn" ${idx === 0 ? "disabled" : ""} onclick="moveSection('${s.id}',-1)" title="Move up"><i class="fas fa-chevron-up"></i></button>
              <button class="icon-btn" ${idx === total - 1 ? "disabled" : ""} onclick="moveSection('${s.id}',1)" title="Move down"><i class="fas fa-chevron-down"></i></button>
              <label class="sw" title="Visible"><input type="checkbox" ${s.visible ? "checked" : ""} onchange="toggleSectionVisible('${s.id}')"><span class="sw-s"></span></label>
              <button class="icon-btn" onclick="renameSection('${s.id}')" title="Rename divider"><i class="fas fa-pen"></i></button>
              <button class="icon-btn danger" onclick="deleteSection('${s.id}')" title="Delete section"><i class="fas fa-trash"></i></button>
              <button class="btn btn-sm" onclick="openItemDrawer('${s.id}',null)"><i class="fas fa-plus"></i> Add Item</button>
            </div>
          </div>`;
        let tbl;
        if (!items.length) {
          tbl = '<div class="empty">No items in this section yet.</div>';
        } else {
          tbl = `
          <table class="items">
            <thead><tr>
              <th style="width:74px">Order</th>
              <th>Label</th>
              <th>Filter Summary</th>
              <th style="width:120px">Popularity</th>
              <th style="width:110px">Property Count</th>
              <th class="c" style="width:64px">Visible</th>
              <th class="c" style="width:96px">Actions</th>
            </tr></thead>
            <tbody>
              ${items
                .map(
                  (it, ii) => `
              <tr>
                <td>
                  <div class="ord-cell">
                    <span class="ord-num">${ii + 1}</span>
                    <button class="icon-btn" ${ii === 0 ? "disabled" : ""} onclick="moveItem('${it.id}',-1)" title="Up"><i class="fas fa-chevron-up"></i></button>
                    <button class="icon-btn" ${ii === items.length - 1 ? "disabled" : ""} onclick="moveItem('${it.id}',1)" title="Down"><i class="fas fa-chevron-down"></i></button>
                  </div>
                </td>
                <td><span class="item-label">${esc(it.label)}</span></td>
                <td>${chipsHtml(it.filterSet)}</td>
                <td>${popChipHtml(it.popularityRule)}</td>
                <td class="count-cell"><span class="count-num">${Number(it.count).toLocaleString()}</span><span class="auto-tag" title="Calculated live from current property data.">auto</span></td>
                <td class="c"><label class="sw"><input type="checkbox" ${it.visible ? "checked" : ""} onchange="toggleItemVisible('${it.id}')"><span class="sw-s"></span></label></td>
                <td class="c">
                  <button class="icon-btn" onclick="openItemDrawer('${it.sectionId}','${it.id}')" title="Edit"><i class="fas fa-pen"></i></button>
                  <button class="icon-btn danger" onclick="deleteItem('${it.id}')" title="Delete"><i class="fas fa-trash"></i></button>
                </td>
              </tr>`,
                )
                .join("")}
            </tbody>
          </table>`;
        }
        return `<div class="section-block">${head}${tbl}</div>`;
      }

      /* ============ TAB CRUD ============ */
      function selectTab(id) {
        currentTabId = id;
        render();
      }
      function addTab() {
        promptModal("Add tab", "", (name) => {
          if (!name.trim()) {
            toast("Tab name is required.");
            pmFocus();
            return false;
          }
          const t = {
            id: uid("t"),
            label: name.trim(),
            order: nextOrder(config.tabs),
            visible: true,
          };
          config.tabs.push(t);
          const secId = uid("s");
          config.sections.push({
            id: secId,
            tabId: t.id,
            label: "",
            order: 1,
            visible: true,
            isDefault: true,
          });
          currentTabId = t.id;
          save();
          render();
          toast('Tab "' + t.label + '" added');
          return true;
        });
      }
      function renameTab(id) {
        const t = config.tabs.find((x) => x.id === id);
        if (!t) return;
        promptModal("Rename tab", t.label, (name) => {
          if (!name.trim()) {
            toast("Tab name is required.");
            pmFocus();
            return false;
          }
          t.label = name.trim();
          save();
          render();
          toast("Tab renamed");
          return true;
        });
      }
      function toggleTabVisible(id) {
        const t = config.tabs.find((x) => x.id === id);
        if (!t) return;
        t.visible = !t.visible;
        save();
        render();
      }
      function moveTab(id, dir) {
        if (swapOrder(tabsSorted(), id, dir)) {
          save();
          render();
        }
      }
      function deleteTab(id) {
        const t = config.tabs.find((x) => x.id === id);
        if (!t) return;
        confirmAction(
          "Delete tab?",
          `Delete "${t.label}" and all its sections & items? This cannot be undone.`,
          () => {
            const secIds = config.sections
              .filter((s) => s.tabId === id)
              .map((s) => s.id);
            config.items = config.items.filter(
              (i) => !secIds.includes(i.sectionId),
            );
            config.sections = config.sections.filter((s) => s.tabId !== id);
            config.tabs = config.tabs.filter((x) => x.id !== id);
            if (currentTabId === id)
              currentTabId = (tabsSorted()[0] || {}).id || null;
            save();
            render();
            toast("Tab deleted");
          },
        );
      }

      /* ============ SECTION CRUD ============ */
      function addSection() {
        if (!currentTabId) {
          toast("Select a tab first");
          return;
        }
        promptModal("Add section divider", "【 】", (name) => {
          if (!name.trim()) {
            toast("Section name is required.");
            pmFocus();
            return false;
          }
          config.sections.push({
            id: uid("s"),
            tabId: currentTabId,
            label: name.trim(),
            order: nextOrder(sectionsOf(currentTabId)),
            visible: true,
            isDefault: false,
          });
          save();
          render();
          toast("Section added");
          return true;
        });
      }
      function renameSection(id) {
        const s = config.sections.find((x) => x.id === id);
        if (!s) return;
        promptModal("Rename divider", s.label, (name) => {
          s.label = name.trim();
          s.isDefault = s.label === ""; // empty label => behaves as default (no divider)
          save();
          render();
          toast("Section updated");
          return true;
        });
      }
      function toggleSectionVisible(id) {
        const s = config.sections.find((x) => x.id === id);
        if (!s) return;
        s.visible = !s.visible;
        save();
        render();
      }
      function moveSection(id, dir) {
        const s = config.sections.find((x) => x.id === id);
        if (!s) return;
        if (swapOrder(sectionsOf(s.tabId), id, dir)) {
          save();
          render();
        }
      }
      function deleteSection(id) {
        const s = config.sections.find((x) => x.id === id);
        if (!s) return;
        const n = itemsOf(id).length;
        confirmAction(
          "Delete section?",
          `Delete this section and its ${n} item(s)?`,
          () => {
            const tabId = s.tabId;
            config.items = config.items.filter((i) => i.sectionId !== id);
            config.sections = config.sections.filter((x) => x.id !== id);
            // Guarantee every tab keeps at least one (default) section
            if (!sectionsOf(tabId).length) {
              config.sections.push({
                id: uid("s"),
                tabId,
                label: "",
                order: 1,
                visible: true,
                isDefault: true,
              });
            }
            save();
            render();
            toast("Section deleted");
          },
        );
      }

      /* ============ ITEM CRUD ============ */
      let editingSectionId = null,
        editingItemId = null;
      function toggleItemVisible(id) {
        const it = config.items.find((x) => x.id === id);
        if (!it) return;
        it.visible = !it.visible;
        save();
        render();
      }
      function moveItem(id, dir) {
        const it = config.items.find((x) => x.id === id);
        if (!it) return;
        if (swapOrder(itemsOf(it.sectionId), id, dir)) {
          save();
          render();
        }
      }
      function deleteItem(id) {
        const it = config.items.find((x) => x.id === id);
        if (!it) return;
        confirmAction("Delete item?", `Delete "${it.label}"?`, () => {
          config.items = config.items.filter((x) => x.id !== id);
          save();
          render();
          toast("Item deleted");
        });
      }
      function swapOrder(siblings, id, dir) {
        const i = siblings.findIndex((x) => x.id === id);
        const j = i + dir;
        if (i < 0 || j < 0 || j >= siblings.length) return false;
        const t = siblings[i].order;
        siblings[i].order = siblings[j].order;
        siblings[j].order = t;
        return true;
      }

      /* ============ FILTER BUILDER DRAWER ============ */
      function selOptions(pairs, cur) {
        return pairs
          .map((p) => {
            const v = Array.isArray(p) ? p[0] : p,
              l = Array.isArray(p) ? p[1] : p;
            return `<option value="${esc(v)}"${String(v) === String(cur) ? " selected" : ""}>${esc(l)}</option>`;
          })
          .join("");
      }
      function pillsHtml(cls, arr, selected, useShort) {
        return arr
          .map((v) => {
            const on = selected.includes(v);
            return `<label class="pill ${on ? "on" : ""}"><input type="checkbox" class="${cls}" value="${esc(v)}" ${on ? "checked" : ""}>${esc(useShort ? short(v) : v)}</label>`;
          })
          .join("");
      }
      function regionTreeHtml(selected) {
        const isWhole = (p) => selected.some((r) => r.pref === p && !r.city);
        const cityOn = (p, c) =>
          selected.some((r) => r.pref === p && r.city === c);
        return Object.keys(REGION_TREE)
          .sort()
          .map(
            (p) => `
          <div class="tree-group">
            <label class="tree-node"><input type="checkbox" class="fb-region" data-pref="${esc(p)}" data-city="" ${isWhole(p) ? "checked" : ""}> <b>${esc(p)}</b> <span class="muted">(whole)</span></label>
            <div class="tree-children">
              ${REGION_TREE[p]
                .slice()
                .sort()
                .map(
                  (c) =>
                    `<label class="tree-leaf"><input type="checkbox" class="fb-region" data-pref="${esc(p)}" data-city="${esc(c)}" ${cityOn(p, c) ? "checked" : ""}> ${esc(c)}</label>`,
                )
                .join("")}
            </div>
          </div>`,
          )
          .join("");
      }
      function stationTreeHtml(selected) {
        const on = (p, l, s) =>
          selected.some((x) => x.pref === p && x.line === l && x.station === s);
        return Object.keys(STATION_TREE)
          .sort()
          .map(
            (p) => `
          <div class="tree-group">
            <div class="tree-node"><b>${esc(p)}</b></div>
            ${Object.keys(STATION_TREE[p])
              .map(
                (line) => `
              <div class="tree-sub">
                <div class="tree-line">${esc(line)}</div>
                <div class="tree-children">
                  ${STATION_TREE[p][line].map((s) => `<label class="tree-leaf"><input type="checkbox" class="fb-station" data-pref="${esc(p)}" data-line="${esc(line)}" data-station="${esc(s)}" ${on(p, line, s) ? "checked" : ""}> ${esc(s)}</label>`).join("")}
                </div>
              </div>`,
              )
              .join("")}
          </div>`,
          )
          .join("");
      }
      function openItemDrawer(sectionId, itemId) {
        editingSectionId = sectionId;

        const item = itemId ? config.items.find((i) => i.id === itemId) : null;

        const pop = item ? item.popularityRule : null;
        $("#fbTitle").textContent = item ? "Edit Item" : "Add Item";
        $("#fbBody").innerHTML = `

              <label class="fl">Item label (emoji supported)<span class="req">*</span></label>

          <fieldset class="fb">

                <label><input type="radio" name="fbTx" value="" ${!f.txType ? "checked" : ""}> Any</label>
                <label><input type="radio" name="fbTx" value="Buy" ${f.txType === "Buy" ? "checked" : ""}> Buy</label>
                <label><input type="radio" name="fbTx" value="Rent" ${f.txType === "Rent" ? "checked" : ""}> Rent</label>

            <div class="field">

          </fieldset>

          <fieldset class="fb">
            <legend>Property type & sale unit</legend>
            <div class="field"><div class="pills">${pillsHtml("fb-ptype", PROP_TYPES, f.propTypes, true)}</div></div>
            <div class="field">
              <label class="fl">Sale unit</label>
              <select id="fb-saleunit"><option value="">Any</option>${selOptions(SALE_UNITS, f.saleUnit)}</select>
            </div>
          </fieldset>

          <fieldset class="fb">
            <legend>Layout & rooms</legend>
            <div class="field">

              <select id="fb-layoutmin"><option value="">Any</option>${selOptions(LAYOUT_MIN, f.layoutMin)}</select>

          <fieldset class="fb">
            <legend>Size & price</legend>
            <div class="grid2">

              <div><label class="fl">Price min (¥)</label><input type="number" id="fb-price-min" min="0" step="1000000" value="${f.priceMin}" /></div>
              <div><label class="fl">Price max (¥)</label><input type="number" id="fb-price-max" min="0" step="1000000" value="${f.priceMax}" /></div>

              <div><label class="fl">Gross yield min (%)</label><input type="number" id="fb-yield" min="0" step="0.1" value="${f.yieldMin}" /></div>
              <div><label class="fl">Building floors</label><select id="fb-floors"><option value="">Any</option>${selOptions(FLOORS, f.floors)}</select></div>
              <div><label class="fl">Occupancy</label><select id="fb-occupancy"><option value="">Any</option>${selOptions(OCCUPANCY, f.occupancy)}</select></div>

          <fieldset class="fb">

            <div class="field"><label class="fl">Build / condition</label><div class="pills">${pillsHtml("fb-cond", CONDITION, f.condition)}</div></div>
            <div class="field"><label class="fl">Area type / POI proximity</label><div class="pills">${pillsHtml("fb-area", AREA_TYPE, f.areaType)}</div></div>
          </fieldset>

          <fieldset class="fb">
            <legend>Feature flags</legend>
            <div class="pills">
              ${FEATURES.map(([k, l]) => `<label class="pill ${f.features[k] ? "on" : ""}"><input type="checkbox" class="fb-feat" data-key="${k}" ${f.features[k] ? "checked" : ""}>${esc(l)}</label>`).join("")}
            </div>

        $("#fbOverlay").classList.add("open");
        $("#fbDrawer").classList.add("open");
        $("#fbDrawer").setAttribute("aria-hidden", "false");
      }
      function closeDrawer() {
        $("#fbOverlay").classList.remove("open");
        $("#fbDrawer").classList.remove("open");
        $("#fbDrawer").setAttribute("aria-hidden", "true");
        editingItemId = null;
        editingSectionId = null;
      }
      // live pill highlight
      $("#fbBody").addEventListener("change", (e) => {
        const pill = e.target.closest(".pill");
        if (pill) pill.classList.toggle("on", e.target.checked);
      });
      function numOrBlank(v) {
        return v === "" || v == null ? "" : Number(v);
      }
      function collectFilter() {
        const body = $("#fbBody");
        const f = blankFilter();
        const tx = body.querySelector('input[name="fbTx"]:checked');
        f.txType = tx ? tx.value : "";
        f.keyword = $("#fb-keyword").value.trim();
        const wholePrefs = new Set();
        $$(".fb-region:checked", body).forEach((cb) => {
          if (!cb.dataset.city) wholePrefs.add(cb.dataset.pref);
        });
        $$(".fb-region:checked", body).forEach((cb) => {
          const pref = cb.dataset.pref,
            city = cb.dataset.city;
          if (!city) f.regions.push({ pref, city: "" });
          else if (!wholePrefs.has(pref)) f.regions.push({ pref, city });
        });
        $$(".fb-station:checked", body).forEach((cb) =>
          f.stations.push({
            pref: cb.dataset.pref,
            line: cb.dataset.line,
            station: cb.dataset.station,
          }),
        );
        f.walk = $("#fb-walk").value;
        f.propTypes = $$(".fb-ptype:checked", body).map((c) => c.value);
        f.saleUnit = $("#fb-saleunit").value;
        f.layoutMin = $("#fb-layoutmin").value;
        f.layouts = $$(".fb-layout:checked", body).map((c) => c.value);
        f.bedrooms = $$(".fb-bed:checked", body).map((c) => c.value);
        f.sizeMin = numOrBlank($("#fb-size-min").value);
        f.sizeMax = numOrBlank($("#fb-size-max").value);
        f.priceMin = numOrBlank($("#fb-price-min").value);
        f.priceMax = numOrBlank($("#fb-price-max").value);
        f.age = $("#fb-age").value;
        f.recency = $("#fb-recency").value;
        f.yieldMin = numOrBlank($("#fb-yield").value);
        f.floors = $("#fb-floors").value;
        f.occupancy = $("#fb-occupancy").value;
        f.condition = $$(".fb-cond:checked", body).map((c) => c.value);
        f.areaType = $$(".fb-area:checked", body).map((c) => c.value);
        $$(".fb-feat:checked", body).forEach(
          (c) => (f.features[c.dataset.key] = true),
        );
        return f;
      }
      function saveItem() {
        const label = $("#fb-label").value.trim();
        if (!label) {
          toast("Item label is required");
          $("#fb-label").focus();
          return;
        }
        const filterSet = collectFilter();
        const popEnabled = $("#fb-pop-enabled").checked;
        const popularityRule = popEnabled
          ? {
              enabled: true,
              metric: $("#fb-pop-metric").value,
              operator: ">=",
              value: Number($("#fb-pop-value").value) || 0,
            }
          : null;
        if (editingItemId) {
          const it = config.items.find((x) => x.id === editingItemId);
          if (it) {
            it.label = label;
            it.filterSet = filterSet;
            it.popularityRule = popularityRule;
          }
          toast("Item updated");
        } else {
          config.items.push({
            id: uid("i"),
            sectionId: editingSectionId,
            label,
            order: nextOrder(itemsOf(editingSectionId)),
            visible: true,
            filterSet,
            popularityRule,
            count: mockCount(label),
          });
          toast("Item added");
        }
        save();
        render();
        closeDrawer();
      }

      /* ============ PROMPT / CONFIRM / TOAST ============ */
      let _pmCb = null;
      function promptModal(title, value, cb) {
        $("#pmTitle").textContent = title;
        $("#pmInput").value = value || "";
        _pmCb = cb;
        $("#pmModal").classList.add("open");
        setTimeout(() => {
          $("#pmInput").focus();
          $("#pmInput").select();
        }, 30);
      }
      function pmOk() {
        if (!_pmCb) return pmCancel();
        const res = _pmCb($("#pmInput").value);
        if (res !== false) pmCancel();
      }
      function pmCancel() {
        $("#pmModal").classList.remove("open");
        _pmCb = null;
      }
      function pmFocus() {
        const inp = $("#pmInput");
        setTimeout(() => {
          inp.focus();
          inp.select();
        }, 30);
      }
      $("#pmInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") pmOk();
        if (e.key === "Escape") pmCancel();
      });
      $("#pmModal").addEventListener("click", (e) => {
        if (e.target.id === "pmModal") pmCancel();
      });

      let _cfCb = null;
      function confirmAction(title, msg, cb) {
        $("#cfTitle").textContent = title;
        $("#cfMsg").textContent = msg;
        _cfCb = cb;
        $("#cfModal").classList.add("open");
      }
      function cfCancel() {
        $("#cfModal").classList.remove("open");
        _cfCb = null;
      }
      $("#cfOk").addEventListener("click", () => {
        const cb = _cfCb;
        cfCancel();
        if (cb) cb();
      });
      $("#cfModal").addEventListener("click", (e) => {
        if (e.target.id === "cfModal") cfCancel();
      });

      function toast(msg) {
        const el = document.createElement("div");
        el.className = "toast";
        el.textContent = msg;
        $("#toastWrap").appendChild(el);
        requestAnimationFrame(() => el.classList.add("show"));
        setTimeout(() => {
          el.classList.remove("show");
          setTimeout(() => el.remove(), 220);
        }, 2400);
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if ($("#fbDrawer").classList.contains("open")) closeDrawer();
          if ($("#pmModal").classList.contains("open")) pmCancel();
          if ($("#cfModal").classList.contains("open")) cfCancel();
        }
      });

      // expose for inline handlers
      Object.assign(window, {
        selectTab,
        addTab,
        renameTab,
        toggleTabVisible,
        moveTab,
        deleteTab,
        addSection,
        renameSection,
        toggleSectionVisible,
        moveSection,
        deleteSection,
        openItemDrawer,
        closeDrawer,
        saveItem,
        toggleItemVisible,
        moveItem,
        deleteItem,
        pmOk,
        pmCancel,
        cfCancel,
      });

      /* ============ INIT ============ */
      load();
      currentTabId = (tabsSorted()[0] || {}).id || null;
      render();
    </script>
  </body>
</html>
