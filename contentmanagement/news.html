<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News</title>
    <style id="uxTableOverflowFix">
/* Table overflow handling: keep text intact, only enable horizontal scroll on narrow viewport */
@media (max-width: 1199px) {
  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
}
</style>
  <style id="uxBaselinePolish">
/* Baseline UI polish — applies only where file CSS doesn't override */
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Pointer cursor on interactive */
button, .btn, [role="button"], select,
input[type="checkbox"], input[type="radio"], input[type="submit"],
input[type="button"], a[href], label[for] {
  cursor: pointer;
}

/* Disabled state */
button:disabled, .btn:disabled, input:disabled, select:disabled, textarea:disabled {
  cursor: not-allowed;
  opacity: 0.6;
}

/* Focus-visible outline (a11y) */
button:focus-visible, .btn:focus-visible,
a:focus-visible, [role="button"]:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid #c4a25f;
  outline-offset: 2px;
}

/* Inherit font family for form controls (fixes browser-default) */
input, select, textarea, button {
  font-family: inherit;
}

/* Responsive media */
img, svg, video {
  max-width: 100%;
  height: auto;
}

/* Subtle hover for buttons (only if no transition already set, gentle filter) */
button:hover:not(:disabled), .btn:hover:not(:disabled) {
  filter: brightness(0.96);
  transition: filter 0.15s ease;
}

/* Smooth scrollbar on Webkit */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: #f5ece0;
}
::-webkit-scrollbar-thumb {
  background: #d9c8b4;
  border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover {
  background: #c4a25f;
}

/* Selection highlight on-brand */
::selection {
  background: #c4a25f;
  color: #fff;
}

/* HR baseline */
hr {
  border: none;
  border-top: 1px solid #eadccd;
  margin: 12px 0;
}

/* Anchor baseline color matches brand (no underline by default to match flat UI) */
a {
  color: #8a5a3b;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
  <body>
    <style>
      /* Scoped comfortable spacing for the News pane (won't override parent layout) */
      .news-pane .category-manager,
      .news-pane .cms-filter-bar,
      .news-pane .table-wrap,
      .news-pane .cms-inline-actions {
        margin-bottom: 16px;
      }
      .news-pane .cms-inline-actions {
        margin-bottom: 0;
      }
      .news-pane .table-wrap table td,
      .news-pane .table-wrap table th {
        padding: 12px 14px;
      }
      .news-pane td.news-row-actions {
        text-align: right;
        white-space: nowrap;
      }
      .news-pane .news-row-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        align-items: center;
      }
      .news-pane .news-row-actions .btn {
        height: 30px;
        min-width: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 8px;
        border: 1px solid #e0e0e0;
        line-height: 1;
      }
      .news-pane .news-row-actions .btn:hover {
        border-color: #eadccd;
      }
      .news-pane .news-row-actions .btn:not(.btn-danger) {
        color: #8b7340;
      }

      .category-manager {
        margin-bottom: 12px;
        padding: 12px;
        border: 1px solid #eadccd;
        border-radius: 12px;
        background: linear-gradient(180deg, #fff9f3, #fffdf9);
      }
      .category-manager-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .category-count {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid #e2c6a8;
        background: #f0e3d7;
        color: #744210;
        font-size: 11px;
      }
      .category-manager-row {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .category-manager-row .cms-filter-input {
        min-width: 230px;
        flex: 1;
      }
      .category-list {
        margin-top: 8px;
        display: grid;
        gap: 6px;
      }
      .category-item {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        border: 1px solid #eadccd;
        border-radius: 10px;
        padding: 6px 8px;
        background: #fff;
      }
      .category-item-actions {
        display: flex;
        gap: 6px;
      }
      @media (max-width: 680px) {
        .category-item {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>

    <div class="news-pane">
    <div class="category-manager">
      <div class="category-manager-head">
        <div>
          <div class="card-title">News category tags</div>
        </div>
        <button class="btn btn-primary" type="button" id="btnAddNewsCategory">
          Add
        </button>
      </div>

      <div id="newsCategoryList" class="category-list"></div>
    </div>

    <div class="cms-filter-bar">
      <button class="btn btn-primary" type="button" onclick="openBlogEditor('news')">New news</button>
      <input
        id="newsSearchInput"
        type="text"
        class="cms-filter-input"
        placeholder="Search by title"
      />
      <select id="newsCategoryFilter" class="filter-select">
        <option value="all">All category tags</option>
      </select>
      <select id="newsTransactionFilter" class="filter-select">
        <option value="all">All transaction types</option>
        <option value="None">None</option>
        <option value="SellerGuide">SellerGuide</option>
        <option value="BuyerGuide">BuyerGuide</option>
        <option value="Renter Guide">Renter Guide</option>
      </select>
    </div>

    <div id="newsResultCount" class="list-result-count"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Category tag</th>
            <th>Transaction type</th>
            <th>Status</th>
            <th>Author</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="newsTableBody"></tbody>
      </table>
    </div>

    <div id="newsPagination" class="pagination"></div>

    </div>

    <script>
      (function () {
        const NEWS_CATEGORY_STORAGE_KEY = "cmsNewsCategories";
        const DEFAULT_NEWS_CATEGORIES = ["Japan", "Real estate", "Investment"];
        const NEWS_PAGE_SIZE = 50;
        let newsPage = 1;
        let lastFilteredNewsRows = [];

        // Seed ≥60 news rows to demonstrate pagination.
        const newsRows = (function buildNewsSeed() {
          const base = [
            {
              title: "Platform maintenance announcement",
              categoryTag: "Japan",
              transactionType: "None",
              status: "Published",
              author: "Anna",
            },
            {
              title: "New lending rules impact investment",
              categoryTag: "Real estate",
              transactionType: "SellerGuide",
              status: "Published",
              author: "Emily",
            },
            {
              title: "Tax basics for investors",
              categoryTag: "Investment",
              transactionType: "None",
              status: "Published",
              author: "Jason",
            },
          ];
          const cats = ["Japan", "Real estate", "Investment"];
          const txns = ["None", "SellerGuide", "BuyerGuide", "Renter Guide"];
          const authors = ["Anna", "Emily", "Jason", "Hana", "Yuki", "Michael"];
          const topics = [
            "Interest rate update",
            "New district development plan",
            "Quarterly market report",
            "Foreign investment trends",
            "Stamp duty changes",
            "Rental demand surge",
            "Construction cost outlook",
            "Urban rezoning approved",
            "Transport line extension",
            "Property tax reform",
            "Vacancy rate report",
            "Green building incentives",
            "Tourism impact on rentals",
            "Mortgage approval data",
            "Regional price movements",
          ];
          const rows = base.slice();
          let n = 0;
          while (rows.length < 64) {
            n += 1;
            rows.push({
              title: topics[n % topics.length] + " #" + n,
              categoryTag: cats[n % cats.length],
              transactionType: txns[n % txns.length],
              status: n % 4 === 0 ? "Draft" : "Published",
              author: authors[n % authors.length],
            });
          }
          return rows;
        })();

        function normalizeCategoryName(name) {
          return String(name || "")
            .trim()
            .replace(/\s+/g, " ");
        }

        function getNewsCategories() {
          try {
            const saved = JSON.parse(
              localStorage.getItem(NEWS_CATEGORY_STORAGE_KEY) || "[]",
            );
            const cleaned = Array.isArray(saved)
              ? saved.map(normalizeCategoryName).filter(Boolean)
              : [];
            return cleaned.length ? cleaned : [...DEFAULT_NEWS_CATEGORIES];
          } catch (e) {
            return [...DEFAULT_NEWS_CATEGORIES];
          }
        }

        function saveNewsCategories(categories) {
          localStorage.setItem(
            NEWS_CATEGORY_STORAGE_KEY,
            JSON.stringify(categories),
          );
        }

        function renderNewsCategoryList() {
          const listEl = document.getElementById("newsCategoryList");
          if (!listEl) return;
          const categories = getNewsCategories();
          const countEl = document.getElementById("newsCategoryCount");
          if (countEl)
            countEl.textContent = `${categories.length} ${categories.length > 1 ? "tags" : "tag"}`;

          listEl.innerHTML = categories
            .map(
              (category) => `
                <div class="category-item">
                  <span class="tag-chip" style="margin-right:0">${category}</span>
                  <div class="category-item-actions">
                    <button class="btn btn-ghost" type="button" onclick="beginRenameNewsCategory('${category.replace(/'/g, "\\'")}')">✎</button>
                    <button class="btn btn-ghost btn-danger" type="button" onclick="deleteNewsCategory('${category.replace(/'/g, "\\'")}')">🗑</button>
                  </div>
                </div>
              `,
            )
            .join("");
          populateNewsCategoryFilter();
          renderNewsTable();
        }

        function populateNewsCategoryFilter() {
          const filterEl = document.getElementById("newsCategoryFilter");
          if (!filterEl) return;
          const currentValue = filterEl.value || "all";
          const categories = getNewsCategories();
          filterEl.innerHTML = [
            '<option value="all">All category tags</option>',
            ...categories.map(
              (category) => `<option value="${category}">${category}</option>`,
            ),
          ].join("");
          filterEl.value = categories.includes(currentValue)
            ? currentValue
            : "all";
        }

        function renderNewsTable() {
          const tbody = document.getElementById("newsTableBody");
          if (!tbody) return;

          const search = (
            document.getElementById("newsSearchInput")?.value || ""
          )
            .trim()
            .toLowerCase();
          const categoryFilter =
            document.getElementById("newsCategoryFilter")?.value || "all";
          const transactionFilter =
            document.getElementById("newsTransactionFilter")?.value || "all";

          const filtered = newsRows.filter((row) => {
            if (categoryFilter !== "all" && row.categoryTag !== categoryFilter)
              return false;
            if (
              transactionFilter !== "all" &&
              row.transactionType !== transactionFilter
            )
              return false;
            if (!search) return true;
            const haystack = [
              row.title,
              row.categoryTag,
              row.transactionType,
              row.status,
              row.author,
            ]
              .join(" ")
              .toLowerCase();
            return haystack.includes(search);
          });

          const total = filtered.length;
          const pages = Math.max(1, Math.ceil(total / NEWS_PAGE_SIZE));
          if (newsPage > pages) newsPage = pages;
          const startIdx = (newsPage - 1) * NEWS_PAGE_SIZE;
          const pageRows = filtered.slice(startIdx, startIdx + NEWS_PAGE_SIZE);
          lastFilteredNewsRows = pageRows;

          const countEl = document.getElementById("newsResultCount");
          if (countEl) {
            if (total === 0) {
              countEl.textContent = "Showing 0 news";
            } else {
              countEl.textContent =
                "Showing " +
                (startIdx + 1) +
                "–" +
                (startIdx + pageRows.length) +
                " of " +
                total +
                " news";
            }
          }

          tbody.innerHTML = pageRows
            .map(
              (row, index) => `
                <tr>
                  <td>${row.title}</td>
                  <td><span class="tag-chip" style="margin-right:0">${row.categoryTag}</span></td>
                  <td>${row.transactionType}</td>
                  <td><span class="badge ${row.status === "Published" ? "badge-success" : "badge-warning"}">${row.status}</span></td>
                  <td>${row.author || "—"}</td>
                  <td class="news-row-actions">
                    <button class="btn btn-ghost" type="button" title="Edit news" onclick="editNewsRow(${index})">✎</button>
                    <button class="btn btn-ghost btn-danger" type="button" title="Delete news" data-del-index="${index}">🗑</button>
                  </td>
                </tr>
              `,
            )
            .join("");

          tbody.querySelectorAll("[data-del-index]").forEach((btn) => {
            btn.addEventListener("click", () => {
              const row = pageRows[Number(btn.getAttribute("data-del-index"))];
              if (!row) return;
              const doDelete = () => {
                const idx = newsRows.indexOf(row);
                if (idx > -1) newsRows.splice(idx, 1);
                renderNewsTable();
                if (typeof window.showToast === "function")
                  window.showToast("News deleted.", "success");
              };
              if (typeof window.showConfirm === "function") {
                window
                  .showConfirm({
                    title: "Delete news",
                    message: `Delete "${row.title}"?`,
                    confirmLabel: "Delete",
                  })
                  .then((ok) => {
                    if (ok) doDelete();
                  });
              } else {
                doDelete();
              }
            });
          });

          if (typeof window.renderPagination === "function") {
            window.renderPagination(
              document.getElementById("newsPagination"),
              total,
              newsPage,
              NEWS_PAGE_SIZE,
              (go) => {
                newsPage = go;
                renderNewsTable();
              },
            );
          }
        }

        function editNewsRow(index) {
          const row = lastFilteredNewsRows[index];
          if (!row) return;
          if (typeof window.openBlogEditor === "function") {
            window.openBlogEditor("news", {
              title: row.title,
              category: row.categoryTag,
              transactionType: row.transactionType,
              status: String(row.status).toLowerCase(),
              author: row.author,
              contentBody: "",
            });
          } else if (typeof window.showToast === "function") {
            window.showToast(
              "The news editor is only available inside Insight Management.",
              "info",
            );
          }
        }

        function commitNewsCategory(rawValue, oldName) {
          const value = normalizeCategoryName(rawValue);
          if (!value) {
            if (typeof window.showToast === "function")
              window.showToast("Please enter a category name.", "error");
            return;
          }
          const categories = getNewsCategories();
          if (oldName) {
            const exists = categories.some(
              (item) =>
                item.toLowerCase() === value.toLowerCase() &&
                item.toLowerCase() !== oldName.toLowerCase(),
            );
            if (exists) {
              if (typeof window.showToast === "function")
                window.showToast("This category already exists.", "error");
              return;
            }
            const updated = categories.map((item) =>
              item.toLowerCase() === oldName.toLowerCase() ? value : item,
            );
            saveNewsCategories(updated);
            renderNewsCategoryList();
            if (typeof window.showToast === "function")
              window.showToast("Category tag renamed.", "success");
            return;
          }
          const exists = categories.some(
            (item) => item.toLowerCase() === value.toLowerCase(),
          );
          if (exists) {
            if (typeof window.showToast === "function")
              window.showToast("This category already exists.", "error");
            return;
          }
          categories.push(value);
          saveNewsCategories(categories);
          renderNewsCategoryList();
          if (typeof window.showToast === "function")
            window.showToast("Category tag added.", "success");
        }

        function addNewsCategory() {
          if (typeof window.showTagInput === "function") {
            window
              .showTagInput({ title: "Add category tag", value: "" })
              .then((val) => {
                if (val == null) return;
                commitNewsCategory(val, null);
              });
          }
        }

        function beginRenameNewsCategory(oldName) {
          if (typeof window.showTagInput === "function") {
            window
              .showTagInput({ title: "Rename category tag", value: oldName })
              .then((val) => {
                if (val == null) return;
                commitNewsCategory(val, oldName);
              });
          }
        }

        function deleteNewsCategory(name) {
          const doDelete = () => {
            const updated = getNewsCategories().filter(
              (item) => item.toLowerCase() !== name.toLowerCase(),
            );
            if (!updated.length) {
              if (typeof window.showToast === "function")
                window.showToast("At least one category is required.", "error");
              return;
            }
            saveNewsCategories(updated);
            renderNewsCategoryList();
            if (typeof window.showToast === "function")
              window.showToast("Category tag deleted.", "success");
          };
          if (typeof window.showConfirm === "function") {
            window
              .showConfirm({
                title: "Delete category tag",
                message: `Delete category "${name}"?`,
                confirmLabel: "Delete",
              })
              .then((ok) => {
                if (ok) doDelete();
              });
          } else {
            doDelete();
          }
        }

        const addBtn = document.getElementById("btnAddNewsCategory");
        if (addBtn) addBtn.addEventListener("click", addNewsCategory);

        [
          "newsSearchInput",
          "newsCategoryFilter",
          "newsTransactionFilter",
        ].forEach((id) => {
          const el = document.getElementById(id);
          if (el) {
            const reset = () => {
              newsPage = 1;
              renderNewsTable();
            };
            el.addEventListener("input", reset);
            el.addEventListener("change", reset);
          }
        });

        renderNewsCategoryList();
        renderNewsTable();

        window.getNewsCategoryTags = getNewsCategories;
        window.beginRenameNewsCategory = beginRenameNewsCategory;
        window.deleteNewsCategory = deleteNewsCategory;
        window.editNewsRow = editNewsRow;
      })();
    </script>
  </body>
</html>
