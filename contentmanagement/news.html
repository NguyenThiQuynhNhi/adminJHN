<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News</title>
  </head>
  <body>
    <style>
      .category-manager {
        margin-bottom: 12px;
        padding: 12px;
        border: 1px solid #eadccd;
        border-radius: 12px;
        background: linear-gradient(180deg, #fff9f3, #fffdf9);
      }
      .category-manager-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .category-count {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid #e2c6a8;
        background: #f0e3d7;
        color: #744210;
        font-size: 11px;
      }
      .category-manager-row {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .category-manager-row .cms-filter-input {
        min-width: 230px;
        flex: 1;
      }
      .category-list {
        margin-top: 8px;
        display: grid;
        gap: 6px;
      }
      .category-item {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        border: 1px solid #eadccd;
        border-radius: 10px;
        padding: 6px 8px;
        background: #fff;
      }
      .category-item-actions {
        display: flex;
        gap: 6px;
      }
      @media (max-width: 680px) {
        .category-item {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>

    <div class="category-manager">
      <div class="category-manager-head">
        <div>
          <div class="card-title">News category tags</div>
        </div>
        <button class="btn btn-primary" type="button" id="btnAddNewsCategory">
          Add
        </button>
      </div>

      <div id="newsCategoryList" class="category-list"></div>
    </div>

    <div class="cms-filter-bar">
      <input
        id="newsSearchInput"
        type="text"
        class="cms-filter-input"
        placeholder="Search by title"
      />
      <select id="newsCategoryFilter" class="filter-select">
        <option value="all">All category tags</option>
      </select>
      <select id="newsTransactionFilter" class="filter-select">
        <option value="all">All transaction types</option>
        <option value="None">None</option>
        <option value="SellerGuide">SellerGuide</option>
        <option value="BuyerGuide">BuyerGuide</option>
        <option value="Renter Guide">Renter Guide</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Category tag</th>
            <th>Transaction type</th>
            <th>Status</th>
            <th>Author</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="newsTableBody"></tbody>
      </table>
    </div>

    <div style="margin-top: 10px" class="cms-inline-actions">
      <button
        class="btn btn-primary"
        type="button"
        onclick="openBlogEditor('news')"
      >
        New news item
      </button>
    </div>

    <script>
      (function () {
        const NEWS_CATEGORY_STORAGE_KEY = "cmsNewsCategories";
        const DEFAULT_NEWS_CATEGORIES = ["Japan", "Real estate", "Investment"];
        let editingNewsCategoryName = null;
        const newsRows = [
          {
            title: "Platform maintenance announcement",
            categoryTag: "Japan",
            transactionType: "None",
            status: "Published",
            author: "Anna",
          },
          {
            title: "New lending rules impact investment",
            categoryTag: "Real estate",
            transactionType: "SellerGuide",
            status: "Published",
            author: "Emily",
          },
          {
            title: "Tax basics for investors",
            categoryTag: "Investment",
            transactionType: "None",
            status: "Published",
            author: "Jason",
          },
        ];

        function normalizeCategoryName(name) {
          return String(name || "")
            .trim()
            .replace(/\s+/g, " ");
        }

        function getNewsCategories() {
          try {
            const saved = JSON.parse(
              localStorage.getItem(NEWS_CATEGORY_STORAGE_KEY) || "[]",
            );
            const cleaned = Array.isArray(saved)
              ? saved.map(normalizeCategoryName).filter(Boolean)
              : [];
            return cleaned.length ? cleaned : [...DEFAULT_NEWS_CATEGORIES];
          } catch (e) {
            return [...DEFAULT_NEWS_CATEGORIES];
          }
        }

        function saveNewsCategories(categories) {
          localStorage.setItem(
            NEWS_CATEGORY_STORAGE_KEY,
            JSON.stringify(categories),
          );
        }

        function renderNewsCategoryList() {
          const listEl = document.getElementById("newsCategoryList");
          if (!listEl) return;
          const categories = getNewsCategories();
          const countEl = document.getElementById("newsCategoryCount");
          if (countEl)
            countEl.textContent = `${categories.length} ${categories.length > 1 ? "tags" : "tag"}`;

          listEl.innerHTML = categories
            .map(
              (category) => `
                <div class="category-item">
                  <span class="tag-chip" style="margin-right:0">${category}</span>
                  <div class="category-item-actions">
                    <button class="btn btn-ghost" type="button" onclick="beginRenameNewsCategory('${category.replace(/'/g, "\\'")}')">✎</button>
                    <button class="btn btn-ghost btn-danger" type="button" onclick="deleteNewsCategory('${category.replace(/'/g, "\\'")}')">🗑</button>
                  </div>
                </div>
              `,
            )
            .join("");
          populateNewsCategoryFilter();
          renderNewsTable();
        }

        function populateNewsCategoryFilter() {
          const filterEl = document.getElementById("newsCategoryFilter");
          if (!filterEl) return;
          const currentValue = filterEl.value || "all";
          const categories = getNewsCategories();
          filterEl.innerHTML = [
            '<option value="all">All category tags</option>',
            ...categories.map(
              (category) => `<option value="${category}">${category}</option>`,
            ),
          ].join("");
          filterEl.value = categories.includes(currentValue)
            ? currentValue
            : "all";
        }

        function renderNewsTable() {
          const tbody = document.getElementById("newsTableBody");
          if (!tbody) return;

          const search = (
            document.getElementById("newsSearchInput")?.value || ""
          )
            .trim()
            .toLowerCase();
          const categoryFilter =
            document.getElementById("newsCategoryFilter")?.value || "all";
          const transactionFilter =
            document.getElementById("newsTransactionFilter")?.value || "all";

          const filtered = newsRows.filter((row) => {
            if (categoryFilter !== "all" && row.categoryTag !== categoryFilter)
              return false;
            if (
              transactionFilter !== "all" &&
              row.transactionType !== transactionFilter
            )
              return false;
            if (!search) return true;
            const haystack = [
              row.title,
              row.categoryTag,
              row.transactionType,
              row.status,
              row.author,
            ]
              .join(" ")
              .toLowerCase();
            return haystack.includes(search);
          });

          tbody.innerHTML = filtered
            .map(
              (row) => `
                <tr>
                  <td>${row.title}</td>
                  <td><span class="tag-chip" style="margin-right:0">${row.categoryTag}</span></td>
                  <td>${row.transactionType}</td>
                  <td><span class="badge badge-success">${row.status}</span></td>
                  <td>${row.author}</td>
                  <td style="text-align:right; display:flex; gap:6px; justify-content:flex-end">
                    <button class="btn btn-ghost" type="button" title="Edit news">✎</button>
                    <button class="btn btn-ghost btn-danger" type="button" title="Delete news" onclick="if (confirm('Delete this news item?')) alert('Deleted (demo)');">🗑</button>
                  </td>
                </tr>
              `,
            )
            .join("");
        }

        function addNewsCategory() {
          const inputEl = document.getElementById("newsCategoryInput");
          const addBtn = document.getElementById("btnAddNewsCategory");
          const cancelBtn = document.getElementById(
            "btnCancelNewsCategoryEdit",
          );
          if (!inputEl) return;
          const value = normalizeCategoryName(inputEl.value);
          if (!value) {
            alert("Please enter a category name.");
            return;
          }
          const categories = getNewsCategories();

          if (editingNewsCategoryName) {
            const exists = categories.some(
              (item) =>
                item.toLowerCase() === value.toLowerCase() &&
                item.toLowerCase() !== editingNewsCategoryName.toLowerCase(),
            );
            if (exists) {
              alert("This category already exists.");
              return;
            }

            const updated = categories.map((item) =>
              item.toLowerCase() === editingNewsCategoryName.toLowerCase()
                ? value
                : item,
            );
            saveNewsCategories(updated);
            editingNewsCategoryName = null;
            if (addBtn) addBtn.textContent = "Add";
            if (cancelBtn) cancelBtn.style.display = "none";
            inputEl.value = "";
            renderNewsCategoryList();
            return;
          }

          const exists = categories.some(
            (item) => item.toLowerCase() === value.toLowerCase(),
          );
          if (exists) {
            alert("This category already exists.");
            return;
          }
          categories.push(value);
          saveNewsCategories(categories);
          inputEl.value = "";
          renderNewsCategoryList();
        }

        function beginRenameNewsCategory(oldName) {
          const inputEl = document.getElementById("newsCategoryInput");
          const addBtn = document.getElementById("btnAddNewsCategory");
          const cancelBtn = document.getElementById(
            "btnCancelNewsCategoryEdit",
          );
          if (!inputEl) return;
          editingNewsCategoryName = oldName;
          inputEl.value = oldName;
          inputEl.focus();
          inputEl.select();
          if (addBtn) addBtn.textContent = "Save";
          if (cancelBtn) cancelBtn.style.display = "inline-flex";
        }

        function cancelNewsCategoryEdit() {
          const inputEl = document.getElementById("newsCategoryInput");
          const addBtn = document.getElementById("btnAddNewsCategory");
          const cancelBtn = document.getElementById(
            "btnCancelNewsCategoryEdit",
          );
          editingNewsCategoryName = null;
          if (inputEl) inputEl.value = "";
          if (addBtn) addBtn.textContent = "Add";
          if (cancelBtn) cancelBtn.style.display = "none";
        }

        function deleteNewsCategory(name) {
          if (!confirm(`Delete category "${name}"?`)) return;
          const updated = getNewsCategories().filter(
            (item) => item.toLowerCase() !== name.toLowerCase(),
          );
          if (!updated.length) {
            alert("At least one category is required.");
            return;
          }
          saveNewsCategories(updated);
          renderNewsCategoryList();
        }

        const addBtn = document.getElementById("btnAddNewsCategory");
        const cancelBtn = document.getElementById("btnCancelNewsCategoryEdit");
        const inputEl = document.getElementById("newsCategoryInput");
        if (addBtn) addBtn.addEventListener("click", addNewsCategory);
        if (cancelBtn)
          cancelBtn.addEventListener("click", cancelNewsCategoryEdit);
        if (inputEl) {
          inputEl.addEventListener("keydown", (event) => {
            if (event.key === "Enter") addNewsCategory();
            if (event.key === "Escape") cancelNewsCategoryEdit();
          });
        }

        [
          "newsSearchInput",
          "newsCategoryFilter",
          "newsTransactionFilter",
        ].forEach((id) => {
          const el = document.getElementById(id);
          if (el) {
            el.addEventListener("input", renderNewsTable);
            el.addEventListener("change", renderNewsTable);
          }
        });

        renderNewsCategoryList();
        renderNewsTable();

        window.getNewsCategoryTags = getNewsCategories;
        window.beginRenameNewsCategory = beginRenameNewsCategory;
        window.deleteNewsCategory = deleteNewsCategory;
      })();
    </script>
  </body>
</html>
