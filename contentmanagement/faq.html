<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAQs</title>
  </head>
  <body>
    <div class="cms-filter-bar">
      <input
        type="text"
        class="cms-filter-input"
        placeholder="Search FAQ question"
      />
      <select class="filter-select">
        <option value="all">All status</option>
        <option value="published">Published</option>
        <option value="draft">Draft</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Question</th>
            <th>Status</th>
            <th>Order</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>How do I book a viewing?</td>
            <td>
              <span class="badge badge-success">Published</span>
            </td>
            <td><button class="icon-btn icon-btn--drag">☰</button></td>
            <td
              style="
                text-align: right;
                display: flex;
                gap: 6px;
                justify-content: flex-end;
              "
            >
              <button class="btn btn-ghost" type="button" title="Edit FAQ">
                ✎
              </button>
              <button
                class="btn btn-ghost btn-danger"
                type="button"
                title="Delete FAQ"
                onclick="
                  if (confirm('Delete this FAQ?')) alert('Deleted (demo)');
                "
              >
                🗑
              </button>
            </td>
          </tr>
          <tr>
            <td>How are yields calculated?</td>
            <td>
              <span class="badge badge-success">Published</span>
            </td>
            <td><button class="icon-btn icon-btn--drag">☰</button></td>
            <td
              style="
                text-align: right;
                display: flex;
                gap: 6px;
                justify-content: flex-end;
              "
            >
              <button class="btn btn-ghost" type="button" title="Edit FAQ">
                ✎
              </button>
              <button
                class="btn btn-ghost btn-danger"
                type="button"
                title="Delete FAQ"
                onclick="
                  if (confirm('Delete this FAQ?')) alert('Deleted (demo)');
                "
              >
                🗑
              </button>
            </td>
          </tr>
          <tr>
            <td>What fees are associated with buying?</td>
            <td>
              <span class="badge badge-warning">Draft</span>
            </td>
            <td><button class="icon-btn icon-btn--drag">☰</button></td>
            <td
              style="
                text-align: right;
                display: flex;
                gap: 6px;
                justify-content: flex-end;
              "
            >
              <button class="btn btn-ghost" type="button" title="Edit FAQ">
                ✎
              </button>
              <button
                class="btn btn-ghost btn-danger"
                type="button"
                title="Delete FAQ"
                onclick="
                  if (confirm('Delete this FAQ?')) alert('Deleted (demo)');
                "
              >
                🗑
              </button>
            </td>
          </tr>
          <tr>
            <td>How do I list my property?</td>
            <td>
              <span class="badge badge-warning">Draft</span>
            </td>
            <td><button class="icon-btn icon-btn--drag">☰</button></td>
            <td
              style="
                text-align: right;
                display: flex;
                gap: 6px;
                justify-content: flex-end;
              "
            >
              <button class="btn btn-ghost" type="button" title="Edit FAQ">
                ✎
              </button>
              <button
                class="btn btn-ghost btn-danger"
                type="button"
                title="Delete FAQ"
                onclick="
                  if (confirm('Delete this FAQ?')) alert('Deleted (demo)');
                "
              >
                🗑
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div style="margin-top: 10px" class="cms-inline-actions">
      <button class="btn btn-primary" type="button" onclick="openFaqEditor()">
        New FAQ
      </button>
    </div>
  </body>
</html>
