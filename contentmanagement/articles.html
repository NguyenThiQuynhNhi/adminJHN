<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Articles</title>
    <style id="uxTableOverflowFix">
/* Table overflow handling: keep text intact, only enable horizontal scroll on narrow viewport */
@media (max-width: 1199px) {
  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
}
</style>
  <style id="uxBaselinePolish">
/* Baseline UI polish — applies only where file CSS doesn't override */
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Pointer cursor on interactive */
button, .btn, [role="button"], select,
input[type="checkbox"], input[type="radio"], input[type="submit"],
input[type="button"], a[href], label[for] {
  cursor: pointer;
}

/* Disabled state */
button:disabled, .btn:disabled, input:disabled, select:disabled, textarea:disabled {
  cursor: not-allowed;
  opacity: 0.6;
}

/* Focus-visible outline (a11y) */
button:focus-visible, .btn:focus-visible,
a:focus-visible, [role="button"]:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid #c4a25f;
  outline-offset: 2px;
}

/* Inherit font family for form controls (fixes browser-default) */
input, select, textarea, button {
  font-family: inherit;
}

/* Responsive media */
img, svg, video {
  max-width: 100%;
  height: auto;
}

/* Subtle hover for buttons (only if no transition already set, gentle filter) */
button:hover:not(:disabled), .btn:hover:not(:disabled) {
  filter: brightness(0.96);
  transition: filter 0.15s ease;
}

/* Smooth scrollbar on Webkit */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: #f5ece0;
}
::-webkit-scrollbar-thumb {
  background: #d9c8b4;
  border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover {
  background: #c4a25f;
}

/* Selection highlight on-brand */
::selection {
  background: #c4a25f;
  color: #fff;
}

/* HR baseline */
hr {
  border: none;
  border-top: 1px solid #eadccd;
  margin: 12px 0;
}

/* Anchor baseline color matches brand (no underline by default to match flat UI) */
a {
  color: #8a5a3b;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
  <body>
    <style>
      .category-manager {
        margin-bottom: 12px;
        padding: 12px;
        border: 1px solid #eadccd;
        border-radius: 12px;
        background: linear-gradient(180deg, #fff9f3, #fffdf9);
      }
      .category-manager-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .category-count {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid #e2c6a8;
        background: #f0e3d7;
        color: #744210;
        font-size: 11px;
      }
      .category-manager-row {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .category-manager-row .cms-filter-input {
        min-width: 230px;
        flex: 1;
      }
      .category-list {
        margin-top: 8px;
        display: grid;
        gap: 6px;
      }
      .category-item {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        border: 1px solid #eadccd;
        border-radius: 10px;
        padding: 6px 8px;
        background: #fff;
      }
      .category-item-actions {
        display: flex;
        gap: 6px;
      }
      @media (max-width: 680px) {
        .category-item {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>

    <style id="articlesPaneSpacing">
      /* Scoped spacing for this Articles pane — keep things from touching ("dính nhau") */
      #articleTableBody td,
      .table-wrap thead th {
        padding: 12px 14px;
      }
      .table-wrap {
        margin-top: 16px;
      }
      .cms-filter-bar {
        margin-top: 16px;
        gap: 10px;
      }
      .cms-inline-actions {
        margin-top: 16px !important;
      }
      .category-manager {
        margin-bottom: 16px;
      }
      .article-row-actions {
        text-align: right;
        white-space: nowrap;
      }
      .article-row-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .article-row-actions .btn {
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 4px 10px;
        border: 1px solid #eadccd;
        border-radius: 8px;
      }
      .article-row-actions .btn:hover {
        border-color: #8b7340;
      }
      .article-row-actions .btn-danger {
        border-color: #e0e0e0;
      }
    </style>

    <div class="category-manager">
      <div class="category-manager-head">
        <div>
          <div class="card-title">Article category tags</div>
        </div>
        <button
          class="btn btn-primary"
          type="button"
          id="btnAddArticleCategory"
        >
          Add
        </button>
      </div>

      <div id="articleCategoryList" class="category-list"></div>
    </div>

    <div class="cms-filter-bar">
      <button class="btn btn-primary" type="button" onclick="openBlogEditor('article')">New article</button>
      <input
        id="articleSearchInput"
        type="text"
        class="cms-filter-input"
        placeholder="Search by title"
      />
      <select id="articleCategoryFilter" class="filter-select">
        <option value="all">All category tags</option>
      </select>
      <select id="articleTransactionFilter" class="filter-select">
        <option value="all">All transaction types</option>
        <option value="None">None</option>
        <option value="SellerGuide">SellerGuide</option>
        <option value="BuyerGuide">BuyerGuide</option>
        <option value="Renter Guide">Renter Guide</option>
      </select>
    </div>

    <div id="articleResultCount" class="list-result-count"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Category tag</th>
            <th>Transaction type</th>
            <th>Status</th>
            <th>Author</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="articleTableBody"></tbody>
      </table>
    </div>

    <div id="articlePagination" class="pagination"></div>


    <script>
      (function () {
        const ARTICLE_CATEGORY_STORAGE_KEY = "cmsArticleCategories";
        const DEFAULT_ARTICLE_CATEGORIES = [
          "Guides",
          "Blog",
          "Market analysis",
        ];
        const ARTICLE_PAGE_SIZE = 50;
        let articlePage = 1;

        // Seed ≥60 article rows to demonstrate pagination.
        const articleRows = (function buildArticleSeed() {
          const base = [
            {
              title: "Guide: reading floor plans",
              categoryTag: "Guides",
              transactionType: "BuyerGuide",
              status: "Published",
              author: "Hana",
            },
            {
              title: "Platform tips for new agents",
              categoryTag: "Blog",
              transactionType: "SellerGuide",
              status: "Draft",
              author: "Yuki",
            },
            {
              title: "Market insights — Q1 rental trends",
              categoryTag: "Market analysis",
              transactionType: "Renter Guide",
              status: "Draft",
              author: "Michael",
            },
          ];
          const cats = ["Guides", "Blog", "Market analysis"];
          const txns = ["None", "SellerGuide", "BuyerGuide", "Renter Guide"];
          const authors = ["Hana", "Yuki", "Michael", "Anna", "Emily", "Jason"];
          const topics = [
            "Choosing the right neighbourhood",
            "Understanding building age",
            "Negotiating purchase price",
            "Mortgage pre-approval steps",
            "Reading a property survey",
            "Renovation budgeting basics",
            "Tax tips for landlords",
            "Staging a rental unit",
            "Earthquake-resistant buildings",
            "Commuting from the suburbs",
            "Comparing management fees",
            "First-time buyer checklist",
            "Investing in regional cities",
            "Short-term rental rules",
            "Energy efficiency upgrades",
          ];
          const rows = base.slice();
          let n = 0;
          while (rows.length < 64) {
            n += 1;
            rows.push({
              title: topics[n % topics.length] + " (Part " + n + ")",
              categoryTag: cats[n % cats.length],
              transactionType: txns[n % txns.length],
              status: n % 3 === 0 ? "Draft" : "Published",
              author: authors[n % authors.length],
            });
          }
          return rows;
        })();

        function normalizeCategoryName(name) {
          return String(name || "")
            .trim()
            .replace(/\s+/g, " ");
        }

        function getArticleCategories() {
          try {
            const saved = JSON.parse(
              localStorage.getItem(ARTICLE_CATEGORY_STORAGE_KEY) || "[]",
            );
            const cleaned = Array.isArray(saved)
              ? saved.map(normalizeCategoryName).filter(Boolean)
              : [];
            return cleaned.length ? cleaned : [...DEFAULT_ARTICLE_CATEGORIES];
          } catch (e) {
            return [...DEFAULT_ARTICLE_CATEGORIES];
          }
        }

        function saveArticleCategories(categories) {
          localStorage.setItem(
            ARTICLE_CATEGORY_STORAGE_KEY,
            JSON.stringify(categories),
          );
        }

        function renderArticleCategoryList() {
          const listEl = document.getElementById("articleCategoryList");
          if (!listEl) return;
          const categories = getArticleCategories();
          const countEl = document.getElementById("articleCategoryCount");
          if (countEl)
            countEl.textContent = `${categories.length} ${categories.length > 1 ? "tags" : "tag"}`;

          listEl.innerHTML = categories
            .map(
              (category) => `
                <div class="category-item">
                  <span class="tag-chip" style="margin-right:0">${category}</span>
                  <div class="category-item-actions">
                    <button class="btn btn-ghost" type="button" onclick="beginRenameArticleCategory('${category.replace(/'/g, "\\'")}')">✎</button>
                    <button class="btn btn-ghost btn-danger" type="button" onclick="deleteArticleCategory('${category.replace(/'/g, "\\'")}')">🗑</button>
                  </div>
                </div>
              `,
            )
            .join("");
          populateArticleCategoryFilter();
          renderArticleTable();
        }

        function populateArticleCategoryFilter() {
          const filterEl = document.getElementById("articleCategoryFilter");
          if (!filterEl) return;
          const currentValue = filterEl.value || "all";
          const categories = getArticleCategories();
          filterEl.innerHTML = [
            '<option value="all">All category tags</option>',
            ...categories.map(
              (category) => `<option value="${category}">${category}</option>`,
            ),
          ].join("");
          filterEl.value = categories.includes(currentValue)
            ? currentValue
            : "all";
        }

        function renderArticleTable() {
          const tbody = document.getElementById("articleTableBody");
          if (!tbody) return;

          const search = (
            document.getElementById("articleSearchInput")?.value || ""
          )
            .trim()
            .toLowerCase();
          const categoryFilter =
            document.getElementById("articleCategoryFilter")?.value || "all";
          const transactionFilter =
            document.getElementById("articleTransactionFilter")?.value || "all";

          const filtered = articleRows.filter((row) => {
            if (categoryFilter !== "all" && row.categoryTag !== categoryFilter)
              return false;
            if (
              transactionFilter !== "all" &&
              row.transactionType !== transactionFilter
            )
              return false;
            if (!search) return true;
            const haystack = [
              row.title,
              row.categoryTag,
              row.transactionType,
              row.status,
              row.author,
            ]
              .join(" ")
              .toLowerCase();
            return haystack.includes(search);
          });

          const total = filtered.length;
          const pages = Math.max(1, Math.ceil(total / ARTICLE_PAGE_SIZE));
          if (articlePage > pages) articlePage = pages;
          const startIdx = (articlePage - 1) * ARTICLE_PAGE_SIZE;
          const pageRows = filtered.slice(
            startIdx,
            startIdx + ARTICLE_PAGE_SIZE,
          );

          const countEl = document.getElementById("articleResultCount");
          if (countEl) {
            if (total === 0) {
              countEl.textContent = "Showing 0 articles";
            } else {
              countEl.textContent =
                "Showing " +
                (startIdx + 1) +
                "–" +
                (startIdx + pageRows.length) +
                " of " +
                total +
                " articles";
            }
          }

          tbody.innerHTML = pageRows
            .map(
              (row, index) => `
                <tr>
                  <td>${row.title}</td>
                  <td><span class="tag-chip" style="margin-right:0">${row.categoryTag}</span></td>
                  <td>${row.transactionType}</td>
                  <td><span class="badge ${row.status === "Published" ? "badge-success" : "badge-warning"}">${row.status}</span></td>
                  <td>${row.author || "—"}</td>
                  <td class="article-row-actions">
                    <button class="btn btn-ghost" type="button" title="Edit article" data-edit-index="${index}">✎</button>
                    <button class="btn btn-ghost btn-danger" type="button" title="Delete article" data-del-index="${index}">🗑</button>
                  </td>
                </tr>
              `,
            )
            .join("");

          // Wire the per-row Edit (✎) button to the shared article editor.
          // Close over the page rows so the correct row opens after filtering.
          tbody.querySelectorAll("[data-edit-index]").forEach((btn) => {
            btn.addEventListener("click", () => {
              const row = pageRows[Number(btn.getAttribute("data-edit-index"))];
              if (!row) return;
              if (typeof window.openBlogEditor === "function") {
                window.openBlogEditor("article", {
                  title: row.title,
                  category: row.categoryTag,
                  transactionType: row.transactionType,
                  status: String(row.status).toLowerCase(),
                  author: row.author,
                  contentBody: "",
                });
              }
            });
          });

          tbody.querySelectorAll("[data-del-index]").forEach((btn) => {
            btn.addEventListener("click", () => {
              const row = pageRows[Number(btn.getAttribute("data-del-index"))];
              if (!row) return;
              const doDelete = () => {
                const idx = articleRows.indexOf(row);
                if (idx > -1) articleRows.splice(idx, 1);
                renderArticleTable();
                if (typeof window.showToast === "function")
                  window.showToast("Article deleted.", "success");
              };
              if (typeof window.showConfirm === "function") {
                window
                  .showConfirm({
                    title: "Delete article",
                    message: `Delete "${row.title}"?`,
                    confirmLabel: "Delete",
                  })
                  .then((ok) => {
                    if (ok) doDelete();
                  });
              } else {
                doDelete();
              }
            });
          });

          if (typeof window.renderPagination === "function") {
            window.renderPagination(
              document.getElementById("articlePagination"),
              total,
              articlePage,
              ARTICLE_PAGE_SIZE,
              (go) => {
                articlePage = go;
                renderArticleTable();
              },
            );
          }
        }

        function commitArticleCategory(rawValue, oldName) {
          const value = normalizeCategoryName(rawValue);
          if (!value) {
            if (typeof window.showToast === "function")
              window.showToast("Please enter a category name.", "error");
            return;
          }
          const categories = getArticleCategories();
          if (oldName) {
            const exists = categories.some(
              (item) =>
                item.toLowerCase() === value.toLowerCase() &&
                item.toLowerCase() !== oldName.toLowerCase(),
            );
            if (exists) {
              if (typeof window.showToast === "function")
                window.showToast("This category already exists.", "error");
              return;
            }
            const updated = categories.map((item) =>
              item.toLowerCase() === oldName.toLowerCase() ? value : item,
            );
            saveArticleCategories(updated);
            renderArticleCategoryList();
            if (typeof window.showToast === "function")
              window.showToast("Category tag renamed.", "success");
            return;
          }
          const exists = categories.some(
            (item) => item.toLowerCase() === value.toLowerCase(),
          );
          if (exists) {
            if (typeof window.showToast === "function")
              window.showToast("This category already exists.", "error");
            return;
          }
          categories.push(value);
          saveArticleCategories(categories);
          renderArticleCategoryList();
          if (typeof window.showToast === "function")
            window.showToast("Category tag added.", "success");
        }

        function addArticleCategory() {
          if (typeof window.showTagInput === "function") {
            window
              .showTagInput({ title: "Add category tag", value: "" })
              .then((val) => {
                if (val == null) return;
                commitArticleCategory(val, null);
              });
          }
        }

        function beginRenameArticleCategory(oldName) {
          if (typeof window.showTagInput === "function") {
            window
              .showTagInput({ title: "Rename category tag", value: oldName })
              .then((val) => {
                if (val == null) return;
                commitArticleCategory(val, oldName);
              });
          }
        }

        function deleteArticleCategory(name) {
          const doDelete = () => {
            const updated = getArticleCategories().filter(
              (item) => item.toLowerCase() !== name.toLowerCase(),
            );
            if (!updated.length) {
              if (typeof window.showToast === "function")
                window.showToast("At least one category is required.", "error");
              return;
            }
            saveArticleCategories(updated);
            renderArticleCategoryList();
            if (typeof window.showToast === "function")
              window.showToast("Category tag deleted.", "success");
          };
          if (typeof window.showConfirm === "function") {
            window
              .showConfirm({
                title: "Delete category tag",
                message: `Delete category "${name}"?`,
                confirmLabel: "Delete",
              })
              .then((ok) => {
                if (ok) doDelete();
              });
          } else {
            doDelete();
          }
        }

        const addBtn = document.getElementById("btnAddArticleCategory");
        if (addBtn) addBtn.addEventListener("click", addArticleCategory);

        [
          "articleSearchInput",
          "articleCategoryFilter",
          "articleTransactionFilter",
        ].forEach((id) => {
          const el = document.getElementById(id);
          if (el) {
            const reset = () => {
              articlePage = 1;
              renderArticleTable();
            };
            el.addEventListener("input", reset);
            el.addEventListener("change", reset);
          }
        });

        renderArticleCategoryList();
        renderArticleTable();

        window.getArticleCategoryTags = getArticleCategories;
        window.beginRenameArticleCategory = beginRenameArticleCategory;
        window.deleteArticleCategory = deleteArticleCategory;
      })();
    </script>
  </body>
</html>
