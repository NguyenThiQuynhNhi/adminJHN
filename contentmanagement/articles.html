<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Articles</title>
  </head>
  <body>
    <style>
      .category-manager {
        margin-bottom: 12px;
        padding: 12px;
        border: 1px solid #eadccd;
        border-radius: 12px;
        background: linear-gradient(180deg, #fff9f3, #fffdf9);
      }
      .category-manager-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .category-count {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid #e2c6a8;
        background: #f0e3d7;
        color: #744210;
        font-size: 11px;
      }
      .category-manager-row {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .category-manager-row .cms-filter-input {
        min-width: 230px;
        flex: 1;
      }
      .category-list {
        margin-top: 8px;
        display: grid;
        gap: 6px;
      }
      .category-item {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        border: 1px solid #eadccd;
        border-radius: 10px;
        padding: 6px 8px;
        background: #fff;
      }
      .category-item-actions {
        display: flex;
        gap: 6px;
      }
      @media (max-width: 680px) {
        .category-item {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>

    <div class="category-manager">
      <div class="category-manager-head">
        <div>
          <div class="card-title">Article category tags</div>
          <div class="card-subtitle">
            Separate category list for Articles modal.
          </div>
        </div>
        <span class="category-count" id="articleCategoryCount">0 tags</span>
      </div>
      <div class="category-manager-row">
        <input
          id="articleCategoryInput"
          type="text"
          class="cms-filter-input"
          placeholder="Enter category name"
        />
        <button
          class="btn btn-primary"
          type="button"
          id="btnAddArticleCategory"
        >
          Add
        </button>
        <button
          class="btn btn-ghost"
          type="button"
          id="btnCancelArticleCategoryEdit"
          style="display: none"
        >
          Cancel edit
        </button>
      </div>
      <div id="articleCategoryList" class="category-list"></div>
    </div>

    <div class="cms-subnav">
      <button
        class="cms-subtab-sm active"
        type="button"
        onclick="switchArticlesCategory('guides', this)"
      >
        Guides
      </button>
      <button
        class="cms-subtab-sm"
        type="button"
        onclick="switchArticlesCategory('blog', this)"
      >
        Blog
      </button>
      <button
        class="cms-subtab-sm"
        type="button"
        onclick="switchArticlesCategory('analysis', this)"
      >
        Market analysis
      </button>
    </div>

    <!-- Guides category -->
    <div id="articles-cat-guides" class="insights-articles-pane active">
      <div class="cms-filter-bar">
        <input
          type="text"
          class="cms-filter-input"
          placeholder="Search guide articles"
        />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Status</th>
              <th>Author</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Guide: reading floor plans</td>
              <td>
                <span class="badge badge-success">Published</span>
              </td>
              <td>Editor Sato</td>
              <td
                style="
                  text-align: right;
                  display: flex;
                  gap: 6px;
                  justify-content: flex-end;
                "
              >
                <button
                  class="btn btn-ghost"
                  type="button"
                  title="Edit article"
                >
                  ✎ Edit
                </button>
                <button
                  class="btn btn-ghost"
                  type="button"
                  title="Delete article"
                  onclick="
                    if (confirm('Delete this article?'))
                      alert('Deleted (demo)');
                  "
                >
                  🗑 Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style="margin-top: 10px" class="cms-inline-actions">
        <button
          class="btn btn-primary"
          type="button"
          onclick="openBlogEditor('article')"
        >
          New article
        </button>
      </div>
    </div>

    <!-- Blog category -->
    <div id="articles-cat-blog" class="insights-articles-pane">
      <div class="cms-filter-bar">
        <input
          type="text"
          class="cms-filter-input"
          placeholder="Search blog posts"
        />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Status</th>
              <th>Author</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Platform tips for new agents</td>
              <td>
                <span class="badge badge-warning">In Review</span>
              </td>
              <td>Content Team</td>
              <td
                style="
                  text-align: right;
                  display: flex;
                  gap: 6px;
                  justify-content: flex-end;
                "
              >
                <button
                  class="btn btn-ghost"
                  type="button"
                  title="Edit article"
                >
                  ✎ Edit
                </button>
                <button
                  class="btn btn-ghost"
                  type="button"
                  title="Delete article"
                  onclick="
                    if (confirm('Delete this article?'))
                      alert('Deleted (demo)');
                  "
                >
                  🗑 Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style="margin-top: 10px" class="cms-inline-actions">
        <button
          class="btn btn-primary"
          type="button"
          onclick="openBlogEditor('article')"
        >
          New article
        </button>
      </div>
    </div>

    <!-- Market analysis category -->
    <div id="articles-cat-analysis" class="insights-articles-pane">
      <div class="cms-filter-bar">
        <input
          type="text"
          class="cms-filter-input"
          placeholder="Search market analysis"
        />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Status</th>
              <th>Author</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Market insights — Q1 rental trends</td>
              <td>
                <span class="badge badge-warning">In Review</span>
              </td>
              <td>Editor Sato</td>
              <td
                style="
                  text-align: right;
                  display: flex;
                  gap: 6px;
                  justify-content: flex-end;
                "
              >
                <button
                  class="btn btn-ghost"
                  type="button"
                  title="Edit article"
                >
                  ✎ Edit
                </button>
                <button
                  class="btn btn-ghost"
                  type="button"
                  title="Delete article"
                  onclick="
                    if (confirm('Delete this article?'))
                      alert('Deleted (demo)');
                  "
                >
                  🗑 Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div style="margin-top: 10px" class="cms-inline-actions">
        <button
          class="btn btn-primary"
          type="button"
          onclick="openBlogEditor('article')"
        >
          New article
        </button>
      </div>
    </div>

    <script>
      (function () {
        const ARTICLE_CATEGORY_STORAGE_KEY = "cmsArticleCategories";
        const DEFAULT_ARTICLE_CATEGORIES = [
          "Guides",
          "Blog",
          "Market analysis",
        ];
        let editingArticleCategoryName = null;

        function normalizeCategoryName(name) {
          return String(name || "")
            .trim()
            .replace(/\s+/g, " ");
        }

        function getArticleCategories() {
          try {
            const saved = JSON.parse(
              localStorage.getItem(ARTICLE_CATEGORY_STORAGE_KEY) || "[]",
            );
            const cleaned = Array.isArray(saved)
              ? saved.map(normalizeCategoryName).filter(Boolean)
              : [];
            return cleaned.length ? cleaned : [...DEFAULT_ARTICLE_CATEGORIES];
          } catch (e) {
            return [...DEFAULT_ARTICLE_CATEGORIES];
          }
        }

        function saveArticleCategories(categories) {
          localStorage.setItem(
            ARTICLE_CATEGORY_STORAGE_KEY,
            JSON.stringify(categories),
          );
        }

        function renderArticleCategoryList() {
          const listEl = document.getElementById("articleCategoryList");
          if (!listEl) return;
          const categories = getArticleCategories();
          const countEl = document.getElementById("articleCategoryCount");
          if (countEl)
            countEl.textContent = `${categories.length} ${categories.length > 1 ? "tags" : "tag"}`;

          listEl.innerHTML = categories
            .map(
              (category) => `
                <div class="category-item">
                  <span class="tag-chip" style="margin-right:0">${category}</span>
                  <div class="category-item-actions">
                    <button class="btn btn-ghost" type="button" onclick="beginRenameArticleCategory('${category.replace(/'/g, "\\'")}')">✎ Edit</button>
                    <button class="btn btn-ghost btn-danger" type="button" onclick="deleteArticleCategory('${category.replace(/'/g, "\\'")}')">🗑 Delete</button>
                  </div>
                </div>
              `,
            )
            .join("");
        }

        function addArticleCategory() {
          const inputEl = document.getElementById("articleCategoryInput");
          const addBtn = document.getElementById("btnAddArticleCategory");
          const cancelBtn = document.getElementById(
            "btnCancelArticleCategoryEdit",
          );
          if (!inputEl) return;
          const value = normalizeCategoryName(inputEl.value);
          if (!value) {
            alert("Please enter a category name.");
            return;
          }
          const categories = getArticleCategories();

          if (editingArticleCategoryName) {
            const exists = categories.some(
              (item) =>
                item.toLowerCase() === value.toLowerCase() &&
                item.toLowerCase() !== editingArticleCategoryName.toLowerCase(),
            );
            if (exists) {
              alert("This category already exists.");
              return;
            }
            const updated = categories.map((item) =>
              item.toLowerCase() === editingArticleCategoryName.toLowerCase()
                ? value
                : item,
            );
            saveArticleCategories(updated);
            editingArticleCategoryName = null;
            if (addBtn) addBtn.textContent = "Add";
            if (cancelBtn) cancelBtn.style.display = "none";
            inputEl.value = "";
            renderArticleCategoryList();
            return;
          }

          const exists = categories.some(
            (item) => item.toLowerCase() === value.toLowerCase(),
          );
          if (exists) {
            alert("This category already exists.");
            return;
          }
          categories.push(value);
          saveArticleCategories(categories);
          inputEl.value = "";
          renderArticleCategoryList();
        }

        function beginRenameArticleCategory(oldName) {
          const inputEl = document.getElementById("articleCategoryInput");
          const addBtn = document.getElementById("btnAddArticleCategory");
          const cancelBtn = document.getElementById(
            "btnCancelArticleCategoryEdit",
          );
          if (!inputEl) return;
          editingArticleCategoryName = oldName;
          inputEl.value = oldName;
          inputEl.focus();
          inputEl.select();
          if (addBtn) addBtn.textContent = "Save";
          if (cancelBtn) cancelBtn.style.display = "inline-flex";
        }

        function cancelArticleCategoryEdit() {
          const inputEl = document.getElementById("articleCategoryInput");
          const addBtn = document.getElementById("btnAddArticleCategory");
          const cancelBtn = document.getElementById(
            "btnCancelArticleCategoryEdit",
          );
          editingArticleCategoryName = null;
          if (inputEl) inputEl.value = "";
          if (addBtn) addBtn.textContent = "Add";
          if (cancelBtn) cancelBtn.style.display = "none";
        }

        function deleteArticleCategory(name) {
          if (!confirm(`Delete category "${name}"?`)) return;
          const updated = getArticleCategories().filter(
            (item) => item.toLowerCase() !== name.toLowerCase(),
          );
          if (!updated.length) {
            alert("At least one category is required.");
            return;
          }
          saveArticleCategories(updated);
          renderArticleCategoryList();
        }

        function switchArticlesCategory(key, el) {
          const tabs = document.querySelectorAll(
            "#articles-content .cms-subtab-sm",
          );
          tabs.forEach((t) => t.classList.remove("active"));
          if (el) el.classList.add("active");

          const panes = document.querySelectorAll(
            "#articles-content .insights-articles-pane",
          );
          panes.forEach((p) => p.classList.remove("active"));

          const target = document.getElementById("articles-cat-" + key);
          if (target) target.classList.add("active");
        }

        const addBtn = document.getElementById("btnAddArticleCategory");
        const cancelBtn = document.getElementById(
          "btnCancelArticleCategoryEdit",
        );
        const inputEl = document.getElementById("articleCategoryInput");
        if (addBtn) addBtn.addEventListener("click", addArticleCategory);
        if (cancelBtn)
          cancelBtn.addEventListener("click", cancelArticleCategoryEdit);
        if (inputEl) {
          inputEl.addEventListener("keydown", (event) => {
            if (event.key === "Enter") addArticleCategory();
            if (event.key === "Escape") cancelArticleCategoryEdit();
          });
        }

        renderArticleCategoryList();

        window.switchArticlesCategory = switchArticlesCategory;
        window.getArticleCategoryTags = getArticleCategories;
        window.beginRenameArticleCategory = beginRenameArticleCategory;
        window.deleteArticleCategory = deleteArticleCategory;
      })();
    </script>
  </body>
</html>
