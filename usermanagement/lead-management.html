<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Lead Directory</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f3ef;
        color: #2a2118;
      }
      .page {
        padding: 24px 32px 32px;
        display: flex;
        gap: 20px;
        min-height: 100vh;
      }

      .sidebar {
        width: 340px;
        background: #fffaf2;
        border-radius: 12px;
        border: 1px solid #eadccd;
        padding: 18px;
        height: fit-content;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
      }

      .main-content {
        flex: 1;
        background: #fffaf2;
        border-radius: 12px;
        border: 1px solid #eadccd;
        padding: 20px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
      }

      .card-title {
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 14px;
        color: #2a2118;
      }

      .btn {
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-primary {
        background: #3a6b3c;
        color: white;
        border: none;
      }
      .btn-secondary {
        background: #f7efe4;
        color: #6a5641;
        border: 1px solid #ddcdb9;
      }

      #newGroupName,
      .new-group select {
        width: 100%;
        padding: 9px 12px;
        margin-bottom: 8px;
        border-radius: 999px;
        border: 1px solid #ddcdb9;
        font-size: 13px;
        background: #fdf8f0;
      }

      .group-list {
        list-style: none;
        padding: 0;
        margin: 0 0 10px 0;
      }
      .group-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .group-item {
        padding: 11px 12px;
        border-radius: 8px;
        margin-bottom: 4px;
        cursor: pointer;
        font-size: 13.5px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .group-item:hover {
        background: #f0e6d8;
      }
      .group-item.active {
        background: #3a6b3c;
        color: white;
      }

      .group-main {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .group-actions {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
      }

      .group-action-btn {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        border: 1px solid #ddcdb9;
        background: #fff;
        color: #6a5641;
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .group-action-btn:hover {
        border-color: #c9b39a;
        background: #f7efe4;
      }

      .group-item.active .group-action-btn {
        border-color: rgba(255, 255, 255, 0.7);
        background: rgba(255, 255, 255, 0.15);
        color: #ffffff;
      }

      .filters-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
        align-items: flex-end;
      }
      .filter-item {
        min-width: 150px;
      }
      .filter-item label {
        display: block;
        font-size: 11px;
        margin-bottom: 4px;
        color: #7c6a55;
      }
      .filter-item input,
      .filter-item select {
        width: 100%;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid #ddcdb9;
        font-size: 12px;
        background: #fdf8f0;
      }
      .filter-actions {
        margin-left: auto;
      }

      .lead-type-tabs {
        display: flex;
        gap: 8px;
        margin: 8px 0 12px;
      }
      .lead-type-tab {
        flex: 1;
        border-radius: 999px;
        padding: 7px 10px;
        font-size: 13px;
        border: 1px solid #ddcdb9;
        background: #fdf8f0;
        color: #6a5641;
        cursor: pointer;
      }
      .lead-type-tab.active {
        background: #3a6b3c;
        color: #ffffff;
        border-color: #3a6b3c;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead {
        background: #f1e4d4;
      }
      th,
      td {
        padding: 11px 9px;
        border-bottom: 1px solid #efe2d3;
        text-align: left;
      }
      .lead-name {
        font-weight: 500;
      }

      .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: #7c6a55;
        font-size: 14px;
      }

      .group-count {
        font-size: 12px;
        color: #7c6a55;
        margin-left: 6px;
      }
    </style>
    <style id="uxTableOverflowFix">
/* Table overflow handling: keep text intact, only enable horizontal scroll on narrow viewport */
@media (max-width: 1199px) {
  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
}
</style>
  <style id="uxBaselinePolish">
/* Baseline UI polish — applies only where file CSS doesn't override */
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Pointer cursor on interactive */
button, .btn, [role="button"], select,
input[type="checkbox"], input[type="radio"], input[type="submit"],
input[type="button"], a[href], label[for] {
  cursor: pointer;
}

/* Disabled state */
button:disabled, .btn:disabled, input:disabled, select:disabled, textarea:disabled {
  cursor: not-allowed;
  opacity: 0.6;
}

/* Focus-visible outline (a11y) */
button:focus-visible, .btn:focus-visible,
a:focus-visible, [role="button"]:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid #c4a25f;
  outline-offset: 2px;
}

/* Inherit font family for form controls (fixes browser-default) */
input, select, textarea, button {
  font-family: inherit;
}

/* Responsive media */
img, svg, video {
  max-width: 100%;
  height: auto;
}

/* Subtle hover for buttons (only if no transition already set, gentle filter) */
button:hover:not(:disabled), .btn:hover:not(:disabled) {
  filter: brightness(0.96);
  transition: filter 0.15s ease;
}

/* Smooth scrollbar on Webkit */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: #f5ece0;
}
::-webkit-scrollbar-thumb {
  background: #d9c8b4;
  border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover {
  background: #c4a25f;
}

/* Selection highlight on-brand */
::selection {
  background: #c4a25f;
  color: #fff;
}

/* HR baseline */
hr {
  border: none;
  border-top: 1px solid #eadccd;
  margin: 12px 0;
}

/* Anchor baseline color matches brand (no underline by default to match flat UI) */
a {
  color: #8a5a3b;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>

      <!-- Sidebar: Groups -->
      <div class="sidebar">
        <div class="card-title">Lead Management</div>

        <div class="new-group">
          <div class="lead-type-tabs">
            <button
              type="button"
              class="lead-type-tab active"
              data-type="end_user"
            >
              End User
            </button>
            <button type="button" class="lead-type-tab" data-type="agent">
              Agent
            </button>
          </div>
          <input id="newGroupType" type="hidden" value="end_user" />
        </div>

        <div style="margin-top: 24px">
          <div class="group-header">
            <div class="card-title" style="font-size: 15px; width: fit-content">
              Groups
            </div>
            <button
              class="btn btn-primary"
              id="createNewGroupBtn"
              style="width: fit-content"
            >
              + New Group
            </button>
          </div>
          <input id="newGroupName" type="text" placeholder="Find Group name" />
          <ul id="groupList" class="group-list"></ul>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <div id="groupHeader" style="margin-bottom: 20px">
          <h2 id="currentGroupName" style="margin: 0 0 6px 0; font-size: 20px">
            Select a group to view leads
          </h2>
          <p id="groupInfo" style="margin: 0; color: #7c6a55"></p>
        </div>

        <div id="leadFilters"></div>

        <table id="leadTable">
          <thead id="tableHeader"></thead>
          <tbody id="leadBody"></tbody>
        </table>

        <div id="emptyState" class="empty-state">
          No leads in this group yet.<br />Please select a group.
        </div>
      </div>
    </div>

      const seedGroups = [

        },
        {

      ];

      function getLeads() {
        if (!localStorage.getItem(LEAD_KEY)) {
          localStorage.setItem(LEAD_KEY, JSON.stringify(seedLeads));
        }
        return JSON.parse(localStorage.getItem(LEAD_KEY));
      }

      function getGroups() {
        if (!localStorage.getItem(GROUP_KEY)) {
          localStorage.setItem(GROUP_KEY, JSON.stringify(seedGroups));
        }
        return JSON.parse(localStorage.getItem(GROUP_KEY));
      }

      function saveGroups(groups) {
        localStorage.setItem(GROUP_KEY, JSON.stringify(groups));
      }

      function renderGroupList() {
        const ul = document.getElementById("groupList");
        ul.innerHTML = "";
        const groups = getGroups();

        const visibleGroups = groups.filter(
          (g) => g.entityType === currentLeadType,
        );

        visibleGroups.forEach((group) => {
          const li = document.createElement("li");
          li.className = `group-item ${group.id === currentGroupId ? "active" : ""}`;
          li.innerHTML = `
            <div class="group-main">
              ${group.name} <span class="group-count">(${group.leadIds.length})</span>
            </div>
            <div class="group-actions">
              <button type="button" class="group-action-btn" data-action="edit" data-group-id="${group.id}" title="Edit group">✎</button>
              <button type="button" class="group-action-btn" data-action="delete" data-group-id="${group.id}" title="Delete group">🗑</button>
            </div>
          `;
          li.onclick = () => loadGroup(group.id);
          ul.appendChild(li);
        });

        ul.querySelectorAll(".group-action-btn").forEach((btn) => {
          btn.addEventListener("click", (event) => {
            event.stopPropagation();
            const action = btn.getAttribute("data-action");
            const groupId = btn.getAttribute("data-group-id");
            if (!groupId) return;
            if (action === "edit") {
              editGroupName(groupId);
              return;
            }
            if (action === "delete") {
              deleteGroup(groupId);
            }
          });
        });
      }

      function editGroupName(groupId) {
        const groups = getGroups();
        const target = groups.find((g) => g.id === groupId);
        if (!target) return;
        openRenameModal(target.name, (newName) => {
          const trimmed = newName.trim();
          if (!trimmed) {
            Toast.err("Group name cannot be empty.");
            return false;
          }
          target.name = trimmed;
          saveGroups(groups);
          renderGroupList();
          if (currentGroupId === groupId) {
            document.getElementById("currentGroupName").textContent =
              target.name;
          }
          Toast.ok("Group renamed");
          return true;
        });
      }

      function deleteGroup(groupId) {
        const groups = getGroups();
        const target = groups.find((g) => g.id === groupId);
        if (!target) return;

        UX.confirm({
          title: "Delete group?",
          message: `Delete group "${target.name}"? This cannot be undone.`,
          okLabel: "Delete",
          danger: true,
          onConfirm() {
            performDeleteGroup(groupId);
          },
        });
      }

      function performDeleteGroup(groupId) {
        const groups = getGroups();
        const target = groups.find((g) => g.id === groupId);
        if (!target) return;

        const nextGroups = groups.filter((g) => g.id !== groupId);
        saveGroups(nextGroups);

        if (currentGroupId === groupId) {
          const replacement = nextGroups.find(
            (g) => g.entityType === currentLeadType,
          );
          if (replacement) {
            loadGroup(replacement.id);
          } else {
            currentGroupId = null;
            renderGroupList();
            document.getElementById("leadBody").innerHTML = "";
            document.getElementById("tableHeader").innerHTML = "";
            document.getElementById("emptyState").style.display = "block";
            document.getElementById("currentGroupName").textContent =
              "Select a group to view leads";
            document.getElementById("groupInfo").textContent = "";
          }
          return;
        }

        renderGroupList();
      }

      function loadGroup(groupId) {
        currentGroupId = groupId;
        renderGroupList();

        const groups = getGroups();
        const group = groups.find((g) => g.id === groupId);
        if (!group) return;

        document.getElementById("currentGroupName").textContent = group.name;

        const allLeads = getLeads();
        const leadsInGroup = allLeads.filter((l) =>
          group.leadIds.includes(String(l.id)),
        );

        currentLeadType = group.entityType;
        currentLeads = leadsInGroup;
        renderFilters(currentLeadType);
        applyFiltersAndRender();
      }

      function extractCountry(location) {
        if (!location) return "-";
        const parts = String(location).split(",");
        const last = parts[parts.length - 1].trim();
        return last || String(location).trim();
      }

      function renderLeadTable(leads, type) {
        const tbody = document.getElementById("leadBody");
        const thead = document.getElementById("tableHeader");
        const empty = document.getElementById("emptyState");

        tbody.innerHTML = "";

        if (leads.length === 0) {
          empty.style.display = "block";
          thead.innerHTML = "";
          return;
        }

        empty.style.display = "none";

        if (type === "end_user") {
          // Match the End User Management table structure
          thead.innerHTML = `
          <tr>
            <th>User</th>
            <th>Buyer status</th>
            <th>Nation</th>
            <th>Logins</th>
            <th>Avg session (min)</th>
            <th>Saved searches</th>
            <th>Saved properties</th>
            <th>Appraisals</th>
            <th>Alerts</th>
            <th>Chat</th>
          </tr>
        `;
          leads.forEach((l) => {
            const name = l.name || "-";
            const email = l.email || "";
            const buyerStatus = l.buyerStatus || "-";
            const nation = extractCountry(l.location);
            const loginCount =
              typeof l.loginCount === "number" ? l.loginCount : "-";
            const avgSession =
              typeof l.avgSessionMinutes === "number"
                ? l.avgSessionMinutes
                : "-";
            const savedSearches =
              typeof l.savedSearchCount === "number" ? l.savedSearchCount : 0;
            const savedProperties =
              typeof l.savedPropertyCount === "number"
                ? l.savedPropertyCount
                : 0;
            const appraisals =
              typeof l.appraisalFormCount === "number"
                ? l.appraisalFormCount
                : 0;
            const alerts = (l.alerts || []).join(" | ") || "-";

            const tr = document.createElement("tr");
            tr.innerHTML = `
            <td class="lead-name">${name}<br><small>${email}</small></td>
            <td>${buyerStatus}</td>
            <td>${nation}</td>
            <td>${loginCount}</td>
            <td>${avgSession}</td>
            <td>${savedSearches}</td>
            <td>${savedProperties}</td>
            <td>${appraisals}</td>
            <td>${alerts}</td>
            <td>
              —
            </td>
          `;
            tbody.appendChild(tr);
          });
        } else {
          // Match the Agent Management table structure
          thead.innerHTML = `
          <tr>
            <th>Agency</th>
            <th>Primary city</th>
            <th>Established date</th>
            <th>Head office address</th>
            <th>Badge</th>
            <th>Rating</th>
            <th>Reviews</th>
            <th>Sales (12m)</th>
            <th>Active listings</th>
            <th>Members</th>
            <th>Plan</th>
            <th>Chat</th>
          </tr>
        `;
          leads.forEach((l) => {
            const agency = l.name || "-";
            const primaryCity = l.primaryCity || "-";
            const establishedDate = l.establishedDate || l.createdDate || "-";
            const headOffice = l.headOfficeAddress || "-";
            const badge = l.badge || "—";
            const rating =
              typeof l.averageRating === "number" ? l.averageRating : "-";
            const reviews =
              typeof l.totalReviews === "number" ? l.totalReviews : "-";
            const sales12m =
              typeof l.salesLast12Months === "number"
                ? l.salesLast12Months
                : "-";
            const activeListings =
              typeof l.activeListings === "number" ? l.activeListings : 0;
            const members =
              typeof l.totalMembersCount === "number"
                ? l.totalMembersCount
                : "-";
            const plan = l.subscriptionPlan || "-";

            const tr = document.createElement("tr");
            tr.innerHTML = `

      let currentLeads = [];

      function applyFiltersAndRender() {
        let filtered = Array.isArray(currentLeads) ? [...currentLeads] : [];

        const searchEl = document.getElementById("filterSearch");
        const search = searchEl ? searchEl.value.trim().toLowerCase() : "";
        if (search) {
          filtered = filtered.filter((l) => {
            const hay = `${l.name || ""} ${l.email || ""}`.toLowerCase();
            return hay.includes(search);
          });
        }

        if (currentLeadType === "end_user") {
          const buyerStatusEl = document.getElementById("filterBuyerStatus");
          const nationEl = document.getElementById("filterNation");
          const alertsEl = document.getElementById("filterAlerts");
          const savedEl = document.getElementById("filterSavedProps");
          const apprEl = document.getElementById("filterAppraisals");
          const activityEl = document.getElementById("filterActivityLevel");

          const buyerStatus = buyerStatusEl ? buyerStatusEl.value : "";
          const nation = nationEl ? nationEl.value.trim().toLowerCase() : "";
          const alerts = alertsEl ? alertsEl.value : "";
          const saved = savedEl ? savedEl.value : "";
          const appr = apprEl ? apprEl.value : "";
          const activity = activityEl ? activityEl.value : "";

          if (buyerStatus) {
            filtered = filtered.filter(
              (l) => (l.buyerStatus || "") === buyerStatus,
            );
          }
          if (nation) {
            filtered = filtered.filter((l) => {
              const n = extractCountry(l.location).toLowerCase();
              return n.includes(nation);
            });
          }
          if (alerts === "has") {
            filtered = filtered.filter(
              (l) => Array.isArray(l.alerts) && l.alerts.length > 0,
            );
          } else if (alerts === "none") {
            filtered = filtered.filter(
              (l) => !Array.isArray(l.alerts) || l.alerts.length === 0,
            );
          }
          if (saved) {
            filtered = filtered.filter((l) => {
              const n = Number(l.savedPropertyCount) || 0;
              if (saved === "any") return n >= 1;
              if (saved === "5+") return n >= 5;
              if (saved === "10+") return n >= 10;
              if (saved === "none") return n === 0;
              return true;
            });
          }
          if (appr) {
            filtered = filtered.filter((l) => {
              const n = Number(l.appraisalFormCount) || 0;
              if (appr === "any") return n >= 1;
              if (appr === "none") return n === 0;
              return true;
            });
          }
          if (activity) {
            filtered = filtered.filter((l) => {
              const n = Number(l.loginCount) || 0;
              if (activity === "high") return n >= 20;
              if (activity === "medium") return n >= 5 && n < 20;
              if (activity === "low") return n < 5;
              return true;
            });
          }
        } else {
          const badgeEl = document.getElementById("filterBadge");
          const planEl = document.getElementById("filterPlan");
          const cityEl = document.getElementById("filterCity");
          const minRatingEl = document.getElementById("filterMinRating");
          const minSalesEl = document.getElementById("filterMinSales");
          const minListingsEl = document.getElementById("filterMinListings");
          const estEl = document.getElementById("filterEstablishedYear");

          const badge = badgeEl ? badgeEl.value : "";
          const plan = planEl ? planEl.value : "";
          const city = cityEl ? cityEl.value.trim().toLowerCase() : "";
          const minRating = minRatingEl ? parseFloat(minRatingEl.value) : NaN;
          const minSales = minSalesEl ? parseInt(minSalesEl.value, 10) : NaN;
          const minListings = minListingsEl
            ? parseInt(minListingsEl.value, 10)
            : NaN;
          const est = estEl ? estEl.value : "";

          if (badge) {
            filtered = filtered.filter((l) => (l.badge || "") === badge);
          }
          if (plan) {
            filtered = filtered.filter(
              (l) => (l.subscriptionPlan || "") === plan,
            );
          }
          if (city) {
            filtered = filtered.filter((l) => {
              const c = (l.primaryCity || "").toLowerCase();
              return c.includes(city);
            });
          }
          if (!isNaN(minRating)) {
            filtered = filtered.filter((l) => {
              const r =
                typeof l.averageRating === "number" ? l.averageRating : 0;
              return r >= minRating;
            });
          }
          if (!isNaN(minSales)) {
            filtered = filtered.filter(
              (l) => (Number(l.salesLast12Months) || 0) >= minSales,
            );
          }
          if (!isNaN(minListings)) {
            filtered = filtered.filter(
              (l) => (Number(l.activeListings) || 0) >= minListings,
            );
          }
          if (est) {
            filtered = filtered.filter((l) => {
              const y = parseInt(
                (l.establishedDate || l.createdDate || "").slice(0, 4),
                10,
              );
              if (isNaN(y)) return false;
              if (est === "before-2000") return y < 2000;
              if (est === "2000-2010") return y >= 2000 && y <= 2010;
              if (est === "2010-2020") return y >= 2010 && y <= 2020;
              if (est === "2020+") return y >= 2020;
              return true;
            });
          }
        }

        const sortByEl = document.getElementById("filterSortBy");
        const sortBy = sortByEl ? sortByEl.value : "";
        if (sortBy) {
          const sorters = {
            "logins-desc": (a, b) =>
              (Number(b.loginCount) || 0) - (Number(a.loginCount) || 0),
            "session-desc": (a, b) =>
              (Number(b.avgSessionMinutes) || 0) -
              (Number(a.avgSessionMinutes) || 0),
            "saved-desc": (a, b) =>
              (Number(b.savedPropertyCount) || 0) -
              (Number(a.savedPropertyCount) || 0),
            "appraisals-desc": (a, b) =>
              (Number(b.appraisalFormCount) || 0) -
              (Number(a.appraisalFormCount) || 0),
            "name-asc": (a, b) =>
              (a.name || "").localeCompare(b.name || ""),
            "rating-desc": (a, b) =>
              (Number(b.averageRating) || 0) - (Number(a.averageRating) || 0),
            "sales-desc": (a, b) =>
              (Number(b.salesLast12Months) || 0) -
              (Number(a.salesLast12Months) || 0),
            "listings-desc": (a, b) =>
              (Number(b.activeListings) || 0) -
              (Number(a.activeListings) || 0),
            "reviews-desc": (a, b) =>
              (Number(b.totalReviews) || 0) - (Number(a.totalReviews) || 0),
            "agency-asc": (a, b) =>
              (a.name || "").localeCompare(b.name || ""),
          };
          if (sorters[sortBy]) filtered = [...filtered].sort(sorters[sortBy]);
        }

        renderLeadTable(filtered, currentLeadType);
      }

      // Create new group
      document
        .getElementById("createNewGroupBtn")
        .addEventListener("click", () => {
          const nameInput = document.getElementById("newGroupName");
          const name = nameInput.value.trim();

          if (!name) {

          const groups = getGroups();

            id: "group_" + Date.now(),
            name: name,
            entityType: type,
            leadIds: [],
            createdDate: new Date().toISOString().slice(0, 10),
          };

          groups.push(newGroup);
          saveGroups(groups);

          nameInput.value = "";
          renderGroupList();
          loadGroup(newGroup.id);

          Toast.ok(`Group "${name}" created`);
        });

      // ──────────── Rename modal (replaces prompt) ────────────
      (function setupRenameModal() {
        const modal = document.createElement("div");
        modal.className = "ux-modal";
        modal.id = "groupRenameModal";
        modal.setAttribute("role", "dialog");
        modal.setAttribute("aria-modal", "true");
        modal.innerHTML = `
          <div class="ux-modal-box">
            <h3>Rename group</h3>
            <div style="margin-bottom:14px">
              <label class="req" style="display:block;font-size:11px;color:#7c6a55;margin-bottom:4px">Group name</label>
              <input id="renameInput" type="text" style="width:100%;padding:7px 10px;border:1px solid #ddcdb9;border-radius:8px;font-size:13px;font-family:inherit;background:#fff" />
              <span class="ux-field-error" id="renameError" style="display:none">Group name cannot be empty.</span>
            </div>
            <div class="ux-modal-actions">
              <button type="button" class="ux-btn" id="renameCancel">Cancel</button>
              <button type="button" class="ux-btn primary" id="renameSave">Save</button>
            </div>
          </div>`;
        document.body.appendChild(modal);

        const input = modal.querySelector("#renameInput");
        const err = modal.querySelector("#renameError");
        const cancelBtn = modal.querySelector("#renameCancel");
        const saveBtn = modal.querySelector("#renameSave");
        let _cb = null;

        function close() {
          modal.classList.remove("open");
          _cb = null;
        }
        cancelBtn.addEventListener("click", close);
        modal.addEventListener("click", (e) => {
          if (e.target === modal) close();
        });
        function trySave() {
          const v = input.value;
          if (!_cb) return close();
          const ok = _cb(v);
          if (ok !== false) close();
          else {
            err.style.display = "block";
            input.classList.add("ux-invalid");
          }
        }
        saveBtn.addEventListener("click", trySave);
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") trySave();
          if (e.key === "Escape") close();
        });
        input.addEventListener("input", () => {
          err.style.display = "none";
          input.classList.remove("ux-invalid");
        });

        window.openRenameModal = function (currentValue, cb) {
          input.value = currentValue || "";
          err.style.display = "none";
          input.classList.remove("ux-invalid");
          _cb = cb;
          modal.classList.add("open");
          setTimeout(() => {
            input.focus();
            input.select();
          }, 30);
        };
      })();

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        getLeads();
        getGroups();

        // Setup lead type tabs
        const tabs = document.querySelectorAll(".lead-type-tab");
        tabs.forEach((tab) => {
          tab.addEventListener("click", () => {
            const selectedType = tab.getAttribute("data-type");
            if (!selectedType || selectedType === currentLeadType) return;

            currentLeadType = selectedType;

            // Update active tab
            tabs.forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");

            // Sync hidden input used for group creation
            const hiddenTypeInput = document.getElementById("newGroupType");
            if (hiddenTypeInput) {
              hiddenTypeInput.value = currentLeadType;
            }

            // Reset current group selection when switching type
            currentGroupId = null;
            renderGroupList();

            const allGroups = getGroups();
            const groupsForType = allGroups.filter(
              (g) => g.entityType === currentLeadType,
            );
            if (groupsForType.length > 0) {
              loadGroup(groupsForType[0].id);
            } else {
              document.getElementById("leadBody").innerHTML = "";
              document.getElementById("tableHeader").innerHTML = "";
              document.getElementById("emptyState").style.display = "block";
              document.getElementById("currentGroupName").textContent =
                "Select a group to view leads";
              document.getElementById("groupInfo").textContent = "";
            }
          });
        });

        renderGroupList();

        // Auto-load first group for initial type so sample data is visible
        const allGroups = getGroups();
        const initialGroups = allGroups.filter(
          (g) => g.entityType === currentLeadType,
        );
        if (initialGroups.length > 0) {
          loadGroup(initialGroups[0].id);
        }
      });
    </script>

<script>
(function(){
  if (window.UX) return; // idempotent
  const wrap = document.getElementById('uxToastWrap');
  const modal = document.getElementById('uxConfirmModal');
  const titleEl = document.getElementById('uxConfirmTitle');
  const msgEl = document.getElementById('uxConfirmMsg');
  const okBtn = document.getElementById('uxConfirmOk');
  const cancelBtn = document.getElementById('uxConfirmCancel');

  // ──── Toast ────────────────────────────────────────────────────
  function toast(msg, type){
    if(!wrap) return;
    const el = document.createElement('div');
    el.className = 'ux-toast ' + (type || 'info');
    const span = document.createElement('span');
    span.textContent = msg || '';
    const x = document.createElement('button');
    x.className = 'x'; x.type = 'button'; x.setAttribute('aria-label','Dismiss');
    x.textContent = '×';
    x.addEventListener('click', () => el.remove());
    el.appendChild(span); el.appendChild(x);
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 220); }, 3800);
  }
  window.Toast = {
    show: toast,
    ok:   (m) => toast(m, 'ok'),
    err:  (m) => toast(m, 'err'),
    info: (m) => toast(m, 'info'),
  };

  // ──── Confirm modal ───────────────────────────────────────────
  let _onOk = null;
  let _lastFocus = null;
  function closeConfirm(){
    modal.classList.remove('open');
    _onOk = null;
    if(_lastFocus && _lastFocus.focus) try { _lastFocus.focus(); } catch(e){}
  }
  okBtn.addEventListener('click', () => { const cb = _onOk; closeConfirm(); if(cb) cb(); });
  cancelBtn.addEventListener('click', closeConfirm);
  modal.addEventListener('click', (e) => { if(e.target === modal) closeConfirm(); });

  function openConfirm(opts){
    titleEl.textContent  = opts.title   || 'Confirm';
    msgEl.textContent    = opts.message || 'Are you sure?';
    okBtn.textContent    = opts.okLabel || 'Confirm';
    cancelBtn.textContent= opts.cancelLabel || 'Cancel';
    okBtn.className = 'ux-btn ' + (opts.danger ? 'danger' : 'primary');
    _onOk = typeof opts.onConfirm === 'function' ? opts.onConfirm : null;
    _lastFocus = document.activeElement;
    modal.classList.add('open');
    setTimeout(() => okBtn.focus(), 40);
  }

  window.UX = {
    confirm: openConfirm,
    toast,
    // Run action only after confirming if dirty
    guard(action){
      if(!window.UX_dirty){ if(typeof action === 'function') action(); return; }
      openConfirm({
        title: 'Discard unsaved changes?',
        message: 'You have edits that have not been saved. Leave anyway?',
        okLabel: 'Discard',
        danger: true,
        onConfirm(){ window.UX_dirty = false; if(typeof action === 'function') action(); }
      });
    },
    markClean(){ window.UX_dirty = false; document.body.classList.remove('ux-dirty'); },
    markDirty(){ window.UX_dirty = true;  document.body.classList.add('ux-dirty'); },
  };

  // ──── Esc closes any open modal (built-in + page modals) ──────
  document.addEventListener('keydown', (e) => {
    if(e.key !== 'Escape') return;
    if(modal.classList.contains('open')){ closeConfirm(); return; }
    document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
      const visible = getComputedStyle(m).display !== 'none' || m.classList.contains('show') || m.classList.contains('open');
      if(!visible) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Backdrop click closes existing page modals ──────────────
  document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
    if(m.__uxBound) return; m.__uxBound = true;
    m.addEventListener('click', (e) => {
      if(e.target !== m) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Auto-track dirty on any [data-track-dirty] container ────
  document.addEventListener('input', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  document.addEventListener('change', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  window.addEventListener('beforeunload', (e) => {
    if(window.UX_dirty){ e.preventDefault(); e.returnValue = ''; }
  });

  // ──── Inline validation helper ────────────────────────────────
  window.UX.validate = function(form){
    let firstInvalid = null;
    form.querySelectorAll('.ux-field-error').forEach(n => n.remove());
    form.querySelectorAll('.ux-invalid').forEach(n => n.classList.remove('ux-invalid'));
    form.querySelectorAll('[required]').forEach(field => {
      const v = (field.value || '').trim();
      let bad = !v;
      if(!bad && field.type === 'email'){
        bad = !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      }
      if(bad){
        field.classList.add('ux-invalid');
        const note = document.createElement('span');
        note.className = 'ux-field-error';
        note.textContent = field.dataset.errorMsg ||
          (field.type === 'email' ? 'Please enter a valid email.' : 'This field is required.');
        if(field.parentNode) field.parentNode.insertBefore(note, field.nextSibling);
        if(!firstInvalid) firstInvalid = field;
      }
    });
    if(firstInvalid){ firstInvalid.focus(); return false; }
    return true;
  };
})();
