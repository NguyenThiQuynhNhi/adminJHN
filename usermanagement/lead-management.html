<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Lead Directory</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        /* ── Shared YUUSHI gold/white design tokens ── */
        --bg-page: #f5f5f5;
        --bg-card: #ffffff;
        --bg-card-warm: #fffaf2;
        --bg-row-hover: #faf6ee;
        --bg-header-soft: #faf6ee;
        --text-primary: #1a1a1a;
        --text-muted: #7a6a5c;
        --text-label: #888;
        --text-link: #8a5a3b;
        --border-default: #e0e0e0;
        --border-warm: #eadccd;
        --border-soft: #f0f0f0;
        --color-primary: #8b7340;
        --color-primary-hover: #6d5a32;
        --color-primary-light: #c9a85c;
        --status-success-text: #2a7a2a;
        --status-success-bg: #d4f0d4;
        --status-warning-text: #c87a2a;
        --status-warning-bg: #fff3d4;
        --status-danger-text: #b23b3b;
        --status-danger-bg: #fbe9e9;
        --status-neutral-text: #666;
        --status-neutral-bg: #e8e8e8;
        --r-sm: 6px;
        --r-md: 8px;
        --r-lg: 12px;
        --r-full: 999px;
        --shadow-card: 0 10px 30px rgba(115, 72, 39, 0.05);
        --shadow-toast: 0 8px 24px rgba(0, 0, 0, 0.3);
        --shadow-modal: 0 18px 50px rgba(59, 47, 42, 0.28);
        --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;

        /* ── Theme variables repointed to the shared palette ── */
        --bg-body: var(--bg-page);
        --border-subtle: var(--border-warm);
        --accent: var(--color-primary);
        --accent-dark: var(--color-primary-hover);
        --text-main: var(--text-primary);
        --badge-green: var(--status-success-text);
        --badge-red: var(--status-danger-text);
        --badge-gray: var(--status-neutral-text);
        --badge-amber: var(--status-warning-text);
        --fs-card-title: 14px;
        --fs-body: 13px;
        --fs-small: 12px;
        --fs-label: 11px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: var(--font-stack);
        background: var(--bg-body);
        color: var(--text-main);
        font-size: var(--fs-body);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .page {
        padding: 24px 32px 32px;
        display: flex;
        gap: 20px;
        min-height: 100vh;
      }
      .sidebar {
        width: 340px;
        background: var(--bg-card);
        border-radius: var(--r-lg);
        border: 1px solid var(--border-subtle);
        padding: 18px;
        height: fit-content;
        box-shadow: var(--shadow-card);
      }
      .main-content {
        flex: 1;
        min-width: 0;
      }
      .card-title {
        font-size: var(--fs-card-title);
        font-weight: 600;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-main);
      }
      .card-title i {
        color: var(--accent);
        font-size: 13px;
        width: 18px;
        text-align: center;
      }

      /* Cards / list surfaces — match the account-management list */
      .card {
        background: var(--bg-card);
        border-radius: var(--r-lg);
        border: 1px solid var(--border-subtle);
        padding: 18px;
        box-shadow: var(--shadow-card);
        margin-bottom: 16px;
      }

      /* Buttons */
      .btn {
        border-radius: var(--r-md);
        border: 1px solid var(--border-subtle);
        padding: 8px 14px;
        font-size: var(--fs-body);
        background: var(--bg-card);
        cursor: pointer;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        font-family: inherit;
        font-weight: 500;
        min-height: 36px;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn:hover {
        background: var(--bg-row-hover);
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        border-color: var(--accent-dark);
        color: #fff;
      }
      .btn-primary:hover {
        background: linear-gradient(
          135deg,
          var(--color-primary-hover),
          var(--color-primary-hover)
        );
      }
      .btn-ghost {
        background: transparent;
        border-color: transparent;
      }
      .btn-ghost:hover {
        background: var(--bg-row-hover);
      }
      .btn-sm {
        padding: 5px 10px;
        font-size: 12px;
        min-height: 30px;
      }

      /* Form controls */
      input,
      select,
      textarea {
        border-radius: var(--r-md);
        border: 1px solid var(--border-subtle);
        padding: 8px 11px;
        font-size: var(--fs-body);
        background: var(--bg-card);
        color: var(--text-main);
        outline: none;
        font-family: inherit;
        width: 100%;
        min-height: 36px;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(139, 115, 64, 0.18);
      }

      /* Filter bar (replicates user / agent management) */
      .filter-bar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 180px), 1fr));
        gap: 10px 12px;
        align-items: end;
      }
      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .field-label {
        font-size: var(--fs-label);
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .number-range {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .number-range input {
        padding: 6px 8px;
      }
      .filter-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      /* Results table */
      .data-table-wrap {
        overflow-x: auto;
      }
      table.data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: var(--fs-small);
      }
      .data-table thead {
        background: var(--bg-header-soft);
      }
      .data-table th,
      .data-table td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border-soft);
        white-space: nowrap;
        vertical-align: middle;
      }
      .data-table th {
        font-weight: 600;
        font-size: var(--fs-label);
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .data-table th.num,
      .data-table td.num {
        text-align: right;
      }
      .data-table tbody tr {
        transition: background 0.12s;
      }
      .data-table tbody tr:hover {
        background: var(--bg-row-hover);
      }

      .results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }
      .results-count {
        font-size: var(--fs-small);
        color: var(--text-muted);
      }
      .results-count strong {
        color: var(--text-main);
      }
      .lead-pager {
        display: flex;
        gap: 6px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .lead-pg-ellipsis {
        padding: 0 4px;
        color: var(--text-muted);
      }
      .btn[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* Badges (full variant set shared with user + agent lists) */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: var(--r-full);
        font-size: 11px;
        font-weight: 600;
        border: 1px solid transparent;
        white-space: nowrap;
      }
      .badge-active,
      .badge-on,
      .badge-normal,
      .badge-verified,
      .badge-paid {
        background: var(--status-success-bg);
        color: var(--status-success-text);
        border-color: var(--status-success-bg);
      }
      .badge-suspended,
      .badge-pending,
      .badge-overdue,
      .badge-warning {
        background: var(--status-warning-bg);
        color: var(--status-warning-text);
        border-color: var(--status-warning-bg);
      }
      .badge-deactivated,
      .badge-none,
      .badge-cancelled {
        background: var(--status-neutral-bg);
        color: var(--status-neutral-text);
        border-color: var(--status-neutral-bg);
      }
      .badge-off,
      .badge-locked,
      .badge-invalid,
      .badge-red {
        background: var(--status-danger-bg);
        color: var(--status-danger-text);
        border-color: var(--status-danger-bg);
      }
      /* Plan / badge accents — distinct styling kept via tokens */
      .badge-premium,
      .badge-gold,
      .badge-top {
        background: var(--status-warning-bg);
        color: var(--color-primary-hover);
        border-color: var(--color-primary-light);
      }
      .badge-silver {
        background: var(--status-neutral-bg);
        color: var(--status-neutral-text);
        border-color: var(--border-default);
      }
      .badge-bronze {
        background: var(--status-warning-bg);
        color: var(--status-warning-text);
        border-color: var(--color-primary-light);
      }

      .star-display {
        color: var(--color-primary-light);
        font-size: 13px;
      }

      /* Alert dot (end-user list) */
      .alert-dot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 24px;
        height: 22px;
        padding: 0 7px;
        border-radius: var(--r-full);
        background: var(--status-danger-bg);
        color: var(--status-danger-text);
        font-size: 11px;
        font-weight: 700;
        gap: 4px;
      }
      .alert-dot.none {
        background: var(--status-success-bg);
        color: var(--status-success-text);
      }

      /* Chat button */
      .btn-chat {
        width: 32px;
        height: 32px;
        border-radius: var(--r-md);
        background: var(--bg-card-warm);
        color: var(--accent);
        border: 1px solid var(--border-warm);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        padding: 0;
      }
      .btn-chat:hover {
        background: var(--accent);
        color: #fff;
      }

      .num {
        text-align: right;
      }
      .hidden {
        display: none !important;
      }

      /* Sidebar group list (kept; recoloured off the green theme) */
      .group-list {
        list-style: none;
        padding: 0;
        margin: 0 0 10px 0;
      }
      .group-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .group-item {
        padding: 11px 12px;
        border-radius: 8px;
        margin-bottom: 4px;
        cursor: pointer;
        font-size: 13.5px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .group-item:hover {
        background: var(--bg-row-hover);
      }
      .group-item.active {
        background: var(--accent);
        color: #fff;
      }
      .group-main {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .group-actions {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
      }
      .group-action-btn {
        width: 24px;
        height: 24px;
        border-radius: var(--r-full);
        border: 1px solid var(--border-default);
        background: var(--bg-card);
        color: var(--text-muted);
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .group-action-btn:hover {
        border-color: var(--color-primary-light);
        background: var(--bg-row-hover);
      }
      .group-item.active .group-action-btn {
        border-color: rgba(255, 255, 255, 0.7);
        background: rgba(255, 255, 255, 0.18);
        color: #ffffff;
      }
      .group-count {
        font-size: 12px;
        color: var(--text-muted);
        margin-left: 6px;
      }

      /* Lead type toggle (kept; recoloured off the green theme) */
      .lead-type-tabs {
        display: flex;
        gap: 8px;
        margin: 8px 0 12px;
      }
      .lead-type-tab {
        flex: 1;
        border-radius: var(--r-md);
        padding: 8px 10px;
        font-size: 13px;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        color: var(--text-muted);
        cursor: pointer;
        font-family: inherit;
      }
      .lead-type-tab.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
        font-size: 14px;
      }
    </style>
    <style id="uxTableOverflowFix">
      /* Table overflow handling: keep text intact, only enable horizontal scroll on narrow viewport */
      @media (max-width: 1199px) {
        table {
          display: block;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
      }
    </style>
    <style id="uxBaselinePolish">
      /* Baseline UI polish — applies only where file CSS doesn't override */
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* Pointer cursor on interactive */
      button,
      .btn,
      [role="button"],
      select,
      input[type="checkbox"],
      input[type="radio"],
      input[type="submit"],
      input[type="button"],
      a[href],
      label[for] {
        cursor: pointer;
      }

      /* Disabled state */
      button:disabled,
      .btn:disabled,
      input:disabled,
      select:disabled,
      textarea:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      /* Focus-visible outline (a11y) */
      button:focus-visible,
      .btn:focus-visible,
      a:focus-visible,
      [role="button"]:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 2px solid var(--color-primary-light);
        outline-offset: 2px;
      }

      /* Inherit font family for form controls (fixes browser-default) */
      input,
      select,
      textarea,
      button {
        font-family: inherit;
      }

      /* Responsive media */
      img,
      svg,
      video {
        max-width: 100%;
        height: auto;
      }

      /* Subtle hover for buttons (only if no transition already set, gentle filter) */
      button:hover:not(:disabled),
      .btn:hover:not(:disabled) {
        filter: brightness(0.96);
        transition: filter 0.15s ease;
      }

      /* Smooth scrollbar on Webkit */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-row-hover);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-primary-light);
        border-radius: var(--r-sm);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-primary);
      }

      /* Selection highlight on-brand */
      ::selection {
        background: var(--color-primary-light);
        color: #fff;
      }

      /* HR baseline */
      hr {
        border: none;
        border-top: 1px solid var(--border-warm);
        margin: 12px 0;
      }

      /* Anchor baseline color matches brand (no underline by default to match flat UI) */
      a {
        color: var(--text-link);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

      function renderGroupList() {
        const ul = document.getElementById("groupList");
        ul.innerHTML = "";
        const groups = getGroups();

        const visibleGroups = groups.filter(
          (g) => g.entityType === currentLeadType,
        );

        visibleGroups.forEach((group) => {
          const li = document.createElement("li");
          li.className = `group-item ${group.id === currentGroupId ? "active" : ""}`;
          li.innerHTML = `
            <div class="group-main">
              ${group.name} <span class="group-count">(${group.leadIds.length})</span>
            </div>
            <div class="group-actions">
              <button type="button" class="group-action-btn" data-action="edit" data-group-id="${group.id}" title="Edit group">✎</button>
              <button type="button" class="group-action-btn" data-action="delete" data-group-id="${group.id}" title="Delete group">🗑</button>
            </div>
          `;
          li.onclick = () => loadGroup(group.id);
          ul.appendChild(li);
        });

        ul.querySelectorAll(".group-action-btn").forEach((btn) => {
          btn.addEventListener("click", (event) => {
            event.stopPropagation();
            const action = btn.getAttribute("data-action");
            const groupId = btn.getAttribute("data-group-id");
            if (!groupId) return;
            if (action === "edit") {
              editGroupName(groupId);
              return;
            }
            if (action === "delete") {
              deleteGroup(groupId);
            }
          });
        });
      }

      function editGroupName(groupId) {
        const groups = getGroups();
        const target = groups.find((g) => g.id === groupId);
        if (!target) return;
        openRenameModal(target.name, (newName) => {
          const trimmed = newName.trim();
          if (!trimmed) return "This field is required.";
          if (trimmed.length > 60)
            return "Group name cannot exceed 60 characters.";
          const dup = getGroups().find(
            (g) =>
              g.entityType === target.entityType &&
              g.id !== groupId &&
              g.name.trim().toLowerCase() === trimmed.toLowerCase(),
          );
          if (dup)
            return "This group name already exists. Please use another one.";
          target.name = trimmed;
          saveGroups(groups);
          renderGroupList();
          if (currentGroupId === groupId) {
            document.getElementById("currentGroupName").textContent =
              target.name;
          }
          Toast.ok("Group renamed successfully.");
          return true;
        });
      }

      function deleteGroup(groupId) {
        const groups = getGroups();
        const target = groups.find((g) => g.id === groupId);
        if (!target) return;

        UX.confirm({
          title: "Delete group?",
          message: `Permanently delete group "${target.name}"? This action cannot be undone.`,
          okLabel: "Delete",
          danger: true,
          onConfirm() {
            performDeleteGroup(groupId);
          },
        });
      }

      function performDeleteGroup(groupId) {
        const groups = getGroups();
        const target = groups.find((g) => g.id === groupId);
        if (!target) return;

        const nextGroups = groups.filter((g) => g.id !== groupId);
        saveGroups(nextGroups);
        Toast.ok("Group deleted successfully.");

        if (currentGroupId === groupId) {
          const replacement = nextGroups.find(
            (g) => g.entityType === currentLeadType,
          );
          if (replacement) {
            loadGroup(replacement.id);
          } else {
            currentGroupId = null;
            renderGroupList();
            document.getElementById("leadFilters").innerHTML = "";
            document.getElementById("leadBody").innerHTML = "";
            document.getElementById("tableHeader").innerHTML = "";
            document.getElementById("resultsCard").style.display = "none";
            document.getElementById("emptyState").style.display = "block";
            document.getElementById("currentGroupName").textContent =
              "Select a group to view leads";
            document.getElementById("groupInfo").textContent = "";
          }
          return;
        }

        renderGroupList();
      }

      function loadGroup(groupId) {
        currentGroupId = groupId;
        renderGroupList();

        const groups = getGroups();
        const group = groups.find((g) => g.id === groupId);
        if (!group) return;

        document.getElementById("currentGroupName").textContent = group.name;

        const allLeads = getLeads();
        const leadsInGroup = allLeads.filter((l) =>
          group.leadIds.includes(String(l.id)),
        );

        currentLeadType = group.entityType;
        currentLeads = leadsInGroup;
        renderFilters(currentLeadType);
        applyFiltersAndRender();
      }

      // Windowed page numbers: up to 7 numbers with ellipsis for skipped ranges.
      function leadPageList(cur, pages) {
        const out = [];
        if (pages <= 7) {
          for (let i = 1; i <= pages; i++) out.push(i);
          return out;
        }
        let s = Math.max(2, cur - 2),
          e = Math.min(pages - 1, cur + 2);
        if (cur <= 4) {
          s = 2;
          e = 5;
        }
        if (cur >= pages - 3) {
          s = pages - 4;
          e = pages - 1;
        }
        out.push(1);
        if (s > 2) out.push("…");
        for (let i = s; i <= e; i++) out.push(i);
        if (e < pages - 1) out.push("…");
        out.push(pages);
        return out;
      }

      let currentLeads = [];

      // ── Pagination (platform standard: 50 rows/page) ──
      const LEAD_PAGE_SIZE = 50;
      let leadPage = 1;
      let lastFiltered = [];
      let lastRenderType = "end_user";

      // Filter logic ported verbatim from the user / agent management list views.
      function applyFiltersAndRender() {
        leadPage = 1; // Apply / Reset / group switch / type switch all reset to page 1
        let filtered = Array.isArray(currentLeads) ? [...currentLeads] : [];

        if (currentLeadType === "end_user") {
          const st = getSel("fStatus"),
            bs = getSel("fBuyerStatus"),
            ap = getSel("fAuthProvider"),
            pl = getSel("fPlan"),
            rc = getSel("fResidentCountry");
          const regF = fldVal("fRegFrom"),
            regT = fldVal("fRegTo"),
            lgF = fldVal("fLoginFrom"),
            lgT = fldVal("fLoginTo"),
            sF = fldVal("fSupportFrom"),
            sT = fldVal("fSupportTo");
          const fMin = fldVal("fFailMin"),
            fMax = fldVal("fFailMax"),
            fThr = fldVal("fFailThreshold");
          const bMin = fldVal("fBudgetMin"),
            bMax = fldVal("fBudgetMax");
          const inRange = (d, f, t) => {
            if (!d) return !f && !t;
            const x = new Date(String(d).split(" ")[0]);
            if (f && x < new Date(f)) return false;
            if (t && x > new Date(t)) return false;
            return true;
          };
          filtered = filtered.filter((l) => {
            const fl = Number(l.failedLogins) || 0;
            if (st.length && !st.includes(l.status)) return false;
            if (bs.length && !bs.includes(l.buyerStatus)) return false;
            if (ap.length && !ap.includes(l.authProvider)) return false;
            if (pl.length && !pl.includes(l.plan)) return false;
            if (rc.length && !rc.includes(l.residentCountry)) return false;
            if ((regF || regT) && !inRange(l.regDate, regF, regT)) return false;
            if ((lgF || lgT) && !inRange(l.lastLogin, lgF, lgT)) return false;
            if ((sF || sT) && !inRange(l.lastSupport, sF, sT)) return false;
            if (fMin !== "" && fl < +fMin) return false;
            if (fMax !== "" && fl > +fMax) return false;
            if (fThr === "0" && fl !== 0) return false;
            if (fThr === "1-4" && (fl < 1 || fl > 4)) return false;
            if (fThr === "5+" && fl < 5) return false;
            if (bMin !== "" && (Number(l.budgetMax) || 0) < +bMin) return false;
            if (bMax !== "" && (Number(l.budgetMin) || 0) > +bMax) return false;
            return true;
          });
        } else {
          const st = getSel("fStatus"),
            pl = getSel("fPlan"),
            sa = getSel("fServiceArea"),
            lg = getSel("fLanguage"),
            sp = getSel("fSpecialism");
          const lF = fldVal("fLicFrom"),
            lT = fldVal("fLicTo"),
            lP = fldVal("fLicPreset");
          const rrMin = fldVal("fRrMin"),
            rrMax = fldVal("fRrMax"),
            rt = fldVal("fRespTime");
          const up = fldVal("fUnpaid");
          const vMin = fldVal("fVioMin"),
            vMax = fldVal("fVioMax"),
            vP = fldVal("fVioPreset");
          const liMin = fldVal("fListMin"),
            liMax = fldVal("fListMax");
          const apv = fldVal("fAppraisal"),
            bMin = fldVal("fBudgetMin"),
            bMax = fldVal("fBudgetMax");
          const respHours = (s) => {
            const m = String(s).match(/(\d+(?:\.\d+)?)/);
            return m ? parseFloat(m[1]) : null;
          };
          const today = new Date();
          const DAY = 1000 * 60 * 60 * 24;
          filtered = filtered.filter((l) => {
            const targetCities =
              l.targetCities || (l.primaryCity ? [l.primaryCity] : []);
            const languages = l.languages || [];
            const specServices = l.specServices || [];
            const reports = Number(l.totalReports) || 0;
            if (st.length && !st.includes(l.status)) return false;
            if (pl.length && !pl.includes(l.subscriptionPlan)) return false;
            if (sa.length && !sa.some((c) => targetCities.includes(c)))
              return false;
            if (lg.length && !lg.some((x) => languages.includes(x)))
              return false;
            if (sp.length && !sp.some((x) => specServices.includes(x)))
              return false;
            if (lF && new Date(l.licExpiry) < new Date(lF)) return false;
            if (lT && new Date(l.licExpiry) > new Date(lT)) return false;
            if (lP === "expired" && new Date(l.licExpiry) >= today)
              return false;
            if (lP === "30d") {
              const d = (new Date(l.licExpiry) - today) / DAY;
              if (d < 0 || d > 30) return false;
            }
            if (lP === "60d") {
              const d = (new Date(l.licExpiry) - today) / DAY;
              if (d < 0 || d > 60) return false;
            }
            if (lP === "90d") {
              const d = (new Date(l.licExpiry) - today) / DAY;
              if (d < 0 || d > 90) return false;
            }
            if (rrMin !== "" && (Number(l.responseRate) || 0) < +rrMin)
              return false;
            if (rrMax !== "" && (Number(l.responseRate) || 0) > +rrMax)
              return false;
            if (rt) {
              const h = respHours(l.avgRespTime);
              if (h === null) return false;
              if (rt === "2" && h > 2) return false;
              if (rt === "24" && h > 24) return false;
              if (rt === "over" && h <= 24) return false;
            }
            if (
              up === "Has Outstanding Balance" &&
              (Number(l.outstanding) || 0) <= 0
            )
              return false;
            if (up === "Overdue" && l.paymentStatus !== "Overdue") return false;
            if (
              up === "No Issues" &&
              ((Number(l.outstanding) || 0) > 0 ||
                l.paymentStatus === "Overdue")
            )
              return false;
            if (vMin !== "" && reports < +vMin) return false;
            if (vMax !== "" && reports > +vMax) return false;
            if (vP === "0" && reports !== 0) return false;
            if (vP === "1-2" && (reports < 1 || reports > 2)) return false;
            if (vP === "3-5" && (reports < 3 || reports > 5)) return false;
            if (vP === "5+" && reports < 5) return false;
            if (liMin !== "" && (Number(l.activeListings) || 0) < +liMin)
              return false;
            if (liMax !== "" && (Number(l.activeListings) || 0) > +liMax)
              return false;
            if (
              apv === "Participating" &&
              (Number(l.appraisalBudget) || 0) <= 0
            )
              return false;
            if (
              apv === "Not Participating" &&
              (Number(l.appraisalBudget) || 0) > 0
            )
              return false;
            if (bMin !== "" && (Number(l.appraisalRemaining) || 0) < +bMin)
              return false;
            if (bMax !== "" && (Number(l.appraisalRemaining) || 0) > +bMax)
              return false;
            return true;
          });
        }

        renderLeadTable(filtered, currentLeadType);
      }
      window.applyFiltersAndRender = applyFiltersAndRender;

      // ──────────── Create-group modal ────────────
      (function setupCreateGroupModal() {
        const modal = document.createElement("div");
        modal.className = "ux-modal";
        modal.id = "groupCreateModal";
        modal.setAttribute("role", "dialog");
        modal.setAttribute("aria-modal", "true");
        modal.innerHTML = `
          <div class="ux-modal-box">
            <h3>Create new group</h3>
            <div style="margin-bottom:14px">
              <label style="display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:600">Group name <span style="color:var(--status-danger-text)">*</span></label>
              <input id="createGroupInput" type="text" placeholder="e.g. VIP Buyers — Tokyo" style="width:100%;padding:8px 11px;border:1px solid var(--border-default);border-radius:var(--r-md);font-size:13px;font-family:inherit;background:var(--bg-card)" autocomplete="off" />
              <span class="ux-field-error" id="createGroupError" style="display:none"></span>
            </div>
            <div style="margin-bottom:18px">
              <label style="display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:600">For</label>
              <div id="createGroupTypeLabel" style="font-size:13px;font-weight:600;color:var(--text-primary)">—</div>
            </div>
            <div class="ux-modal-actions">
              <button type="button" class="ux-btn" id="createGroupCancel">Cancel</button>
              <button type="button" class="ux-btn primary" id="createGroupConfirm">Create group</button>
            </div>
          </div>`;
        document.body.appendChild(modal);

        const input = modal.querySelector("#createGroupInput");
        const err = modal.querySelector("#createGroupError");
        const typeLbl = modal.querySelector("#createGroupTypeLabel");
        const cancelBtn = modal.querySelector("#createGroupCancel");
        const confirmBtn = modal.querySelector("#createGroupConfirm");
        let _type = "end_user";

        function close() {
          modal.classList.remove("open");
          input.value = "";
          input.classList.remove("ux-invalid");
          err.style.display = "none";
        }
        function showError(msg) {
          err.textContent = msg;
          err.style.display = "block";
          input.classList.add("ux-invalid");
          input.focus();
        }
        function tryConfirm() {
          const trimmed = input.value.trim();
          if (!trimmed) return showError("This field is required.");
          if (trimmed.length > 60)
            return showError("Group name cannot exceed 60 characters.");
          const dup = getGroups().find(
            (g) =>
              g.entityType === _type &&
              g.name.trim().toLowerCase() === trimmed.toLowerCase(),
          );
          if (dup)
            return showError(
              "This group name already exists. Please use another one.",
            );
          close();
          createGroupWithName(trimmed, _type);
        }

        cancelBtn.addEventListener("click", close);
        confirmBtn.addEventListener("click", tryConfirm);
        modal.addEventListener("click", (e) => {
          if (e.target === modal) close();
        });
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            tryConfirm();
          }
          if (e.key === "Escape") close();
        });
        input.addEventListener("input", () => {
          err.style.display = "none";
          input.classList.remove("ux-invalid");
        });

        window.openCreateGroupModal = function (type) {
          _type = type || "end_user";
          typeLbl.textContent = _type === "agent" ? "Agent" : "End User";
          input.value = "";
          input.classList.remove("ux-invalid");
          err.style.display = "none";
          modal.classList.add("open");
          setTimeout(() => input.focus(), 30);
        };
      })();

      // ──────────── Rename modal (replaces prompt) ────────────
      (function setupRenameModal() {
        const modal = document.createElement("div");
        modal.className = "ux-modal";
        modal.id = "groupRenameModal";
        modal.setAttribute("role", "dialog");

    <script>
      (function () {
        if (window.UX) return; // idempotent
        const wrap = document.getElementById("uxToastWrap");
        const modal = document.getElementById("uxConfirmModal");
        const titleEl = document.getElementById("uxConfirmTitle");
        const msgEl = document.getElementById("uxConfirmMsg");
        const okBtn = document.getElementById("uxConfirmOk");
        const cancelBtn = document.getElementById("uxConfirmCancel");

        // ──── Toast ────────────────────────────────────────────────────
        function toast(msg, type) {
          if (!wrap) return;
          const el = document.createElement("div");
          el.className = "ux-toast " + (type || "info");
          const span = document.createElement("span");
          span.textContent = msg || "";
          const x = document.createElement("button");
          x.className = "x";
          x.type = "button";
          x.setAttribute("aria-label", "Dismiss");
          x.textContent = "×";
          x.addEventListener("click", () => el.remove());
          el.appendChild(span);
          el.appendChild(x);
          wrap.appendChild(el);
          setTimeout(() => {
            el.style.opacity = "0";
            setTimeout(() => el.remove(), 220);
          }, 3800);
        }
        window.Toast = {
          show: toast,
          ok: (m) => toast(m, "ok"),
          err: (m) => toast(m, "err"),
          info: (m) => toast(m, "info"),
        };

        // ──── Confirm modal ───────────────────────────────────────────
        let _onOk = null;
        let _lastFocus = null;
        function closeConfirm() {
          modal.classList.remove("open");
          _onOk = null;
          if (_lastFocus && _lastFocus.focus)
            try {
              _lastFocus.focus();
            } catch (e) {}
        }
        okBtn.addEventListener("click", () => {
          const cb = _onOk;
          closeConfirm();
          if (cb) cb();
        });
        cancelBtn.addEventListener("click", closeConfirm);
        modal.addEventListener("click", (e) => {
          if (e.target === modal) closeConfirm();
        });

        function openConfirm(opts) {
          titleEl.textContent = opts.title || "Confirm";
          msgEl.textContent = opts.message || "Are you sure?";
          okBtn.textContent = opts.okLabel || "Confirm";
          cancelBtn.textContent = opts.cancelLabel || "Cancel";
          okBtn.className = "ux-btn " + (opts.danger ? "danger" : "primary");
          _onOk = typeof opts.onConfirm === "function" ? opts.onConfirm : null;
          _lastFocus = document.activeElement;
          modal.classList.add("open");
          setTimeout(() => okBtn.focus(), 40);
        }

        window.UX = {
          confirm: openConfirm,
          toast,
          // Run action only after confirming if dirty
          guard(action) {
            if (!window.UX_dirty) {
              if (typeof action === "function") action();
              return;
            }
            openConfirm({
              title: "Discard unsaved changes?",
              message: "You have edits that have not been saved. Leave anyway?",
              okLabel: "Discard",
              danger: true,
              onConfirm() {
                window.UX_dirty = false;
                if (typeof action === "function") action();
              },
            });
          },
          markClean() {
            window.UX_dirty = false;
            document.body.classList.remove("ux-dirty");
          },
          markDirty() {
            window.UX_dirty = true;
            document.body.classList.add("ux-dirty");
          },
        };

        // ──── Esc closes any open modal (built-in + page modals) ──────
        document.addEventListener("keydown", (e) => {
          if (e.key !== "Escape") return;
          if (modal.classList.contains("open")) {
            closeConfirm();
            return;
          }
          document
            .querySelectorAll(".modal-backdrop, .modal-overlay")
            .forEach((m) => {
              const visible =
                getComputedStyle(m).display !== "none" ||
                m.classList.contains("show") ||
                m.classList.contains("open");
              if (!visible) return;
              m.classList.remove("open", "show", "active");
              m.style.display = "none";
            });
        });

        // ──── Backdrop click closes existing page modals ──────────────
        document
          .querySelectorAll(".modal-backdrop, .modal-overlay")
          .forEach((m) => {
            if (m.__uxBound) return;
            m.__uxBound = true;
            m.addEventListener("click", (e) => {
              if (e.target !== m) return;
              m.classList.remove("open", "show", "active");
              m.style.display = "none";
            });
          });

        // ──── Auto-track dirty on any [data-track-dirty] container ────
        document.addEventListener("input", (e) => {
          if (e.target.closest("[data-track-dirty]")) UX.markDirty();
        });
        document.addEventListener("change", (e) => {
          if (e.target.closest("[data-track-dirty]")) UX.markDirty();

          if (window.UX_dirty) {

            e.returnValue = "";

        window.UX.validate = function (form) {
          let firstInvalid = null;
          form.querySelectorAll(".ux-field-error").forEach((n) => n.remove());
          form
            .querySelectorAll(".ux-invalid")
            .forEach((n) => n.classList.remove("ux-invalid"));
          form.querySelectorAll("[required]").forEach((field) => {
            const v = (field.value || "").trim();
            let bad = !v;
            if (!bad && field.type === "email") {
              bad = !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
            }
            if (bad) {
              field.classList.add("ux-invalid");
              const note = document.createElement("span");
              note.className = "ux-field-error";
              note.textContent =
                field.dataset.errorMsg ||
                (field.type === "email"
                  ? "Please enter a valid email."
                  : "This field is required.");
              if (field.parentNode)
                field.parentNode.insertBefore(note, field.nextSibling);
              if (!firstInvalid) firstInvalid = field;
            }
          });
          if (firstInvalid) {
            firstInvalid.focus();
            return false;
          }
          return true;
        };
