<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Lead Directory</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f3ef;
        color: #2a2118;
      }
      .page {
        padding: 24px 32px 32px;
        display: flex;
        gap: 20px;
        min-height: 100vh;
      }

      .sidebar {
        width: 300px;
        background: #fffaf2;
        border-radius: 12px;
        border: 1px solid #eadccd;
        padding: 18px;
        height: fit-content;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
      }

      .main-content {
        flex: 1;
        background: #fffaf2;
        border-radius: 12px;
        border: 1px solid #eadccd;
        padding: 20px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
      }

      .card-title {
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 14px;
        color: #2a2118;
      }

      .btn {
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-primary {
        background: #3a6b3c;
        color: white;
        border: none;
      }
      .btn-secondary {
        background: #f7efe4;
        color: #6a5641;
        border: 1px solid #ddcdb9;
      }

      .new-group input,
      .new-group select {
        width: 100%;
        padding: 9px 12px;
        margin-bottom: 8px;
        border-radius: 999px;
        border: 1px solid #ddcdb9;
        font-size: 13px;
        background: #fdf8f0;
      }

      .group-list {
        list-style: none;
        padding: 0;
        margin: 0 0 10px 0;
      }
      .group-item {
        padding: 11px 14px;
        border-radius: 8px;
        margin-bottom: 4px;
        cursor: pointer;
        font-size: 13.5px;
        transition: all 0.2s;
      }
      .group-item:hover {
        background: #f0e6d8;
      }
      .group-item.active {
        background: #3a6b3c;
        color: white;
      }

      .filters-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
        align-items: flex-end;
      }
      .filter-item {
        min-width: 150px;
      }
      .filter-item label {
        display: block;
        font-size: 11px;
        margin-bottom: 4px;
        color: #7c6a55;
      }
      .filter-item input,
      .filter-item select {
        width: 100%;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid #ddcdb9;
        font-size: 12px;
        background: #fdf8f0;
      }
      .filter-actions {
        margin-left: auto;
      }

      .lead-type-tabs {
        display: flex;
        gap: 8px;
        margin: 8px 0 12px;
      }
      .lead-type-tab {
        flex: 1;
        border-radius: 999px;
        padding: 7px 10px;
        font-size: 13px;
        border: 1px solid #ddcdb9;
        background: #fdf8f0;
        color: #6a5641;
        cursor: pointer;
      }
      .lead-type-tab.active {
        background: #3a6b3c;
        color: #ffffff;
        border-color: #3a6b3c;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead {
        background: #f1e4d4;
      }
      th,
      td {
        padding: 11px 9px;
        border-bottom: 1px solid #efe2d3;
        text-align: left;
      }
      .lead-name {
        font-weight: 500;
      }

      .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: #7c6a55;
        font-size: 14px;
      }

      .group-count {
        font-size: 12px;
        color: #7c6a55;
        margin-left: 6px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <!-- Sidebar: Groups -->
      <div class="sidebar">
        <div class="card-title">Lead Management</div>

        <div class="new-group">
          <input id="newGroupName" type="text" placeholder="Find Group name" />
          <div class="lead-type-tabs">
            <button
              type="button"
              class="lead-type-tab active"
              data-type="end_user"
            >
              End User
            </button>
            <button type="button" class="lead-type-tab" data-type="agent">
              Agent
            </button>
          </div>
          <input id="newGroupType" type="hidden" value="end_user" />
          <button
            class="btn btn-primary"
            id="createNewGroupBtn"
            style="width: 100%"
          >
            + Create New Group
          </button>
        </div>

        <div style="margin-top: 24px">
          <div class="card-title" style="font-size: 15px">Existing Groups</div>
          <ul id="groupList" class="group-list"></ul>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <div id="groupHeader" style="margin-bottom: 20px">
          <h2 id="currentGroupName" style="margin: 0 0 6px 0; font-size: 20px">
            Select a group to view leads
          </h2>
          <p id="groupInfo" style="margin: 0; color: #7c6a55"></p>
        </div>

        <div id="leadFilters"></div>

        <table id="leadTable">
          <thead id="tableHeader"></thead>
          <tbody id="leadBody"></tbody>
        </table>

        <div id="emptyState" class="empty-state">
          No leads in this group yet.<br />Please select a group.
        </div>
      </div>
    </div>

      const seedGroups = [

      function getLeads() {
        if (!localStorage.getItem(LEAD_KEY)) {
          localStorage.setItem(LEAD_KEY, JSON.stringify(seedLeads));
        }
        return JSON.parse(localStorage.getItem(LEAD_KEY));
      }

      function getGroups() {
        if (!localStorage.getItem(GROUP_KEY)) {
          localStorage.setItem(GROUP_KEY, JSON.stringify(seedGroups));
        }
        return JSON.parse(localStorage.getItem(GROUP_KEY));
      }

      function saveGroups(groups) {
        localStorage.setItem(GROUP_KEY, JSON.stringify(groups));
      }

      function renderGroupList() {
        const ul = document.getElementById("groupList");
        ul.innerHTML = "";
        const groups = getGroups();

        const visibleGroups = groups.filter(
          (g) => g.entityType === currentLeadType,
        );

        visibleGroups.forEach((group) => {
          const li = document.createElement("li");
          li.className = `group-item ${group.id === currentGroupId ? "active" : ""}`;
          li.innerHTML = `${group.name} <span class="group-count">(${group.leadIds.length})</span>`;
          li.onclick = () => loadGroup(group.id);
          ul.appendChild(li);
        });
      }

      function loadGroup(groupId) {
        currentGroupId = groupId;
        renderGroupList();

        const groups = getGroups();
        const group = groups.find((g) => g.id === groupId);
        if (!group) return;

        document.getElementById("currentGroupName").textContent = group.name;

        const allLeads = getLeads();
        const leadsInGroup = allLeads.filter((l) =>
          group.leadIds.includes(String(l.id)),
        );

        currentLeadType = group.entityType;
        currentLeads = leadsInGroup;
        renderFilters(currentLeadType);
        applyFiltersAndRender();
      }

      function extractCountry(location) {
        if (!location) return "-";
        const parts = String(location).split(",");
        const last = parts[parts.length - 1].trim();
        return last || String(location).trim();
      }

      function renderLeadTable(leads, type) {
        const tbody = document.getElementById("leadBody");
        const thead = document.getElementById("tableHeader");
        const empty = document.getElementById("emptyState");

        tbody.innerHTML = "";

        if (leads.length === 0) {
          empty.style.display = "block";
          thead.innerHTML = "";
          return;
        }

        empty.style.display = "none";

        if (type === "end_user") {
          // Match the End User Management table structure
          thead.innerHTML = `
          <tr>
            <th>User</th>
            <th>Buyer status</th>
            <th>Nation</th>
            <th>Status</th>
            <th>Last active</th>
            <th>Logins</th>
            <th>Avg session (min)</th>
            <th>Saved searches</th>
            <th>Saved properties</th>
            <th>Appraisals</th>
            <th>Alerts</th>
            <th>Chat</th>
          </tr>
        `;
          leads.forEach((l) => {
            const name = l.name || "-";
            const email = l.email || "";
            const buyerStatus = l.buyerStatus || "-";
            const nation = extractCountry(l.location);
            const status = l.status || "-";
            const lastActive = l.lastActive || "-";
            const loginCount =
              typeof l.loginCount === "number" ? l.loginCount : "-";
            const avgSession =
              typeof l.avgSessionMinutes === "number"
                ? l.avgSessionMinutes
                : "-";
            const savedSearches =
              typeof l.savedSearchCount === "number" ? l.savedSearchCount : 0;
            const savedProperties =
              typeof l.savedPropertyCount === "number"
                ? l.savedPropertyCount
                : 0;
            const appraisals =
              typeof l.appraisalFormCount === "number"
                ? l.appraisalFormCount
                : 0;
            const alerts = (l.alerts || []).join(" | ") || "-";

            const tr = document.createElement("tr");
            tr.innerHTML = `
            <td class="lead-name">${name}<br><small>${email}</small></td>
            <td>${buyerStatus}</td>
            <td>${nation}</td>
            <td>${status}</td>
            <td>${lastActive}</td>
            <td>${loginCount}</td>
            <td>${avgSession}</td>
            <td>${savedSearches}</td>
            <td>${savedProperties}</td>
            <td>${appraisals}</td>
            <td>${alerts}</td>
            <td>
              —
            </td>
          `;
            tbody.appendChild(tr);
          });
        } else {
          // Match the Agent Management table structure
          thead.innerHTML = `
          <tr>
            <th>Agency</th>
            <th>Primary city</th>
            <th>Established date</th>
            <th>Head office address</th>
            <th>Badge</th>
            <th>Rating</th>
            <th>Reviews</th>
            <th>Sales (12m)</th>
            <th>Active listings</th>
            <th>Members</th>
            <th>Plan</th>
            <th>Chat</th>
          </tr>
        `;
          leads.forEach((l) => {
            const agency = l.name || "-";
            const primaryCity = l.primaryCity || "-";
            const establishedDate = l.establishedDate || l.createdDate || "-";
            const headOffice = l.headOfficeAddress || "-";
            const badge = l.badge || "—";
            const rating =
              typeof l.averageRating === "number" ? l.averageRating : "-";
            const reviews =
              typeof l.totalReviews === "number" ? l.totalReviews : "-";
            const sales12m =
              typeof l.salesLast12Months === "number"
                ? l.salesLast12Months
                : "-";
            const activeListings =
              typeof l.activeListings === "number" ? l.activeListings : 0;
            const members =
              typeof l.totalMembersCount === "number"
                ? l.totalMembersCount
                : "-";
            const plan = l.subscriptionPlan || "-";

            const tr = document.createElement("tr");
            tr.innerHTML = `
            <td>${agency}</td>
            <td>${primaryCity}</td>
            <td>${establishedDate}</td>
            <td>${headOffice}</td>
            <td>${badge}</td>
            <td>${rating}</td>
            <td>${reviews}</td>
            <td>${sales12m}</td>
            <td>${activeListings}</td>
            <td>${members}</td>
            <td>${plan}</td>
            <td>—</td>
          `;
            tbody.appendChild(tr);
          });

      function renderFilters(type) {
        const container = document.getElementById("leadFilters");
        if (!container) return;

        if (type === "end_user") {
          container.innerHTML = `
            <div class="filters-row">
              <div class="filter-item">
                <label for="filterStatus">Status</label>
                <select id="filterStatus">
                  <option value="">All</option>
                  <option value="Active">Active</option>
                  <option value="Suspended">Suspended</option>
                </select>
              </div>
              <div class="filter-item">
                <label for="filterBuyerStatus">Buyer status</label>
                <select id="filterBuyerStatus">
                  <option value="">All</option>
                  <option value="First-time buyer">First-time buyer</option>
                  <option value="Investor">Investor</option>
                  <option value="Repeat buyer">Repeat buyer</option>
                </select>
              </div>
              <div class="filter-item">
                <label for="filterNation">Nation</label>
                <input
                  id="filterNation"
                  type="text"
                  placeholder="e.g. Vietnam"
                />
              </div>
              <div class="filter-item">
                <label for="filterAlerts">Alerts</label>
                <select id="filterAlerts">
                  <option value="">All</option>
                  <option value="has">Has alerts</option>
                  <option value="none">No alerts</option>
                </select>
              </div>
              <div class="filter-actions">
                <button class="btn btn-secondary" id="resetFiltersBtn">
                  Reset
                </button>
              </div>
            </div>
          `;
        } else {
          container.innerHTML = `
            <div class="filters-row">
              <div class="filter-item">
                <label for="filterBadge">Badge</label>
                <select id="filterBadge">
                  <option value="">All</option>
                  <option value="TOP Agent">TOP Agent</option>
                  <option value="Premium Agent">Premium Agent</option>
                </select>
              </div>
              <div class="filter-item">
                <label for="filterPlan">Plan</label>
                <select id="filterPlan">
                  <option value="">All</option>
                  <option value="Premium Agent">Premium Agent</option>
                  <option value="Standard Agent">Standard Agent</option>
                </select>
              </div>
              <div class="filter-item">
                <label for="filterCity">Primary city</label>
                <input
                  id="filterCity"
                  type="text"
                  placeholder="e.g. Tokyo"
                />
              </div>
              <div class="filter-item">
                <label for="filterMinRating">Min rating</label>
                <input
                  id="filterMinRating"
                  type="number"
                  step="0.1"
                  min="0"
                  max="5"
                  placeholder="e.g. 4.5"
                />
              </div>
              <div class="filter-actions">
                <button class="btn btn-secondary" id="resetFiltersBtn">
                  Reset
                </button>
              </div>
            </div>
          `;
        }

        const inputs = container.querySelectorAll("input, select");
        inputs.forEach((el) => {
          const eventName = el.tagName === "SELECT" ? "change" : "input";
          el.addEventListener(eventName, () => {
            applyFiltersAndRender();
          });
        });

        const resetBtn = document.getElementById("resetFiltersBtn");
        if (resetBtn) {
          resetBtn.addEventListener("click", () => {
            inputs.forEach((el) => {
              if ("value" in el) {
                el.value = "";
              }
            });
            applyFiltersAndRender();
          });
        }
      }

      let currentLeads = [];

      function applyFiltersAndRender() {
        let filtered = Array.isArray(currentLeads) ? [...currentLeads] : [];

        if (currentLeadType === "end_user") {
          const statusEl = document.getElementById("filterStatus");
          const buyerStatusEl = document.getElementById("filterBuyerStatus");
          const nationEl = document.getElementById("filterNation");
          const alertsEl = document.getElementById("filterAlerts");

          const status = statusEl ? statusEl.value : "";
          const buyerStatus = buyerStatusEl ? buyerStatusEl.value : "";
          const nation = nationEl ? nationEl.value.trim().toLowerCase() : "";
          const alerts = alertsEl ? alertsEl.value : "";

          if (status) {
            filtered = filtered.filter((l) => (l.status || "") === status);
          }
          if (buyerStatus) {
            filtered = filtered.filter(
              (l) => (l.buyerStatus || "") === buyerStatus,
            );
          }
          if (nation) {
            filtered = filtered.filter((l) => {
              const n = extractCountry(l.location).toLowerCase();
              return n.includes(nation);
            });
          }
          if (alerts === "has") {
            filtered = filtered.filter(
              (l) => Array.isArray(l.alerts) && l.alerts.length > 0,
            );
          } else if (alerts === "none") {
            filtered = filtered.filter(
              (l) => !Array.isArray(l.alerts) || l.alerts.length === 0,
            );
          }
        } else {
          const badgeEl = document.getElementById("filterBadge");
          const planEl = document.getElementById("filterPlan");
          const cityEl = document.getElementById("filterCity");
          const minRatingEl = document.getElementById("filterMinRating");

          const badge = badgeEl ? badgeEl.value : "";
          const plan = planEl ? planEl.value : "";
          const city = cityEl ? cityEl.value.trim().toLowerCase() : "";
          const minRating = minRatingEl ? parseFloat(minRatingEl.value) : NaN;

          if (badge) {
            filtered = filtered.filter((l) => (l.badge || "") === badge);
          }
          if (plan) {
            filtered = filtered.filter(
              (l) => (l.subscriptionPlan || "") === plan,
            );
          }
          if (city) {
            filtered = filtered.filter((l) => {
              const c = (l.primaryCity || "").toLowerCase();
              return c.includes(city);
            });
          }
          if (!isNaN(minRating)) {
            filtered = filtered.filter((l) => {
              const r =
                typeof l.averageRating === "number" ? l.averageRating : 0;
              return r >= minRating;
            });
          }
        }

        renderLeadTable(filtered, currentLeadType);
      }

      // Create new group
      document
        .getElementById("createNewGroupBtn")
        .addEventListener("click", () => {
          const name = document.getElementById("newGroupName").value.trim();
          const type = document.getElementById("newGroupType").value;

          if (!name) {
            alert("Please enter a group name!");
            return;
          }

          const groups = getGroups();
          const newGroup = {
            id: "group_" + Date.now(),
            name: name,
            entityType: type,
            leadIds: [],
            createdDate: new Date().toISOString().slice(0, 10),
          };

          groups.push(newGroup);
          saveGroups(groups);

          document.getElementById("newGroupName").value = "";
          renderGroupList();
          loadGroup(newGroup.id);

          alert(`Group "${name}" created successfully!`);
        });

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        getLeads();
        getGroups();

        // Setup lead type tabs
        const tabs = document.querySelectorAll(".lead-type-tab");
        tabs.forEach((tab) => {
          tab.addEventListener("click", () => {
            const selectedType = tab.getAttribute("data-type");
            if (!selectedType || selectedType === currentLeadType) return;

            currentLeadType = selectedType;

            // Update active tab
            tabs.forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");

            // Sync hidden input used for group creation
            const hiddenTypeInput = document.getElementById("newGroupType");
            if (hiddenTypeInput) {
              hiddenTypeInput.value = currentLeadType;
            }

            // Reset current group selection when switching type
            currentGroupId = null;
            renderGroupList();

            const allGroups = getGroups();
            const groupsForType = allGroups.filter(
              (g) => g.entityType === currentLeadType,
            );
            if (groupsForType.length > 0) {
              loadGroup(groupsForType[0].id);
            } else {
              document.getElementById("leadBody").innerHTML = "";
              document.getElementById("tableHeader").innerHTML = "";
              document.getElementById("emptyState").style.display = "block";
              document.getElementById("currentGroupName").textContent =
                "Select a group to view leads";
              document.getElementById("groupInfo").textContent = "";
            }
          });
        });

        renderGroupList();

        // Auto-load first group for initial type so sample data is visible
        const allGroups = getGroups();
        const initialGroups = allGroups.filter(
          (g) => g.entityType === currentLeadType,
        );
        if (initialGroups.length > 0) {
          loadGroup(initialGroups[0].id);
        }
      });
    </script>
  </body>
</html>
