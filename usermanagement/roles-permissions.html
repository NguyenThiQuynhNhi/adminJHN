<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Roles &amp; Permissions</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f3ef;
        color: #2a2118;
      }

      .page {
        padding: 24px 32px 32px;
      }

      .page-header {
        margin-bottom: 18px;
      }

      .page-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .page-subtitle {
        font-size: 13px;
        color: #7c6a55;
        max-width: 720px;
      }

      .pill {
        margin-top: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        background: #efe3cf;
        color: #7b623f;
        display: inline-block;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(0, 2.5fr);
        gap: 18px;
      }

      .card {
        background: #fffaf2;
        border-radius: 10px;
        border: 1px solid #eadccd;
        padding: 16px 18px 18px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      }

      .card-header {
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 15px;
        font-weight: 600;
      }

      .card-subtitle {
        font-size: 12px;
        color: #7c6a55;
      }

      .role-list {
        max-height: 380px;
        overflow: auto;
        margin-top: 6px;
      }

      .role-item {
        padding: 8px 9px;
        border-radius: 8px;
        border: 1px solid transparent;
        cursor: pointer;
        margin-bottom: 6px;
      }

      .role-item-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
      }

      .role-actions {
        display: inline-flex;
        gap: 4px;
      }

      .icon-btn {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        border: 1px solid #ddcdb9;
        background: #fdf8f0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
      }

      .icon-btn:hover {
        background: #efe3cf;
      }

      .icon-btn svg {
        width: 13px;
        height: 13px;
        stroke: #6a5641;
      }

      .role-item:hover {
        background: #f6ede0;
      }

      .role-item.active {
        border-color: #c49b63;
        background: #f0e0c9;
      }

      .role-name {
        font-size: 13px;
        font-weight: 600;
      }

      .role-meta {
        font-size: 11px;
        color: #7c6a55;
        margin-top: 2px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 10px;
        background: #efe3cf;
        color: #7b623f;
        margin-top: 4px;
      }

      .btn {
        border-radius: 999px;
        border: none;
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .btn-primary {
        background: #3a6b3c;
        color: #fff;
      }

      .btn-secondary {
        background: #f7efe4;
        color: #6a5641;
        border: 1px solid #ddcdb9;
      }

      .btn-sm {
        padding: 4px 10px;
        font-size: 11px;
      }

      .permission-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 6px;
        font-size: 11px;
      }

      .permission-table th,
      .permission-table td {
        border-bottom: 1px solid #efe2d3;
        padding: 6px 5px;
        text-align: left;
      }

      .permission-table thead {
        background: #f1e4d4;
      }

      .perm-scope {
        font-weight: 600;
        color: #6b5032;
      }

      .perm-desc {
        font-size: 11px;
        color: #7c6a55;
        margin-top: 2px;
      }

      .matrix-cell {
        text-align: center;
      }

      .matrix-indicator {
        display: inline-flex;
        width: 18px;
        height: 18px;
        border-radius: 6px;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        border: 1px solid #c9b79f;
        background: #fff;
        cursor: pointer;
      }

      .matrix-indicator.active {
        background: #3a6b3c;
        color: #fff;
        border-color: #3a6b3c;
      }

      .assignment-list {
        margin-top: 6px;
        max-height: 190px;
        overflow: auto;
      }

      .assignment-item {
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid #eadccd;
        margin-bottom: 6px;
      }

      .assignment-name {
        font-size: 12px;
        font-weight: 500;
      }

      .assignment-meta {
        font-size: 11px;
        color: #7c6a55;
        margin-top: 2px;
      }

      .field-row {
        margin-top: 8px;
      }

      .field-row label {
        display: block;
        font-size: 11px;
        color: #7c6a55;
        margin-bottom: 2px;
      }

      .field-row select {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #ddcdb9;
        padding: 5px 7px;
        font-size: 12px;
        background: #fdf8f0;
      }

      .divider-text {
        font-size: 11px;
        color: #9a8466;
        margin-top: 10px;
      }

      .layout-col-roles {
        grid-column: 1 / auto;
      }

      .layout-col-matrix {
        grid-column: 2 / auto;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 40;
      }

      .modal {
        background: #fffaf2;
        border-radius: 10px;
        border: 1px solid #eadccd;
        padding: 16px 18px 14px;
        width: 420px;
        max-width: calc(100% - 32px);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .modal-title {
        font-size: 15px;
        font-weight: 600;
      }

      .modal-field {
        margin-bottom: 8px;
      }

      .modal-field label {
        display: block;
        font-size: 11px;
        color: #7c6a55;
        margin-bottom: 2px;
      }

      .modal-field input,
      .modal-field textarea {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #ddcdb9;
        padding: 6px 8px;
        font-size: 12px;
        background: #fdf8f0;
        font-family: inherit;
      }

      .modal-field textarea {
        min-height: 80px;
        resize: vertical;
      }

      .modal-footer {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      @media (max-width: 1180px) {
        .layout {
          grid-template-columns: minmax(0, 1.4fr) minmax(0, 2.2fr);
          grid-template-rows: auto;
          grid-template-areas: "roles matrix";
        }

        .layout-col-roles {
          grid-area: roles;
        }

        .layout-col-matrix {
          grid-area: matrix;
        }
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
    <style id="uxResponsiveSplitFix">
/* Force stack 1 column: list full-width on top, detail below */
.layout {
  grid-template-columns: minmax(0, 1fr) !important;
}
/* Compact tightening for very narrow viewports */
@media (max-width: 900px) {
  .page {
    padding: 16px !important;
  }
}
</style>
<style id="uxTableOverflowFix">
/* Table overflow handling: keep text intact, only enable horizontal scroll on narrow viewport */
@media (max-width: 1199px) {
  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
}
</style>
  <style id="uxBaselinePolish">
/* Baseline UI polish — applies only where file CSS doesn't override */
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Pointer cursor on interactive */
button, .btn, [role="button"], select,
input[type="checkbox"], input[type="radio"], input[type="submit"],
input[type="button"], a[href], label[for] {
  cursor: pointer;
}

/* Disabled state */
button:disabled, .btn:disabled, input:disabled, select:disabled, textarea:disabled {
  cursor: not-allowed;
  opacity: 0.6;
}

/* Focus-visible outline (a11y) */
button:focus-visible, .btn:focus-visible,
a:focus-visible, [role="button"]:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid #c4a25f;
  outline-offset: 2px;
}

/* Inherit font family for form controls (fixes browser-default) */
input, select, textarea, button {
  font-family: inherit;
}

/* Responsive media */
img, svg, video {
  max-width: 100%;
  height: auto;
}

/* Subtle hover for buttons (only if no transition already set, gentle filter) */
button:hover:not(:disabled), .btn:hover:not(:disabled) {
  filter: brightness(0.96);
  transition: filter 0.15s ease;
}

/* Smooth scrollbar on Webkit */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: #f5ece0;
}
::-webkit-scrollbar-thumb {
  background: #d9c8b4;
  border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover {
  background: #c4a25f;
}

/* Selection highlight on-brand */
::selection {
  background: #c4a25f;
  color: #fff;
}

/* HR baseline */
hr {
  border: none;
  border-top: 1px solid #eadccd;
  margin: 12px 0;
}

/* Anchor baseline color matches brand (no underline by default to match flat UI) */
a {
  color: #8a5a3b;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
  <body>
    <div class="page">
      <div class="page-header">
        <div class="page-title">Roles &amp; Permissions</div>
      </div>

      <div class="layout">
        <div class="card layout-col-roles">
          <div class="card-header">
            <div class="card-title">Role list</div>
          </div>

          <div
            style="
              display: flex;
              flex-direction: column;
              gap: 6px;
              margin-bottom: 8px;
            "
          >
            <div style="display: flex; justify-content: flex-end; gap: 6px">
              <button
                type="button"
                class="btn btn-secondary btn-sm"
                id="addRoleBtn"
              >
                New role
              </button>
            </div>
            <div
              style="
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
              "
            >
              <input
                id="roleSearch"
                type="text"
                placeholder="Search role or description"
                style="
                  flex: 1;
                  min-width: 150px;
                  border-radius: 999px;
                  border: 1px solid #ddcdb9;
                  padding: 5px 10px;
                  font-size: 11px;
                  background: #fdf8f0;
                "
              />
              <select
                id="roleTypeFilter"
                style="
                  border-radius: 999px;
                  border: 1px solid #ddcdb9;
                  padding: 5px 10px;
                  font-size: 11px;
                  background: #fdf8f0;
                "
              >
                <option value="">All types</option>
                <option value="Global">Global</option>
                <option value="Support">Support</option>
                <option value="Content">Content</option>
                <option value="Finance">Finance</option>
                <option value="Custom">Custom</option>
              </select>
              <select
                id="rolePrivilegeFilter"
                title="Privilege level"
                style="
                  border-radius: 999px;
                  border: 1px solid #ddcdb9;
                  padding: 5px 10px;
                  font-size: 11px;
                  background: #fdf8f0;
                "
              >
                <option value="">All privileges</option>
                <option value="admin">Has admin rights</option>
                <option value="write">Has write rights</option>
                <option value="read-only">Read-only</option>
                <option value="none">No permissions</option>
              </select>
              <select
                id="roleScopeFilter"
                title="Includes scope"
                style="
                  border-radius: 999px;
                  border: 1px solid #ddcdb9;
                  padding: 5px 10px;
                  font-size: 11px;
                  background: #fdf8f0;
                "
              >
                <option value="">Any scope</option>
                <option value="users">Users</option>
                <option value="leads">Leads</option>
                <option value="properties">Properties</option>
                <option value="content">Content</option>
                <option value="support">Support</option>
                <option value="billing">Billing</option>
                <option value="analytics">Analytics</option>
                <option value="system">System</option>
              </select>
              <select
                id="roleSortBy"
                title="Sort by"
                style="
                  border-radius: 999px;
                  border: 1px solid #ddcdb9;
                  padding: 5px 10px;
                  font-size: 11px;
                  background: #fdf8f0;
                "
              >
                <option value="default">Default order</option>
                <option value="name-asc">Name A→Z</option>
                <option value="name-desc">Name Z→A</option>
                <option value="scopes-desc">Most scopes ↓</option>
              </select>
              <button
                type="button"
                class="btn btn-secondary btn-sm"
                id="resetRoleFilters"
              >
                Reset
              </button>
            </div>
          </div>

          <div class="role-list" id="roleList"></div>
          <div
            id="roleListEmpty"
            style="
              display: none;
              padding: 10px 6px;
              color: #7b623f;
              font-size: 12px;
              text-align: center;
            "
          >
            No roles match current filters.
          </div>
        </div>

        <div class="card layout-col-matrix">
          <div class="card-header">
            <div class="card-title" id="matrixTitle">Permission matrix</div>
            <div class="card-subtitle" id="matrixSubtitle"></div>
          </div>

          <div class="field-row">
            <label for="roleNameInput">Role name</label>
            <input
              type="text"
              id="roleNameInput"
              style="
                width: 100%;
                border-radius: 8px;
                border: 1px solid #ddcdb9;
                padding: 5px 7px;
                font-size: 12px;
                background: #fdf8f0;
              "
            />
          </div>

          <div
            style="margin-top: 10px; display: flex; justify-content: flex-end"
          >
            <button
              type="button"
              class="btn btn-primary btn-sm"
              id="saveRoleBtn"
            >
              Save changes
            </button>
          </div>

          <table class="permission-table">
            <thead>
              <tr>
                <th style="width: 40%">Scope</th>
                <th style="width: 23%">Read</th>
                <th style="width: 23%">Write</th>
                <th style="width: 14%">Admin</th>
              </tr>
            </thead>
            <tbody id="permissionBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="modal-backdrop" id="roleModal">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title" id="roleModalTitle">New role</div>
          <button
            type="button"
            class="btn btn-secondary btn-sm"
            id="closeRoleModalBtn"
          >
            Close
          </button>
        </div>
        <div class="modal-field">
          <label for="modalRoleName" class="req">Role name</label>
          <input id="modalRoleName" type="text" required autocomplete="off" />
        </div>
        <div class="modal-field">
          <label for="modalRoleDescription">Description</label>
          <textarea id="modalRoleDescription" placeholder="What is this role responsible for?"></textarea>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary btn-sm"
            id="cancelRoleModalBtn"
          >
            Cancel
          </button>
          <button
            type="button"
            class="btn btn-primary btn-sm"
            id="saveRoleModalBtn"
          >
            Save role
          </button>
        </div>
      </div>
    </div>

    <script>
      const permissionScopes = [
        {
          id: "users",
          label: "Users & accounts",
          desc: "View and manage end user / agent / internal support accounts.",
        },
        {
          id: "leads",
          label: "Leads & CRM",
          desc: "Access to lead inbox, routing, assignment and history.",
        },
        {
          id: "properties",
          label: "Property inventory",
          desc: "View and curate listings and projects.",
        },
        {
          id: "content",
          label: "Content & CMS",
          desc: "Articles, landing pages, static content blocks.",
        },
        {
          id: "support",
          label: "Messages & support",
          desc: "Tickets, routing, SLA (never message/call content).",
        },
        {
          id: "billing",
          label: "Billing & monetisation",
          desc: "Plans, invoices, payouts configuration.",
        },
        {
          id: "analytics",
          label: "Operations & analytics",
          desc: "Funnels, cohorts, platform health dashboards.",
        },
        {
          id: "system",
          label: "System settings & integrations",
          desc: "SSO, webhooks, API keys and audit configuration.",
        },
      ];

      let roles = [
        {
          id: "platform_admin",
          name: "Platform Admin",
          type: "Global",
          description: "Full platform configuration and operations.",
          permissions: {
            users: { read: true, write: true, admin: true },
            leads: { read: true, write: true, admin: true },
            properties: { read: true, write: true, admin: true },
            content: { read: true, write: true, admin: true },
            support: { read: true, write: true, admin: true },
            billing: { read: true, write: true, admin: true },
            analytics: { read: true, write: true, admin: true },
            system: { read: true, write: true, admin: true },
          },
        },
        {
          id: "support_lead",
          name: "Support Lead",
          type: "Support",
          description: "Head of CS, manages tickets and queues.",
          permissions: {
            users: { read: true, write: false, admin: false },
            leads: { read: true, write: false, admin: false },
            properties: { read: true, write: false, admin: false },
            content: { read: true, write: false, admin: false },
            support: { read: true, write: true, admin: true },
            billing: { read: false, write: false, admin: false },
            analytics: { read: true, write: false, admin: false },
            system: { read: false, write: false, admin: false },
          },
        },
        {
          id: "content_editor",
          name: "Content Editor",
          type: "Content",
          description: "Create and schedule content.",
          permissions: {
            users: { read: true, write: false, admin: false },
            leads: { read: false, write: false, admin: false },
            properties: { read: true, write: false, admin: false },
            content: { read: true, write: true, admin: false },
            support: { read: false, write: false, admin: false },
            billing: { read: false, write: false, admin: false },
            analytics: { read: true, write: false, admin: false },
            system: { read: false, write: false, admin: false },
          },
        },
        {
          id: "finance_ops",
          name: "Finance & Ops",
          type: "Finance",
          description: "Manage payouts, invoices and reconciliation.",
          permissions: {
            users: { read: true, write: false, admin: false },
            leads: { read: false, write: false, admin: false },
            properties: { read: true, write: false, admin: false },
            content: { read: false, write: false, admin: false },
            support: { read: true, write: false, admin: false },
            billing: { read: true, write: true, admin: true },
            analytics: { read: true, write: false, admin: false },
            system: { read: false, write: false, admin: false },
          },
        },
      ];

      let selectedRoleId = roles[0].id;
      let roleModalMode = "create";
      let editingRoleId = null;

      function getRole(id) {
        return roles.find((r) => r.id === id);
      }

      function getFilteredRoles() {
        const search = (
          document.getElementById("roleSearch")?.value || ""
        )
          .trim()
          .toLowerCase();
        const typeFilter =
          document.getElementById("roleTypeFilter")?.value || "";
        const privFilter =
          document.getElementById("rolePrivilegeFilter")?.value || "";
        const scopeFilter =
          document.getElementById("roleScopeFilter")?.value || "";
        const sortBy =
          document.getElementById("roleSortBy")?.value || "default";

        const hasPriv = (perms, level) => {
          if (!perms) return false;
          return Object.values(perms).some((p) => p && p[level]);
        };
        const scopeCount = (perms) => {
          if (!perms) return 0;
          return Object.values(perms).filter(
            (p) => p && (p.read || p.write || p.admin),
          ).length;
        };

        let result = roles.filter((role) => {
          if (search) {
            const hay = `${role.name} ${role.description || ""} ${role.type || ""}`.toLowerCase();
            if (!hay.includes(search)) return false;
          }
          if (typeFilter && (role.type || "") !== typeFilter) return false;
          if (privFilter) {
            if (privFilter === "admin" && !hasPriv(role.permissions, "admin"))
              return false;
            if (
              privFilter === "write" &&
              !hasPriv(role.permissions, "write")
            )
              return false;
            if (privFilter === "read-only") {
              if (
                hasPriv(role.permissions, "write") ||
                hasPriv(role.permissions, "admin") ||
                !hasPriv(role.permissions, "read")
              )
                return false;
            }
            if (privFilter === "none" && scopeCount(role.permissions) > 0)
              return false;
          }
          if (scopeFilter) {
            const p = (role.permissions || {})[scopeFilter];
            if (!p || !(p.read || p.write || p.admin)) return false;
          }
          return true;
        });

        if (sortBy !== "default") {
          const sorters = {
            "name-asc": (a, b) => a.name.localeCompare(b.name),
            "name-desc": (a, b) => b.name.localeCompare(a.name),
            "scopes-desc": (a, b) =>
              scopeCount(b.permissions) - scopeCount(a.permissions),
          };
          if (sorters[sortBy]) result = [...result].sort(sorters[sortBy]);
        }
        return result;
      }

      function renderRoles() {
        const list = document.getElementById("roleList");
        list.innerHTML = "";
        const filtered = getFilteredRoles();
        const empty = document.getElementById("roleListEmpty");
        if (empty) empty.style.display = filtered.length ? "none" : "block";
        filtered.forEach((role) => {
          const div = document.createElement("div");
          div.className =
            "role-item" + (role.id === selectedRoleId ? " active" : "");
          div.innerHTML = `
            <div class="role-item-head">
              <div class="role-name">${role.name}</div>
              <div class="role-actions">
                <button type="button" class="icon-btn" data-action="edit" title="Edit role" aria-label="Edit role">

<script>
(function(){
  if (window.UX) return; // idempotent
  const wrap = document.getElementById('uxToastWrap');
  const modal = document.getElementById('uxConfirmModal');
  const titleEl = document.getElementById('uxConfirmTitle');
  const msgEl = document.getElementById('uxConfirmMsg');
  const okBtn = document.getElementById('uxConfirmOk');
  const cancelBtn = document.getElementById('uxConfirmCancel');

  // ──── Toast ────────────────────────────────────────────────────
  function toast(msg, type){
    if(!wrap) return;
    const el = document.createElement('div');
    el.className = 'ux-toast ' + (type || 'info');
    const span = document.createElement('span');
    span.textContent = msg || '';
    const x = document.createElement('button');
    x.className = 'x'; x.type = 'button'; x.setAttribute('aria-label','Dismiss');
    x.textContent = '×';
    x.addEventListener('click', () => el.remove());
    el.appendChild(span); el.appendChild(x);
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 220); }, 3800);
  }
  window.Toast = {
    show: toast,
    ok:   (m) => toast(m, 'ok'),
    err:  (m) => toast(m, 'err'),
    info: (m) => toast(m, 'info'),
  };

  // ──── Confirm modal ───────────────────────────────────────────
  let _onOk = null;
  let _lastFocus = null;
  function closeConfirm(){
    modal.classList.remove('open');
    _onOk = null;
    if(_lastFocus && _lastFocus.focus) try { _lastFocus.focus(); } catch(e){}
  }
  okBtn.addEventListener('click', () => { const cb = _onOk; closeConfirm(); if(cb) cb(); });
  cancelBtn.addEventListener('click', closeConfirm);
  modal.addEventListener('click', (e) => { if(e.target === modal) closeConfirm(); });

  function openConfirm(opts){
    titleEl.textContent  = opts.title   || 'Confirm';
    msgEl.textContent    = opts.message || 'Are you sure?';
    okBtn.textContent    = opts.okLabel || 'Confirm';
    cancelBtn.textContent= opts.cancelLabel || 'Cancel';
    okBtn.className = 'ux-btn ' + (opts.danger ? 'danger' : 'primary');
    _onOk = typeof opts.onConfirm === 'function' ? opts.onConfirm : null;
    _lastFocus = document.activeElement;
    modal.classList.add('open');
    setTimeout(() => okBtn.focus(), 40);
  }

  window.UX = {
    confirm: openConfirm,
    toast,
    // Run action only after confirming if dirty
    guard(action){
      if(!window.UX_dirty){ if(typeof action === 'function') action(); return; }
      openConfirm({
        title: 'Discard unsaved changes?',
        message: 'You have edits that have not been saved. Leave anyway?',
        okLabel: 'Discard',
        danger: true,
        onConfirm(){ window.UX_dirty = false; if(typeof action === 'function') action(); }
      });
    },
    markClean(){ window.UX_dirty = false; document.body.classList.remove('ux-dirty'); },
    markDirty(){ window.UX_dirty = true;  document.body.classList.add('ux-dirty'); },
  };

  // ──── Esc closes any open modal (built-in + page modals) ──────
  document.addEventListener('keydown', (e) => {
    if(e.key !== 'Escape') return;
    if(modal.classList.contains('open')){ closeConfirm(); return; }
    document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
      const visible = getComputedStyle(m).display !== 'none' || m.classList.contains('show') || m.classList.contains('open');
      if(!visible) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Backdrop click closes existing page modals ──────────────
  document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
    if(m.__uxBound) return; m.__uxBound = true;
    m.addEventListener('click', (e) => {
      if(e.target !== m) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Auto-track dirty on any [data-track-dirty] container ────
  document.addEventListener('input', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  document.addEventListener('change', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  window.addEventListener('beforeunload', (e) => {
    if(window.UX_dirty){ e.preventDefault(); e.returnValue = ''; }
  });

  // ──── Inline validation helper ────────────────────────────────
  window.UX.validate = function(form){
    let firstInvalid = null;
    form.querySelectorAll('.ux-field-error').forEach(n => n.remove());
    form.querySelectorAll('.ux-invalid').forEach(n => n.classList.remove('ux-invalid'));
    form.querySelectorAll('[required]').forEach(field => {
      const v = (field.value || '').trim();
      let bad = !v;
      if(!bad && field.type === 'email'){
        bad = !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      }
      if(bad){
        field.classList.add('ux-invalid');
        const note = document.createElement('span');
        note.className = 'ux-field-error';
        note.textContent = field.dataset.errorMsg ||
          (field.type === 'email' ? 'Please enter a valid email.' : 'This field is required.');
        if(field.parentNode) field.parentNode.insertBefore(note, field.nextSibling);
        if(!firstInvalid) firstInvalid = field;
      }
    });
    if(firstInvalid){ firstInvalid.focus(); return false; }
    return true;
  };
})();
