<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roles &amp; Permissions</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #8B7340;
      --gold-light: #c9a85c;
      --gray-text: #888;
      --border: #e0e0e0;
      --bg: #ffffff;
      --text: #1a1a1a;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      font-family: var(--font);
      background: #f5f5f5;
      color: var(--text);
      min-height: 100vh;
    }

    /* ══════════════════════════════════════
       MAIN PAGE
    ══════════════════════════════════════ */
    .page {
      background: var(--bg);
      min-height: 100vh;
      padding: 32px 36px 48px;
    }

    /* ── Page Header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .btn-add {
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .btn-add:hover { filter: brightness(0.9); }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      width: 260px;
      margin-bottom: 20px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      color: #aaa;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 9px 14px 9px 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13.5px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: #bbb; }
    .search-input:focus { border-color: var(--gold-light); }

    /* ── Table ── */
    .table-wrap {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      border-bottom: 1.5px solid var(--border);
    }

    th {
      padding: 14px 18px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-align: left;
      background: var(--bg);
    }

    th.col-role { width: 240px; }
    th.col-desc { }
    th.col-actions { width: 90px; text-align: right; padding-right: 20px; }

    .sort-arrow {
      display: inline-flex;
      flex-direction: column;
      gap: 1px;
      vertical-align: middle;
      margin-left: 5px;
      margin-bottom: 1px;
    }
    .sort-arrow span {
      display: block;
      width: 0;
      height: 0;
    }
    .sort-arrow span:first-child {
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 4px solid #aaa;
    }
    .sort-arrow span:last-child {
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 4px solid #aaa;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    td {
      padding: 16px 18px;
      font-size: 13.5px;
      color: var(--text);
      vertical-align: middle;
    }

    td.col-desc { color: #333; }

    .row-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-right: 20px;
    }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: #aaa;
      transition: color 0.15s;
    }
    .action-btn:hover { color: var(--gold); }
    .action-btn svg { width: 17px; height: 17px; }

    /* ── Table Footer ── */
    .table-footer {
      padding: 13px 18px;
      font-size: 12.5px;
      color: var(--gray-text);
      border-top: 1px solid #f0f0f0;
    }

    /* ── Result count + pagination ── */
    .result-count {
      font-size: 12.5px;
      color: var(--gray-text);
      margin-bottom: 12px;
    }
    .pager {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .pager button {
      min-width: 34px;
      height: 34px;
      padding: 0 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
    }
    .pager button:hover:not(:disabled) { background: #faf7ef; }
    .pager button.current {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
      font-weight: 700;
    }
    .pager button:disabled { opacity: 0.45; cursor: default; }
    .pager .pager-ellipsis { padding: 0 4px; color: var(--gray-text); }

    /* ══════════════════════════════════════
       OVERLAY + DRAWER
    ══════════════════════════════════════ */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-backdrop {
      flex: 0 0 260px;
      background: rgba(80, 80, 80, 0.55);
    }

    .drawer {
      flex: 1;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateX(40px);
      transition: transform 0.25s ease;
    }
    .overlay.open .drawer {
      transform: translateX(0);
    }

    /* ── Drawer Header ── */
    .drawer-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 24px 28px 20px;
      flex-shrink: 0;
    }

    .drawer-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .drawer-subtitle {
      font-size: 13px;
      color: var(--gold);
      margin-top: 3px;
    }

    .drawer-header-actions {
      display: flex;
      gap: 10px;
      margin-top: 2px;
    }

    .btn-cancel {
      background: #5c5c5c;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .btn-cancel:hover { filter: brightness(0.88); }

    .btn-save {
      background: #d6ccb8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 22px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save.active {
      background: var(--gold);
      cursor: pointer;
    }
    .btn-save.active:hover { filter: brightness(0.9); }

    .drawer-divider {
      height: 1px;
      background: #ebebeb;
      margin: 0;
      flex-shrink: 0;
    }

    /* ── Drawer Body ── */
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    /* ── Section Block ── */
    .form-section {
      padding: 24px 28px 28px;
      border-bottom: 1px solid #ebebeb;
    }

    .form-section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }

    .form-section-sub {
      font-size: 12.5px;
      color: var(--gold);
      margin-bottom: 20px;
    }

    /* ── Form Fields ── */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group:last-child { margin-bottom: 0; }

    .form-label {
      display: block;
      font-size: 12.5px;
      color: #444;
      margin-bottom: 7px;
    }

    .req {
      color: #e04040;
      margin-left: 3px;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13.5px;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
      resize: none;
    }
    .form-input::placeholder,
    .form-textarea::placeholder { color: #c0c0c0; }
    .form-input:focus,
    .form-textarea:focus { border-color: var(--gold-light); }

    .form-textarea { height: 90px; }

    /* ── Permission Table ── */
    .perm-section {
      padding: 24px 28px 32px;
    }

    .perm-group {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .perm-group:last-child { margin-bottom: 0; }

    .perm-group-header {
      background: #f7f5f1;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    .perm-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #f2f2f2;
      transition: background 0.1s;
    }
    .perm-row:last-child { border-bottom: none; }
    .perm-row:hover { background: #fafaf8; }

    .perm-row label {
      font-size: 13.5px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    /* Custom checkbox */
    .custom-cb {
      position: relative;
      flex-shrink: 0;
      width: 20px;
      height: 20px;
    }

    .custom-cb input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
    }

    .cb-box {
      width: 20px;
      height: 20px;
      border: 1.5px solid #ccc;
      border-radius: 5px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      pointer-events: none;
    }

    .custom-cb input:checked ~ .cb-box {
      background: var(--gold);
      border-color: var(--gold);
    }

    .cb-check {
      display: none;
      width: 10px;
      height: 10px;
    }

    .custom-cb input:checked ~ .cb-box .cb-check {
      display: block;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     MAIN PAGE — Roles & Permissions
══════════════════════════════════════ -->
<div class="page">

  <div class="page-header">
    <h1 class="page-title">Roles &amp; Permissions</h1>
    <button class="btn-add" onclick="openDrawer()">Add</button>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="roleSearch" type="text" placeholder="Search role name" oninput="renderRoles(true)" />
  </div>

  <!-- Result count -->
  <div class="result-count" id="roleCount"></div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-role" id="roleSortHead" onclick="toggleSort()" style="cursor:pointer">
            Role name
            <span class="sort-arrow">
              <span></span><span></span>
            </span>
          </th>
          <th class="col-desc">Description</th>
          <th class="col-actions">Actions</th>
        </tr>
      </thead>
      <tbody id="rolesBody">
      </tbody>
    </table>
    <div class="table-footer" id="roleFooter">1 – 5 of 5</div>
  </div>

  <!-- Pagination controls -->
  <div class="pager" id="rolePager"></div>

</div><!-- /.page -->


<!-- ══════════════════════════════════════
     OVERLAY — New Role Drawer
══════════════════════════════════════ -->
<div class="overlay" id="overlay">

  <!-- left dim backdrop, click to close -->
  <div class="overlay-backdrop" onclick="closeDrawer()"></div>

  <!-- Right panel -->
  <div class="drawer">

    <!-- Drawer Header -->
    <div class="drawer-header">
      <div>
        <div class="drawer-title" id="drawerTitle">New Role</div>
        <div class="drawer-subtitle" id="drawerSubtitle">Add a new Role</div>
      </div>
      <div class="drawer-header-actions">
        <button class="btn-cancel" onclick="closeDrawer()">Cancel</button>
        <button class="btn-save" id="saveBtn">Save</button>
      </div>
    </div>

    <div class="drawer-divider"></div>

    <!-- Scrollable Body -->
    <div class="drawer-body">

      <!-- General Section -->
      <div class="form-section">
        <div class="form-section-title">General</div>
        <div class="form-section-sub">Basic information about the role</div>

        <div class="form-group">
          <label class="form-label" for="roleName">Role name <span class="req">*</span></label>
          <input
            class="form-input"
            id="roleName"
            type="text"
            placeholder="Enter"
            oninput="checkSave()"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="roleDesc">Description</label>
          <textarea
            class="form-textarea"
            id="roleDesc"
            placeholder="Enter"
          ></textarea>
        </div>
      </div>

      <!-- Permission Table Section -->
      <div class="perm-section">
        <div class="form-section-title">Permission table</div>
        <div class="form-section-sub" id="permSubtitle" style="margin-bottom:20px">Full platform configuration and operations</div>

        <!-- User Management Group -->
        <div class="perm-group">
          <div class="perm-group-header">User management</div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="view-user-list" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>View User List</label></div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="edit-user-info" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>Edit User Information</label></div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="suspend-delete-account" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>Suspend / Delete Account</label></div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="approve-reject-agent" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>Approve / Reject Agent</label></div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="send-password-reset" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>Send Password Reset</label></div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="grant-remove-badge" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>Grant / Remove Badge</label></div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="change-kyc" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>Change KYC Verification Status</label></div>
        </div>

        <!-- Property Management Group -->
        <div class="perm-group">
          <div class="perm-group-header">Property Management</div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="view-property-list" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>View Property List</label></div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="publish-suspend-delete-property" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>Publish / Suspend / Delete Property</label></div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="review-reported-properties" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>Review &amp; Process Reported Properties</label></div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="edit-property-type" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>Edit Property Type &amp; Filter Settings</label></div>
        </div>

        <!-- Financial Management Group -->
        <div class="perm-group">
          <div class="perm-group-header">Financial Management</div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="view-transaction-history" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>View Transaction History</label></div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="approve-reject-payouts" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>Approve / Reject Payouts</label></div>
          <div class="perm-row"><label><span class="custom-cb"><input type="checkbox" data-perm-id="manage-invoices" /><span class="cb-box"><svg class="cb-check" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>Manage Invoices &amp; Reconciliation</label></div>
        </div>

      </div><!-- /.perm-section -->
    </div><!-- /.drawer-body -->
  </div><!-- /.drawer -->
</div><!-- /.overlay -->

<script>
  /* ── Role data ── */
  const ROLES = {
    'platform-admin': {
      name: 'Platform Admin',
      description: 'Full platform configuration and operations.',
      permissions: ['view-user-list', 'suspend-delete-account', 'grant-remove-badge', 'change-kyc', 'view-property-list']
    },
    'support-lead': {
      name: 'Support Lead',
      description: 'Head of CS, manages tickets and queues.',
      permissions: ['view-user-list', 'approve-reject-agent', 'send-password-reset', 'view-property-list', 'review-reported-properties']
    },
    'content-editor': {
      name: 'Content Editor',
      description: 'Create and schedule content.',
      permissions: ['view-property-list', 'publish-suspend-delete-property', 'edit-property-type']
    },
    'finance-ops': {
      name: 'Finance & Ops',
      description: 'Manage payouts, invoices and reconciliation.',
      permissions: ['view-transaction-history', 'approve-reject-payouts', 'manage-invoices']
    }
  };

  /* ── Ordered list backing the table (named roles first, then deterministic
        filler so the list exceeds one page / >=60 roles). Each filler role is
        also registered in ROLES so its Edit drawer works. ── */
  const ROLE_LIST = [
    { id: 'platform-admin', name: 'Platform Admin', description: 'Full platform configuration and operations.' },
    { id: 'support-lead', name: 'Support Lead', description: 'Head of CS, manages tickets and queues.' },
    { id: 'content-editor', name: 'Content Editor', description: 'Create and schedule content.' },
    { id: 'finance-ops', name: 'Finance & Ops', description: 'Manage payouts, invoices and reconciliation.' }
  ];
  (function padRoles() {
    const ALL_PERMS = [
      'view-user-list', 'edit-user-info', 'suspend-delete-account', 'approve-reject-agent',
      'send-password-reset', 'grant-remove-badge', 'change-kyc', 'view-property-list',
      'publish-suspend-delete-property', 'review-reported-properties', 'edit-property-type',
      'view-transaction-history', 'approve-reject-payouts', 'manage-invoices'
    ];
    const namePool = [
      'Listing Moderator', 'Regional Manager', 'Compliance Officer', 'Data Analyst',
      'Customer Support Agent', 'Marketing Specialist', 'Onboarding Specialist',
      'Billing Administrator', 'Localization Editor', 'Partnerships Manager',
      'Fraud Reviewer', 'Quality Assurance', 'Account Manager', 'Operations Coordinator'
    ];
    const descPool = [
      'Reviews and moderates property listings.',
      'Oversees operations for an assigned region.',
      'Monitors policy compliance across the platform.',
      'Reviews reports and platform analytics.',
      'Handles day-to-day customer support tickets.',
      'Plans and runs marketing campaigns.',
      'Guides new users through onboarding.',
      'Manages invoices and billing records.'
    ];
    const target = 60;
    let n = 1;
    while (ROLE_LIST.length < target) {
      const id = 'role-' + n;
      const name = namePool[n % namePool.length] + ' ' + n;
      const description = descPool[n % descPool.length];
      const permCount = 2 + (n % 4);
      const permissions = [];
      for (let k = 0; k < permCount; k++) {
        permissions.push(ALL_PERMS[(n + k * 3) % ALL_PERMS.length]);
      }
      ROLE_LIST.push({ id, name, description });
      ROLES[id] = { name, description, permissions };
      n++;
    }
  })();

  /* ── Pagination + list state (universal 50/page) ── */
  const PAGE_SIZE = 50;
  let rolePage = 1;
  let roleSortAsc = true;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  const EDIT_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  const DELETE_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';

  function buildPager(containerId, totalRows, curPage, onGo) {
    const el = document.getElementById(containerId);
    if (!el) return;
    const totalPages = Math.max(1, Math.ceil(totalRows / PAGE_SIZE));
    if (totalRows <= PAGE_SIZE) { el.innerHTML = ''; return; }
    const pages = [];
    if (totalPages <= 7) {
      for (let i = 1; i <= totalPages; i++) pages.push(i);
    } else {
      pages.push(1);
      let lo = Math.max(2, curPage - 1);
      let hi = Math.min(totalPages - 1, curPage + 1);
      if (curPage <= 3) { lo = 2; hi = 4; }
      if (curPage >= totalPages - 2) { lo = totalPages - 3; hi = totalPages - 1; }
      if (lo > 2) pages.push('…');
      for (let i = lo; i <= hi; i++) pages.push(i);
      if (hi < totalPages - 1) pages.push('…');
      pages.push(totalPages);
    }
    let html = '<button ' + (curPage === 1 ? 'disabled' : '') + ' data-go="' + (curPage - 1) + '">Previous</button>';
    pages.forEach((p) => {
      if (p === '…') html += '<span class="pager-ellipsis">…</span>';
      else html += '<button class="' + (p === curPage ? 'current' : '') + '" data-go="' + p + '">' + p + '</button>';
    });
    html += '<button ' + (curPage === totalPages ? 'disabled' : '') + ' data-go="' + (curPage + 1) + '">Next</button>';
    el.innerHTML = html;
    el.querySelectorAll('button[data-go]').forEach((b) => {
      b.addEventListener('click', () => {
        if (b.disabled) return;
        onGo(parseInt(b.dataset.go, 10));
      });
    });
  }

  function toggleSort() {
    roleSortAsc = !roleSortAsc;
    renderRoles(true);
  }

  function renderRoles(resetPage) {
    if (resetPage) rolePage = 1;
    const q = (document.getElementById('roleSearch').value || '').toLowerCase();
    let filtered = ROLE_LIST.filter((r) => !q || r.name.toLowerCase().includes(q));
    filtered = filtered.slice().sort((a, b) =>
      roleSortAsc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name)
    );
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (rolePage > totalPages) rolePage = totalPages;
    if (rolePage < 1) rolePage = 1;
    const start = total === 0 ? 0 : (rolePage - 1) * PAGE_SIZE + 1;
    const end = Math.min(rolePage * PAGE_SIZE, total);
    document.getElementById('roleCount').textContent =
      total === 0 ? 'Showing 0 of 0 roles'
                  : 'Showing ' + start + '–' + end + ' of ' + total + ' roles';
    const rows = filtered.slice((rolePage - 1) * PAGE_SIZE, rolePage * PAGE_SIZE);
    document.getElementById('rolesBody').innerHTML = rows.length
      ? rows.map((r) => `
          <tr>
            <td>${escapeHtml(r.name)}</td>
            <td class="col-desc">${escapeHtml(r.description)}</td>
            <td>
              <div class="row-actions">
                <button class="action-btn" title="Edit" onclick="openEditDrawer('${r.id}')">${EDIT_ICON}</button>
                <button class="action-btn" title="Delete">${DELETE_ICON}</button>
              </div>
            </td>
          </tr>`).join('')
      : `<tr><td colspan="3" style="text-align:center;color:#999;padding:30px">No roles found.</td></tr>`;
    document.getElementById('roleFooter').textContent = start + ' – ' + end + ' of ' + total;
    buildPager('rolePager', total, rolePage, (p) => { rolePage = p; renderRoles(); });
  }

  /* ── Helpers ── */
  function setCheckboxes(activePermissions) {
    document.querySelectorAll('[data-perm-id]').forEach(cb => {
      cb.checked = activePermissions.includes(cb.dataset.permId);
    });
  }

  function resetCheckboxes() {
    document.querySelectorAll('[data-perm-id]').forEach(cb => { cb.checked = false; });
  }

  function updatePermSubtitle(text) {
    document.getElementById('permSubtitle').textContent = text;
  }

  /* ── Open: ADD mode ── */
  function openDrawer() {
    document.getElementById('drawerTitle').textContent   = 'New Role';
    document.getElementById('drawerSubtitle').textContent = 'Add a new Role';
    document.getElementById('roleName').value  = '';
    document.getElementById('roleDesc').value  = '';
    resetCheckboxes();
    updatePermSubtitle('Full platform configuration and operations');
    document.getElementById('saveBtn').classList.remove('active');
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('roleName').focus(), 280);
  }

  /* ── Open: EDIT mode ── */
  function openEditDrawer(roleId) {
    const role = ROLES[roleId];
    if (!role) return;

    document.getElementById('drawerTitle').textContent    = role.name;
    document.getElementById('drawerSubtitle').textContent = 'Edit role';
    document.getElementById('roleName').value  = role.name;
    document.getElementById('roleDesc').value  = role.description;
    setCheckboxes(role.permissions);
    updatePermSubtitle(role.description.replace(/\.$/, ''));
    document.getElementById('saveBtn').classList.add('active');
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  /* ── Close ── */
  function closeDrawer() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  /* ── Save button reactivity (Add mode) ── */
  function checkSave() {
    const val = document.getElementById('roleName').value.trim();
    document.getElementById('saveBtn').classList.toggle('active', val.length > 0);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  /* Initial render of the roles list (page 1). */
  renderRoles(true);
</script>

</body>
</html>
