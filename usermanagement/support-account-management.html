<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Support Account Management</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f3ef;
        color: #2a2118;
      }

      .page {
        padding: 24px 32px 32px;
      }

      .page-header {
        margin-bottom: 18px;
      }

      .page-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .page-subtitle {
        font-size: 13px;
        color: #7c6a55;
        max-width: 640px;
      }

      .pill {
        margin-top: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        background: #efe3cf;
        color: #7b623f;
        display: inline-block;
      }

      .card {
        background: #fffaf2;
        border-radius: 10px;
        border: 1px solid #eadccd;
        padding: 14px 16px 16px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 15px;
        font-weight: 600;
      }

      .card-subtitle {
        font-size: 12px;
        color: #7c6a55;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .filters input[type="text"],
      .filters select {
        border-radius: 999px;
        border: 1px solid #ddcdb9;
        padding: 6px 10px;
        font-size: 12px;
        background: #fdf8f0;
      }

      .filters input[type="text"] {
        flex: 1;
        min-width: 200px;
      }

      .filters select {
        min-width: 150px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: #f1e4d4;
      }

      th,
      td {
        padding: 8px 6px;
        text-align: left;
        border-bottom: 1px solid #efe2d3;
      }

      th {
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        color: #7b623f;
      }

      tbody tr:hover td {
        background: #f8efe3;
      }

      .badge-soft {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 999px;
        background: #f1e4d4;
        color: #7b623f;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 600;
      }

      .status-active {
        background: #e0f6df;
        color: #266734;
      }

      .status-suspended {
        background: #fde0dd;
        color: #9a2136;
      }

      .status-pending {
        background: #fff5d6;
        color: #8a6a21;
      }

      .type-chip {
        font-size: 10px;
        border-radius: 999px;
        padding: 2px 7px;
        background: #efe3cf;
        color: #7b623f;
        margin-right: 4px;
      }

      .btn {
        border-radius: 999px;
        border: none;
        padding: 4px 10px;
        font-size: 11px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .btn-ghost {
        background: #f7efe4;
        color: #6a5641;
        border: 1px solid #ddcdb9;
      }

      .btn-primary {
        background: #3a6b3c;
        color: #fff;
      }

      .btn-sm {
        padding: 3px 8px;
        font-size: 10px;
      }

      .actions {
        display: flex;
        gap: 6px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
        gap: 18px;
      }

      .detail-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .detail-list {
        list-style: none;
        padding-left: 0;
        margin: 0;
        font-size: 12px;
        color: #6d5b45;
      }

      .detail-list li {
        margin-bottom: 4px;
      }

      .empty-state {
        font-size: 12px;
        color: #7c6a55;
        text-align: center;
        padding: 14px 0;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="page-header">
        <div class="page-title">Support Account Management</div>
      </div>

      <div id="listView">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Support accounts</div>
            </div>
          </div>

          <div class="filters">
            <input
              type="text"
              id="searchInput"
              placeholder="Search company, contact, email"
            />
            <select id="categoryFilter">
              <option value="">All categories</option>
              <option value="Property manager">Property manager</option>
              <option value="Tax advisor">Tax advisor</option>
              <option value="Legal">Legal professional</option>
            </select>
            <select id="statusFilter">
              <option value="">Any status</option>
              <option value="Active">Active</option>
              <option value="Suspended">Suspended</option>
              <option value="Pending">Pending</option>
            </select>
          </div>

          <table>
            <thead>
              <tr>
                <th>Company</th>
                <th>Category</th>
                <th>Status</th>
                <th>Assigned agents</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="supportTableBody"></tbody>
          </table>
          <div class="empty-state" id="emptyState" style="display: none">
            No support accounts match current filters.
          </div>
        </div>
      </div>

      <div id="detailView" style="display: none">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Support account details</div>
            </div>
            <div style="display: flex; align-items: center; gap: 8px">
              <button
                type="button"
                class="btn btn-ghost btn-sm"
                id="backToListBtn"
              >
                ← Back to support list
              </button>
              <button
                type="button"
                class="btn btn-ghost btn-sm"
                id="saveLeadSupportBtn"
              >
                ★ Save as lead
              </button>
              <button
                type="button"
                class="btn btn-ghost btn-sm"
                id="unsaveLeadSupportBtn"
              >
                ✕ Unsave lead
              </button>
              <span class="badge-soft" id="selectedBadge"
                >No account selected</span
              >
            </div>
          </div>
          <div id="detailPanel">
            <div class="empty-state">
              Select a support account to see details.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const supportAccounts = [
        {
          id: "SUP-01",
          company: "Kansai Property Management",
          contact: "Tanaka Ken",
          email: "ken@kansai-pm.jp",
          category: "Property manager",
          status: "Active",
          assignedAgents: 12,
          regions: "Osaka, Kyoto",
          onboardingStatus: "Completed",
          complianceNotes: "MSA signed, KYC complete.",
        },
        {
          id: "SUP-02",
          company: "Tokyo Tax Advisory Partners",
          contact: "Saito Mika",
          email: "mika@tokyotaxpartners.jp",
          category: "Tax advisor",
          status: "Pending",
          assignedAgents: 5,
          regions: "Tokyo 23 wards",
          onboardingStatus: "License verification in progress",
          complianceNotes: "Waiting for updated certificate.",
        },
        {
          id: "SUP-03",
          company: "Legal Bridge Partners",
          contact: "Kobayashi Ryo",
          email: "ryo@legalbridge.jp",
          category: "Legal professional",
          status: "Active",
          assignedAgents: 8,
          regions: "National",
          onboardingStatus: "Completed",
          complianceNotes: "Bar association membership verified.",
        },
      ];

      let selectedId = null;

      function applyFilters(list) {
        const keyword = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const category = document.getElementById("categoryFilter").value;
        const status = document.getElementById("statusFilter").value;

        return list.filter((s) => {
          if (keyword) {
            const text = `${s.company} ${s.contact} ${s.email}`.toLowerCase();
            if (!text.includes(keyword)) return false;
          }
          if (category && s.category !== category) return false;
          if (status && s.status !== status) return false;
          return true;
        });
      }

      function renderTable() {
        const body = document.getElementById("supportTableBody");
        const empty = document.getElementById("emptyState");
        const filtered = applyFilters(supportAccounts);

        body.innerHTML = "";
        if (!filtered.length) {
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";

        filtered.forEach((s) => {
          const tr = document.createElement("tr");
          const statusClass =
            s.status === "Active"
              ? "status-active"
              : s.status === "Suspended"
                ? "status-suspended"
                : "status-pending";
          tr.innerHTML = `
            <td>
              <div style="font-weight:600;">${s.company}</div>
              <div style="font-size:10px;color:#7c6a55;">${s.contact} · ${
                s.email
              }</div>
            </td>
            <td><span class="type-chip">${s.category}</span></td>
            <td><span class="status-pill ${statusClass}">${s.status}</span></td>
            <td>${s.assignedAgents}</td>
            <td>
              <div class="actions">
                <button type="button" class="btn btn-ghost btn-sm" data-view-id="${
                  s.id
                }">View</button>
                <button type="button" class="btn btn-ghost btn-sm" data-suspend-id="${
                  s.id
                }">Suspend</button>
              </div>
            </td>
          `;
          tr.addEventListener("click", (e) => {
            if (e.target.closest("button")) return;
            openDetail(s.id);
          });
          body.appendChild(tr);
        });

        body.querySelectorAll("[data-view-id]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = btn.getAttribute("data-view-id");
            openDetail(id);
          });
        });

        body.querySelectorAll("[data-suspend-id]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = btn.getAttribute("data-suspend-id");
            toggleSuspend(id);
          });
        });
      }

      function openDetail(id) {
        const listView = document.getElementById("listView");
        const detailView = document.getElementById("detailView");
        if (listView && detailView) {
          listView.style.display = "none";
          detailView.style.display = "block";
        }
        selectSupport(id);
      }

      function selectSupport(id) {
        selectedId = id;
        const s = supportAccounts.find((x) => x.id === id);
        const badge = document.getElementById("selectedBadge");
        const panel = document.getElementById("detailPanel");
        if (!s) {
          badge.textContent = "No account selected";
          panel.innerHTML =
            '<div class="empty-state">Select a support account to see details.</div>';
          return;
        }
        badge.textContent = `${s.id} · ${s.category}`;
        panel.innerHTML = `
          <div class="detail-title">${s.company}</div>
          <ul class="detail-list">
            <li><strong>Contact:</strong> ${s.contact}</li>
            <li><strong>Email:</strong> ${s.email}</li>
            <li><strong>Category:</strong> ${s.category}</li>
            <li><strong>Status:</strong> ${s.status}</li>
            <li><strong>Assigned agents:</strong> ${s.assignedAgents}</li>
            <li><strong>Regions:</strong> ${s.regions}</li>
            <li><strong>Onboarding:</strong> ${s.onboardingStatus}</li>
            <li><strong>Compliance notes:</strong> ${s.complianceNotes}</li>
          </ul>
        `;
      }

      function toggleSuspend(id) {
        const s = supportAccounts.find((x) => x.id === id);
        if (!s) return;
        if (s.status === "Active") {
          if (
            !confirm(
              `Suspend support account ${s.company}? Linked agents will see access limited. (Demo)`,
            )
          ) {
            return;
          }
          s.status = "Suspended";
        } else {
          if (!confirm(`Re-activate support account ${s.company}?`)) {
            return;
          }
          s.status = "Active";
        }
        if (selectedId === id) {
          selectSupport(id);
        }
        renderTable();
      }

      const LEAD_STORAGE_KEY = "yuushiAdminLeads";

      function getStoredLeads() {
        try {
          const raw = window.localStorage.getItem(LEAD_STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          console.error("Failed to read leads from storage", e);
          return [];
        }
      }

      function saveStoredLeads(list) {
        try {
          window.localStorage.setItem(LEAD_STORAGE_KEY, JSON.stringify(list));
        } catch (e) {
          console.error("Failed to write leads to storage", e);
          alert(
            "Unable to save lead in this browser (localStorage blocked). Demo only.",
          );
        }
      }

      function removeLead(entityType, id) {
        const all = getStoredLeads();
        const keyId = String(id);
        const filtered = all.filter(
          (l) => !(l && l.entityType === entityType && String(l.id) === keyId),
        );
        saveStoredLeads(filtered);
      }

      function isLead(entityType, id) {
        const all = getStoredLeads();
        const keyId = String(id);
        return all.some(
          (l) => l && l.entityType === entityType && String(l.id) === keyId,
        );
      }

      function updateLeadButtonsForSupport() {
        const saveBtn = document.getElementById("saveLeadSupportBtn");
        const unsaveBtn = document.getElementById("unsaveLeadSupportBtn");
        if (!saveBtn || !unsaveBtn) return;
        if (!selectedId) {
          saveBtn.style.display = "inline-flex";
          unsaveBtn.style.display = "none";
          return;
        }
        if (isLead("support", selectedId)) {
          saveBtn.style.display = "none";
          unsaveBtn.style.display = "inline-flex";
        } else {
          saveBtn.style.display = "inline-flex";
          unsaveBtn.style.display = "none";
        }
      }

      function upsertLead(lead) {
        const list = getStoredLeads();
        const keyId = String(lead.id);
        const idx = list.findIndex(
          (l) =>
            l && l.entityType === lead.entityType && String(l.id) === keyId,
        );
        const now = new Date().toISOString().slice(0, 10);
        if (idx >= 0) {
          list[idx] = { ...list[idx], ...lead, updatedDate: now };
        } else {
          list.push({ ...lead, createdDate: lead.createdDate || now });
        }
        saveStoredLeads(list);
      }

      function saveLeadFromSupport() {
        if (!selectedId) {
          alert("Select a support account first to save as lead.");
          return;
        }
        const s = supportAccounts.find((x) => x.id === selectedId);
        if (!s) {
          alert("Selected support account not found in current dataset.");
          return;
        }

        const lead = {
          id: s.id,
          entityType: "support",
          name: s.company || "",
          contactName: s.contact || "",
          email: s.email || "",
          category: s.category || "",
          status: s.status || "",
          assignedAgents: s.assignedAgents ?? null,
          regions: s.regions || "",
          onboardingStatus: s.onboardingStatus || "",
          leadStatus: "New",
          source: "Support Account Management",
        };

        upsertLead(lead);
        alert(
          "Saved support account as lead for admin overview (demo only, stored in browser localStorage).",
        );
        updateLeadButtonsForSupport();
      }

      function unsaveLeadFromSupport() {
        if (!selectedId) {
          alert("Select a support account first to unsave lead.");
          return;
        }
        removeLead("support", selectedId);
        alert("Lead removed from admin overview (demo only).");
        updateLeadButtonsForSupport();
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderTable();
        selectSupport(null);

        ["searchInput", "categoryFilter", "statusFilter"].forEach((id) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.addEventListener("input", renderTable);
          el.addEventListener("change", renderTable);
        });

        const saveLeadBtn = document.getElementById("saveLeadSupportBtn");
        if (saveLeadBtn) {
          saveLeadBtn.addEventListener("click", saveLeadFromSupport);
        }

        const unsaveLeadBtn = document.getElementById("unsaveLeadSupportBtn");
        if (unsaveLeadBtn) {
          unsaveLeadBtn.addEventListener("click", unsaveLeadFromSupport);
        }

        const backBtn = document.getElementById("backToListBtn");
        if (backBtn) {
          backBtn.addEventListener("click", () => {
            const listView = document.getElementById("listView");
            const detailView = document.getElementById("detailView");
            if (listView && detailView) {
              detailView.style.display = "none";
              listView.style.display = "block";
            }
            selectedId = null;
            selectSupport(null);
          });
        }

        const params = new URLSearchParams(window.location.search);
        const from = params.get("from");
        const leadId = params.get("leadId");
        if (from === "leads" && leadId) {
          const match = supportAccounts.find(
            (s) => String(s.id) === String(leadId),
          );
          if (match) {
            openDetail(match.id);
          }
        }

        // Khởi tạo state nút Save/Unsave
        updateLeadButtonsForSupport();
      });
    </script>
  </body>
</html>
