<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Support Account Management</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f3ef;
        color: #2a2118;
      }

      .page {
        padding: 24px 32px 32px;
      }

      .page-header {
        margin-bottom: 18px;
      }

      .page-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .page-subtitle {
        font-size: 13px;
        color: #7c6a55;
        max-width: 640px;
      }

      .pill {
        margin-top: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        background: #efe3cf;
        color: #7b623f;
        display: inline-block;
      }

      .card {
        background: #fffaf2;
        border-radius: 10px;
        border: 1px solid #eadccd;
        padding: 14px 16px 16px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 15px;
        font-weight: 600;
      }

      .card-subtitle {
        font-size: 12px;
        color: #7c6a55;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .filters input[type="text"],
      .filters select {
        border-radius: 999px;
        border: 1px solid #ddcdb9;
        padding: 6px 10px;
        font-size: 12px;
        background: #fdf8f0;
      }

      .filters input[type="text"] {
        flex: 1;
        min-width: 200px;
      }

      .filters select {
        min-width: 150px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: #f1e4d4;
      }

      th,
      td {
        padding: 8px 6px;
        text-align: left;
        border-bottom: 1px solid #efe2d3;
      }

      th {
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        color: #7b623f;
      }

      tbody tr:hover td {
        background: #f8efe3;
      }

      .badge-soft {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 999px;
        background: #f1e4d4;
        color: #7b623f;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 600;
      }

      .status-active {
        background: #e0f6df;
        color: #266734;
      }

      .status-suspended {
        background: #fde0dd;
        color: #9a2136;
      }

      .status-pending {
        background: #fff5d6;
        color: #8a6a21;
      }

      .type-chip {
        font-size: 10px;
        border-radius: 999px;
        padding: 2px 7px;
        background: #efe3cf;
        color: #7b623f;
        margin-right: 4px;
      }

      .btn {
        border-radius: 999px;
        border: none;
        padding: 4px 10px;
        font-size: 11px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .btn-ghost {
        background: #f7efe4;
        color: #6a5641;
        border: 1px solid #ddcdb9;
      }

      .btn-primary {
        background: #3a6b3c;
        color: #fff;
      }

      .btn-sm {
        padding: 3px 8px;
        font-size: 10px;
      }

      .actions {
        display: flex;
        gap: 6px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
        gap: 18px;
      }

      .detail-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .detail-list {
        list-style: none;
        padding-left: 0;
        margin: 0;
        font-size: 12px;
        color: #6d5b45;
      }

      .detail-list li {
        margin-bottom: 4px;
      }

      .empty-state {
        font-size: 12px;
        color: #7c6a55;
        text-align: center;
        padding: 14px 0;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="page-header">
        <div class="page-title">Support Account Management</div>
      </div>

      <div id="listView">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Support accounts</div>
            </div>
          </div>

          <div class="filters">
            <input
              type="text"
              id="searchInput"
              placeholder="Search company, contact, email"
            />
            <select id="categoryFilter">
              <option value="">All categories</option>
              <option value="Property manager">Property manager</option>
              <option value="Tax advisor">Tax advisor</option>
              <option value="Legal">Legal professional</option>
            </select>
            <select id="statusFilter">
              <option value="">Any status</option>
              <option value="Active">Active</option>
              <option value="Suspended">Suspended</option>
              <option value="Pending">Pending</option>
            </select>
            <select id="assignedFilter" title="Assigned agents">
              <option value="">Any agent volume</option>
              <option value="0">No agents assigned</option>
              <option value="1-5">1 – 5 agents</option>
              <option value="6-10">6 – 10 agents</option>
              <option value="10+">10+ agents</option>
            </select>
            <select id="complianceFilter" title="Compliance status">
              <option value="">Any compliance</option>
              <option value="cleared">Cleared (MSA / KYC / verified)</option>
              <option value="pending">Documents pending</option>
            </select>
            <select id="sortBy" title="Sort by">
              <option value="company-asc">Sort: Company A→Z</option>
              <option value="agents-desc">Sort: Most agents ↓</option>
              <option value="agents-asc">Sort: Fewest agents ↑</option>
              <option value="status-asc">Sort: Status</option>
              <option value="category-asc">Sort: Category</option>
            </select>
            <button type="button" class="btn btn-ghost" id="resetFiltersBtn">
              Reset
            </button>
          </div>

          <table>
            <thead>
              <tr>
                <th>Company</th>
                <th>Category</th>
                <th>Status</th>
                <th>Assigned agents</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="supportTableBody"></tbody>
          </table>
          <div class="empty-state" id="emptyState" style="display: none">
            No support accounts match current filters.
          </div>
        </div>
      </div>

      <div id="detailView" style="display: none">
        <div class="entity-toolbar">
          <button type="button" class="entity-back-btn" id="backToListBtn">
            <span aria-hidden="true">←</span> Back to support list
          </button>
          <div class="entity-toolbar-right">
            <button
              type="button"
              class="btn btn-ghost"
              id="saveLeadSupportBtn"
              title="Pin this support account to the admin Lead overview"
            >
              <span aria-hidden="true">★</span> Save as lead
            </button>
            <button
              type="button"
              class="btn btn-ghost"
              id="unsaveLeadSupportBtn"
              style="display: none"
            >
              <span aria-hidden="true">✕</span> Unsave lead
            </button>
          </div>
        </div>

        <div class="entity-hero">
          <div class="entity-hero-avatar">
            <div class="avatar-circle" id="heroAvatar">S</div>
          </div>
          <div class="entity-hero-info">
            <h1 class="entity-hero-name" id="heroName">Select an account</h1>
            <div class="entity-hero-meta">
              <span class="badge-soft" id="selectedBadge"
                >No account selected</span
              >
              <span class="entity-hero-sep">·</span>
              <span class="entity-hero-email" id="heroEmail">—</span>
            </div>
          </div>
          <div class="entity-hero-actions">
            <button type="button" class="btn btn-ghost" id="heroToggleBtn">
              Suspend
            </button>
          </div>
        </div>

        <div id="detailPanel">
          <div class="empty-state" style="padding: 60px 20px">
            Select a support account to see details.
          </div>
        </div>
      </div>
    </div>

    <script>
      const supportAccounts = [
        {
          id: "SUP-01",
          company: "Kansai Property Management",
          contact: "Tanaka Ken",
          email: "ken@kansai-pm.jp",
          category: "Property manager",
          status: "Active",
          assignedAgents: 12,
          regions: "Osaka, Kyoto",
          onboardingStatus: "Completed",
          complianceNotes: "MSA signed, KYC complete.",
        },
        {
          id: "SUP-02",
          company: "Tokyo Tax Advisory Partners",
          contact: "Saito Mika",
          email: "mika@tokyotaxpartners.jp",
          category: "Tax advisor",
          status: "Pending",
          assignedAgents: 5,
          regions: "Tokyo 23 wards",
          onboardingStatus: "License verification in progress",
          complianceNotes: "Waiting for updated certificate.",
        },
        {
          id: "SUP-03",
          company: "Legal Bridge Partners",
          contact: "Kobayashi Ryo",
          email: "ryo@legalbridge.jp",
          category: "Legal professional",
          status: "Active",
          assignedAgents: 8,
          regions: "National",
          onboardingStatus: "Completed",
          complianceNotes: "Bar association membership verified.",
        },
      ];

      let selectedId = null;

      function applyFilters(list) {
        const keyword = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const category = document.getElementById("categoryFilter").value;
        const status = document.getElementById("statusFilter").value;
        const assigned =
          document.getElementById("assignedFilter")?.value || "";
        const compliance =
          document.getElementById("complianceFilter")?.value || "";
        const sortBy =
          document.getElementById("sortBy")?.value || "company-asc";

        let result = list.filter((s) => {
          if (keyword) {
            const text =
              `${s.company} ${s.contact} ${s.email}`.toLowerCase();
            if (!text.includes(keyword)) return false;
          }
          if (category && s.category !== category) return false;
          if (status && s.status !== status) return false;
          if (assigned) {
            const n = Number(s.assignedAgents) || 0;
            if (assigned === "0" && n !== 0) return false;
            if (assigned === "1-5" && (n < 1 || n > 5)) return false;
            if (assigned === "6-10" && (n < 6 || n > 10)) return false;
            if (assigned === "10+" && n <= 10) return false;
          }
          if (compliance) {
            const notes = (s.complianceNotes || "").toLowerCase();
            const cleared = /verified|signed|complete|cleared|approved/.test(
              notes,
            );
            if (compliance === "cleared" && !cleared) return false;
            if (compliance === "pending" && cleared) return false;
          }
          return true;
        });

        const sorters = {
          "company-asc": (a, b) =>
            (a.company || "").localeCompare(b.company || ""),
          "agents-desc": (a, b) =>
            (Number(b.assignedAgents) || 0) -
            (Number(a.assignedAgents) || 0),
          "agents-asc": (a, b) =>
            (Number(a.assignedAgents) || 0) -
            (Number(b.assignedAgents) || 0),
          "status-asc": (a, b) =>
            (a.status || "").localeCompare(b.status || ""),
          "category-asc": (a, b) =>
            (a.category || "").localeCompare(b.category || ""),
        };
        return [...result].sort(sorters[sortBy] || sorters["company-asc"]);
      }

      function renderTable() {
        const body = document.getElementById("supportTableBody");
        const empty = document.getElementById("emptyState");
        const filtered = applyFilters(supportAccounts);

        body.innerHTML = "";
        if (!filtered.length) {
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";

        filtered.forEach((s) => {
          const tr = document.createElement("tr");
          const statusClass =
            s.status === "Active"
              ? "status-active"
              : s.status === "Suspended"
                ? "status-suspended"
                : "status-pending";
          tr.innerHTML = `
            <td>
              <div style="font-weight:600;">${s.company}</div>
              <div style="font-size:10px;color:#7c6a55;">${s.contact} · ${
                s.email
              }</div>
            </td>
            <td><span class="type-chip">${s.category}</span></td>
            <td><span class="status-pill ${statusClass}">${s.status}</span></td>
            <td>${s.assignedAgents}</td>
            <td>
              <div class="actions">
                <button type="button" class="btn btn-ghost btn-sm" data-view-id="${
                  s.id
                }">View</button>
                <button type="button" class="btn btn-ghost btn-sm" data-suspend-id="${
                  s.id
                }">Suspend</button>
              </div>
            </td>
          `;
          tr.addEventListener("click", (e) => {
            if (e.target.closest("button")) return;
            openDetail(s.id);
          });
          body.appendChild(tr);
        });

        body.querySelectorAll("[data-view-id]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = btn.getAttribute("data-view-id");
            openDetail(id);
          });
        });

        body.querySelectorAll("[data-suspend-id]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = btn.getAttribute("data-suspend-id");
            toggleSuspend(id);
          });
        });
      }

      function openDetail(id) {
        const listView = document.getElementById("listView");
        const detailView = document.getElementById("detailView");
        if (listView && detailView) {
          listView.style.display = "none";
          detailView.style.display = "block";
        }
        selectSupport(id);
      }

      function selectSupport(id) {
        selectedId = id;
        UX.markClean();
        const s = supportAccounts.find((x) => x.id === id);
        const badge = document.getElementById("selectedBadge");
        const panel = document.getElementById("detailPanel");
        const heroName = document.getElementById("heroName");
        const heroEmail = document.getElementById("heroEmail");
        const heroAvatar = document.getElementById("heroAvatar");
        const heroToggleBtn = document.getElementById("heroToggleBtn");

        if (!s) {
          badge.textContent = "No account selected";
          if (heroName) heroName.textContent = "Select an account";
          if (heroEmail) heroEmail.textContent = "—";
          if (heroAvatar) heroAvatar.textContent = "S";
          if (heroToggleBtn) {
            heroToggleBtn.textContent = "Suspend";
            heroToggleBtn.className = "btn btn-ghost";
            heroToggleBtn.onclick = null;
          }
          panel.innerHTML =
            '<div class="empty-state" style="padding:60px 20px">Select a support account to see details.</div>';
          return;
        }
        badge.textContent = `${s.id} · ${s.category}`;
        if (heroName) heroName.textContent = s.company;
        if (heroEmail) heroEmail.textContent = s.email || "—";
        if (heroAvatar) {
          heroAvatar.textContent = (s.company || "S")
            .split(/\s+/)
            .filter(Boolean)
            .map((w) => w[0])
            .join("")
            .slice(0, 2)
            .toUpperCase();
        }
        if (heroToggleBtn) {
          const isActive = s.status === "Active";
          heroToggleBtn.textContent = isActive ? "Suspend" : "Re-activate";
          heroToggleBtn.className = isActive ? "btn btn-danger" : "btn btn-ghost";
          heroToggleBtn.onclick = () => toggleSuspend(s.id);
        }

        const statusClass =
          s.status === "Active"
            ? "status-active"
            : s.status === "Suspended"
              ? "status-suspended"
              : "status-pending";
        panel.innerHTML = `
          <div class="detail-section">
            <div class="detail-title">
              Account information
              <span class="section-sub">${s.id}</span>
            </div>
            <div class="info-grid">
              <div class="info-row">
                <div class="info-label">Primary contact</div>
                <div class="info-value">${s.contact || "—"}</div>
              </div>
              <div class="info-row">
                <div class="info-label">Email</div>
                <div class="info-value">${s.email || "—"}</div>
              </div>
              <div class="info-row">
                <div class="info-label">Category</div>
                <div class="info-value">
                  <span class="type-chip">${s.category}</span>
                </div>
              </div>
              <div class="info-row">
                <div class="info-label">Account status</div>
                <div class="info-value">
                  <span class="status-pill ${statusClass}">${s.status}</span>
                </div>
              </div>
              <div class="info-row">
                <div class="info-label">Assigned agents</div>
                <div class="info-value">${s.assignedAgents}</div>
              </div>
              <div class="info-row">
                <div class="info-label">Service regions</div>
                <div class="info-value">${s.regions || "—"}</div>
              </div>
              <div class="info-row info-row-wide">
                <div class="info-label">Onboarding</div>
                <div class="info-value">${s.onboardingStatus || "—"}</div>
              </div>
              <div class="info-row info-row-wide">
                <div class="info-label">Compliance notes</div>
                <div class="info-value">${s.complianceNotes || "—"}</div>
              </div>
            </div>
          </div>
        `;
      }

      function toggleSuspend(id) {
        const s = supportAccounts.find((x) => x.id === id);
        if (!s) return;
        const suspending = s.status === "Active";
        UX.confirm({
          title: suspending ? "Suspend account?" : "Re-activate account?",
          message: suspending
            ? `Suspend support account ${s.company}? Linked agents will see access limited.`
            : `Re-activate support account ${s.company}?`,
          okLabel: suspending ? "Suspend" : "Re-activate",
          danger: suspending,
          onConfirm() {
            s.status = suspending ? "Suspended" : "Active";
            if (selectedId === id) selectSupport(id);
            renderTable();
            Toast.ok(
              suspending
                ? `${s.company} suspended`
                : `${s.company} re-activated`,
            );
          },
        });
      }

      const LEAD_STORAGE_KEY = "yuushiAdminLeads";

      function getStoredLeads() {
        try {
          const raw = window.localStorage.getItem(LEAD_STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          console.error("Failed to read leads from storage", e);
          return [];
        }
      }

      function saveStoredLeads(list) {
        try {
          window.localStorage.setItem(LEAD_STORAGE_KEY, JSON.stringify(list));
        } catch (e) {
          console.error("Failed to write leads to storage", e);
          Toast.err("Unable to save: localStorage blocked.");
        }
      }

      function removeLead(entityType, id) {
        const all = getStoredLeads();
        const keyId = String(id);
        const filtered = all.filter(
          (l) => !(l && l.entityType === entityType && String(l.id) === keyId),
        );
        saveStoredLeads(filtered);
      }

      function isLead(entityType, id) {
        const all = getStoredLeads();
        const keyId = String(id);
        return all.some(
          (l) => l && l.entityType === entityType && String(l.id) === keyId,
        );
      }

      function updateLeadButtonsForSupport() {
        const saveBtn = document.getElementById("saveLeadSupportBtn");
        const unsaveBtn = document.getElementById("unsaveLeadSupportBtn");
        if (!saveBtn || !unsaveBtn) return;
        if (!selectedId) {
          saveBtn.style.display = "inline-flex";
          unsaveBtn.style.display = "none";
          return;
        }
        if (isLead("support", selectedId)) {
          saveBtn.style.display = "none";
          unsaveBtn.style.display = "inline-flex";
        } else {
          saveBtn.style.display = "inline-flex";
          unsaveBtn.style.display = "none";
        }
      }

      function upsertLead(lead) {
        const list = getStoredLeads();
        const keyId = String(lead.id);
        const idx = list.findIndex(
          (l) =>
            l && l.entityType === lead.entityType && String(l.id) === keyId,
        );
        const now = new Date().toISOString().slice(0, 10);
        if (idx >= 0) {
          list[idx] = { ...list[idx], ...lead, updatedDate: now };
        } else {
          list.push({ ...lead, createdDate: lead.createdDate || now });
        }
        saveStoredLeads(list);
      }

      function saveLeadFromSupport() {
        if (!selectedId) {
          Toast.err("Select a support account first."); 
          return;
        }
        const s = supportAccounts.find((x) => x.id === selectedId);
        if (!s) {
          Toast.err("Support account not found."); 
          return;
        }

        const lead = {
          id: s.id,
          entityType: "support",
          name: s.company || "",
          contactName: s.contact || "",
          email: s.email || "",
          category: s.category || "",
          status: s.status || "",
          assignedAgents: s.assignedAgents ?? null,
          regions: s.regions || "",
          onboardingStatus: s.onboardingStatus || "",
          leadStatus: "New",
          source: "Support Account Management",
        };

        upsertLead(lead);
        Toast.ok("Saved as lead in admin overview");
        updateLeadButtonsForSupport();
      }

      function unsaveLeadFromSupport() {
        if (!selectedId) {
          Toast.err("Select a support account first."); 
          return;
        }
        removeLead("support", selectedId);
        Toast.ok("Lead removed");
        updateLeadButtonsForSupport();
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderTable();
        selectSupport(null);

        [
          "searchInput",
          "categoryFilter",
          "statusFilter",
          "assignedFilter",
          "complianceFilter",
          "sortBy",
        ].forEach((id) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.addEventListener("input", renderTable);
          el.addEventListener("change", renderTable);
        });
        document
          .getElementById("resetFiltersBtn")
          ?.addEventListener("click", () => {
            [
              "searchInput",
              "categoryFilter",
              "statusFilter",
              "assignedFilter",
              "complianceFilter",
            ].forEach((id) => {
              const el = document.getElementById(id);
              if (el) el.value = "";
            });
            const sb = document.getElementById("sortBy");
            if (sb) sb.value = "company-asc";
            renderTable();
          });

        const saveLeadBtn = document.getElementById("saveLeadSupportBtn");
        if (saveLeadBtn) {
          saveLeadBtn.addEventListener("click", saveLeadFromSupport);
        }

        const unsaveLeadBtn = document.getElementById("unsaveLeadSupportBtn");
        if (unsaveLeadBtn) {
          unsaveLeadBtn.addEventListener("click", unsaveLeadFromSupport);
        }

        const backBtn = document.getElementById("backToListBtn");
        if (backBtn) {
          backBtn.addEventListener("click", () => {
            UX.guard(() => {
              const listView = document.getElementById("listView");
              const detailView = document.getElementById("detailView");
              if (listView && detailView) {
                detailView.style.display = "none";
                listView.style.display = "block";
              }
              selectedId = null;
              selectSupport(null);
            });
          });
        }

        const params = new URLSearchParams(window.location.search);
        const from = params.get("from");
        const leadId = params.get("leadId");
        if (from === "leads" && leadId) {
          const match = supportAccounts.find(
            (s) => String(s.id) === String(leadId),
          );
          if (match) {

  <div class="ux-modal-box">
    <h3 id="uxConfirmTitle">Confirm</h3>
    <p id="uxConfirmMsg"></p>
    <div class="ux-modal-actions">
      <button type="button" class="ux-btn" id="uxConfirmCancel">Cancel</button>
      <button type="button" class="ux-btn primary" id="uxConfirmOk">Confirm</button>
    </div>
  </div>

<script>
(function(){
  if (window.UX) return; // idempotent
  const wrap = document.getElementById('uxToastWrap');
  const modal = document.getElementById('uxConfirmModal');
  const titleEl = document.getElementById('uxConfirmTitle');
  const msgEl = document.getElementById('uxConfirmMsg');
  const okBtn = document.getElementById('uxConfirmOk');
  const cancelBtn = document.getElementById('uxConfirmCancel');

  // ──── Toast ────────────────────────────────────────────────────
  function toast(msg, type){
    if(!wrap) return;
    const el = document.createElement('div');
    el.className = 'ux-toast ' + (type || 'info');
    const span = document.createElement('span');
    span.textContent = msg || '';
    const x = document.createElement('button');
    x.className = 'x'; x.type = 'button'; x.setAttribute('aria-label','Dismiss');
    x.textContent = '×';
    x.addEventListener('click', () => el.remove());
    el.appendChild(span); el.appendChild(x);
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 220); }, 3800);
  }
  window.Toast = {
    show: toast,
    ok:   (m) => toast(m, 'ok'),
    err:  (m) => toast(m, 'err'),
    info: (m) => toast(m, 'info'),
  };

  // ──── Confirm modal ───────────────────────────────────────────
  let _onOk = null;
  let _lastFocus = null;
  function closeConfirm(){
    modal.classList.remove('open');
    _onOk = null;
    if(_lastFocus && _lastFocus.focus) try { _lastFocus.focus(); } catch(e){}
  }
  okBtn.addEventListener('click', () => { const cb = _onOk; closeConfirm(); if(cb) cb(); });
  cancelBtn.addEventListener('click', closeConfirm);
  modal.addEventListener('click', (e) => { if(e.target === modal) closeConfirm(); });

  function openConfirm(opts){
    titleEl.textContent  = opts.title   || 'Confirm';
    msgEl.textContent    = opts.message || 'Are you sure?';
    okBtn.textContent    = opts.okLabel || 'Confirm';
    cancelBtn.textContent= opts.cancelLabel || 'Cancel';
    okBtn.className = 'ux-btn ' + (opts.danger ? 'danger' : 'primary');
    _onOk = typeof opts.onConfirm === 'function' ? opts.onConfirm : null;
    _lastFocus = document.activeElement;
    modal.classList.add('open');
    setTimeout(() => okBtn.focus(), 40);
  }

  window.UX = {
    confirm: openConfirm,
    toast,
    // Run action only after confirming if dirty
    guard(action){
      if(!window.UX_dirty){ if(typeof action === 'function') action(); return; }
      openConfirm({
        title: 'Discard unsaved changes?',
        message: 'You have edits that have not been saved. Leave anyway?',
        okLabel: 'Discard',
        danger: true,
        onConfirm(){ window.UX_dirty = false; if(typeof action === 'function') action(); }
      });
    },
    markClean(){ window.UX_dirty = false; document.body.classList.remove('ux-dirty'); },
    markDirty(){ window.UX_dirty = true;  document.body.classList.add('ux-dirty'); },
  };

  // ──── Esc closes any open modal (built-in + page modals) ──────
  document.addEventListener('keydown', (e) => {
    if(e.key !== 'Escape') return;
    if(modal.classList.contains('open')){ closeConfirm(); return; }
    document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
      const visible = getComputedStyle(m).display !== 'none' || m.classList.contains('show') || m.classList.contains('open');
      if(!visible) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Backdrop click closes existing page modals ──────────────
  document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
    if(m.__uxBound) return; m.__uxBound = true;
    m.addEventListener('click', (e) => {
      if(e.target !== m) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Auto-track dirty on any [data-track-dirty] container ────
  document.addEventListener('input', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  document.addEventListener('change', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  window.addEventListener('beforeunload', (e) => {
    if(window.UX_dirty){ e.preventDefault(); e.returnValue = ''; }
  });

  // ──── Inline validation helper ────────────────────────────────
  window.UX.validate = function(form){
    let firstInvalid = null;
    form.querySelectorAll('.ux-field-error').forEach(n => n.remove());
    form.querySelectorAll('.ux-invalid').forEach(n => n.classList.remove('ux-invalid'));
    form.querySelectorAll('[required]').forEach(field => {
      const v = (field.value || '').trim();
      let bad = !v;
      if(!bad && field.type === 'email'){
        bad = !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      }
      if(bad){
        field.classList.add('ux-invalid');
        const note = document.createElement('span');
        note.className = 'ux-field-error';
        note.textContent = field.dataset.errorMsg ||
          (field.type === 'email' ? 'Please enter a valid email.' : 'This field is required.');
        if(field.parentNode) field.parentNode.insertBefore(note, field.nextSibling);
        if(!firstInvalid) firstInvalid = field;
      }
    });
    if(firstInvalid){ firstInvalid.focus(); return false; }
    return true;
  };
})();
</script>
