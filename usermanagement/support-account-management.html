<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Support Account Management</title>
    <style>
      :root{
        --bg-page:#f5f5f5;--bg-card:#ffffff;--bg-card-warm:#fffaf2;--bg-row-hover:#faf6ee;--bg-header-soft:#faf6ee;
        --text-primary:#1a1a1a;--text-muted:#7a6a5c;--text-label:#888;--text-link:#8a5a3b;
        --border-default:#e0e0e0;--border-warm:#eadccd;--border-soft:#f0f0f0;
        --color-primary:#8B7340;--color-primary-hover:#6d5a32;--color-primary-light:#c9a85c;
        --status-success-text:#2a7a2a;--status-success-bg:#d4f0d4;--status-warning-text:#c87a2a;--status-warning-bg:#fff3d4;--status-danger-text:#b23b3b;--status-danger-bg:#fbe9e9;--status-neutral-text:#666;--status-neutral-bg:#e8e8e8;
        --r-sm:6px;--r-md:8px;--r-lg:12px;--r-full:999px;
        --shadow-card:0 10px 30px rgba(115,72,39,.05);--shadow-toast:0 8px 24px rgba(0,0,0,.3);--shadow-modal:0 18px 50px rgba(59,47,42,.28);
        --font-stack:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--font-stack);
        background: var(--bg-page);
        color: var(--text-primary);
      }

      .page {
        padding: 24px 32px 32px;
      }

      .page-header {
        margin-bottom: 18px;
      }

      .page-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .page-subtitle {
        font-size: 13px;
        color: var(--text-muted);
        max-width: 640px;
      }

      .pill {
        margin-top: 6px;
        padding: 4px 10px;
        border-radius: var(--r-full);
        font-size: 11px;
        font-weight: 600;
        background: var(--status-warning-bg);
        color: var(--color-primary);
        display: inline-block;
      }

      .card {
        background: var(--bg-card-warm);
        border-radius: var(--r-lg);
        border: 1px solid var(--border-warm);
        padding: 14px 16px 16px;
        box-shadow: var(--shadow-card);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 15px;
        font-weight: 600;
      }

      .card-subtitle {
        font-size: 12px;
        color: var(--text-muted);
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .filters input[type="text"],
      .filters select {
        border-radius: var(--r-full);
        border: 1px solid var(--border-warm);
        padding: 6px 10px;
        font-size: 12px;
        background: var(--bg-card-warm);
      }

      .filters input[type="text"] {
        flex: 1;
        min-width: 200px;
      }

      .filters select {
        min-width: 150px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: var(--bg-header-soft);
      }

      th,
      td {
        padding: 8px 6px;
        text-align: left;
        border-bottom: 1px solid var(--border-soft);
      }

      th {
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        color: var(--text-muted);
      }

      tbody tr:hover td {
        background: var(--bg-row-hover);
      }

      .badge-soft {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: var(--r-full);
        background: var(--bg-header-soft);
        color: var(--color-primary);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: var(--r-full);
        font-size: 10px;
        font-weight: 600;
      }

      .status-active {
        background: var(--status-success-bg);
        color: var(--status-success-text);
      }

      .status-suspended {
        background: var(--status-danger-bg);
        color: var(--status-danger-text);
      }

      .status-pending {
        background: var(--status-warning-bg);
        color: var(--status-warning-text);
      }

      .type-chip {
        font-size: 10px;
        border-radius: var(--r-full);
        padding: 2px 7px;
        background: var(--bg-header-soft);
        color: var(--color-primary);
        margin-right: 4px;
      }

      .btn {
        border-radius: var(--r-full);
        border: none;
        padding: 4px 10px;
        font-size: 11px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .btn-ghost {
        background: var(--bg-card);
        color: var(--text-primary);
        border: 1px solid var(--border-warm);
      }

      .btn-primary {
        background: var(--color-primary);
        color: #fff;
      }

      .btn-sm {
        padding: 3px 8px;
        font-size: 10px;
      }

      .actions {
        display: flex;
        gap: 6px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
        gap: 18px;
      }

      .detail-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .detail-list {
        list-style: none;
        padding-left: 0;
        margin: 0;
        font-size: 12px;
        color: var(--text-muted);
      }

      .detail-list li {
        margin-bottom: 4px;
      }

      .empty-state {
        font-size: 12px;
        color: var(--text-muted);
        text-align: center;
        padding: 14px 0;
      }

      .result-count {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .pager {
        display: flex;
        gap: 6px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      .pg-ellipsis {
        padding: 0 4px;
        color: var(--text-muted);
      }

      .btn[disabled] {
        opacity: 0.45;
        cursor: not-allowed;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
    <style id="uxResponsiveSplitFix">
/* Force stack 1 column: list full-width on top, detail below */
.layout {
  grid-template-columns: minmax(0, 1fr) !important;
}
/* Compact tightening for very narrow viewports */
@media (max-width: 900px) {
  .page {
    padding: 16px !important;
  }
}
</style>
<style id="uxTableOverflowFix">
/* Table overflow handling: keep text intact, only enable horizontal scroll on narrow viewport */
@media (max-width: 1199px) {
  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
}
</style>
  <style id="uxBaselinePolish">
/* Baseline UI polish — applies only where file CSS doesn't override */
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Pointer cursor on interactive */
button, .btn, [role="button"], select,
input[type="checkbox"], input[type="radio"], input[type="submit"],
input[type="button"], a[href], label[for] {
  cursor: pointer;
}

/* Disabled state */
button:disabled, .btn:disabled, input:disabled, select:disabled, textarea:disabled {
  cursor: not-allowed;
  opacity: 0.6;
}

/* Focus-visible outline (a11y) */
button:focus-visible, .btn:focus-visible,
a:focus-visible, [role="button"]:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid #c4a25f;
  outline-offset: 2px;
}

/* Inherit font family for form controls (fixes browser-default) */
input, select, textarea, button {
  font-family: inherit;
}

/* Responsive media */
img, svg, video {
  max-width: 100%;
  height: auto;
}

/* Subtle hover for buttons (only if no transition already set, gentle filter) */
button:hover:not(:disabled), .btn:hover:not(:disabled) {
  filter: brightness(0.96);
  transition: filter 0.15s ease;
}

/* Smooth scrollbar on Webkit */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: #f5ece0;
}
::-webkit-scrollbar-thumb {
  background: #d9c8b4;
  border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover {
  background: #c4a25f;
}

/* Selection highlight on-brand */
::selection {
  background: #c4a25f;
  color: #fff;
}

/* HR baseline */
hr {
  border: none;
  border-top: 1px solid #eadccd;
  margin: 12px 0;
}

/* Anchor baseline color matches brand (no underline by default to match flat UI) */
a {
  color: #8a5a3b;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
  <body>
    <div class="page">
      <div class="page-header">
        <div class="page-title">Support Account Management</div>
      </div>

      <div id="listView">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Support accounts</div>
            </div>
          </div>

          <div class="filters">
            <input
              type="text"
              id="searchInput"
              placeholder="Search company, contact, email"
            />
            <select id="categoryFilter">
              <option value="">All categories</option>
              <option value="Property manager">Property manager</option>
              <option value="Tax advisor">Tax advisor</option>
              <option value="Legal">Legal professional</option>
            </select>
            <select id="statusFilter">
              <option value="">Any status</option>
              <option value="Active">Active</option>
              <option value="Suspended">Suspended</option>
              <option value="Pending">Pending</option>
            </select>
            <select id="assignedFilter" title="Assigned agents">
              <option value="">Any agent volume</option>
              <option value="0">No agents assigned</option>
              <option value="1-5">1 – 5 agents</option>
              <option value="6-10">6 – 10 agents</option>
              <option value="10+">10+ agents</option>
            </select>
            <select id="complianceFilter" title="Compliance status">
              <option value="">Any compliance</option>
              <option value="cleared">Cleared (MSA / KYC / verified)</option>
              <option value="pending">Documents pending</option>
            </select>
            <select id="sortBy" title="Sort by">
              <option value="company-asc">Sort: Company A→Z</option>
              <option value="agents-desc">Sort: Most agents ↓</option>
              <option value="agents-asc">Sort: Fewest agents ↑</option>
              <option value="status-asc">Sort: Status</option>
              <option value="category-asc">Sort: Category</option>
            </select>
            <button type="button" class="btn btn-ghost" id="resetFiltersBtn">
              Reset
            </button>
          </div>

          <div class="result-count" id="supportCount">Showing 0 of 0 support accounts</div>

          <table>
            <thead>
              <tr>
                <th>Company</th>
                <th>Category</th>
                <th>Status</th>
                <th>Assigned agents</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="supportTableBody"></tbody>
          </table>
          <div class="empty-state" id="emptyState" style="display: none">
            No support accounts match current filters.
          </div>
          <div class="pager" id="supportPager"></div>
        </div>
      </div>

      <div id="detailView" style="display: none">
        <div class="entity-toolbar">
          <button type="button" class="entity-back-btn" id="backToListBtn">
            <span aria-hidden="true">←</span> Back to support list
          </button>
          <div class="entity-toolbar-right">
            <button
              type="button"
              class="btn btn-ghost"
              id="saveLeadSupportBtn"
              title="Pin this support account to the admin Lead overview"
            >
              <span aria-hidden="true">★</span> Save as lead
            </button>
            <button
              type="button"
              class="btn btn-ghost"
              id="unsaveLeadSupportBtn"
              style="display: none"
            >
              <span aria-hidden="true">✕</span> Unsave lead
            </button>
          </div>
        </div>

        <div class="entity-hero">
          <div class="entity-hero-avatar">
            <div class="avatar-circle" id="heroAvatar">S</div>
          </div>
          <div class="entity-hero-info">
            <h1 class="entity-hero-name" id="heroName">Select an account</h1>
            <div class="entity-hero-meta">
              <span class="badge-soft" id="selectedBadge"
                >No account selected</span
              >
              <span class="entity-hero-sep">·</span>
              <span class="entity-hero-email" id="heroEmail">—</span>
            </div>
          </div>
          <div class="entity-hero-actions">
            <button type="button" class="btn btn-ghost" id="heroToggleBtn">
              Suspend
            </button>
          </div>
        </div>

        <div id="detailPanel">
          <div class="empty-state" style="padding: 60px 20px">
            Select a support account to see details.
          </div>
        </div>
      </div>
    </div>

    <script>
      const supportAccounts = [
        {
          id: "SUP-01",
          company: "Kansai Property Management",
          contact: "Tanaka Ken",
          email: "ken@kansai-pm.jp",
          category: "Property manager",
          status: "Active",
          assignedAgents: 12,
          regions: "Osaka, Kyoto",
          onboardingStatus: "Completed",
          complianceNotes: "MSA signed, KYC complete.",
        },
        {
          id: "SUP-02",
          company: "Tokyo Tax Advisory Partners",
          contact: "Saito Mika",
          email: "mika@tokyotaxpartners.jp",
          category: "Tax advisor",
          status: "Pending",
          assignedAgents: 5,
          regions: "Tokyo 23 wards",
          onboardingStatus: "License verification in progress",
          complianceNotes: "Waiting for updated certificate.",
        },
        {
          id: "SUP-03",
          company: "Legal Bridge Partners",
          contact: "Kobayashi Ryo",
          email: "ryo@legalbridge.jp",
          category: "Legal professional",
          status: "Active",
          assignedAgents: 8,
          regions: "National",
          onboardingStatus: "Completed",
          complianceNotes: "Bar association membership verified.",
        },
      ];

      // Deterministic filler so the dataset exceeds 50 rows (demo pagination).
      (function seedFiller() {
        const categories = ["Property manager", "Tax advisor", "Legal professional"];
        const statuses = ["Active", "Suspended", "Pending"];
        const regions = ["Tokyo", "Osaka", "Kyoto", "Nagoya", "Fukuoka", "National"];
        const companies = [
          "Sakura", "Fuji", "Sumida", "Hokkaido", "Sapporo",
          "Nara", "Kobe", "Sendai", "Chiba", "Yokohama",
        ];
        for (let i = 1; i <= 56; i++) {
          const cleared = i % 3 !== 0;
          const status = statuses[i % statuses.length];
          supportAccounts.push({
            id: `SUP-${String(100 + i).padStart(3, "0")}`,
            company: `${companies[i % companies.length]} Support Group ${i}`,
            contact: `Contact Person ${i}`,
            email: `support${i}@partner.jp`,
            category: categories[i % categories.length],
            status,
            assignedAgents: i % 13,
            regions: regions[i % regions.length],
            onboardingStatus: cleared ? "Completed" : "Documents pending",
            complianceNotes: cleared
              ? "MSA signed, KYC complete, verified."
              : "Waiting for updated certificate.",
          });
        }
      })();

      let selectedId = null;

      const PAGE_SIZE = 50;
      let pageNum = 1;
      function pageWindow(cur, pages) {
        const out = [];
        if (pages <= 7) { for (let i = 1; i <= pages; i++) out.push(i); return out; }
        let s = Math.max(2, cur - 2), e = Math.min(pages - 1, cur + 2);
        if (cur <= 4) { s = 2; e = 5; }
        if (cur >= pages - 3) { s = pages - 4; e = pages - 1; }
        out.push(1);
        if (s > 2) out.push("…");
        for (let i = s; i <= e; i++) out.push(i);
        if (e < pages - 1) out.push("…");
        out.push(pages);
        return out;
      }
      function renderPager(total, pagerEl, gotoName) {
        if (!pagerEl) return;
        const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
        if (total <= PAGE_SIZE) { pagerEl.innerHTML = ""; pagerEl.style.display = "none"; return; }
        pagerEl.style.display = "flex";
        let h = `<button type="button" class="btn btn-sm" ${pageNum===1?"disabled":""} onclick="${gotoName}(${pageNum-1})">‹ Prev</button>`;
        pageWindow(pageNum, pages).forEach(p => {
          h += p === "…" ? `<span class="pg-ellipsis">…</span>`
            : `<button type="button" class="btn btn-sm ${p===pageNum?"btn-primary":""}" onclick="${gotoName}(${p})">${p}</button>`;
        });
        h += `<button type="button" class="btn btn-sm" ${pageNum===pages?"disabled":""} onclick="${gotoName}(${pageNum+1})">Next ›</button>`;
        pagerEl.innerHTML = h;
      }
      function gotoPage(p) { pageNum = p; renderTable(); }
      window.gotoPage = gotoPage;

      function applyFilters(list) {
        const keyword = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const category = document.getElementById("categoryFilter").value;
        const status = document.getElementById("statusFilter").value;
        const assigned =
          document.getElementById("assignedFilter")?.value || "";
        const compliance =
          document.getElementById("complianceFilter")?.value || "";
        const sortBy =
          document.getElementById("sortBy")?.value || "company-asc";

        let result = list.filter((s) => {
          if (keyword) {
            const text =
              `${s.company} ${s.contact} ${s.email}`.toLowerCase();
            if (!text.includes(keyword)) return false;
          }
          if (category && s.category !== category) return false;
          if (status && s.status !== status) return false;
          if (assigned) {
            const n = Number(s.assignedAgents) || 0;
            if (assigned === "0" && n !== 0) return false;
            if (assigned === "1-5" && (n < 1 || n > 5)) return false;
            if (assigned === "6-10" && (n < 6 || n > 10)) return false;
            if (assigned === "10+" && n <= 10) return false;
          }
          if (compliance) {
            const notes = (s.complianceNotes || "").toLowerCase();
            const cleared = /verified|signed|complete|cleared|approved/.test(
              notes,
            );
            if (compliance === "cleared" && !cleared) return false;
            if (compliance === "pending" && cleared) return false;
          }
          return true;
        });

        const sorters = {
          "company-asc": (a, b) =>
            (a.company || "").localeCompare(b.company || ""),
          "agents-desc": (a, b) =>
            (Number(b.assignedAgents) || 0) -
            (Number(a.assignedAgents) || 0),
          "agents-asc": (a, b) =>
            (Number(a.assignedAgents) || 0) -
            (Number(b.assignedAgents) || 0),
          "status-asc": (a, b) =>
            (a.status || "").localeCompare(b.status || ""),
          "category-asc": (a, b) =>
            (a.category || "").localeCompare(b.category || ""),
        };
        return [...result].sort(sorters[sortBy] || sorters["company-asc"]);
      }

      function renderTable() {
        const body = document.getElementById("supportTableBody");
        const empty = document.getElementById("emptyState");
        const countEl = document.getElementById("supportCount");
        const pagerEl = document.getElementById("supportPager");
        const filtered = applyFilters(supportAccounts);
        const total = filtered.length;
        const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
        if (pageNum > pages) pageNum = pages;
        if (pageNum < 1) pageNum = 1;

        body.innerHTML = "";
        if (!total) {
          empty.style.display = "block";
          if (countEl) countEl.textContent = "Showing 0 of 0 support accounts";
          renderPager(total, pagerEl, "gotoPage");
          return;
        }
        empty.style.display = "none";

        const start = (pageNum - 1) * PAGE_SIZE;
        const pageRows = filtered.slice(start, start + PAGE_SIZE);
        if (countEl) {
          countEl.textContent = `Showing ${start + 1}–${start + pageRows.length} of ${total} support accounts`;
        }

        pageRows.forEach((s) => {
          const tr = document.createElement("tr");
          const statusClass =
            s.status === "Active"
              ? "status-active"
              : s.status === "Suspended"
                ? "status-suspended"
                : "status-pending";
          tr.innerHTML = `
            <td>
              <div style="font-weight:600;">${s.company}</div>
              <div style="font-size:10px;color:var(--text-muted);">${s.contact} · ${
                s.email
              }</div>
            </td>
            <td><span class="type-chip">${s.category}</span></td>
            <td><span class="status-pill ${statusClass}">${s.status}</span></td>
            <td>${s.assignedAgents}</td>
            <td>
              <div class="actions">
                <button type="button" class="btn btn-ghost btn-sm" data-view-id="${
                  s.id
                }">View</button>
                <button type="button" class="btn btn-ghost btn-sm" data-suspend-id="${
                  s.id
                }">Suspend</button>
              </div>
            </td>
          `;
          tr.addEventListener("click", (e) => {
            if (e.target.closest("button")) return;
            openDetail(s.id);
          });
          body.appendChild(tr);
        });

        body.querySelectorAll("[data-view-id]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = btn.getAttribute("data-view-id");
            openDetail(id);
          });
        });

        body.querySelectorAll("[data-suspend-id]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = btn.getAttribute("data-suspend-id");
            toggleSuspend(id);
          });
        });

        renderPager(total, pagerEl, "gotoPage");
      }

      function openDetail(id) {
        const listView = document.getElementById("listView");
        const detailView = document.getElementById("detailView");
        if (listView && detailView) {
          listView.style.display = "none";
          detailView.style.display = "block";
        }
        selectSupport(id);
      }

      function selectSupport(id) {
        selectedId = id;
        UX.markClean();
        const s = supportAccounts.find((x) => x.id === id);
        const badge = document.getElementById("selectedBadge");
        const panel = document.getElementById("detailPanel");
        const heroName = document.getElementById("heroName");
        const heroEmail = document.getElementById("heroEmail");
        const heroAvatar = document.getElementById("heroAvatar");
        const heroToggleBtn = document.getElementById("heroToggleBtn");

        if (!s) {
          badge.textContent = "No account selected";
          if (heroName) heroName.textContent = "Select an account";
          if (heroEmail) heroEmail.textContent = "—";
          if (heroAvatar) heroAvatar.textContent = "S";
          if (heroToggleBtn) {
            heroToggleBtn.textContent = "Suspend";
            heroToggleBtn.className = "btn btn-ghost";
            heroToggleBtn.onclick = null;
          }
          panel.innerHTML =
            '<div class="empty-state" style="padding:60px 20px">Select a support account to see details.</div>';
          return;
        }
        badge.textContent = `${s.id} · ${s.category}`;
        if (heroName) heroName.textContent = s.company;
        if (heroEmail) heroEmail.textContent = s.email || "—";
        if (heroAvatar) {
          heroAvatar.textContent = (s.company || "S")
            .split(/\s+/)
            .filter(Boolean)

<script>
(function(){
  if (window.UX) return; // idempotent
  const wrap = document.getElementById('uxToastWrap');
  const modal = document.getElementById('uxConfirmModal');
  const titleEl = document.getElementById('uxConfirmTitle');
  const msgEl = document.getElementById('uxConfirmMsg');
  const okBtn = document.getElementById('uxConfirmOk');
  const cancelBtn = document.getElementById('uxConfirmCancel');

  // ──── Toast ────────────────────────────────────────────────────
  function toast(msg, type){
    if(!wrap) return;
    const el = document.createElement('div');
    el.className = 'ux-toast ' + (type || 'info');
    const span = document.createElement('span');
    span.textContent = msg || '';
    const x = document.createElement('button');
    x.className = 'x'; x.type = 'button'; x.setAttribute('aria-label','Dismiss');
    x.textContent = '×';
    x.addEventListener('click', () => el.remove());
    el.appendChild(span); el.appendChild(x);
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 220); }, 3800);
  }
  window.Toast = {
    show: toast,
    ok:   (m) => toast(m, 'ok'),
    err:  (m) => toast(m, 'err'),
    info: (m) => toast(m, 'info'),
  };

  // ──── Confirm modal ───────────────────────────────────────────
  let _onOk = null;
  let _lastFocus = null;
  function closeConfirm(){
    modal.classList.remove('open');
    _onOk = null;
    if(_lastFocus && _lastFocus.focus) try { _lastFocus.focus(); } catch(e){}
  }
  okBtn.addEventListener('click', () => { const cb = _onOk; closeConfirm(); if(cb) cb(); });
  cancelBtn.addEventListener('click', closeConfirm);
  modal.addEventListener('click', (e) => { if(e.target === modal) closeConfirm(); });

  function openConfirm(opts){
    titleEl.textContent  = opts.title   || 'Confirm';
    msgEl.textContent    = opts.message || 'Are you sure?';
    okBtn.textContent    = opts.okLabel || 'Confirm';
    cancelBtn.textContent= opts.cancelLabel || 'Cancel';
    okBtn.className = 'ux-btn ' + (opts.danger ? 'danger' : 'primary');
    _onOk = typeof opts.onConfirm === 'function' ? opts.onConfirm : null;
    _lastFocus = document.activeElement;
    modal.classList.add('open');
    setTimeout(() => okBtn.focus(), 40);
  }

  window.UX = {
    confirm: openConfirm,
    toast,
    // Run action only after confirming if dirty
    guard(action){
      if(!window.UX_dirty){ if(typeof action === 'function') action(); return; }
      openConfirm({
        title: 'Discard unsaved changes?',
        message: 'You have edits that have not been saved. Leave anyway?',
        okLabel: 'Discard',
        danger: true,
        onConfirm(){ window.UX_dirty = false; if(typeof action === 'function') action(); }
      });
    },
    markClean(){ window.UX_dirty = false; document.body.classList.remove('ux-dirty'); },
    markDirty(){ window.UX_dirty = true;  document.body.classList.add('ux-dirty'); },
  };

  // ──── Esc closes any open modal (built-in + page modals) ──────
  document.addEventListener('keydown', (e) => {
    if(e.key !== 'Escape') return;
    if(modal.classList.contains('open')){ closeConfirm(); return; }
    document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
      const visible = getComputedStyle(m).display !== 'none' || m.classList.contains('show') || m.classList.contains('open');
      if(!visible) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Backdrop click closes existing page modals ──────────────
  document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
    if(m.__uxBound) return; m.__uxBound = true;
    m.addEventListener('click', (e) => {
      if(e.target !== m) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Auto-track dirty on any [data-track-dirty] container ────
  document.addEventListener('input', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  document.addEventListener('change', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  window.addEventListener('beforeunload', (e) => {
    if(window.UX_dirty){ e.preventDefault(); e.returnValue = ''; }
  });

  // ──── Inline validation helper ────────────────────────────────
  window.UX.validate = function(form){
    let firstInvalid = null;
    form.querySelectorAll('.ux-field-error').forEach(n => n.remove());
    form.querySelectorAll('.ux-invalid').forEach(n => n.classList.remove('ux-invalid'));
    form.querySelectorAll('[required]').forEach(field => {
      const v = (field.value || '').trim();
      let bad = !v;
      if(!bad && field.type === 'email'){
        bad = !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      }
      if(bad){
        field.classList.add('ux-invalid');
        const note = document.createElement('span');
        note.className = 'ux-field-error';
        note.textContent = field.dataset.errorMsg ||
          (field.type === 'email' ? 'Please enter a valid email.' : 'This field is required.');
        if(field.parentNode) field.parentNode.insertBefore(note, field.nextSibling);
        if(!firstInvalid) firstInvalid = field;
      }
    });
    if(firstInvalid){ firstInvalid.focus(); return false; }
    return true;
  };
})();
</script>

<div class="ux-modal" id="leadPickerModal" role="dialog" aria-modal="true" aria-labelledby="lpTitle">
  <div class="ux-modal-box lp-modal-box">
    <h3 id="lpTitle">Save to lead group</h3>
    <div class="lp-subject" id="lpSubject">—</div>

    <div class="lp-newrow">
      <input id="lpNewName" type="text" placeholder="New group name…" />
      <button type="button" id="lpCreateBtn">Create group</button>
    </div>

    <div class="lp-list" id="lpList"></div>

    <div class="ux-modal-actions">
      <button type="button" class="ux-btn" id="lpCancelBtn">Cancel</button>
      <button type="button" class="ux-btn primary" id="lpSaveBtn" disabled>Save to group</button>
    </div>
  </div>
</div>

<script>
(function() {
  if (window.openLeadGroupPicker) return;
  const GROUP_KEY = "yuushiLeadGroups";
  const LEAD_KEY = "yuushiLeads";

  function readGroups() {
    try { return JSON.parse(localStorage.getItem(GROUP_KEY)) || []; }
    catch (e) { return []; }
  }
  function writeGroups(g) {
    localStorage.setItem(GROUP_KEY, JSON.stringify(g));
  }
  function readLeads() {
    try { return JSON.parse(localStorage.getItem(LEAD_KEY)) || []; }
    catch (e) { return []; }
  }
  function writeLeads(l) {
    localStorage.setItem(LEAD_KEY, JSON.stringify(l));
  }
  function upsertLead(lead) {
    const all = readLeads();
    const keyId = String(lead.id);
    const idx = all.findIndex(
      (x) => x && x.entityType === lead.entityType && String(x.id) === keyId,
    );
    if (idx >= 0) all[idx] = { ...all[idx], ...lead };
    else all.push(lead);
    writeLeads(all);
  }

  const modal     = document.getElementById('leadPickerModal');
  const titleEl   = document.getElementById('lpTitle');
  const subjEl    = document.getElementById('lpSubject');
  const listEl    = document.getElementById('lpList');
  const newNameEl = document.getElementById('lpNewName');
  const createBtn = document.getElementById('lpCreateBtn');
  const cancelBtn = document.getElementById('lpCancelBtn');
  const saveBtn   = document.getElementById('lpSaveBtn');
  let _ctx = null;   // { lead, onSaved }
  let _selectedId = null;

  function close() {
    modal.classList.remove('open');
    _ctx = null;
    _selectedId = null;
    newNameEl.value = '';
    saveBtn.disabled = true;
  }
  cancelBtn.addEventListener('click', close);
  modal.addEventListener('click', (e) => { if (e.target === modal) close(); });

  function render() {
    if (!_ctx) return;
    const lead = _ctx.lead;
    const groups = readGroups().filter((g) => g.entityType === lead.entityType);
    listEl.innerHTML = '';
    if (!groups.length) {
      listEl.innerHTML = '<div class="lp-empty">No groups yet for this type. Use the box above to create one.</div>';
      saveBtn.disabled = true;
      return;
    }
    groups.forEach((g) => {
      const already = (g.leadIds || []).map(String).includes(String(lead.id));
      const row = document.createElement('label');
      row.className = 'lp-group';
      if (_selectedId === g.id) row.classList.add('selected');
      row.innerHTML = `
        <input type="radio" name="lpGroup" value="${g.id}" ${_selectedId === g.id ? 'checked' : ''} />
        <div class="lp-group-body">
          <div class="lp-group-name">${g.name}${already ? '<span class="lp-already">already in group</span>' : ''}</div>
          <div class="lp-group-meta">${(g.leadIds || []).length} member${(g.leadIds || []).length === 1 ? '' : 's'} · created ${g.createdDate || '—'}</div>
        </div>
        <span class="lp-group-badge">${g.entityType === 'agent' ? 'AGENT' : g.entityType === 'end_user' ? 'END USER' : g.entityType.toUpperCase()}</span>
      `;
      row.addEventListener('click', () => {
        _selectedId = g.id;
        render();
      });
      listEl.appendChild(row);
    });
    saveBtn.disabled = !_selectedId;
  }

  createBtn.addEventListener('click', () => {
    if (!_ctx) return;
    const name = newNameEl.value.trim();
    if (!name) {
      newNameEl.classList.add('ux-invalid');
      newNameEl.focus();
      return;
    }
    newNameEl.classList.remove('ux-invalid');
    const groups = readGroups();
    const id = 'g_' + Date.now();
    groups.push({
      id,
      name,
      entityType: _ctx.lead.entityType,
      leadIds: [],
      createdDate: new Date().toISOString().slice(0, 10),
    });
    writeGroups(groups);
    newNameEl.value = '';
    _selectedId = id;
    render();
    if (window.Toast) Toast.ok(`Group "${name}" created`);
  });

  newNameEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); createBtn.click(); }
  });

  saveBtn.addEventListener('click', () => {
    if (!_ctx || !_selectedId) return;
    const lead = _ctx.lead;
    const onSaved = _ctx.onSaved;
    const groups = readGroups();
    const group = groups.find((g) => g.id === _selectedId);
    if (!group) { close(); return; }
    group.leadIds = group.leadIds || [];
    if (!group.leadIds.map(String).includes(String(lead.id))) {
      group.leadIds.push(lead.id);
    }
    writeGroups(groups);
    upsertLead(lead);
    if (window.Toast) Toast.ok(`Added to "${group.name}"`);
    if (typeof onSaved === 'function') onSaved(group);
    close();
  });

  window.openLeadGroupPicker = function (opts) {
    opts = opts || {};
    const lead = opts.lead;
    if (!lead || !lead.id || !lead.entityType) {
      console.error('openLeadGroupPicker: lead.id and lead.entityType required');
      return;
    }
    _ctx = { lead, onSaved: opts.onSaved };
    _selectedId = null;
    titleEl.textContent = opts.title || 'Save to lead group';
    subjEl.textContent =
      (lead.name ? lead.name : 'Lead') +
      (lead.email ? ' · ' + lead.email : lead.id ? ' · ' + lead.id : '');
    render();
    modal.classList.add('open');
    setTimeout(() => newNameEl.focus(), 40);
  };
})();
</script>
<!-- ─────── END LEAD GROUP PICKER ─────── -->
