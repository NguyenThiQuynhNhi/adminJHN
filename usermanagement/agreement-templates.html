<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Agent Agreements</title>
    <style>
      :root {
        --bg-body: #f5f3ef;
        --bg-card: #fffaf2;
        --border-subtle: #eadccd;
        --accent: #c26b41;
        --accent-soft: #f3d7c6;
        --text-main: #3b2f2a;
        --text-muted: #7a6a5c;
        --badge-green: #2f855a;
        --badge-gray: #4a5568;
        --badge-orange: #b7791f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px 24px 32px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .page-subtitle {
        margin: 0 0 16px;
        font-size: 13px;
        color: var(--text-muted);
        max-width: 760px;
      }

      .layout-main {
        display: grid;
        grid-template-columns: minmax(0, 6fr) minmax(0, 7fr);
        gap: 16px;
        align-items: flex-start;
      }

      .card {
        background-color: var(--bg-card);
        border-radius: 14px;
        border: 1px solid var(--border-subtle);
        padding: 14px 16px 16px;
        box-shadow: 0 10px 30px rgba(115, 72, 39, 0.04);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
      }

      .card-subtitle {
        font-size: 12px;
        color: var(--text-muted);
      }

      .toolbar-right {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .toolbar-stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 8px;
      }

      .btn {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 6px 11px;
        font-size: 11px;
        background-color: #fff;
        cursor: pointer;
        display: inline-flex;
        gap: 4px;
        align-items: center;
        color: var(--text-main);
      }

      .btn-primary {
        background: linear-gradient(135deg, #c26b41, #a55232);
        border-color: #a55232;
        color: #fffaf3;
      }

      .btn-ghost {
        background: transparent;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 7px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 500;
        border: 1px solid transparent;
        white-space: nowrap;
      }

      .badge-status-draft {
        background: #f7f7f8;
        color: var(--badge-gray);
        border-color: #d2d6dc;
      }

      .badge-status-published {
        background: #e6f6ef;
        color: var(--badge-green);
        border-color: #b7e4cc;
      }

      .badge-status-pending {
        background: #fff6e0;
        color: var(--badge-orange);
        border-color: #fbd38d;
      }

      .badge-status-signed {
        background: #e6fffa;
        color: #2b6cb0;
        border-color: #b2f5ea;
      }

      .list-scroll {
        max-height: 360px;
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: #f7efe6;
      }

      th,
      td {
        padding: 7px 8px;
        text-align: left;
        border-bottom: 1px solid #efe0d4;
      }

      th {
        font-weight: 500;
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }

      tbody tr {
        cursor: pointer;
        transition: background 0.12s ease;
      }

      tbody tr:hover {
        background-color: #f8f1ea;
      }

      tbody tr.selected-row {
        background-color: #f1e3d5;
      }

      .agreement-title-cell {
        font-weight: 600;
      }

      .detail-layout {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .detail-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
        margin-bottom: 4px;
      }

      .detail-field-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 2px;
      }

      .detail-input,
      .detail-select,
      textarea {
        width: 100%;
        border-radius: 9px;
        border: 1px solid var(--border-subtle);
        padding: 5px 8px;
        font-size: 12px;
        background-color: #fffcf7;
        color: var(--text-main);
        outline: none;
      }

      .detail-input:focus,
      .detail-select:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(194, 107, 65, 0.2);
      }

      textarea {
        min-height: 140px;
        resize: vertical;
        font-family: inherit;
      }

      .hint-text {
        font-size: 11px;
        color: var(--text-muted);
      }

      .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0;
      }

      .filter-input,
      .filter-select {
        border-radius: 999px;
        border: 1px solid var(--border-subtle);
        padding: 5px 10px;
        font-size: 12px;
        background-color: #fffcf7;
        color: var(--text-main);
        outline: none;
      }

      @media (max-width: 960px) {
        .layout-main {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
    <style id="uxResponsiveSplitFix">
/* Force stack 1 column: list full-width on top, detail below */
.layout-main {
  grid-template-columns: minmax(0, 1fr) !important;
}
/* Compact tightening for very narrow viewports */
@media (max-width: 900px) {
  .page {
    padding: 16px !important;
  }
}
</style>
<style id="uxTableOverflowFix">
/* Table overflow handling: keep text intact, only enable horizontal scroll on narrow viewport */
@media (max-width: 1199px) {
  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
}
</style>
  <style id="uxBaselinePolish">
/* Baseline UI polish — applies only where file CSS doesn't override */
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Pointer cursor on interactive */
button, .btn, [role="button"], select,
input[type="checkbox"], input[type="radio"], input[type="submit"],
input[type="button"], a[href], label[for] {
  cursor: pointer;
}

/* Disabled state */
button:disabled, .btn:disabled, input:disabled, select:disabled, textarea:disabled {
  cursor: not-allowed;
  opacity: 0.6;
}

/* Focus-visible outline (a11y) */
button:focus-visible, .btn:focus-visible,
a:focus-visible, [role="button"]:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid #c4a25f;
  outline-offset: 2px;
}

/* Inherit font family for form controls (fixes browser-default) */
input, select, textarea, button {
  font-family: inherit;
}

/* Responsive media */
img, svg, video {
  max-width: 100%;
  height: auto;
}

/* Subtle hover for buttons (only if no transition already set, gentle filter) */
button:hover:not(:disabled), .btn:hover:not(:disabled) {
  filter: brightness(0.96);
  transition: filter 0.15s ease;
}

/* Smooth scrollbar on Webkit */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: #f5ece0;
}
::-webkit-scrollbar-thumb {
  background: #d9c8b4;
  border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover {
  background: #c4a25f;
}

/* Selection highlight on-brand */
::selection {
  background: #c4a25f;
  color: #fff;
}

/* HR baseline */
hr {
  border: none;
  border-top: 1px solid #eadccd;
  margin: 12px 0;
}

/* Anchor baseline color matches brand (no underline by default to match flat UI) */
a {
  color: #8a5a3b;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
  <body>
    <header>
      <h1>Agreement management</h1>
    </header>

    <main class="layout-main">
      <!-- LEFT: Agreements list -->
      <section class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Agreement templates</div>
          </div>
          <div class="toolbar-right">
            <button id="newAgreementBtn" class="btn" type="button">
              New agreement
            </button>
          </div>
        </div>

        <div class="toolbar-stack">
          <div class="filter-row">
            <select id="filterStatus" class="filter-select">
              <option value="all">Status: All</option>
              <option value="draft">Draft</option>
              <option value="published">Published</option>
            </select>
            <select id="filterAcceptance" class="filter-select" title="Agent acceptance">
              <option value="">Acceptance: All</option>
              <option value="all-signed">All agents signed</option>
              <option value="partial">Partially signed</option>
              <option value="none">None signed yet</option>
            </select>
            <select id="filterUpdated" class="filter-select" title="Last updated">
              <option value="">Updated: Any time</option>
              <option value="7d">Last 7 days</option>
              <option value="30d">Last 30 days</option>
              <option value="90d">Last 90 days</option>
              <option value="older">Older than 90 days</option>
            </select>
            <select id="filterSentStatus" class="filter-select" title="Sent to agents">
              <option value="">Sent: All</option>
              <option value="sent">Sent</option>
              <option value="not-sent">Not yet sent</option>
            </select>
            <select id="sortBy" class="filter-select" title="Sort by">
              <option value="updated-desc">Sort: Updated ↓</option>
              <option value="updated-asc">Sort: Updated ↑</option>
              <option value="title-asc">Sort: Title A→Z</option>
              <option value="acceptance-desc">Sort: Acceptance % ↓</option>
              <option value="status-asc">Sort: Status</option>
            </select>
            <input
              id="filterAgreementSearch"
              class="filter-input"
              type="text"
              placeholder="Search agreement by title or body"
            />
            <button type="button" class="btn" id="resetAgreementFilters" style="background:#fff;border:1px solid #ddcdb9;color:#6b5c4e">
              Reset
            </button>
          </div>
        </div>

        <div class="list-scroll">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Status</th>
                <th>Last update</th>
                <th>Agent agreed</th>
              </tr>
            </thead>
            <tbody id="agreementsTbody"></tbody>
          </table>
        </div>
      </section>

      <!-- RIGHT: Agreement editor -->
      <section class="card">
        <div class="detail-layout" id="emptyDetail">
          <div class="card-title">Agreement detail</div>
        </div>

        <div class="detail-layout" id="detailPanel" style="display: none">
          <div class="card-header" style="padding: 0">
            <div>
              <div class="card-title" id="detailTitle"></div>
              <div class="card-subtitle" id="detailMeta"></div>
            </div>
            <div class="toolbar-right">
              <button
                id="sendToAgentsBtn"
                class="btn btn-primary"
                type="button"
              >
                Send to agents
              </button>
              <button id="saveAgreementBtn" class="btn" type="button">
                Save Draft
              </button>
            </div>
          </div>

          <div data-track-dirty>
            <div class="detail-section-title">Basic information</div>
            <div class="detail-grid">
              <div>
                <div class="detail-field-label req">Title</div>
                <input id="inputTitle" class="detail-input" type="text" required />
              </div>
            </div>

            <div style="margin-top:14px">
              <div class="detail-section-title req" style="display:flex;align-items:center;gap:6px">
                Agreement body
                <span class="ux-dirty-pill">Unsaved changes</span>
              </div>
              <textarea
                id="inputBody"
                required
                placeholder="Write the agreement clauses here. Example sections: Purpose, Definitions, Agent obligations, Platform obligations, Confidentiality, Termination, Governing law..."
              ></textarea>
            </div>
          </div>
          <div class="hint-text" id="editabilityHint"></div>
        </div>
      </section>
    </main>

    <script>
      // Demo seed data
      const agreements = [
        {
          id: "code-of-conduct",
          title: "Agent Code of Conduct",
          status: "published",
          effectiveFrom: "2026-03-15",
          lastUpdatedAt: "2026-03-20 10:05",
          lastSentAt: "2026-03-21 08:00",
          body: "Defines expected behaviour when using the platform, communication standards, and rules for handling client data.",
        },
        {
          id: "data-usage-policy",
          title: "Data usage & privacy policy (Agents)",
          status: "published",
          effectiveFrom: "2026-02-01",
          lastUpdatedAt: "2026-02-01 09:00",
          lastSentAt: "2026-02-02 08:45",
          body: "Explains how platform data may be accessed by agents and which logs are recorded for security and compliance.",
        },
        {
          id: "new-feature-beta",
          title: "Beta feature participation terms",
          status: "draft",
          effectiveFrom: "",
          lastUpdatedAt: "2026-04-01 14:32",
          lastSentAt: "",
          body: "Draft: conditions for participating in limited beta features, including feedback loops and rollback scenarios.",
        },
      ];

      const agents = [
        { id: "AG-001", name: "Tokyo Prime Realty", office: "Tokyo" },
        { id: "AG-002", name: "Osaka Investment Desk", office: "Osaka" },
        { id: "AG-003", name: "Fukuoka Residential", office: "Fukuoka" },
      ];

      const acceptanceRecords = [
        {
          agreementId: "code-of-conduct",
          agentId: "AG-001",
          status: "signed",
          signedAt: "2026-03-21 11:10",
        },
        {
          agreementId: "code-of-conduct",
          agentId: "AG-002",
          status: "signed",
          signedAt: "2026-03-22 09:05",
        },
        {
          agreementId: "code-of-conduct",
          agentId: "AG-003",
          status: "pending",
          signedAt: "",
        },
        {
          agreementId: "data-usage-policy",
          agentId: "AG-001",
          status: "signed",
          signedAt: "2026-02-02 10:00",
        },
        {
          agreementId: "data-usage-policy",
          agentId: "AG-002",
          status: "pending",
          signedAt: "",
        },
        {
          agreementId: "data-usage-policy",
          agentId: "AG-003",
          status: "pending",
          signedAt: "",
        },
      ];

      let selectedAgreementId = null;

      const els = {
        agreementsTbody: document.getElementById("agreementsTbody"),
        newAgreementBtn: document.getElementById("newAgreementBtn"),
        emptyDetail: document.getElementById("emptyDetail"),
        detailPanel: document.getElementById("detailPanel"),
        detailTitle: document.getElementById("detailTitle"),
        detailMeta: document.getElementById("detailMeta"),
        inputTitle: document.getElementById("inputTitle"),
        inputBody: document.getElementById("inputBody"),
        saveAgreementBtn: document.getElementById("saveAgreementBtn"),
        sendToAgentsBtn: document.getElementById("sendToAgentsBtn"),
        filterStatus: document.getElementById("filterStatus"),
        filterAgreementSearch: document.getElementById("filterAgreementSearch"),
        editabilityHint: document.getElementById("editabilityHint"),
      };

      function getAgreementAcceptanceSummary(agreementId) {
        const total = agents.length;
        const signed = acceptanceRecords.filter(
          (rec) => rec.agreementId === agreementId && rec.status === "signed",
        ).length;
        return `${signed}/${total}`;
      }

      function getLastUpdateLabel(agreement) {
        if (agreement.lastSentAt) {
          return `Sent ${agreement.lastSentAt}`;
        }
        if (agreement.lastUpdatedAt) {
          return `Updated ${agreement.lastUpdatedAt}`;
        }
        return "-";
      }

      function _acceptanceStats(agreementId) {
        const recs = acceptanceRecords.filter((r) => r.agreementId === agreementId);
        const signed = recs.filter((r) => r.status === "signed").length;
        const total = recs.length || agents.length;
        return { signed, total, ratio: total ? signed / total : 0 };
      }

      function getFilteredAgreements() {
        const statusFilter = els.filterStatus.value;
        const keyword = els.filterAgreementSearch.value.trim().toLowerCase();
        const acceptance =
          document.getElementById("filterAcceptance")?.value || "";
        const updated =
          document.getElementById("filterUpdated")?.value || "";
        const sentStatus =
          document.getElementById("filterSentStatus")?.value || "";
        const sortBy =
          document.getElementById("sortBy")?.value || "updated-desc";

        const now = new Date("2026-05-15T00:00:00");
        const daysSince = (s) => {
          if (!s) return Infinity;
          const d = new Date(s.replace(" ", "T"));
          return isNaN(d) ? Infinity : (now - d) / 86400000;
        };

        let result = agreements.filter((agreement) => {
          if (statusFilter !== "all" && agreement.status !== statusFilter) {
            return false;
          }
          if (
            keyword &&
            !(
              agreement.title.toLowerCase().includes(keyword) ||
              (agreement.body || "").toLowerCase().includes(keyword)
            )
          ) {
            return false;
          }
          if (acceptance) {
            const { ratio, signed, total } = _acceptanceStats(agreement.id);
            if (acceptance === "all-signed" && (total === 0 || signed < total))
              return false;
            if (
              acceptance === "partial" &&
              (signed === 0 || signed === total)
            )
              return false;
            if (acceptance === "none" && signed > 0) return false;
          }
          if (updated) {
            const d = daysSince(agreement.lastUpdatedAt);
            if (updated === "7d" && d > 7) return false;
            if (updated === "30d" && d > 30) return false;
            if (updated === "90d" && d > 90) return false;
            if (updated === "older" && d <= 90) return false;
          }
          if (sentStatus) {
            const sent = !!agreement.lastSentAt;
            if (sentStatus === "sent" && !sent) return false;
            if (sentStatus === "not-sent" && sent) return false;
          }
          return true;
        });

        const sorters = {
          "updated-desc": (a, b) =>
            (b.lastUpdatedAt || "").localeCompare(a.lastUpdatedAt || ""),
          "updated-asc": (a, b) =>
            (a.lastUpdatedAt || "").localeCompare(b.lastUpdatedAt || ""),
          "title-asc": (a, b) => a.title.localeCompare(b.title),
          "acceptance-desc": (a, b) =>
            _acceptanceStats(b.id).ratio - _acceptanceStats(a.id).ratio,
          "status-asc": (a, b) => a.status.localeCompare(b.status),
        };
        return [...result].sort(sorters[sortBy] || sorters["updated-desc"]);
      }

      function applyEditability(agreement) {
        const isDraft = agreement.status === "draft";
        els.inputTitle.disabled = !isDraft;
        els.inputBody.disabled = !isDraft;
        els.saveAgreementBtn.disabled = !isDraft;
        els.sendToAgentsBtn.disabled = !isDraft;
        els.editabilityHint.textContent = isDraft
          ? "Draft can be edited."
          : "Published agreements are read-only.";
      }

      function statusBadge(status) {
        const span = document.createElement("span");
        span.classList.add("badge");
        if (status === "published") {
          span.classList.add("badge-status-published");
          span.textContent = "Published";
        } else {
          span.classList.add("badge-status-draft");
          span.textContent = "Draft";
        }
        return span;
      }

      function acceptanceStatusBadge(status) {
        const span = document.createElement("span");
        span.classList.add("badge");
        if (status === "signed") {
          span.classList.add("badge-status-signed");
          span.textContent = "Signed";
        } else {
          span.classList.add("badge-status-pending");
          span.textContent = "Pending";
        }
        return span;
      }

      function renderAgreementsTable() {
        els.agreementsTbody.innerHTML = "";

        const filteredAgreements = getFilteredAgreements();
        filteredAgreements.forEach((ag) => {
          const tr = document.createElement("tr");
          if (ag.id === selectedAgreementId) tr.classList.add("selected-row");

          const tdTitle = document.createElement("td");
          tdTitle.innerHTML = `<div class="agreement-title-cell">${ag.title}</div>`;

          const tdStatus = document.createElement("td");
          tdStatus.appendChild(statusBadge(ag.status));

          const tdUpdated = document.createElement("td");
          tdUpdated.textContent = getLastUpdateLabel(ag);

          const tdAccepted = document.createElement("td");
          tdAccepted.textContent = getAgreementAcceptanceSummary(ag.id);

          tr.appendChild(tdTitle);
          tr.appendChild(tdStatus);
          tr.appendChild(tdUpdated);
          tr.appendChild(tdAccepted);

          tr.addEventListener("click", () => selectAgreement(ag.id));
          els.agreementsTbody.appendChild(tr);
        });
      }

      function selectAgreement(id) {
        const doSelect = () => {
          const ag = agreements.find((x) => x.id === id);
          if (!ag) return;
          selectedAgreementId = id;

          els.emptyDetail.style.display = "none";
          els.detailPanel.style.display = "";

          els.detailTitle.textContent = ag.title;
          els.detailMeta.textContent = `Status: ${ag.status} · ${getLastUpdateLabel(ag)}`;

          els.inputTitle.value = ag.title;
          els.inputBody.value = ag.body || "";
          els.inputTitle.classList.remove("ux-invalid");
          els.inputBody.classList.remove("ux-invalid");
          applyEditability(ag);
          UX.markClean();

          renderAgreementsTable();
        };
        if (selectedAgreementId && selectedAgreementId !== id) {
          UX.guard(doSelect);
        } else {
          doSelect();
        }
      }

      function createNewAgreement() {
        const now = new Date();
        const id = `agreement-${now.getTime()}`;
        const title = "New agent agreement";
        const ag = {
          id,
          title,
          status: "draft",
          effectiveFrom: "",
          lastUpdatedAt: new Date().toLocaleString("en-GB", { hour12: false }),
          lastSentAt: "",
          body: "",
        };
        agreements.unshift(ag);
        renderAgreementsTable();
        selectAgreement(id);
      }

      function saveAgreement() {
        if (!selectedAgreementId) return;
        const ag = agreements.find((x) => x.id === selectedAgreementId);
        if (!ag) return;
        if (ag.status !== "draft") return;

        const title = els.inputTitle.value.trim();
        const body = els.inputBody.value.trim();
        if (!title) {
          els.inputTitle.classList.add("ux-invalid");
          els.inputTitle.focus();
          Toast.err("Title is required.");
          return;
        }
        els.inputTitle.classList.remove("ux-invalid");
        if (!body) {
          els.inputBody.classList.add("ux-invalid");
          els.inputBody.focus();
          Toast.err("Body cannot be empty.");
          return;
        }
        els.inputBody.classList.remove("ux-invalid");

        ag.title = title;
        ag.body = body;
        ag.lastUpdatedAt = new Date().toLocaleString("en-GB", {
          hour12: false,
        });

        els.detailTitle.textContent = ag.title;
        els.detailMeta.textContent = `Status: ${ag.status} · ${getLastUpdateLabel(ag)}`;
        renderAgreementsTable();

<script>
(function(){
  if (window.UX) return; // idempotent
  const wrap = document.getElementById('uxToastWrap');
  const modal = document.getElementById('uxConfirmModal');
  const titleEl = document.getElementById('uxConfirmTitle');
  const msgEl = document.getElementById('uxConfirmMsg');
  const okBtn = document.getElementById('uxConfirmOk');
  const cancelBtn = document.getElementById('uxConfirmCancel');

  // ──── Toast ────────────────────────────────────────────────────
  function toast(msg, type){
    if(!wrap) return;
    const el = document.createElement('div');
    el.className = 'ux-toast ' + (type || 'info');
    const span = document.createElement('span');
    span.textContent = msg || '';
    const x = document.createElement('button');
    x.className = 'x'; x.type = 'button'; x.setAttribute('aria-label','Dismiss');
    x.textContent = '×';
    x.addEventListener('click', () => el.remove());
    el.appendChild(span); el.appendChild(x);
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 220); }, 3800);
  }
  window.Toast = {
    show: toast,
    ok:   (m) => toast(m, 'ok'),
    err:  (m) => toast(m, 'err'),
    info: (m) => toast(m, 'info'),
  };

  // ──── Confirm modal ───────────────────────────────────────────
  let _onOk = null;
  let _lastFocus = null;
  function closeConfirm(){
    modal.classList.remove('open');
    _onOk = null;
    if(_lastFocus && _lastFocus.focus) try { _lastFocus.focus(); } catch(e){}
  }
  okBtn.addEventListener('click', () => { const cb = _onOk; closeConfirm(); if(cb) cb(); });
  cancelBtn.addEventListener('click', closeConfirm);
  modal.addEventListener('click', (e) => { if(e.target === modal) closeConfirm(); });

  function openConfirm(opts){
    titleEl.textContent  = opts.title   || 'Confirm';
    msgEl.textContent    = opts.message || 'Are you sure?';
    okBtn.textContent    = opts.okLabel || 'Confirm';
    cancelBtn.textContent= opts.cancelLabel || 'Cancel';
    okBtn.className = 'ux-btn ' + (opts.danger ? 'danger' : 'primary');
    _onOk = typeof opts.onConfirm === 'function' ? opts.onConfirm : null;
    _lastFocus = document.activeElement;
    modal.classList.add('open');
    setTimeout(() => okBtn.focus(), 40);
  }

  window.UX = {
    confirm: openConfirm,
    toast,
    // Run action only after confirming if dirty
    guard(action){
      if(!window.UX_dirty){ if(typeof action === 'function') action(); return; }
      openConfirm({
        title: 'Discard unsaved changes?',
        message: 'You have edits that have not been saved. Leave anyway?',
        okLabel: 'Discard',
        danger: true,
        onConfirm(){ window.UX_dirty = false; if(typeof action === 'function') action(); }
      });
    },
    markClean(){ window.UX_dirty = false; document.body.classList.remove('ux-dirty'); },
    markDirty(){ window.UX_dirty = true;  document.body.classList.add('ux-dirty'); },
  };

  // ──── Esc closes any open modal (built-in + page modals) ──────
  document.addEventListener('keydown', (e) => {
    if(e.key !== 'Escape') return;
    if(modal.classList.contains('open')){ closeConfirm(); return; }
    document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
      const visible = getComputedStyle(m).display !== 'none' || m.classList.contains('show') || m.classList.contains('open');
      if(!visible) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Backdrop click closes existing page modals ──────────────
  document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
    if(m.__uxBound) return; m.__uxBound = true;
    m.addEventListener('click', (e) => {
      if(e.target !== m) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Auto-track dirty on any [data-track-dirty] container ────
  document.addEventListener('input', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  document.addEventListener('change', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  window.addEventListener('beforeunload', (e) => {
    if(window.UX_dirty){ e.preventDefault(); e.returnValue = ''; }
  });

  // ──── Inline validation helper ────────────────────────────────
  window.UX.validate = function(form){
    let firstInvalid = null;
    form.querySelectorAll('.ux-field-error').forEach(n => n.remove());
    form.querySelectorAll('.ux-invalid').forEach(n => n.classList.remove('ux-invalid'));
    form.querySelectorAll('[required]').forEach(field => {
      const v = (field.value || '').trim();
      let bad = !v;
      if(!bad && field.type === 'email'){
        bad = !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      }
      if(bad){
        field.classList.add('ux-invalid');
        const note = document.createElement('span');
        note.className = 'ux-field-error';
        note.textContent = field.dataset.errorMsg ||
          (field.type === 'email' ? 'Please enter a valid email.' : 'This field is required.');
        if(field.parentNode) field.parentNode.insertBefore(note, field.nextSibling);
        if(!firstInvalid) firstInvalid = field;
      }
    });
    if(firstInvalid){ firstInvalid.focus(); return false; }
    return true;
  };
})();
</script>
