<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agreement Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #8B7340;
      --gold-light: #c9a85c;
      --border:     #e0e0e0;
      --bg:         #ffffff;
      --text:       #1a1a1a;
      --gray:       #888;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      font-family: var(--font);
      background: #f5f5f5;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 20px;
      padding: 14px 32px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      padding: 4px; display: flex; align-items: center;
      color: #555; transition: color .15s;
    }
    .icon-btn:hover { color: var(--text); }
    .icon-btn svg { width: 22px; height: 22px; }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ════════════════════════════════════════
       LIST VIEW
    ════════════════════════════════════════ */
    .list-page {
      background: var(--bg);
      min-height: calc(100vh - 53px);
      padding: 28px 32px 48px;
    }
    .list-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 22px;
    }
    .page-title { font-size: 22px; font-weight: 700; }

    .btn-add {
      background: var(--gold); color: #fff; border: none;
      border-radius: 8px; padding: 10px 28px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: filter .15s;
    }
    .btn-add:hover { filter: brightness(.9); }

    /* Filters */
    .filters { display: flex; gap: 12px; margin-bottom: 20px; }

    .search-wrap { position: relative; width: 260px; }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); width: 15px; height: 15px;
      color: #aaa; pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 9px 14px 9px 36px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13.5px; font-family: var(--font);
      color: var(--text); outline: none; transition: border-color .15s;
    }
    .search-input::placeholder { color: #bbb; }
    .search-input:focus { border-color: var(--gold-light); }

    .select-wrap { position: relative; width: 180px; }
    .select-wrap svg {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); width: 14px; height: 14px;
      color: #888; pointer-events: none;
    }
    .filter-select {
      width: 100%; padding: 9px 36px 9px 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 13.5px; font-family: var(--font);
      color: var(--text); background: var(--bg);
      outline: none; appearance: none; cursor: pointer;
    }

    /* Table */
    .table-wrap {
      border: 1.5px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1.5px solid var(--border); }
    th {
      padding: 14px 18px; font-size: 13px; font-weight: 600;
      color: var(--text); text-align: left; background: var(--bg);
    }
    .th-actions { text-align: right; padding-right: 20px; width: 90px; }

    .sort-icon {
      display: inline-flex; flex-direction: column;
      gap: 1px; vertical-align: middle; margin-left: 4px;
    }
    .sort-icon span { display: block; width: 0; height: 0; }
    .sort-icon span:first-child {
      border: 3.5px solid transparent; border-bottom-color: #aaa;
    }
    .sort-icon span:last-child {
      border: 3.5px solid transparent; border-top-color: #aaa;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0; transition: background .1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    td { padding: 16px 18px; font-size: 13.5px; vertical-align: middle; }
    .empty-cell { text-align: center; color: var(--gray); padding: 28px 18px; }

    .row-actions {
      display: flex; justify-content: flex-end;
      gap: 10px; padding-right: 4px;
    }
    .action-btn {
      background: none; border: none; cursor: pointer;
      padding: 4px; display: flex; align-items: center;
      color: #aaa; transition: color .15s;
    }
    .action-btn:hover { color: var(--gold); }
    .action-btn.danger:hover { color: #c0392b; }
    .action-btn svg { width: 17px; height: 17px; }

    .table-footer {
      padding: 13px 18px; font-size: 12.5px;
      color: var(--gray); border-top: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }

    /* Pagination */
    .pager { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .pg-btn {
      min-width: 30px; height: 30px; padding: 0 9px;
      border: 1px solid var(--border); background: #fff;
      border-radius: 7px; font-size: 12.5px; font-family: var(--font);
      color: var(--text); cursor: pointer;
    }
    .pg-btn:hover:not(:disabled) { background: #f5f1ea; }
    .pg-btn.active { background: var(--gold); border-color: var(--gold); color: #fff; font-weight: 700; }
    .pg-btn:disabled { opacity: .45; cursor: not-allowed; }
    .pg-ellipsis { padding: 0 4px; color: var(--gray); }

    /* Badges */
    .badge {
      display: inline-block; padding: 3px 12px; border-radius: 20px;
      font-size: 11.5px; font-weight: 600; letter-spacing: .2px;
    }
    .badge-published { background: #d4f0d4; color: #2a7a2a; }
    .badge-draft     { background: #e8e8e8; color: #666; }

    /* ════════════════════════════════════════
       EDITOR VIEW (full-page)
    ════════════════════════════════════════ */
    #view-editor { min-height: calc(100vh - 53px); display: none; }
    #view-editor.active {
      display: flex; flex-direction: column;
      background: var(--bg);
    }

    /* Editor header */
    .editor-header {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      padding: 20px 28px 18px; flex-shrink: 0;
    }
    .editor-header-left { display: flex; align-items: flex-start; gap: 10px; }
    .back-btn {
      background: none; border: none; cursor: pointer;
      font-size: 22px; color: #555; padding: 0 6px 0 0;
      margin-top: 2px; line-height: 1; transition: color .15s;
    }
    .back-btn:hover { color: var(--text); }
    .editor-title { font-size: 18px; font-weight: 700; }
    .editor-subtitle { font-size: 13px; color: var(--gold); margin-top: 3px; }

    .editor-actions { display: flex; align-items: center; gap: 10px; margin-top: 4px; position: relative; }

    .btn {
      border: none; border-radius: 8px; padding: 9px 20px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: filter .15s;
    }
    .btn:hover { filter: brightness(.88); }
    .btn-gray    { background: #5c5c5c; color: #fff; }
    .btn-gray2   { background: #7a7a7a; color: #fff; }
    .btn-gold    { background: var(--gold); color: #fff; }
    .btn-gold:hover { filter: brightness(.9); }

    .more-dots {
      background: none; border: none; cursor: pointer;
      padding: 6px 8px; display: flex; flex-direction: column;
      gap: 3px; align-items: center;
    }
    .more-dots span {
      display: block; width: 4px; height: 4px;
      background: #666; border-radius: 50%;
    }
    .more-menu {
      position: absolute; top: 42px; right: 0; z-index: 20;
      background: #fff; border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.14);
      min-width: 170px; padding: 6px; display: none;
    }
    .more-menu.open { display: block; }
    .more-menu button {
      width: 100%; text-align: left; background: none; border: none;
      padding: 9px 12px; border-radius: 6px; font-size: 13px;
      font-family: var(--font); color: var(--text); cursor: pointer;
    }
    .more-menu button:hover { background: #f5f1ea; }
    .more-menu button.danger { color: #c0392b; }

    .editor-divider { height: 1px; background: #ebebeb; flex-shrink: 0; }

    /* Editor body layout */
    .editor-body {
      display: flex; flex: 1; gap: 24px;
      padding: 20px 28px 24px; overflow: hidden;
    }

    /* Left: editor area */
    .editor-main {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }

    .page-name-input {
      width: 100%; padding: 12px 16px; margin-bottom: 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 15px; font-family: var(--font); color: var(--text);
      outline: none; transition: border-color .15s; flex-shrink: 0;
    }
    .page-name-input::placeholder { color: #ccc; }
    .page-name-input:focus { border-color: var(--gold-light); }

    .editor-box {
      flex: 1; display: flex; flex-direction: column;
      border: 1.5px solid var(--border); border-radius: 8px;
      overflow: hidden; min-height: 0;
    }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 1px;
      padding: 7px 10px; border-bottom: 1px solid var(--border);
      flex-wrap: nowrap; background: var(--bg); flex-shrink: 0; overflow-x: auto;
    }
    .toolbar::-webkit-scrollbar { height: 0; }

    .tb {
      background: none; border: none; cursor: pointer;
      padding: 5px 6px; border-radius: 5px;
      color: #333; display: flex; align-items: center;
      gap: 3px; font-size: 12.5px; font-family: var(--font);
      transition: background .12s; line-height: 1; flex-shrink: 0;
    }
    .tb:hover { background: #f0ece6; }
    .tb.on    { background: #ede8e0; color: var(--gold); }
    .tb svg   { width: 14px; height: 14px; }
    .tb-sep   { width: 1px; height: 18px; background: #ddd; margin: 0 3px; flex-shrink: 0; }

    .tb-select {
      background: none; border: none; border-radius: 5px;
      font-size: 12.5px; font-family: var(--font); color: #333;
      padding: 5px 4px; cursor: pointer; outline: none; flex-shrink: 0;
    }
    .tb-select:hover { background: #f0ece6; }

    .color-box {
      width: 13px; height: 13px; background: #1a1a1a;
      border-radius: 2px; flex-shrink: 0;
    }
    .chevron-tiny {
      width: 0; height: 0;
      border-left: 3px solid transparent;
      border-right: 3px solid transparent;
      border-top: 4px solid #666;
      flex-shrink: 0;
    }

    /* Editable content */
    .editor-content {
      flex: 1; padding: 20px 22px; outline: none;
      font-size: 14px; line-height: 1.75; color: var(--text);
      overflow-y: auto;
    }
    .editor-content:empty::before {
      content: attr(data-ph); color: #ccc; pointer-events: none;
    }
    .editor-content h1 { font-size: 19px; font-weight: 700; margin: 0 0 14px; }
    .editor-content h2 { font-size: 16px; font-weight: 600; margin: 0 0 10px; }
    .editor-content p  { margin: 0 0 14px; }
    .editor-content ul,
    .editor-content ol { margin: 0 0 14px; padding-left: 22px; }
    .editor-content blockquote {
      border-left: 3px solid var(--gold);
      padding-left: 14px; color: #666; margin: 12px 0;
    }
    .editor-content code {
      background: #f4f4f4; padding: 2px 5px;
      border-radius: 3px; font-size: 12.5px;
    }
    .editor-content hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .editor-content img { max-width: 100%; display: block; margin: 12px 0; border-radius: 4px; }

    /* Right: info sidebar */
    .editor-sidebar { width: 270px; flex-shrink: 0; }

    .sidebar-heading { font-size: 15px; font-weight: 700; margin-bottom: 4px; }

    .info-row {
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 12px; color: var(--gray); margin-bottom: 5px; }
    .info-value { font-size: 13.5px; color: var(--text); }
    .info-value.empty { color: #ccc; }

    /* ── Toast ── */
    .toast-wrap {
      position: fixed; right: 18px; bottom: 18px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      background: #fff; border: 1px solid var(--border);
      border-left: 4px solid var(--gold); border-radius: 8px;
      padding: 10px 14px; min-width: 220px; max-width: 360px;
      box-shadow: 0 4px 16px rgba(0,0,0,.12); font-size: 13px; color: var(--text);
      pointer-events: auto; animation: toastIn .18s ease;
    }
    .toast.ok  { border-left-color: #2a7a2a; }
    .toast.err { border-left-color: #c0392b; }
    @keyframes toastIn { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ── Confirm modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 9000; display: none;
      align-items: center; justify-content: center; background: rgba(0,0,0,.4);
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff; border-radius: 12px; padding: 22px 24px;
      width: 420px; max-width: 90vw; box-shadow: 0 10px 32px rgba(0,0,0,.22);
    }
    .modal-box h3 { font-size: 16px; font-weight: 700; margin: 0 0 8px; }
    .modal-box p { font-size: 13.5px; color: #555; line-height: 1.5; margin: 0 0 18px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-danger { background: #c0392b; color: #fff; }
  </style>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<nav class="topbar">
  <button class="icon-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
  </button>
  <button class="icon-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
  </button>
</nav>

<!-- ════════════════════════════════════════
     VIEW: LIST
════════════════════════════════════════ -->
<div id="view-list" class="view active">
  <div class="list-page">

    <div class="list-header">
      <h1 class="page-title">Agreement Management</h1>
      <button class="btn-add" onclick="openNew()">Add</button>
    </div>

    <div class="filters">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="searchInput" class="search-input" type="text" placeholder="Search agreement by title" />
      </div>
      <div class="select-wrap">
        <select id="statusFilter" class="filter-select">
          <option value="">All status</option>
          <option value="published">Published</option>
          <option value="draft">Draft</option>
        </select>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title <span class="sort-icon"><span></span><span></span></span></th>
            <th style="width:150px">Status <span class="sort-icon"><span></span><span></span></span></th>
            <th style="width:190px">Last update <span class="sort-icon"><span></span><span></span></span></th>
            <th style="width:150px">Agent Agreed</th>
            <th class="th-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="agreementsTbody"></tbody>
      </table>
      <div class="table-footer">
        <span id="agreementsCount">Showing 0 of 0 agreements</span>
        <div class="pager" id="agreementsPager"></div>
      </div>
    </div>

  </div>
</div>

<!-- ════════════════════════════════════════
     VIEW: EDITOR (New + Edit)
════════════════════════════════════════ -->
<div id="view-editor" class="view">

  <!-- Header -->
  <div class="editor-header">
    <div class="editor-header-left">
      <button class="back-btn" onclick="goBack()">&#8249;</button>
      <div>
        <div class="editor-title" id="editorTitle">New Agreement</div>
        <div class="editor-subtitle" id="editorSubtitle">Add a new agreement</div>
      </div>
    </div>
    <div class="editor-actions" id="editorActions"></div>
  </div>

  <div class="editor-divider"></div>

  <!-- Body -->
  <div class="editor-body">

    <!-- Left: editor -->
    <div class="editor-main">
      <input class="page-name-input" id="pageName" type="text" placeholder="Page name" />

      <div class="editor-box">
        <!-- Toolbar -->
        <div class="toolbar">
          <!-- Undo / Redo -->
          <button class="tb" onclick="cmd('undo')" title="Undo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
          </button>
          <button class="tb" onclick="cmd('redo')" title="Redo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
          </button>

          <div class="tb-sep"></div>

          <!-- Paragraph style -->
          <select class="tb-select" onchange="applyBlockFormat(this.value); this.value='p'">
            <option value="p">Normal text</option>
            <option value="h1">Heading 1</option>
            <option value="h2">Heading 2</option>
            <option value="h3">Heading 3</option>
          </select>

          <div class="tb-sep"></div>

          <!-- Lists dropdown hint -->
          <button class="tb" title="List style">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            <span class="chevron-tiny"></span>
          </button>

          <!-- Text color -->
          <button class="tb" title="Text color">
            <span class="color-box" id="colorSwatch"></span>
            <span class="chevron-tiny"></span>
          </button>

          <div class="tb-sep"></div>

          <!-- Bold -->
          <button class="tb" id="tb-bold" onclick="toggleFmt('bold','tb-bold')" title="Bold"><b>B</b></button>
          <!-- Italic -->
          <button class="tb" id="tb-italic" onclick="toggleFmt('italic','tb-italic')" title="Italic"><i>I</i></button>
          <!-- Underline -->
          <button class="tb" id="tb-underline" onclick="toggleFmt('underline','tb-underline')" title="Underline"><u>U</u></button>
          <!-- Strikethrough -->
          <button class="tb" id="tb-strike" onclick="toggleFmt('strikeThrough','tb-strike')" title="Strikethrough"><s>S</s></button>
          <!-- Inline code -->
          <button class="tb" onclick="wrapCode()" title="Inline code">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
            </svg>
          </button>
          <!-- Highlight -->
          <button class="tb" title="Highlight">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
          </button>

          <div class="tb-sep"></div>

          <!-- Bullet list -->
          <button class="tb" onclick="cmd('insertUnorderedList')" title="Bullet list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/>
              <circle cx="4" cy="6" r="1" fill="currentColor" stroke="none"/>
              <circle cx="4" cy="12" r="1" fill="currentColor" stroke="none"/>
              <circle cx="4" cy="18" r="1" fill="currentColor" stroke="none"/>
            </svg>
          </button>
          <!-- Numbered list -->
          <button class="tb" onclick="cmd('insertOrderedList')" title="Numbered list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/>
              <path d="M4 6h1v4" stroke="currentColor" stroke-width="1.8" fill="none"/>
              <path d="M4 10H5" stroke="currentColor" stroke-width="1.8" fill="none"/>
              <path d="M3 14h2v1l-2 2h2" stroke="currentColor" stroke-width="1.8" fill="none"/>
            </svg>
          </button>

          <div class="tb-sep"></div>

          <!-- Link -->
          <button class="tb" onclick="insertLink()" title="Link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
          </button>
          <!-- Image -->
          <button class="tb" onclick="insertImg()" title="Image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <!-- Code block -->
          <button class="tb" title="Code block">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="18" rx="2"/>
              <polyline points="8 10 4 14 8 18"/><polyline points="16 10 20 14 16 18"/>
            </svg>
          </button>
          <!-- Blockquote -->
          <button class="tb" onclick="cmd('formatBlock','blockquote')" title="Blockquote">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>
              <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>
            </svg>
          </button>
          <!-- Horizontal rule -->
          <button class="tb" onclick="cmd('insertHorizontalRule')" title="Horizontal rule">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="2" y1="12" x2="22" y2="12"/>
            </svg>
          </button>
        </div>

        <!-- Content editable -->
        <div
          class="editor-content"
          id="editorContent"
          contenteditable="true"
          data-ph="Your content page"
          spellcheck="false"
        ></div>
      </div>
    </div>

    <!-- Right: sidebar -->
    <div class="editor-sidebar">
      <div class="sidebar-heading">Information</div>

      <div class="info-row">
        <div class="info-label">Status</div>
        <div class="info-value" id="infoStatus"><span class="empty">-</span></div>
      </div>
      <div class="info-row">
        <div class="info-label">Created</div>
        <div class="info-value" id="infoCreated"><span class="empty">-</span></div>
      </div>
      <div class="info-row">
        <div class="info-label">Last Update</div>
        <div class="info-value" id="infoLastUpdate"><span class="empty">-</span></div>
      </div>
      <div class="info-row">
        <div class="info-label">Agent Agreed</div>
        <div class="info-value" id="infoAgreed"><span class="empty">-</span></div>
      </div>
    </div>

  </div><!-- /.editor-body -->
</div><!-- /#view-editor -->

<!-- Confirm modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <h3 id="confirmTitle">Confirm</h3>
    <p id="confirmMsg"></p>
    <div class="modal-actions">
      <button class="btn btn-gray" id="confirmCancel">Cancel</button>
      <button class="btn btn-danger" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  /* ── Data model (in-memory demo) ─────────────────────────────────────── */
  const agreements = [
    {
      id: "agent-code",
      title: "Agent Code of Conduct",
      status: "published",
      created: "2025-05-25, 19:55",
      lastUpdate: "2025-05-25, 19:55",
      agreed: 1500,
      total: 3000,
      content:
        "<h1>Agent Code of Conduct</h1><p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Quis lobortis nisl cursus bibendum sit nulla accumsan sodales ornare.</p><p>Rhoncus proin orci duis scelerisque molestie cursus tincidunt aliquam.</p>",
    },
    {
      id: "data-usage",
      title: "Data usage & privacy policy (Agents)",
      status: "published",
      created: "2025-05-25, 19:55",
      lastUpdate: "2025-05-25, 19:55",
      agreed: 2653,
      total: 3000,
      content:
        "<h1>Data usage & privacy policy</h1><p>Explains how platform data may be accessed by agents and which logs are recorded for security and compliance.</p>",
    },
    {
      id: "beta-terms",
      title: "Beta feature participation terms",
      status: "draft",
      created: "2025-05-25, 19:55",
      lastUpdate: "2025-05-25, 19:55",
      agreed: 0,
      total: 3,
      content:
        "<h1>Beta Feature Participation Terms</h1><p>By participating in the beta programme, you agree to provide feedback and keep features confidential until general availability.</p>",
    },
  ];

  // Deterministic filler so the dataset exceeds 50 rows (demo pagination).
  (function seedFiller() {
    const topics = [
      "Commission schedule", "Listing quality standard", "Brand usage policy",
      "Referral program terms", "Anti-fraud commitment", "Service-level agreement",
      "Photography guidelines", "Lead handling rules", "Dispute resolution policy",
      "Renewal & cancellation terms",
    ];
    for (let i = 1; i <= 56; i++) {
      const isDraft = i % 3 === 0;
      const day = String(1 + (i % 28)).padStart(2, "0");
      const month = String(1 + (i % 4)).padStart(2, "0");
      const stamp = `2026-${month}-${day}, ${String(8 + (i % 10)).padStart(2, "0")}:${String((i * 5) % 60).padStart(2, "0")}`;
      const topic = topics[i % topics.length];
      agreements.push({
        id: `agreement-seed-${i}`,
        title: `${topic} v${i}`,
        status: isDraft ? "draft" : "published",
        created: stamp,
        lastUpdate: stamp,
        agreed: isDraft ? 0 : (i * 37) % 3000,
        total: isDraft ? 3 : 3000,
        content: `<h1>${topic}</h1><p>Filler agreement template #${i} generated for pagination demo. Covers ${topic.toLowerCase()} terms for agents.</p>`,
      });
    }
  })();

  /* ── State ───────────────────────────────────────────────────────────── */
  const PAGE_SIZE = 50;
  let pageNum = 1;
  let editId = null; // null = New mode, otherwise the agreement id being edited

  const $ = (id) => document.getElementById(id);
  const esc = (s) =>
    String(s ?? "").replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c],
    );
  const now = () =>
    new Date().toISOString().slice(0, 16).replace("T", ", ");

  /* ── Toast ──────────────────────────────────────────────────────────── */
  function toast(msg, kind) {
    const el = document.createElement("div");
    el.className = "toast " + (kind || "ok");
    el.textContent = msg;
    $("toastWrap").appendChild(el);
    setTimeout(() => {
      el.style.opacity = "0";
      el.style.transition = "opacity .25s";
      setTimeout(() => el.remove(), 260);
    }, 3000);
  }

  /* ── Confirm modal ──────────────────────────────────────────────────── */
  let _confirmCb = null;
  function askConfirm(title, message, okLabel, cb) {
    $("confirmTitle").textContent = title;
    $("confirmMsg").textContent = message;
    $("confirmOk").textContent = okLabel || "Delete";
    _confirmCb = cb;
    $("confirmModal").classList.add("open");
  }
  function closeConfirm() {
    $("confirmModal").classList.remove("open");
    _confirmCb = null;
  }

  /* ── View switching ─────────────────────────────────────────────────── */
  function show(id) {
    document.querySelectorAll(".view").forEach((v) => v.classList.remove("active"));
    $(id).classList.add("active");
  }
  function goBack() {
    closeMoreMenu();
    show("view-list");
    renderList();
  }
  window.goBack = goBack;

  /* ── Badges / helpers ───────────────────────────────────────────────── */
  function statusBadge(status) {
    return status === "published"
      ? '<span class="badge badge-published">PUBLISHED</span>'
      : '<span class="badge badge-draft">DRAFT</span>';
  }

  /* ── List filtering + pagination ────────────────────────────────────── */
  function getFiltered() {
    const kw = $("searchInput").value.trim().toLowerCase();
    const st = $("statusFilter").value;
    return agreements.filter((a) => {
      if (st && a.status !== st) return false;
      if (kw && !a.title.toLowerCase().includes(kw)) return false;
      return true;
    });
  }

  function pageWindow(cur, pages) {
    const out = [];
    if (pages <= 7) { for (let i = 1; i <= pages; i++) out.push(i); return out; }
    let s = Math.max(2, cur - 2), e = Math.min(pages - 1, cur + 2);
    if (cur <= 4) { s = 2; e = 5; }
    if (cur >= pages - 3) { s = pages - 4; e = pages - 1; }
    out.push(1);
    if (s > 2) out.push("…");
    for (let i = s; i <= e; i++) out.push(i);
    if (e < pages - 1) out.push("…");
    out.push(pages);
    return out;
  }
  function renderPager(total) {
    const pagerEl = $("agreementsPager");
    const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (total <= PAGE_SIZE) { pagerEl.innerHTML = ""; pagerEl.style.display = "none"; return; }
    pagerEl.style.display = "flex";
    let h = `<button type="button" class="pg-btn" ${pageNum === 1 ? "disabled" : ""} onclick="gotoPage(${pageNum - 1})">‹ Prev</button>`;
    pageWindow(pageNum, pages).forEach((p) => {
      h += p === "…"
        ? `<span class="pg-ellipsis">…</span>`
        : `<button type="button" class="pg-btn ${p === pageNum ? "active" : ""}" onclick="gotoPage(${p})">${p}</button>`;
    });
    h += `<button type="button" class="pg-btn" ${pageNum === pages ? "disabled" : ""} onclick="gotoPage(${pageNum + 1})">Next ›</button>`;
    pagerEl.innerHTML = h;
  }
  function gotoPage(p) { pageNum = p; renderList(); }
  window.gotoPage = gotoPage;

  function renderList() {
    const tbody = $("agreementsTbody");
    const filtered = getFiltered();
    const total = filtered.length;
    const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (pageNum > pages) pageNum = pages;
    if (pageNum < 1) pageNum = 1;
    const start = (pageNum - 1) * PAGE_SIZE;
    const rows = filtered.slice(start, start + PAGE_SIZE);

    $("agreementsCount").textContent = total === 0
      ? "Showing 0 of 0 agreements"
      : `Showing ${start + 1}–${start + rows.length} of ${total} agreements`;

    if (!total) {
      tbody.innerHTML = '<tr><td class="empty-cell" colspan="5">No agreements match the filters.</td></tr>';
      renderPager(total);
      return;
    }

    tbody.innerHTML = rows
      .map(
        (a) => `
        <tr>
          <td>${esc(a.title)}</td>
          <td>${statusBadge(a.status)}</td>
          <td>${esc(a.lastUpdate)}</td>
          <td>${a.agreed}/${a.total}</td>
          <td>
            <div class="row-actions">
              <button class="action-btn" title="Edit" onclick="openEdit('${a.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="action-btn danger" title="Delete" onclick="askDelete('${a.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>`,
      )
      .join("");
    renderPager(total);
  }

  /* ── Sidebar ────────────────────────────────────────────────────────── */
  function setSidebar(ag) {
    const empty = '<span class="empty">-</span>';
    $("infoStatus").innerHTML = ag ? statusBadge(ag.status) : empty;
    $("infoCreated").innerHTML = ag && ag.created ? esc(ag.created) : empty;
    $("infoLastUpdate").innerHTML = ag && ag.lastUpdate ? esc(ag.lastUpdate) : empty;
    $("infoAgreed").innerHTML = ag ? `${ag.agreed}/${ag.total}` : empty;
  }

  /* ── Editor: New ────────────────────────────────────────────────────── */
  function openNew() {
    editId = null;
    $("editorTitle").textContent = "New Agreement";
    $("editorSubtitle").textContent = "Add a new agreement";
    $("pageName").value = "";
    $("editorContent").innerHTML = "";
    $("editorActions").innerHTML = `
      <button class="btn btn-gray" onclick="goBack()">Cancel</button>
      <button class="btn btn-gray2" onclick="saveDraft()">Save Draft</button>
      <button class="btn btn-gold" onclick="sendToAgents()">Send to agents</button>`;
    setSidebar(null);
    show("view-editor");
    $("pageName").focus();
  }
  window.openNew = openNew;

  /* ── Editor: Edit ───────────────────────────────────────────────────── */
  function openEdit(id) {
    const ag = agreements.find((a) => a.id === id);
    if (!ag) return;
    editId = id;
    $("editorTitle").textContent = ag.title;
    $("editorSubtitle").textContent = "Created: " + ag.created;
    $("pageName").value = ag.title;
    $("editorContent").innerHTML = ag.content || "";
    $("editorActions").innerHTML = `
      <button class="btn btn-gray" onclick="goBack()">Cancel</button>
      <button class="btn btn-gold" onclick="saveChange()">Save Change</button>
      <button class="more-dots" title="More" onclick="toggleMoreMenu(event)"><span></span><span></span><span></span></button>
      <div class="more-menu" id="moreMenu">
        ${ag.status === "draft" ? `<button onclick="sendToAgents()">Send to agents</button>` : ""}
        <button class="danger" onclick="askDelete('${ag.id}')">Delete agreement</button>
      </div>`;
    setSidebar(ag);
    show("view-editor");
  }
  window.openEdit = openEdit;

  function toggleMoreMenu(e) {
    e.stopPropagation();
    $("moreMenu")?.classList.toggle("open");
  }
  function closeMoreMenu() {
    $("moreMenu")?.classList.remove("open");
  }
  document.addEventListener("click", () => closeMoreMenu());

  /* ── Save / send / delete ───────────────────────────────────────────── */
  function readEditor() {
    return {
      title: $("pageName").value.trim(),
      content: $("editorContent").innerHTML.trim(),
    };
  }

  function saveDraft() {
    const { title, content } = readEditor();
    if (!title) { toast("Please enter a title.", "err"); $("pageName").focus(); return; }
    const ag = {
      id: "agreement-" + Date.now(),
      title,
      status: "draft",
      created: now(),
      lastUpdate: now(),
      agreed: 0,
      total: 3000,
      content,
    };
    agreements.unshift(ag);
    toast(`Draft "${title}" saved.`, "ok");
    goBack();
  }
  window.saveDraft = saveDraft;

  function saveChange() {
    const ag = agreements.find((a) => a.id === editId);
    if (!ag) return;
    const { title, content } = readEditor();
    if (!title) { toast("Please enter a title.", "err"); $("pageName").focus(); return; }
    ag.title = title;
    ag.content = content;
    ag.lastUpdate = now();
    toast("Agreement updated successfully.", "ok");
    goBack();
  }
  window.saveChange = saveChange;

  function sendToAgents() {
    const { title, content } = readEditor();
    if (!title) { toast("Please enter a title.", "err"); $("pageName").focus(); return; }
    let ag = editId ? agreements.find((a) => a.id === editId) : null;
    if (ag) {
      ag.title = title;
      ag.content = content;
    } else {
      ag = {
        id: "agreement-" + Date.now(),
        title,
        status: "draft",
        created: now(),
        agreed: 0,
        total: 3000,
        content,
      };
      agreements.unshift(ag);
    }
    ag.status = "published";
    ag.lastUpdate = now();
    closeMoreMenu();
    toast(`"${title}" sent to agents.`, "ok");
    goBack();
  }
  window.sendToAgents = sendToAgents;

  function askDelete(id) {
    const ag = agreements.find((a) => a.id === id);
    if (!ag) return;
    closeMoreMenu();
    askConfirm(
      "Delete agreement?",
      `Permanently delete "${ag.title}"? This action cannot be undone.`,
      "Delete",
      () => {
        const idx = agreements.findIndex((a) => a.id === id);
        if (idx >= 0) agreements.splice(idx, 1);
        toast("Agreement deleted successfully.", "ok");
        closeConfirm();
        if ($("view-editor").classList.contains("active")) goBack();
        else renderList();
      },
    );
  }
  window.askDelete = askDelete;

  /* ── Rich-text toolbar ──────────────────────────────────────────────── */
  function cmd(command, value) {
    $("editorContent").focus();
    document.execCommand(command, false, value || null);
  }
  window.cmd = cmd;
  function toggleFmt(command, btnId) {
    cmd(command);
    $(btnId).classList.toggle("on", document.queryCommandState(command));
  }
  window.toggleFmt = toggleFmt;
  function applyBlockFormat(tag) {
    $("editorContent").focus();
    document.execCommand("formatBlock", false, tag);
  }
  window.applyBlockFormat = applyBlockFormat;
  function wrapCode() {
    const sel = window.getSelection();
    if (!sel.rangeCount || sel.isCollapsed) return;
    try { sel.getRangeAt(0).surroundContents(document.createElement("code")); } catch (e) {}
  }
  window.wrapCode = wrapCode;
  function insertLink() { const url = prompt("URL:"); if (url) cmd("createLink", url); }
  window.insertLink = insertLink;
  function insertImg() { const url = prompt("Image URL:"); if (url) cmd("insertImage", url); }
  window.insertImg = insertImg;

  /* ── Wiring ─────────────────────────────────────────────────────────── */
  $("searchInput").addEventListener("input", () => { pageNum = 1; renderList(); });
  $("statusFilter").addEventListener("change", () => { pageNum = 1; renderList(); });
  $("confirmCancel").addEventListener("click", closeConfirm);
  $("confirmOk").addEventListener("click", () => { if (_confirmCb) _confirmCb(); });
  $("confirmModal").addEventListener("click", (e) => { if (e.target === $("confirmModal")) closeConfirm(); });
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if ($("confirmModal").classList.contains("open")) closeConfirm();
    else if ($("view-editor").classList.contains("active")) goBack();
  });

  renderList();
</script>

</body>
</html>
