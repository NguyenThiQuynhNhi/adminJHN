<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Property Reports</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        /* ===== YUUSHI unified gold/white design tokens ===== */
        --bg-page: #f5f5f5;
        --bg-card: #ffffff;
        --bg-card-warm: #fffaf2;
        --bg-row-hover: #faf6ee;
        --bg-header-soft: #faf6ee;
        --text-primary: #1a1a1a;
        --text-muted: #7a6a5c;
        --text-label: #888;
        --text-link: #8a5a3b;
        --border-default: #e0e0e0;
        --border-warm: #eadccd;
        --border-soft: #f0f0f0;
        --color-primary: #8b7340;
        --color-primary-hover: #6d5a32;
        --color-primary-light: #c9a85c;
        --status-success-text: #2a7a2a;
        --status-success-bg: #d4f0d4;
        --status-warning-text: #c87a2a;
        --status-warning-bg: #fff3d4;
        --status-danger-text: #b23b3b;
        --status-danger-bg: #fbe9e9;
        --status-neutral-text: #666;
        --status-neutral-bg: #e8e8e8;
        --r-sm: 6px;
        --r-md: 8px;
        --r-lg: 12px;
        --r-full: 999px;
        --shadow-card: 0 10px 30px rgba(115, 72, 39, 0.05);
        --shadow-toast: 0 8px 24px rgba(0, 0, 0, 0.3);
        --shadow-modal: 0 18px 50px rgba(59, 47, 42, 0.28);
        --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;

        /* ===== Local aliases repointed to the unified palette ===== */
        --bg-body: var(--bg-page);
        --border-subtle: var(--border-default);
        --border-strong: var(--border-warm);
        --accent: var(--color-primary);
        --accent-dark: var(--color-primary-hover);
        --accent-deep: var(--color-primary-hover);
        --gold: var(--color-primary-light);
        --text-main: var(--text-primary);
        --text-dim: var(--text-label);
        --badge-green: var(--status-success-text);
        --badge-red: var(--status-danger-text);
        --badge-gray: var(--status-neutral-text);
        --badge-amber: var(--status-warning-text);
        --badge-blue: var(--status-neutral-text);
        --badge-purple: var(--color-primary);
        --fs-h1: 22px;
        --fs-card-title: 14px;
        --fs-body: 13px;
        --fs-small: 12px;
        --fs-label: 11px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        padding: clamp(16px, 2.5vw, 24px);
        font-family: var(--font-stack);
        background: var(--bg-body);
        color: var(--text-main);
        font-size: var(--fs-body);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      h1 {
        margin: 0 0 4px;
        font-size: var(--fs-h1);
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .page-subtitle {
        margin: 0 0 16px;
        font-size: var(--fs-small);
        color: var(--text-muted);
        max-width: 760px;
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .page-header-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .card {
        background: var(--bg-card);
        border-radius: var(--r-lg);
        border: 1px solid var(--border-default);
        padding: 18px;
        box-shadow: var(--shadow-card);
        margin-bottom: 16px;
      }
      .card-title {
        font-size: var(--fs-card-title);
        font-weight: 600;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border-soft);
      }
      .card-title i {
        color: var(--accent);
        font-size: 13px;
        width: 18px;
        text-align: center;
      }
      .filter-bar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 180px), 1fr));
        gap: 10px 12px;
        align-items: end;
      }
      .field-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .field-label {
        font-size: var(--fs-label);
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      input,
      select,
      textarea {
        border-radius: var(--r-md);
        border: 1px solid var(--border-default);
        padding: 8px 11px;
        font-size: var(--fs-body);
        background: var(--bg-card);
        color: var(--text-main);
        outline: none;
        font-family: inherit;
        width: 100%;
        min-height: 36px;
      }
      textarea {
        resize: vertical;
        min-height: 70px;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 2px rgba(139, 115, 64, 0.18);
      }
      .filter-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        justify-content: flex-end;
        flex-wrap: wrap;
      }
      .btn {
        border-radius: var(--r-md);
        border: 1px solid var(--border-default);
        padding: 8px 14px;
        font-size: var(--fs-body);
        background: var(--bg-card);
        cursor: pointer;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        font-family: inherit;
        font-weight: 500;
        min-height: 36px;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn:hover {
        background: var(--bg-row-hover);
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--color-primary),
          var(--color-primary-hover)
        );
        border-color: var(--color-primary-hover);
        color: #ffffff;
      }
      .btn-primary:hover {
        background: linear-gradient(
          135deg,
          var(--color-primary-hover),
          var(--color-primary-hover)
        );
      }
      .btn-ghost {
        background: transparent;
        border-color: transparent;
      }
      .btn-ghost:hover {
        background: var(--bg-row-hover);
      }
      .btn-sm {
        padding: 5px 10px;
        font-size: 12px;
        min-height: 30px;
      }
      .btn-danger {
        color: var(--status-danger-text);
        border-color: var(--status-danger-bg);
      }
      .btn-danger:hover {
        background: var(--status-danger-bg);
      }
      .btn-warning {
        color: var(--status-warning-text);
        border-color: var(--status-warning-bg);
      }
      .btn-warning:hover {
        background: var(--status-warning-bg);
      }
      .btn-success {
        color: var(--status-success-text);
        border-color: var(--status-success-bg);
      }
      .btn-success:hover {
        background: var(--status-success-bg);
      }

      .data-table-wrap {
        overflow-x: auto;
      }
      table.data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: var(--fs-small);
      }
      .data-table thead {
        background: var(--bg-header-soft);
      }
      .data-table th,
      .data-table td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border-soft);
        vertical-align: middle;
      }
      .data-table th {
        font-weight: 600;
        font-size: var(--fs-label);
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }
      .data-table tbody tr {
        cursor: pointer;
        transition: background 0.12s;
      }
      .data-table tbody tr:hover {
        background: var(--bg-row-hover);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: var(--r-full);
        font-size: 11px;
        font-weight: 600;
        border: 1px solid transparent;
        white-space: nowrap;
      }
      .badge-pending {
        background: var(--status-warning-bg);
        color: var(--status-warning-text);
      }
      .badge-suspended {
        background: var(--status-success-bg);
        color: var(--status-success-text);
      }
      .badge-dismissed {
        background: var(--status-danger-bg);
        color: var(--status-danger-text);
      }
      .badge-individual {
        background: var(--status-neutral-bg);
        color: var(--status-neutral-text);
      }
      .badge-company {
        background: var(--bg-card-warm);
        color: var(--color-primary);
        border-color: var(--border-warm);
      }
      .badge-reason {
        background: var(--bg-card-warm);
        color: var(--color-primary);
        border-color: var(--border-warm);
      }

      .results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }
      .results-count {
        font-size: var(--fs-small);
        color: var(--text-muted);
      }
      .results-count strong {
        color: var(--text-main);
      }

      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .pagination.hidden {
        display: none !important;
      }
      .page-btn {
        min-width: 34px;
        min-height: 34px;
        padding: 6px 10px;
        border-radius: var(--r-md);
        border: 1px solid var(--border-default);
        background: var(--bg-card);
        color: var(--text-main);
        font-size: var(--fs-small);
        font-family: inherit;
        font-weight: 500;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        transition: background 0.15s;
      }
      .page-btn:hover:not(:disabled):not(.active) {
        background: var(--bg-row-hover);
      }
      .page-btn.active {
        background: var(--gold);
        border-color: var(--gold);
        color: #ffffff;
        cursor: default;
      }
      .page-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .page-ellipsis {
        min-width: 24px;
        text-align: center;
        color: var(--text-muted);
        font-size: var(--fs-small);
        user-select: none;
      }

      .kpi-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }
      .kpi {
        background: var(--bg-card);
        border: 1px solid var(--border-default);
        border-radius: var(--r-lg);
        padding: 14px;
        box-shadow: var(--shadow-card);
      }
      .kpi-label {
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 5px;
      }
      .kpi-value {
        font-size: 22px;
        font-weight: 800;
        color: var(--text-main);
        line-height: 1.1;
      }
      .kpi-hint {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 4px;
      }

      /* ===== Detail view ===== */
      .detail-toolbar {
        position: sticky;
        top: 0;
        background: var(--bg-body);
        padding: 12px 0;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .detail-toolbar-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .detail-toolbar-right {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .detail-hero {
        background: var(--bg-card-warm);
        border-radius: var(--r-lg);
        border: 1px solid var(--border-warm);
        padding: 22px;
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 16px;
        flex-wrap: wrap;
        box-shadow: var(--shadow-card);
      }
      .detail-thumb {
        width: 76px;
        height: 76px;
        border-radius: var(--r-lg);
        background: linear-gradient(
          135deg,
          var(--color-primary),
          var(--color-primary-hover)
        );
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        flex-shrink: 0;
        box-shadow: 0 8px 20px rgba(139, 115, 64, 0.25);
      }
      .detail-hero-info {
        flex: 1;
        min-width: 0;
      }
      .detail-name {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 6px;
        color: var(--text-main);
      }
      .detail-meta {
        font-size: var(--fs-small);
        color: var(--text-muted);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .detail-id-pill {
        font-family: ui-monospace, "Consolas", monospace;
        font-size: 11px;
        background: var(--bg-card);
        border: 1px solid var(--border-default);
        padding: 2px 8px;
        border-radius: var(--r-sm);
        color: var(--text-muted);
      }

      .section-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 380px), 1fr));
        gap: 14px;
      }
      .kv-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 180px), 1fr));
        gap: 12px 16px;
      }
      .kv {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .kv-label {
        font-size: var(--fs-label);
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .kv-value {
        font-size: var(--fs-body);
        color: var(--text-main);
        word-break: break-word;
        min-height: 20px;
      }
      .kv-full {
        grid-column: 1 / -1;
      }

      .description-box {
        background: var(--bg-card-warm);
        border: 1px solid var(--border-warm);
        border-radius: var(--r-md);
        padding: 12px 14px;
        font-size: 13px;
        color: var(--text-main);
        line-height: 1.55;
        white-space: pre-line;
      }

      .attach-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .attach-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: var(--bg-card-warm);
        border: 1px solid var(--border-warm);
        border-radius: var(--r-md);
        font-size: 12.5px;
      }
      .attach-item .ico {
        width: 32px;
        height: 32px;
        background: rgba(139, 115, 64, 0.12);
        color: var(--color-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--r-sm);
        flex-shrink: 0;
      }
      .attach-item .info {
        flex: 1;
        min-width: 0;
      }
      .attach-item .info .lbl {
        font-weight: 600;
        color: var(--text-main);
      }
      .attach-item .info .meta {
        font-size: 11px;
        color: var(--text-muted);
      }

      .audit-log {
        display: flex;
        flex-direction: column;
        gap: 0;
        border-left: 2px solid var(--border-strong);
        margin-left: 6px;
        padding-left: 14px;
      }
      .audit-entry {
        position: relative;
        padding: 8px 0;
        font-size: 12.5px;
      }
      .audit-entry::before {
        content: "";
        position: absolute;
        left: -22px;
        top: 12px;
        width: 10px;
        height: 10px;
        background: var(--accent);
        border: 2px solid var(--bg-card);
        border-radius: 50%;
      }
      .audit-entry .when {
        font-size: 11px;
        color: var(--text-dim);
        margin-bottom: 2px;
      }
      .audit-entry .what {
        color: var(--text-main);
      }
      .audit-entry .who {
        font-weight: 600;
        color: var(--accent-deep);
      }

      .hidden {
        display: none !important;
      }

      .alert {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12.5px;
        margin-bottom: 14px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .alert i {
        margin-top: 1px;
      }
      .alert.info {
        background: var(--bg-card-warm);
        border: 1px solid var(--border-warm);
        color: var(--color-primary-hover);
      }
      .alert.warn {
        background: var(--status-warning-bg);
        border: 1px solid var(--status-warning-bg);
        color: var(--status-warning-text);
      }
      .alert.danger {
        background: var(--status-danger-bg);
        border: 1px solid var(--status-danger-bg);
        color: var(--status-danger-text);
      }
      .alert.success {
        background: var(--status-success-bg);
        border: 1px solid var(--status-success-bg);
        color: var(--status-success-text);
      }

      /* ===== Toast ===== */
      .toast-wrap {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .toast {
        background: var(--text-primary);
        color: #ffffff;
        padding: 10px 14px;
        border-radius: var(--r-md);
        font-size: 13px;
        display: flex;
        gap: 10px;
        align-items: center;
        box-shadow: var(--shadow-toast);
        animation: toastIn 0.2s ease;
        max-width: 360px;
      }
      .toast.success {
        background: var(--status-success-text);
      }
      .toast.error {
        background: var(--status-danger-text);
      }
      .toast.warn {
        background: var(--status-warning-text);
        color: #ffffff;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== Modal ===== */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(34, 24, 18, 0.48);
        /* dim overlay */
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 100;
      }
      .modal-backdrop.open {
        display: flex;
      }
      .modal-box {
        width: 500px;
        max-width: 100%;
        background: var(--bg-card);
        border-radius: var(--r-lg);
        box-shadow: var(--shadow-modal);
        display: flex;
        flex-direction: column;
        max-height: 90vh;
      }
      .modal-header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border-default);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .modal-title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .modal-body {
        padding: 18px;
        overflow: auto;
      }
      .modal-body label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 4px;
        margin-top: 12px;
      }
      .modal-body label:first-of-type {
        margin-top: 0;
      }
      .modal-body .req::after {
        content: " *";
        color: var(--status-danger-text);
      }
      .modal-body .check-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
      }
      .modal-body .check-row input {
        width: 16px;
        height: 16px;
        accent-color: var(--color-primary);
        min-height: 0;
        cursor: pointer;
      }
      .modal-body .check-row label {
        margin: 0;
        text-transform: none;
        letter-spacing: 0;
        font-weight: 500;
        font-size: 13px;
        color: var(--text-main);
        cursor: pointer;
      }
      .modal-footer {
        padding: 12px 18px;
        border-top: 1px solid var(--border-default);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      @media (max-width: 768px) {
        .page-header {
          flex-direction: column;
        }
        .detail-toolbar {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <!-- ================== LIST VIEW ================== -->
    <div id="listView">
      <div class="page-header">
        <div>
          <h1>Property Reports</h1>
        </div>
        <div class="page-header-actions">
          <button class="btn" type="button" onclick="exportCsv()">
            <i class="fas fa-file-export"></i> Export CSV
          </button>
        </div>
      </div>

      <section class="card">
        <div class="card-title"><i class="fas fa-filter"></i> Filters</div>
        <div class="filter-bar">
          <div class="field-group">
            <label class="field-label" for="fStatus">Status</label>
            <select id="fStatus" multiple size="3">
              <option value="pending">Pending</option>
              <option value="suspended">Suspended</option>
              <option value="dismissed">Dismissed</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label" for="fReason">Reason</label>
            <select id="fReason">
              <option value="">All reasons</option>
              <option value="property_sold">Property sold</option>
              <option value="incorrect_information">
                Incorrect information
              </option>
              <option value="privacy_copyright">Privacy / copyright</option>
              <option value="unauthorized_listing">Unauthorized listing</option>
              <option value="unauthorized_images">Unauthorized images</option>

      // ========================================================================

          auditLog: [

            },

      ];

      // ------------------------------------------------------------------
      // Deterministic filler so the list always has >= 60 reports for the
      // universal 50/page pagination. The five hand-written examples above
      // are kept as-is; these padded rows use fixed, realistic values.
      // ------------------------------------------------------------------
      (function seedReports() {
        const TITLES = [
          ["Studio in Nakano", "Tokyo Realty Co."],
          ["Riverside Condo in Kyoto", "Kyoto Estate KK"],
          ["Townhouse in Sapporo", "Hokkaido Homes"],
          ["Seaside Villa in Fukuoka", "Kyushu Living Ltd."],
          ["Compact Flat in Nagoya", "Chubu Property Group"],
          ["Garden House in Kobe", "Kansai Realty"],
          ["Modern Loft in Sendai", "Tohoku Homes KK"],
          ["Hillside Cottage in Nara", "Nara Estate Co."],
          ["City Apartment in Hiroshima", "Setouchi Realty"],
          ["Renovated Machiya in Kanazawa", "Hokuriku Homes"],
          ["Mountain Cabin in Nagano", "Alps Property"],
          ["Bayfront Suite in Yokohama", "Yokohama Living KK"],
        ];
        const REASONS = [
          "property_sold",
          "incorrect_information",
          "privacy_copyright",
          "unauthorized_listing",
          "unauthorized_images",
          "other",
        ];
        const STATUSES = ["pending", "suspended", "dismissed"];
        const REPORTERS = [
          ["individual", "Sophie Turner", "sophie.turner@example.com", "+81-90-1111-2222"],
          ["company", "Compliance Team", "compliance@example.jp", "+81-3-4444-5555"],
          ["individual", "Kenji Watanabe", "kenji.w@example.com", "+81-80-7777-8888"],
          ["company", "Legal Department", "legal@example.jp", "+81-6-2222-3333"],
          ["individual", "Maria Garcia", "maria.g@example.com", "+34-600-123-456"],
        ];
        const DESCRIPTIONS = [
          "The information shown in this listing does not match what I observed on site. Please review the details.",
          "These photos appear to be reused from another listing without authorization. Kindly investigate.",
          "I was told this property is no longer available, yet it still shows as active on the platform.",
          "Privacy concern: the listing exposes details that should not be public. Please look into it.",
          "This listing seems to have been posted without proper authorization from the owner.",
        ];
        const target = 60;
        const startCount = reports.length;
        const startNum = startCount + 1;
        for (let i = 0; i < target - startCount; i++) {
          const n = startNum + i;
          const idNum = String(n).padStart(4, "0");
          const [title, owner] = TITLES[i % TITLES.length];
          const reason = REASONS[i % REASONS.length];
          const status = STATUSES[i % STATUSES.length];
          const [rType, rName, rEmail, rPhone] =
            REPORTERS[i % REPORTERS.length];
          // Deterministic descending dates: spread across 2024.
          const day = ((i * 7) % 27) + 1;
          const month = ((i * 3) % 12) + 1;
          const created = `2024-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}T${String(8 + (i % 10)).padStart(2, "0")}:${String((i * 5) % 60).padStart(2, "0")}:00`;
          const updated =
            status === "pending"
              ? created
              : `2024-${String(month).padStart(2, "0")}-${String(Math.min(day + 1, 28)).padStart(2, "0")}T12:00:00`;
          const audit = [
            {
              at: created,
              by: "System",
              action: "created",
              detail: `Submitted by ${rName} — Report received.`,
            },
          ];
          const rec = {
            id: `R-2024-${idNum}`,
            propertyId: `P-${2100 + n}`,
            propertyTitle: title,
            propertyOwner: owner,
            reporterType: rType,
            reporterName: rType === "company" ? `${owner} ${rName}` : rName,
            reporterEmail: rEmail,
            reporterPhone: rPhone,
            reason,
            description: DESCRIPTIONS[i % DESCRIPTIONS.length],
            attachments:
              i % 3 === 0
                ? [
                    {
                      type: "image",
                      label: "Listing screenshot",
                      size: "320 KB",
                    },
                  ]
                : [],
            status,
            createdAt: created,
            updatedAt: updated,
            auditLog: audit,
          };
          if (status === "suspended") {
            rec.suspendNote = "Reviewed and confirmed — listing suspended.";
            audit.push({
              at: updated,
              by: "Admin Tanaka",
              action: "suspended",
              detail:
                "Suspended by Admin Tanaka — Listing suspended. Reporter notified.",
            });
          } else if (status === "dismissed") {
            rec.dismissReason = "no_issue_found";
            rec.dismissNote = "Reviewed — no issue found with the listing.";
            audit.push({
              at: updated,
              by: "Admin Sato",
              action: "dismissed",
              detail:
                "Dismissed by Admin Sato — Reason: No issue found. No action on listing. Reporter notified.",

          reports.push(rec);
        }
      })();

      // ========================================================================
      // STATE + HELPERS
      // ========================================================================
      const PAGE_SIZE = 50;
      let filtered = reports.slice();
      let currentPage = 1;
      let currentReport = null;

      const $ = (id) => document.getElementById(id);
      const esc = (s) =>
        String(s ?? "").replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      const escAttr = (s) => esc(s).replace(/"/g, "&quot;");

      function fmtDate(s) {
        if (!s) return "—";
        const d = new Date(s);
        if (Number.isNaN(d.getTime())) return s;
        return d.toLocaleDateString("en-GB", {
          year: "numeric",
          month: "short",
          day: "2-digit",
        });
      }
      function fmtDateTime(s) {
        if (!s) return "—";
        const d = new Date(s);
        if (Number.isNaN(d.getTime())) return s;
        return d.toLocaleString("en-GB", {
          dateStyle: "medium",
          timeStyle: "short",
        });
      }
      function badgeStatus(s) {
        return `<span class="badge badge-${s}">${STATUS_LABEL[s] || s}</span>`;
      }
      function badgeReporter(t) {
        return t === "company"
          ? '<span class="badge badge-company"><i class="fas fa-building"></i> Real-Estate Company</span>'
          : '<span class="badge badge-individual"><i class="fas fa-user"></i> Individual</span>';
      }
      function badgeReason(r) {
        return `<span class="badge badge-reason">${REASON_LABEL[r] || r}</span>`;
      }

      function toast(msg, kind) {
        const wrap = $("toastWrap");
        const el = document.createElement("div");
        el.className = "toast " + (kind || "success");
        el.innerHTML = `<i class="fas fa-${kind === "error" ? "circle-exclamation" : kind === "warn" ? "triangle-exclamation" : "circle-check"}"></i> ${esc(msg)}`;
        wrap.appendChild(el);
        setTimeout(() => {
          el.style.opacity = "0";
          el.style.transform = "translateY(8px)";
          el.style.transition = "all 0.2s";
        }, 2400);
        setTimeout(() => el.remove(), 2700);
      }

      // ========================================================================
      // LIST RENDER
      // ========================================================================
      function renderKpi() {
        const row = $("kpiRow");
        if (!row) return; // KPI cards removed from the report screen
        const counts = { pending: 0, suspended: 0, dismissed: 0 };
        reports.forEach((r) => {
          counts[r.status] = (counts[r.status] || 0) + 1;
        });
        row.innerHTML = `
          <div class="kpi"><div class="kpi-label">Pending</div><div class="kpi-value" style="color:var(--badge-amber)">${counts.pending}</div><div class="kpi-hint">Awaiting admin action</div></div>
          <div class="kpi"><div class="kpi-label">Suspended</div><div class="kpi-value" style="color:var(--badge-green)">${counts.suspended}</div><div class="kpi-hint">Listing suspended</div></div>
          <div class="kpi"><div class="kpi-label">Dismissed</div><div class="kpi-value" style="color:var(--badge-red)">${counts.dismissed}</div><div class="kpi-hint">Report closed, no action</div></div>
          <div class="kpi"><div class="kpi-label">Total Reports</div><div class="kpi-value">${reports.length}</div><div class="kpi-hint">All time</div></div>
        `;
      }

      function renderList() {
        const total = filtered.length;
        const tbody = $("listBody");

        // Clamp the current page to the available range.
        const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        if (!total) {
          $("resultCount").textContent = "Showing 0 of 0 reports";
          tbody.innerHTML =
            '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text-muted)">No reports match the filters.</td></tr>';
          renderPagination(0, totalPages);
          return;
        }

        const startIdx = (currentPage - 1) * PAGE_SIZE;
        const endIdx = Math.min(startIdx + PAGE_SIZE, total);
        $("resultCount").textContent =
          `Showing ${startIdx + 1}–${endIdx} of ${total} reports`;

        const pageRows = filtered.slice(startIdx, endIdx);
        tbody.innerHTML = pageRows
          .map(
            (r) => `
          <tr onclick="showDetail('${r.id}')">
            <td><strong>${esc(r.id)}</strong></td>
            <td>
              <div style="font-weight:600">${esc(r.propertyTitle)}</div>
              <div style="font-size:11px;color:var(--text-muted)">${esc(r.propertyId)}</div>
            </td>
            <td>${badgeReason(r.reason)}</td>
            <td>${badgeReporter(r.reporterType)}<br><span style="font-size:11px;color:var(--text-muted)">${esc(r.reporterName)}</span></td>
            <td>${fmtDate(r.createdAt)}</td>
            <td>${fmtDate(r.updatedAt)}</td>
            <td>${badgeStatus(r.status)}</td>
            <td><button class="btn btn-sm btn-ghost" type="button" title="Open property detail" onclick="event.stopPropagation();openPropertyTab('${escAttr(r.propertyId)}')"><i class="fas fa-arrow-up-right-from-square"></i></button></td>
          </tr>`,
          )
          .join("");

        renderPagination(total, totalPages);
      }

      // Build the page number sequence: always show first & last, current
      // and its neighbours, with "…" gaps. Capped to keep it compact (<= 7
      // numbered buttons before ellipses kick in).
      function pageNumbers(current, totalPages) {
        if (totalPages <= 7) {
          return Array.from({ length: totalPages }, (_, i) => i + 1);
        }
        const pages = new Set([1, totalPages, current]);
        if (current - 1 > 1) pages.add(current - 1);
        if (current + 1 < totalPages) pages.add(current + 1);
        const sorted = Array.from(pages).sort((a, b) => a - b);
        const out = [];
        let prev = 0;
        sorted.forEach((p) => {
          if (prev && p - prev > 1) out.push("…");
          out.push(p);
          prev = p;
        });
        return out;
      }

      function renderPagination(total, totalPages) {
        const wrap = $("pagination");
        // Hidden whenever everything fits on a single page (<= 50 rows).
        if (total <= PAGE_SIZE) {
          wrap.innerHTML = "";
          wrap.classList.add("hidden");
          return;
        }
        wrap.classList.remove("hidden");
        let html = "";
        html += `<button class="page-btn" type="button" ${currentPage === 1 ? "disabled" : ""} onclick="goToPage(${currentPage - 1})"><i class="fas fa-chevron-left"></i> Previous</button>`;
        pageNumbers(currentPage, totalPages).forEach((p) => {
          if (p === "…") {
            html += '<span class="page-ellipsis">…</span>';
          } else {
            html += `<button class="page-btn ${p === currentPage ? "active" : ""}" type="button" onclick="goToPage(${p})">${p}</button>`;
          }
        });
        html += `<button class="page-btn" type="button" ${currentPage === totalPages ? "disabled" : ""} onclick="goToPage(${currentPage + 1})">Next <i class="fas fa-chevron-right"></i></button>`;
        wrap.innerHTML = html;
      }

      function goToPage(p) {
        currentPage = p;
        renderList();
        window.scrollTo(0, 0);
      }
      window.goToPage = goToPage;

      function applyFilters() {
        const statuses = Array.from($("fStatus").selectedOptions).map(
          (o) => o.value,
        );
        const reason = $("fReason").value;
        const reporterType = $("fReporterType").value;
        const from = $("fFrom").value;
        const to = $("fTo").value;
        const q = $("fSearch").value.toLowerCase().trim();
        filtered = reports.filter((r) => {
          if (statuses.length && !statuses.includes(r.status)) return false;
          if (reason && r.reason !== reason) return false;
          if (reporterType && r.reporterType !== reporterType) return false;
          if (from && new Date(r.createdAt) < new Date(from)) return false;
          if (to && new Date(r.createdAt) > new Date(to + "T23:59:59"))
            return false;
          if (q) {
            const blob = [
              r.id,
              r.propertyId,
              r.propertyTitle,
              r.reporterName,
              r.propertyOwner,
            ]
              .join(" ")
              .toLowerCase();
            if (!blob.includes(q)) return false;
          }
          return true;
        });
        currentPage = 1;
        renderList();
      }
      function resetFilters() {
        Array.from($("fStatus").options).forEach((o) => (o.selected = false));
        $("fReason").value = "";
        $("fReporterType").value = "";
        $("fFrom").value = "";
        $("fTo").value = "";
        $("fSearch").value = "";
        filtered = reports.slice();
        currentPage = 1;
        renderList();
      }

      function exportCsv() {
        toast(`Export ${filtered.length} filtered reports as CSV.`);
      }

      // ========================================================================
      // DETAIL RENDER
      // ========================================================================
      function showDetail(id) {
        const r = reports.find((x) => x.id === id);
        if (!r) return;
        currentReport = r;
        renderDetail();
        $("listView").classList.add("hidden");
        $("detailView").classList.remove("hidden");
        window.scrollTo(0, 0);
      }
      function showList() {
        $("detailView").classList.add("hidden");
        $("listView").classList.remove("hidden");
        currentReport = null;
      }
      window.showDetail = showDetail;
      window.showList = showList;

      function attachIcon(t) {
        return (
          {
            image: "fa-image",
            doc: "fa-file-lines",
            link: "fa-link",
            video: "fa-video",
          }[t] || "fa-paperclip"
        );
      }
      function attachLabel(t) {
        return (
          {
            image: "Image",
            doc: "Document",
            link: "External link",
            video: "Video",
          }[t] || "Attachment"
        );
      }

      function renderDetail() {
        const r = currentReport;
        if (!r) return;

        $("dStatusBadge").outerHTML =
          `<span class="badge badge-${r.status}" id="dStatusBadge">${STATUS_LABEL[r.status]}</span>`;
        $("dPropertyTitle").textContent = r.propertyTitle;
        $("dReportId").textContent = r.id;
        $("dPropertyId").textContent = r.propertyId;
        $("dPropertyOwner").textContent = "Owner: " + r.propertyOwner;

        // Actions toolbar — depends on status
        const actions = $("dActions");
        if (r.status === "pending") {
          actions.innerHTML = `
            <button class="btn btn-success" type="button" onclick="openModal('suspendModal')" title="Suspend the listing — hide from public view"><i class="fas fa-lock"></i> Suspend listing</button>
            <button class="btn btn-danger" type="button" onclick="openModal('dismissModal')" title="Close report without action on listing"><i class="fas fa-circle-xmark"></i> Dismiss report</button>`;
        } else {
          actions.innerHTML = `
            <span style="font-size:12px;color:var(--text-muted);align-self:center">
              <i class="fas fa-lock"></i>
            </span>`;
        }

        // Status-driven alert banners removed (status pill + Report Information
        // card already convey status/reason — see "Business rules" in handoff).
        $("dAlert").innerHTML = "";

        // Report Info card
        $("dReportInfo").innerHTML = `
          <div class="kv"><span class="kv-label">Reason</span><div class="kv-value">${badgeReason(r.reason)}</div></div>
          <div class="kv"><span class="kv-label">Status</span><div class="kv-value">${badgeStatus(r.status)}</div></div>
          <div class="kv"><span class="kv-label">Submitted</span><div class="kv-value">${fmtDateTime(r.createdAt)}</div></div>
          <div class="kv"><span class="kv-label">Last update</span><div class="kv-value">${fmtDateTime(r.updatedAt)}</div></div>
        `;

        // Reporter Info card
        $("dReporterInfo").innerHTML = `
          <div class="kv"><span class="kv-label">Type</span><div class="kv-value">${badgeReporter(r.reporterType)}</div></div>
          <div class="kv"><span class="kv-label">Name</span><div class="kv-value"><strong>${esc(r.reporterName)}</strong></div></div>
          <div class="kv"><span class="kv-label">Email</span><div class="kv-value"><a href="mailto:${escAttr(r.reporterEmail)}" style="color:var(--accent)">${esc(r.reporterEmail)}</a></div></div>
          <div class="kv"><span class="kv-label">Phone</span><div class="kv-value">${esc(r.reporterPhone)}</div></div>
        `;

        // Description
        $("dDescription").textContent = r.description || "—";

        // Attachments
        const att = $("dAttachments");
        if (!r.attachments || !r.attachments.length) {
          att.innerHTML =
            '<div style="color:var(--text-muted);font-size:12.5px;font-style:italic;padding:8px">No attachments provided by the reporter.</div>';
        } else {
          att.innerHTML = r.attachments
            .map(
              (a) => `
            <div class="attach-item">
              <div class="ico"><i class="fas ${attachIcon(a.type)}"></i></div>
              <div class="info">
                <div class="lbl">${esc(a.label)}</div>
                <div class="meta">${attachLabel(a.type)}${a.size ? " · " + esc(a.size) : ""}${a.url ? ' · <a href="' + escAttr(a.url) + '" target="_blank" rel="noopener" style="color:var(--accent)">Open in new tab ↗</a>' : ""}</div>
              </div>
              <button class="btn btn-sm" type="button" onclick="toast('Download ' + ${JSON.stringify(a.label)})"><i class="fas fa-download"></i> Download</button>
            </div>`,
            )
            .join("");
        }

        // Audit log
        $("dAuditLog").innerHTML =
          (r.auditLog || [])
            .slice()
            .reverse()
            .map(
              (e) => `
          <div class="audit-entry">
            <div class="when">${fmtDateTime(e.at)}</div>
            <div class="what"><span class="who">${esc(e.by)}</span> · ${esc(e.detail)}</div>
          </div>`,
            )
            .join("") ||
          '<div style="color:var(--text-muted);font-size:12.5px;font-style:italic">No audit entries yet.</div>';
      }

      // ========================================================================
      // ACTIONS
      // ========================================================================
      function nowIso() {
        return new Date().toISOString().slice(0, 19);
      }

      function openModal(id) {
        $(id).classList.add("open");
      }
      function closeModal(id) {
        $(id).classList.remove("open");
      }
      window.openModal = openModal;
      window.closeModal = closeModal;

      // Close (without confirming) via backdrop click or Escape key, in
      // addition to the header "X" and "Cancel" buttons. Applies to both the
      // Suspend and Dismiss modals.
      ["suspendModal", "dismissModal"].forEach((id) => {
        const backdrop = $(id);
        if (!backdrop) return;
        backdrop.addEventListener("mousedown", (e) => {
          if (e.target === backdrop) closeModal(id);
        });
      });
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        ["suspendModal", "dismissModal"].forEach((id) => {
          const backdrop = $(id);
          if (backdrop && backdrop.classList.contains("open")) closeModal(id);
        });
      });

      function confirmSuspend() {
        if (!currentReport) return;
        const note = $("suspendNote").value.trim();
        const notify = $("suspendNotify").checked;
        currentReport.status = "suspended";
        currentReport.suspendNote = note;
        currentReport.updatedAt = nowIso();
        currentReport.auditLog.push({
          at: currentReport.updatedAt,
          by: CURRENT_ADMIN,
          action: "suspended",
          detail: `Suspended by ${CURRENT_ADMIN} — Listing suspended. Reporter notified.${note ? " " + note : ""}`,
        });
        closeModal("suspendModal");
        $("suspendNote").value = "";
        $("suspendNotify").checked = true;
        renderDetail();
        renderKpi();
        applyFilters();
        toast(
          `${currentReport.id} resolved — listing suspended.${notify ? " Email sent." : ""}`,
        );
      }

      function confirmDismiss() {
        if (!currentReport) return;
        const reason = $("dismissReason").value;
        const note = $("dismissNote").value.trim();
        if (!reason) {
          toast("Please select a dismiss reason.", "error");
          return;
        }
        currentReport.status = "dismissed";
        currentReport.dismissReason = reason;
        currentReport.dismissNote = note;
        currentReport.updatedAt = nowIso();
        currentReport.auditLog.push({
          at: currentReport.updatedAt,
          by: CURRENT_ADMIN,
          action: "dismissed",
          detail: `Dismissed by ${CURRENT_ADMIN} — Reason: ${DISMISS_REASON_LABEL[reason]}. No action on listing. Reporter notified.${note ? " " + note : ""}`,
        });
        closeModal("dismissModal");
        $("dismissReason").value = "";
        $("dismissNote").value = "";
        renderDetail();
        renderKpi();
        applyFilters();
        toast(`${currentReport.id} dismissed. Reporter notified.`, "warn");
      }

      function openPropertyLink() {
        if (!currentReport) return;
        const url = `property-detail-view.html?propertyId=${encodeURIComponent(currentReport.propertyId)}`;
        try {
          if (window.parent && window.parent !== window) {
            const frame = window.parent.document.getElementById("contentFrame");
            if (frame) {
              frame.src = "property/" + url;
              return;
            }
          }
        } catch (e) {}
        window.open(url, "_blank");
      }

      function openPropertyTab(propertyId) {
        const url = `property/property-list-oversight.html?propertyId=${encodeURIComponent(propertyId)}`;
        window.open(url, "_blank");
      }

      // expose action handlers used by inline onclick
      window.confirmSuspend = confirmSuspend;
      window.confirmDismiss = confirmDismiss;
      window.openPropertyLink = openPropertyLink;
      window.openPropertyTab = openPropertyTab;
      window.applyFilters = applyFilters;
      window.resetFilters = resetFilters;
      window.exportCsv = exportCsv;

      // ========================================================================
      // INIT
      // ========================================================================
      renderKpi();
      renderList();
    </script>
  </body>
</html>
