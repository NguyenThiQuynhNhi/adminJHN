<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Detail</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        /* ===== YUUSHI unified gold/white design system ===== */
        --bg-page: #f5f5f5;
        --bg-card: #ffffff;
        --bg-card-warm: #fffaf2;
        --bg-row-hover: #faf6ee;
        --bg-header-soft: #faf6ee;
        --text-primary: #1a1a1a;
        --text-muted: #7a6a5c;
        --text-label: #888;
        --text-link: #8a5a3b;
        --border-default: #e0e0e0;
        --border-warm: #eadccd;
        --border-soft: #f0f0f0;
        --color-primary: #8b7340;
        --color-primary-hover: #6d5a32;
        --color-primary-light: #c9a85c;
        --status-success-text: #2a7a2a;
        --status-success-bg: #d4f0d4;
        --status-warning-text: #c87a2a;
        --status-warning-bg: #fff3d4;
        --status-danger-text: #b23b3b;
        --status-danger-bg: #fbe9e9;
        --status-neutral-text: #666;
        --status-neutral-bg: #e8e8e8;
        --r-sm: 6px;
        --r-md: 8px;
        --r-lg: 12px;
        --r-full: 999px;
        --shadow-card: 0 10px 30px rgba(115, 72, 39, 0.05);
        --shadow-toast: 0 8px 24px rgba(0, 0, 0, 0.3);
        --shadow-modal: 0 18px 50px rgba(59, 47, 42, 0.28);
        --font-stack:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        /* ===== Legacy theme vars repointed to the new palette ===== */
        --bg-body: var(--bg-page);
        --bg-card-page: var(--bg-card);
        --border-subtle: var(--border-default);
        --border-strong: var(--border-warm);
        --accent: var(--color-primary);
        --accent-dark: var(--color-primary-hover);
        --accent-deep: var(--color-primary-hover);
        --gold: var(--color-primary-light);
        --text-main: var(--text-primary);
        --text-dim: var(--text-label);
        --badge-green: var(--status-success-text);
        --badge-red: var(--status-danger-text);
        --badge-gray: var(--status-neutral-text);
        --badge-amber: var(--status-warning-text);
        --badge-blue: var(--status-neutral-text);
        --badge-purple: var(--status-neutral-text);
        --fs-h1: 22px;
        --fs-card-title: 14px;
        --fs-body: 13px;
        --fs-small: 12px;
        --fs-label: 11px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        padding: clamp(16px, 2.5vw, 24px);
        font-family: var(--font-stack);
        background: var(--bg-page);
        color: var(--text-main);
        font-size: var(--fs-body);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      h1 {
        margin: 0 0 4px;
        font-size: var(--fs-h1);
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .card {
        background: var(--bg-card);
        border-radius: var(--r-lg);
        border: 1px solid var(--border-subtle);
        padding: 18px;
        box-shadow: var(--shadow-card);
        margin-bottom: 16px;
      }
      .card-title {
        font-size: var(--fs-card-title);
        font-weight: 600;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border-soft);
      }
      .card-title i {
        color: var(--accent);
        font-size: 13px;
        width: 18px;
        text-align: center;
      }
      .card-title small {
        margin-left: auto;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-dim);
      }
      .btn {
        border-radius: var(--r-md);
        border: 1px solid var(--border-subtle);
        padding: 8px 14px;
        font-size: var(--fs-body);
        background: var(--bg-card);
        cursor: pointer;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        font-family: inherit;
        font-weight: 500;
        min-height: 36px;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn:hover {
        background: var(--bg-row-hover);
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn-primary {
        background: var(--color-primary);
        border-color: var(--color-primary-hover);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--color-primary-hover);
      }
      .btn-sm {
        padding: 5px 10px;
        font-size: 12px;
        min-height: 30px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: var(--r-full);
        font-size: 11px;
        font-weight: 600;
        border: 1px solid transparent;
        white-space: nowrap;
      }
      .badge-active,
      .badge-published,
      .badge-onsale,
      .badge-yes {
        background: var(--status-success-bg);
        color: var(--status-success-text);
        border-color: var(--status-success-bg);
      }
      .badge-pending,
      .badge-presale,
      .badge-amber {
        background: var(--status-warning-bg);
        color: var(--status-warning-text);
        border-color: var(--status-warning-bg);
      }
      .badge-draft,
      .badge-private,
      .badge-gray {
        background: var(--status-neutral-bg);
        color: var(--status-neutral-text);
        border-color: var(--status-neutral-bg);
      }
      .badge-closed,
      .badge-soldout,
      .badge-suspended,
      .badge-rejected,
      .badge-no {
        background: var(--status-danger-bg);
        color: var(--status-danger-text);
        border-color: var(--status-danger-bg);
      }
      .badge-members {
        background: var(--bg-card-warm);
        color: var(--color-primary);
        border-color: var(--border-warm);
      }
      .badge-group {
        background: var(--bg-card-warm);
        color: var(--color-primary);
        border-color: var(--border-warm);
        font-weight: 700;
      }
      .badge-paid {
        background: var(--status-warning-bg);
        color: var(--status-warning-text);
        border-color: var(--status-warning-bg);
      }

      /* ===== Slim top bar ===== */
      .topbar {
        position: sticky;
        top: 0;
        background: var(--bg-page);
        padding: 12px 0;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .topbar-name {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-main);
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ===== Detail hero ===== */
      .detail-hero {
        background: var(--bg-card-warm);
        border-radius: var(--r-lg);
        border: 1px solid var(--border-warm);
        padding: 22px;
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 16px;
        flex-wrap: wrap;
        box-shadow: var(--shadow-card);
      }
      .detail-thumb {
        width: 96px;
        height: 76px;
        border-radius: var(--r-lg);
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        flex-shrink: 0;
        box-shadow: 0 8px 20px rgba(139, 115, 64, 0.25);
      }
      .detail-hero-info {
        flex: 1;
        min-width: 0;
      }
      .detail-name {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 6px;
        color: var(--text-main);
      }
      .detail-meta {
        font-size: var(--fs-small);
        color: var(--text-muted);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .detail-id-pill {
        font-family: ui-monospace, "Consolas", monospace;
        font-size: 11px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        padding: 2px 8px;
        border-radius: var(--r-sm);
        color: var(--text-muted);
      }
      .section-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 460px), 1fr));
        gap: 14px;
      }
      .kv-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 200px), 1fr));
        gap: 12px 16px;
      }
      .kv {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .kv-label {
        font-size: var(--fs-label);
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .kv-label .req {
        color: var(--badge-red);
        margin-left: 3px;
      }
      .kv-value {
        font-size: var(--fs-body);
        color: var(--text-main);
        word-break: break-word;
        min-height: 20px;
      }
      .kv-full {
        grid-column: 1 / -1;
      }
      .kv-half {
        grid-column: span 2;
      }

      /* ===== Accordion (amenities) ===== */
      .accord {
        border: 1px solid var(--border-subtle);
        border-radius: var(--r-md);
        margin-bottom: 8px;
        background: var(--bg-card-warm);
        overflow: hidden;
      }
      .accord-header {
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        font-weight: 600;
        font-size: 12.5px;
        color: var(--text-main);
        user-select: none;
      }
      .accord-header:hover {
        background: var(--bg-row-hover);
      }
      .accord-header i.fa-chevron-down {
        color: var(--text-muted);
        font-size: 11px;
        transition: transform 0.2s;
      }
      .accord.open .accord-header i.fa-chevron-down {
        transform: rotate(180deg);
      }
      .accord-body {
        padding: 12px 14px 14px;
        border-top: 1px solid var(--border-subtle);
        display: none;
      }
      .accord.open .accord-body {
        display: block;
      }

      /* ===== Media gallery ===== */
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
      }
      .gallery-item {
        background: var(--bg-header-soft);
        border: 1px solid var(--border-subtle);
        border-radius: var(--r-md);
        aspect-ratio: 4/3;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 22px;
        position: relative;
        overflow: hidden;
      }
      .gallery-item .cover-tag {
        position: absolute;
        top: 6px;
        left: 6px;
        background: var(--accent);
        color: #fff;
        font-size: 10px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: var(--r-sm);
      }
      .gallery-item .gallery-meta {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 10px;
        padding: 3px 6px;
      }
      .hidden {
        display: none !important;
      }

      /* ===== Alerts ===== */
      .alert {
        padding: 10px 14px;
        border-radius: var(--r-md);
        font-size: 12.5px;
        margin-bottom: 14px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .alert i {
        margin-top: 1px;
      }
      .alert.info {
        background: var(--bg-card-warm);
        border: 1px solid var(--border-warm);
        color: var(--text-link);
      }
      .alert.warn {
        background: var(--status-warning-bg);
        border: 1px solid var(--status-warning-bg);
        color: var(--status-warning-text);
      }
      .alert.danger {
        background: var(--status-danger-bg);
        border: 1px solid var(--status-danger-bg);
        color: var(--status-danger-text);
      }
      .alert.success {
        background: var(--status-success-bg);
        border: 1px solid var(--status-success-bg);
        color: var(--status-success-text);
      }

      /* ===== Toast ===== */
      .toast-wrap {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .toast {
        background: var(--text-primary);
        color: #fff;
        padding: 10px 14px;
        border-radius: var(--r-md);
        font-size: 13px;
        display: flex;
        gap: 10px;
        align-items: center;
        box-shadow: var(--shadow-toast);
        animation: toastIn 0.2s ease;
        max-width: 360px;
      }
      .toast.success i {
        color: var(--color-primary-light);
      }
      .toast.error {
        background: var(--status-danger-text);
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ============ Points of Interest ============ */
      .poi-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .poi-meta {
        background: var(--status-success-bg);
        border: 1px solid var(--status-success-bg);
        color: var(--status-success-text);
        padding: 8px 12px;
        border-radius: var(--r-md);
        font-size: 12px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .poi-categories {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
        gap: 10px;
      }
      .poi-category {
        background: var(--bg-card-warm);
        border: 1px solid var(--border-subtle);
        border-radius: var(--r-md);
        overflow: hidden;
        --cat-color: var(--accent);
      }
      .poi-category.empty {
        opacity: 0.55;
      }
      .poi-cat-header {
        padding: 8px 12px;
        background: var(--bg-header-soft);
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12.5px;
        color: var(--text-main);
        border-left: 3px solid var(--cat-color);
      }
      .poi-cat-header i {
        color: var(--cat-color);
        font-size: 13px;
      }
      .poi-cat-header .poi-count {
        margin-left: auto;
        background: var(--cat-color);
        color: #fff;
        padding: 1px 8px;
        border-radius: var(--r-full);
        font-size: 10.5px;
        font-weight: 700;
        min-width: 22px;
        text-align: center;
      }
      .poi-items {
        padding: 4px 12px 8px;
      }
      .poi-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 5px 0;
        font-size: 12px;
        border-bottom: 1px dashed var(--border-soft);
      }
      .poi-item:last-child {
        border-bottom: 0;
      }
      .poi-item .poi-name {
        color: var(--text-main);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        flex: 1;
      }
      .poi-item .poi-dist {
        color: var(--text-muted);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        flex-shrink: 0;
        font-weight: 600;
      }
      .poi-empty {
        background: var(--bg-card-warm);
        border: 2px dashed var(--border-strong);
        border-radius: var(--r-md);
        padding: 28px 20px;
        text-align: center;
        color: var(--text-muted);
      }
      .poi-empty i {
        font-size: 32px;
        color: var(--accent);
        display: block;
        margin-bottom: 10px;
      }
      .poi-empty p {
        margin: 4px 0;
        font-size: 13px;
      }

      @media (max-width: 768px) {
        .topbar {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <!-- ================== SLIM TOP BAR ================== -->
    <div class="topbar">
      <div class="topbar-name" id="barName">Property Detail</div>
      <button
        class="btn"
        type="button"
        onclick="history.length>1?history.back():window.close()"
      >
        <i class="fas fa-arrow-left"></i> Back

    </div>
    <div class="section-grid" id="dSections"></div>

    <div class="toast-wrap" id="toastWrap"></div>

        let soldCount = 0;
        properties.forEach((p, i) => {
          // Default sale status
          if (!p.saleStatus) p.saleStatus = "On Sale";

          // Deterministically mark a spread of ~10 listings as Sold Out.
          const hasBuyPrice = !!p.priceBuy;
          const markSold = hasBuyPrice && soldCount < 10 && i % 6 === 2;
          if (markSold) {
            const s = SOLD_CYCLE[soldCount % SOLD_CYCLE.length];
            p.saleStatus = "Sold Out";
            p.finalSalePrice = Math.round(
              p.priceBuy * (1 - ((i % 5) + 1) / 100),
            );
            p.soldDate = s.soldDate;
            p.soldNotes = s.notes;
            // Auto-suspend on sale (matches mark-as-sold rule).
            p.publishStatus = "Suspended";
            soldCount++;
          }
        });
      })();

      const esc = (s) =>

          /[&<>"']/g,

            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      const escAttr = (s) => esc(s).replace(/"/g, "&quot;");
      const fmtYen = (n) =>
        n === "" || n == null ? "—" : "¥" + Number(n).toLocaleString("en-US");
      const fmtNum = (n) =>
        n === "" || n == null ? "—" : Number(n).toLocaleString("en-US");
      const fmtPct = (n) => (n === "" || n == null ? "—" : Number(n) + "%");
      const fmtDate = (s) => (s ? s : "—");

      function badgePublish(s) {
        const m = {
          "Pending Review": "badge-pending",
          Published: "badge-published",
          Rejected: "badge-rejected",
          Suspended: "badge-suspended",
        };
        return `<span class="badge ${m[s] || "badge-gray"}">${esc(s || "—")}</span>`;
      }
      function badgeMembers(s) {
        return s === "Members Only"
          ? `<span class="badge badge-members"><i class="fas fa-lock"></i> Members Only</span>`
          : `<span class="badge badge-published">Open</span>`;
      }
      function badgeTx(s) {
        if (!s) return `<span class="badge badge-gray">—</span>`;
        if (s === "Buy") return `<span class="badge badge-onsale">Buy</span>`;
        return `<span class="badge badge-amber">Rent</span>`;
      }
      function badgeYesNo(b) {
        return b
          ? `<span class="badge badge-yes">Yes</span>`
          : `<span class="badge badge-no">No</span>`;
      }
      function badgeGroup(g) {
        return `<span class="badge badge-group">Group ${g}</span>`;
      }
      function badgeSale(s) {
        const v = s === "Sold Out" ? "badge-soldout" : "badge-onsale";
        return `<span class="badge ${v}">${esc(s || "On Sale")}</span>`;
      }

      function toast(msg, kind) {
        const wrap = $("toastWrap");
        if (!wrap) return;
        const el = document.createElement("div");
        el.className = "toast " + (kind || "success");
        el.innerHTML = `<i class="fas fa-${kind === "error" ? "circle-exclamation" : "circle-check"}"></i> ${esc(msg)}`;
        wrap.appendChild(el);
        setTimeout(() => {
          el.style.opacity = "0";
          el.style.transform = "translateY(8px)";
          el.style.transition = "all 0.2s";
        }, 2400);
        setTimeout(() => el.remove(), 2700);
      }

      // ------------------------------------------------------------------------
      // Resolve the property's group from explicit field, else infer from propType.
      // ------------------------------------------------------------------------
      function resolveGroup(p) {
        if (p && GROUP_META[p.group]) return p.group;
        const t = p && p.propType;
        if (t) {
          for (const g of [1, 2, 3]) {
            if (GROUP_META[g].propTypes.includes(t)) return g;
          }
        }
        return 1; // safe default
      }

      // ------------------------------------------------------------------------
      // Resolve options for a field
      // ------------------------------------------------------------------------
      function resolveOpts(f, prop) {
        if (f.opts) return f.opts;
        if (f.optKey === "_groupPropType" && prop)
          return GROUP_META[resolveGroup(prop)].propTypes;
        if (f.optsByField && prop) {
          const v = prop[f.optsByField];
          if (f.optsByField === "prefecture") return OPT.cityByPref[v] || [];
        }
        return [];
      }

      // ------------------------------------------------------------------------
      // showIf: check object {fieldKey: [allowedValues...]}
      // ------------------------------------------------------------------------
      function showIfPass(f, prop) {
        if (!f.showIf) return true;
        for (const k in f.showIf) {
          if (!f.showIf[k].includes(prop[k])) return false;
        }
        return true;
      }

      // ------------------------------------------------------------------------
      // Render a single field (kv item) — READ-ONLY value representation only
      // ------------------------------------------------------------------------
      function renderField(f, prop) {
        if (f.t === "header") {
          return `<div class="kv-full" style="grid-column:1/-1;font-weight:700;color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:0.05em;padding:6px 0 2px;border-top:1px dashed var(--border-subtle);margin-top:6px">${esc(f.l)}</div>`;
        }
        if (f.t === "note") {
          return `<div class="kv-full alert info" style="margin:6px 0 0">${esc(f.l)}</div>`;
        }
        const val = prop[f.k];
        const labelHtml = f.hideLabel
          ? ""
          : `<span class="kv-label">${esc(f.l)}${f.req ? '<span class="req">*</span>' : ""}</span>`;
        const fullCls = f.full ? " kv-full" : "";
        const valueHtml = renderViewField(f, val, prop);
        return `<div class="kv${fullCls}">${labelHtml}<div class="kv-value">${valueHtml}</div></div>`;
      }

      function renderViewField(f, val, prop) {
        if (f.t === "auto") {
          if (f.display) return f.display;
          if (f.k === "pricePerSqm" && prop.priceBuy && prop.exclusiveArea)
            return fmtYen(Math.round(prop.priceBuy / prop.exclusiveArea));
          if (f.k === "rentUnitPrice" && prop.rentMonthly && prop.exclusiveArea)
            return fmtYen(Math.round(prop.rentMonthly / prop.exclusiveArea));
          if (f.k === "pricePerTsubo" && prop.priceBuy && prop.landArea)
            return fmtYen(Math.round(prop.priceBuy / (prop.landArea / 3.306)));
          if (f.k === "occRate" && prop.unitsOcc && prop.totalUnits)
            return Math.round((prop.unitsOcc / prop.totalUnits) * 100) + "%";
          return "—";
        }
        if (f.t === "yen") {
          if (f.k === "priceBuy" && prop && prop.saleStatus === "Sold Out") {
            return `<span style="color:var(--text-muted);text-decoration:line-through" title="Original asking price — superseded by final sale price">${fmtYen(val)}</span>`;
          }
          return fmtYen(val);
        }
        if (f.t === "num") return fmtNum(val);
        if (f.t === "percent") return fmtPct(val);
        if (f.t === "date") return fmtDate(val);
        if (f.t === "toggle") return badgeYesNo(!!val);
        if (f.t === "textarea")
          return `<div style="white-space:pre-wrap;line-height:1.55">${esc(val) || '<em style="color:var(--text-muted)">—</em>'}</div>`;
        if (f.t === "checks") {
          const arr = Array.isArray(val) ? val : [];
          if (!arr.length)
            return '<em style="color:var(--text-muted)">None selected</em>';
          return arr
            .map(
              (v) =>
                `<span class="badge badge-published" style="margin:2px 4px 2px 0">${esc(v)}</span>`,
            )
            .join("");
        }
        return esc(val) || "—";
      }

      // ------------------------------------------------------------------------
      // Render a section card
      // ------------------------------------------------------------------------
      function renderSection(secKey, prop) {
        const sec = SEC[secKey];
        if (!sec) return "";

        let inner;
        if (sec.custom === "poi") inner = renderPOI(prop);
        else if (sec.custom === "media") inner = renderMedia(prop);
        else if (sec.accord) inner = renderAmenities(sec, prop);
        else {
          const items = (sec.fields || [])
            .filter((f) => showIfPass(f, prop))
            .map((f) => renderField(f, prop))
            .join("");
          inner = `<div class="kv-grid">${items}</div>`;
        }

        const fullCls = sec.full || sec.accord || sec.custom ? " kv-full" : "";
        return `
          <section class="card${fullCls === " kv-full" ? '" style="grid-column:1/-1' : ""}">
            <div class="card-title"><i class="fas ${sec.icon}"></i> ${esc(sec.title)}</div>
            ${inner}
          </section>`;
      }

      function renderAmenities(sec, prop) {
        const panelsHtml = sec.panels
          .map((p, i) => {
            const arr = Array.isArray(prop[p.key]) ? prop[p.key] : [];
            const count = arr.length;
            const body = arr.length

                  )
                  .join("")
              : '<em style="color:var(--text-muted)">None selected</em>';
            return `
            <div class="accord ${i === 0 ? "open" : ""}">
              <div class="accord-header" onclick="this.parentElement.classList.toggle('open')">
                <span>${esc(p.title)} ${count ? `<span style="color:var(--accent);margin-left:4px">(${count})</span>` : ""}</span>
                <i class="fas fa-chevron-down"></i>
              </div>
              <div class="accord-body">${body}</div>
            </div>`;
          })
          .join("");

        const extra = sec.extra ? renderField(sec.extra, prop) : "";
        return `${panelsHtml}<div style="margin-top:14px"><div class="kv-grid">${extra}</div></div>`;

            "Tennoji Park",
            "Nakanoshima Park",
            "Utsubo Park",
          ],
          hospital: [
            "Osaka General Medical Center",
            "Kitano Hospital",
            "Osaka Red Cross Hospital",
            "Umeda Clinic",
          ],
        },
        Kanagawa: {
          station: [
            "Yokohama Station (JR / Tokyu)",
            "Kawasaki Station (JR Tokaido)",
            "Minatomirai Station (Minatomirai Line)",
            "Kannai Station (JR Negishi)",
            "Sakuragicho Station",
          ],
          supermarket: [
            "Sotetsu Rosen Yokohama",
            "OK Mart Kawasaki",
            "Yokohama Big Camera",
            "Inageya Minatomirai",
          ],
          school: [
            "Yokohama City University",
            "Kawasaki Elementary School",
            "Yokohama International School",
          ],
          park: [
            "Yamashita Park",
            "Sankei-en Garden",
            "Minatomirai Rinko Park",
          ],
          hospital: [
            "Yokohama City University Hospital",
            "Yokohama General Hospital",
            "Kawasaki Saiwai Hospital",
          ],
        },
        Kyoto: {
          station: [
            "Kyoto Station (JR Shinkansen)",
            "Karasuma Oike Station (Karasuma)",
            "Gion-Shijo Station (Keihan)",
            "Kawaramachi Station (Hankyu)",
          ],
          supermarket: [
            "Fresco Kyoto",
            "Aeon Kyoto",
            "Daiei Kyoto",
            "Family Mart Gion",
          ],
          school: [
            "Kyoto University",
            "Doshisha University",
            "Kyoto Elementary School",
          ],
          park: ["Maruyama Park", "Kyoto Imperial Palace Park", "Okazaki Park"],
          hospital: [
            "Kyoto University Hospital",
            "Kyoto City Hospital",
            "Gion Clinic",
          ],
        },
        Fukuoka: {
          station: [
            "Hakata Station (JR Shinkansen)",
            "Tenjin Station (Nishitetsu)",
            "Fukuoka Airport Station",
            "Nakasu-Kawabata Station",
          ],
          supermarket: ["Sunny Mart Hakata", "Maruai Tenjin", "Lawson Nakasu"],
          school: [
            "Kyushu University",
            "Fukuoka Elementary School",
            "Hakata Junior High",
          ],
          park: ["Ohori Park", "Maizuru Park", "Fukuoka Castle Park"],
          hospital: [
            "Kyushu University Hospital",
            "Fukuoka Red Cross Hospital",
            "Hakata Clinic",
          ],
        },
      };
      const DEFAULT_POI_LIB = POI_LIBRARY.Tokyo;

      // Deterministic random based on input string
      function _hash(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
        return Math.abs(h);
      }

      function locatePOIs() {
        const prop = currentProp;
        if (!prop) return;
        if (!prop.prefecture || !prop.city) {
          toast(
            "Set Prefecture & City first, then click Locate POIs.",
            "error",
          );
          return;
        }
        const lib = POI_LIBRARY[prop.prefecture] || DEFAULT_POI_LIB;
        const seedBase =
          (prop.id || "") +
          (prop.postCode || "") +
          prop.prefecture +
          prop.city +
          (prop.chome || "");
        const nearby = [];
        POI_CATEGORIES.forEach((cat) => {
          const items = lib[cat.key] || [];
          const seed = _hash(seedBase + cat.key);
          const count = Math.min(items.length, 3 + (seed % 4));
          for (let i = 0; i < count; i++) {
            const itemSeed = _hash(seedBase + cat.key + i);
            const distM =
              cat.key === "station"
                ? 100 + (itemSeed % 1400)
                : 200 + (itemSeed % 4300);
            if (distM >= 5000) continue;
            const walkMin = Math.max(1, Math.round(distM / 80));
            nearby.push({ cat: cat.key, name: items[i], distM, walkMin });
          }
        });
        nearby.sort((a, b) => a.distM - b.distM);
        prop.poi = prop.poi || {};
        prop.poi.nearby = nearby;
        prop.poi.locatedAt = new Date().toLocaleString("en-GB", {
          dateStyle: "short",
          timeStyle: "short",
        });
        prop.poi.locatedAddress = [
          prop.postCode,
          prop.prefecture,
          prop.city,
          prop.chome,
        ]
          .filter(Boolean)
          .join(" · ");
        renderDetailPage();
        toast(
          `Located ${nearby.length} POIs within 5 km from ${prop.poi.locatedAddress}.`,
        );
      }
      window.locatePOIs = locatePOIs;

      function fmtDist(m) {
        return m >= 1000 ? (m / 1000).toFixed(2) + " km" : m + " m";
      }

      function renderPOI(prop) {
        const poi = prop.poi || {};
        const nearby = (poi.nearby || []).filter((p) => p.distM < 5000);
        const grouped = {};
        nearby.forEach((p) => {
          (grouped[p.cat] = grouped[p.cat] || []).push(p);
        });

        const locateBtn = `
          <button type="button" class="btn btn-primary btn-sm" onclick="locatePOIs()">
            <i class="fas fa-location-crosshairs"></i> ${nearby.length ? "Re-locate POIs" : "Locate POIs"}
          </button>`;

        const meta = nearby.length
          ? `<div class="poi-meta">
              <i class="fas fa-circle-check" style="color:var(--badge-green)"></i>
              <strong>${nearby.length} POIs</strong> found within 5 km · Located ${esc(poi.locatedAt || "")}
              ${poi.locatedAddress ? `<span style="color:var(--text-dim);margin-left:8px">📍 ${esc(poi.locatedAddress)}</span>` : ""}
            </div>`
          : "";

        const categories = nearby.length
          ? POI_CATEGORIES.map((cat) => {
              const items = grouped[cat.key] || [];
              if (!items.length)
                return `
            <div class="poi-category empty">
              <div class="poi-cat-header" style="--cat-color:${cat.color}">
                <i class="fas ${cat.icon}"></i>
                <strong>${cat.label}</strong>
                <span class="poi-count">0</span>
              </div>
            </div>`;
              return `
            <div class="poi-category">
              <div class="poi-cat-header" style="--cat-color:${cat.color}">
                <i class="fas ${cat.icon}"></i>
                <strong>${cat.label}</strong>
                <span class="poi-count">${items.length}</span>
              </div>
              <div class="poi-items">
                ${items
                  .map(
                    (p) => `
                  <div class="poi-item">
                    <span class="poi-name">${esc(p.name)}</span>
                    <span class="poi-dist">${fmtDist(p.distM)} <span style="color:var(--text-dim)">· ${p.walkMin} min walk</span></span>
                  </div>`,
                  )
                  .join("")}
              </div>
            </div>`;
            }).join("")
          : `
          <div class="poi-empty">
            <i class="fas fa-location-crosshairs"></i>
            <p><strong>No POIs located yet.</strong></p>
            <p style="font-size:11.5px;color:var(--text-muted);margin:6px 0 0">Click <strong>Locate POIs</strong> above to auto-fetch nearby Metro / Bus Station, Supermarket, School, Park and Hospital within 5 km of the property address.</p>
          </div>`;

        return `
          <div class="poi-header">
            <div class="kv-label" style="margin:0">📍 Points of Interest <span style="color:var(--text-dim);font-weight:500;text-transform:none;letter-spacing:0">(within 5 km · auto-detected)</span></div>
            ${locateBtn}
          </div>
          ${meta}
          <div class="poi-categories">${categories}</div>
        `;
      }

      function renderMedia(prop) {
        const m = prop.media || {};
        const photos = m.photoCount || 0;
        const videos = m.videoCount || 0;
        const tour = m.tour3d || "";
        const photoTiles = Array.from(
          { length: Math.min(photos, 8) },
          (_, i) => `
          <div class="gallery-item">
            <i class="fas fa-image"></i>
            ${i === 0 ? '<span class="cover-tag">Cover</span>' : ""}
            <span class="gallery-meta">photo-${i + 1}.jpg</span>
          </div>`,
        ).join("");
        return `
          <div class="kv-grid" style="margin-bottom:14px">
            <div class="kv">
              <span class="kv-label">3D Viewing Tour</span>
              <div class="kv-value">${
                tour
                  ? `<a href="${escAttr(tour)}" target="_blank" rel="noopener" style="color:var(--accent)">${esc(tour)}</a>`
                  : "—"
              }</div>
            </div>
            <div class="kv">
              <span class="kv-label">Videos</span>
              <div class="kv-value">${videos} file${videos !== 1 ? "s" : ""}</div>
            </div>
            <div class="kv">
              <span class="kv-label">Photos</span>
              <div class="kv-value">${photos} photo${photos !== 1 ? "s" : ""} ${photos > 0 ? '<span class="badge badge-amber" style="margin-left:6px">Cover: photo-1.jpg</span>' : ""}</div>
            </div>
          </div>
          ${photos ? `<div class="gallery-grid">${photoTiles}${photos > 8 ? `<div class="gallery-item"><span style="font-size:12px;color:var(--text-muted)">+${photos - 8} more</span></div>` : ""}</div>` : ""}
        `;
      }

      function thumbIcon(group) {
        return (
          { 1: "fa-home", 2: "fa-building", 3: "fa-mountain", 4: "fa-key" }[
            group
          ] || "fa-cube"
        );
      }

      // ========================================================================
      // INIT — resolve record from URL / sessionStorage, render the page
      // ========================================================================
      function resolveRecord() {
        const params = new URLSearchParams(location.search);
        const urlId = params.get("propertyId") || params.get("id") || "";

        // (a) Passed record via sessionStorage (e.g. from Approval screen)
        try {
          const raw = sessionStorage.getItem("yuushi.viewRecord");
          if (raw) {
            const rec = JSON.parse(raw);
            if (rec && typeof rec === "object") {
              if (!urlId || String(rec.id) === String(urlId)) return rec;
            }
          }
        } catch (e) {
          /* ignore malformed sessionStorage */
        }

        // (b) Find in local dataset by id
        if (urlId) {
          const found = properties.find((p) => String(p.id) === String(urlId));
          if (found) return found;
        }

        // (c) Fallback to first property
        return properties[0] || null;
      }

      function renderDetailPage() {
        const p = currentProp;
        if (!p) {
          $("dName").textContent = "No property found";
          return;
        }
        const group = resolveGroup(p);

        // Top bar + hero
        $("barName").textContent = p.name || "(Unnamed)";
        $("dThumb").innerHTML = `<i class="fas ${thumbIcon(group)}"></i>`;
        $("dName").textContent = p.name || "(Unnamed)";
        $("dId").textContent = p.id || "—";
        $("dGroupBadge").innerHTML = `<span class="badge badge-group"><i class="fas ${GROUP_META[group].icon}"></i> ${esc(GROUP_META[group].label)}</span>`;
        $("dMetaAddress").textContent =
          [p.prefecture, p.city, p.chome].filter(Boolean).join(" · ") || "—";
        $("dMetaPublish").innerHTML = badgePublish(p.publishStatus);
        $("dMetaSale").innerHTML = badgeSale(p.saleStatus);
        $("dMetaMembers").innerHTML = badgeMembers(p.membersOnly);
        $("dMetaTx").innerHTML = badgeTx(
          p.txType || (group === 3 ? "Buy" : ""),
        );

        // Alerts + sold-out record card
        const alerts = [];
        if (p.publishStatus === "Pending Review")
          alerts.push({
            kind: "warn",
            icon: "fa-clock",
            msg: "This listing is awaiting approval.",
          });
        if (p.publishStatus === "Rejected")
          alerts.push({
            kind: "danger",
            icon: "fa-circle-xmark",
            msg:
              "This listing was rejected. Reason: " +
              esc(p.rejectCategory || "—") +
              (p.rejectNotes ? ". " + esc(p.rejectNotes) : ""),
          });
        let soldCardHtml = "";
        if (p.saleStatus === "Sold Out") {
          const notesHtml = `<div style="margin-top:8px;font-size:12.5px;color:var(--status-danger-text)"><strong>Final sale price:</strong> ${
            p.publishPrice ? "Published" : "Hidden"
          }</div>`;
          soldCardHtml = `
            <section class="card" style="background:var(--status-danger-bg);border:1px solid var(--status-danger-text)">
              <div class="card-title" style="border-bottom-color:var(--status-danger-text);color:var(--status-danger-text)">
                <i class="fas fa-circle-check"></i> Sold — sale record
              </div>
              <div style="font-size:15px;font-weight:700;color:var(--status-danger-text)">
                Sold at ${fmtYen(p.finalSalePrice)} on ${fmtDate(p.soldDate)}
              </div>
              ${notesHtml}
            </section>`;
        }
        $("dAlerts").innerHTML =
          soldCardHtml +
          alerts
            .map(
              (a) =>
                `<div class="alert ${a.kind}"><i class="fas ${a.icon}"></i> <div>${a.msg}</div></div>`,
            )
            .join("");

        // Sections
        const secs = GROUP_SECS[group] || [];
        $("dSections").innerHTML = secs
          .map((k) => renderSection(k, p))
          .join("");
      }

      // Boot
      currentProp = resolveRecord();
      renderDetailPage();
    </script>
  </body>
