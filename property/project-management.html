<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - New Development Properties</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f3ef;
        color: #2a2118;
      }

      .page {
        padding: 24px 32px 32px;
      }

      .page-header {
        margin-bottom: 18px;
      }

      .page-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .page-subtitle {
        font-size: 13px;
        color: #7c6a55;
        max-width: 760px;
      }

      .pill {
        margin-top: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        background: #efe3cf;
        color: #7b623f;
        display: inline-block;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 2.3fr) minmax(0, 2.2fr);
        gap: 16px;
      }

      .card {
        background: #fffaf2;
        border-radius: 10px;
        border: 1px solid #eadccd;
        padding: 14px 16px 16px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      }

      .card-header {
        margin-bottom: 10px;
      }

      .card-title {
        font-size: 15px;
        font-weight: 600;
      }

      .card-subtitle {
        font-size: 12px;
        color: #7c6a55;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 6px;
        margin-bottom: 8px;
      }

      .filters input,
      .filters select {
        border-radius: 999px;
        border: 1px solid #ddcdb9;
        padding: 6px 10px;
        font-size: 12px;
        background: #fdf8f0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: #f1e4d4;
      }

      th,
      td {
        padding: 7px 6px;
        border-bottom: 1px solid #efe2d3;
        text-align: left;
      }

      th {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        color: #7b623f;
      }

      .project-name {
        font-weight: 500;
      }

      .project-meta {
        font-size: 11px;
        color: #7c6a55;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 7px;
        border-radius: 999px;
        font-size: 11px;
        background: #efe3cf;
        color: #7b623f;
      }

      .badge-status-active {
        background: #e3f5e5;
        color: #216234;
      }

      .badge-status-planning {
        background: #e4f0ff;
        color: #245796;
      }

      .badge-status-closed {
        background: #e0dfe6;
        color: #4e4a73;
      }

      .empty-state {
        text-align: center;
        font-size: 12px;
        color: #7c6a55;
        padding: 14px 0;
      }

      .kv-row {
        display: grid;
        grid-template-columns: 140px minmax(0, 1fr);
        gap: 8px;
        align-items: flex-start;
        font-size: 12px;
        margin-bottom: 6px;
      }

      .kv-label {
        color: #7c6a55;
      }

      .list-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chip {
        border-radius: 999px;
        padding: 4px 9px;
        background: #f7efe4;
        border: 1px solid #ddcdb9;
        font-size: 11px;
      }

      .textarea-like {
        border-radius: 8px;
        border: 1px solid #ddcdb9;
        background: #fdf8f0;
        padding: 8px 9px;
        font-size: 12px;
        min-height: 80px;
        white-space: pre-line;
      }

      .btn {
        border-radius: 999px;
        border: none;
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .btn-primary {
        background: #3a6b3c;
        color: #fff;
      }

      .btn-secondary {
        background: #f7efe4;
        color: #6a5641;
        border: 1px solid #ddcdb9;
      }

      .btn-sm {
        padding: 4px 10px;
        font-size: 11px;
      }

      .group-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 10px 0 8px;
      }

      .group-tab {
        border-radius: 999px;
        border: 1px solid #ddcdb9;
        background: #f7efe4;
        padding: 4px 10px;
        font-size: 11px;
        cursor: pointer;
        color: #6a5641;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .group-tab.active {
        background: #ad986e;
        color: #fffaf2;
        border-color: #ad986e;
      }

      .section-card {
        border-radius: 10px;
        border: 1px solid #eadccd;
        background: #fffdf8;
        padding: 10px 11px 9px;
        margin-bottom: 8px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
        font-size: 12px;
      }

      .section-title {
        font-weight: 600;
        color: #4f3c2b;
      }

      .section-meta {
        font-size: 11px;
        color: #7c6a55;
      }

      .matrix {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
        margin-top: 4px;
      }

      .matrix thead {
        background: #f3e6d4;
      }

      .matrix th,
      .matrix td {
        padding: 4px 5px;
        border-bottom: 1px solid #efe2d3;
        text-align: left;
      }

      .matrix th {
        font-weight: 600;
        color: #7b623f;
      }

      .status-pill-small {
        display: inline-flex;
        align-items: center;
        padding: 1px 6px;
        border-radius: 999px;
        font-size: 10px;
        background: #efe3cf;
        color: #7b623f;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }

        .kv-row {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
    <style id="uxResponsiveSplitFix">
/* Force stack 1 column: list full-width on top, detail below */
.layout {
  grid-template-columns: minmax(0, 1fr) !important;
}
/* Compact tightening for very narrow viewports */
@media (max-width: 900px) {
  .page {
    padding: 16px !important;
  }
}
</style>
<style id="uxTableOverflowFix">
/* Table overflow handling: keep text intact, only enable horizontal scroll on narrow viewport */
@media (max-width: 1199px) {
  table {
    display: block;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
}
</style>
  <style id="uxBaselinePolish">
/* Baseline UI polish — applies only where file CSS doesn't override */
body {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Pointer cursor on interactive */
button, .btn, [role="button"], select,
input[type="checkbox"], input[type="radio"], input[type="submit"],
input[type="button"], a[href], label[for] {
  cursor: pointer;
}

/* Disabled state */
button:disabled, .btn:disabled, input:disabled, select:disabled, textarea:disabled {
  cursor: not-allowed;
  opacity: 0.6;
}

/* Focus-visible outline (a11y) */
button:focus-visible, .btn:focus-visible,
a:focus-visible, [role="button"]:focus-visible,
input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid #c4a25f;
  outline-offset: 2px;
}

/* Inherit font family for form controls (fixes browser-default) */
input, select, textarea, button {
  font-family: inherit;
}

/* Responsive media */
img, svg, video {
  max-width: 100%;
  height: auto;
}

/* Subtle hover for buttons (only if no transition already set, gentle filter) */
button:hover:not(:disabled), .btn:hover:not(:disabled) {
  filter: brightness(0.96);
  transition: filter 0.15s ease;
}

/* Smooth scrollbar on Webkit */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-track {
  background: #f5ece0;
}
::-webkit-scrollbar-thumb {
  background: #d9c8b4;
  border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover {
  background: #c4a25f;
}

/* Selection highlight on-brand */
::selection {
  background: #c4a25f;
  color: #fff;
}

/* HR baseline */
hr {
  border: none;
  border-top: 1px solid #eadccd;
  margin: 12px 0;
}

/* Anchor baseline color matches brand (no underline by default to match flat UI) */
a {
  color: #8a5a3b;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
  <body>
    <div class="page">
      <div class="page-header">
        <div class="page-title">New development properties</div>
      </div>

      <div class="layout">
        <div class="card">
          <div class="card-header">
            <div class="card-title">New development properties list</div>
          </div>

          <div class="filters">
            <input
              id="searchInput"
              type="text"
              placeholder="Search by property title, ID, developer"
            />
            <select id="statusFilter">
              <option value="">Status: All</option>
              <option value="On sale">On sale</option>
              <option value="Coming soon">Coming soon</option>
              <option value="Sold out">Sold out</option>
            </select>
            <select id="cityFilter">
              <option value="">City: All</option>
              <option value="Tokyo">Tokyo</option>
              <option value="Osaka">Osaka</option>
              <option value="Nagoya">Nagoya</option>
            </select>
            <select id="typeFilter" title="Property type">
              <option value="">All types</option>
              <option value="Apartments">Apartments</option>
              <option value="Houses">Houses</option>
              <option value="Townhouses">Townhouses</option>
              <option value="Villas">Villas</option>
            </select>
            <select id="availFilter" title="Inventory">
              <option value="">All inventory</option>
              <option value="any">Has available units</option>
              <option value="sold-out">Sold out</option>
            </select>
            <select id="sizeFilter" title="Project size">
              <option value="">All sizes</option>
              <option value="small">Small (&lt; 50 units)</option>
              <option value="mid">Mid (50–150)</option>
              <option value="large">Large (150+)</option>
            </select>
            <select id="sortBy" title="Sort by">
              <option value="default">Default order</option>
              <option value="title-asc">Title A→Z</option>
              <option value="units-desc">Most units ↓</option>
              <option value="avail-desc">Most available ↓</option>
              <option value="price-asc">Price low→high</option>
              <option value="price-desc">Price high→low</option>
            </select>
            <button type="button" class="btn" id="resetFiltersBtn">Reset</button>
          </div>

          <table>
            <thead>
              <tr>
                <th>Property</th>
                <th>City</th>
                <th>Type</th>
                <th>Developer</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="projectBody"></tbody>
          </table>
          <div class="empty-state" id="projectEmpty" style="display: none">
            No projects found.
          </div>

          <div style="margin-top: 10px">
            <button class="btn btn-secondary btn-sm" id="exportBtn">
              Export project list (CSV)
            </button>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">Selected property overview</div>
          </div>

          <div id="detailContainer">
            <div class="card-subtitle">No property selected.</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const newDevProperties = [
        {
          id: "ND-2026-001",
          title: "Shinjuku Garden Towers (Phase 1)",
          city: "Tokyo",
          area: "Shinjuku-ku",
          type: "Apartments",
          developer: "Yuushi Development",
          status: "On sale",
          totalUnits: 220,
          availableUnits: 42,
          priceMin: 78000000,
          priceMax: 118000000,
        },
        {
          id: "ND-2026-002",
          title: "Osaka Riverside Residences",
          city: "Osaka",
          area: "Kita-ku",
          type: "Apartments",
          developer: "Osaka Prime Dev",
          status: "Coming soon",
          totalUnits: 180,
          availableUnits: 0,
          priceMin: 0,
          priceMax: 0,
        },
        {
          id: "ND-2025-015",
          title: "Nagoya Central Terrace Houses",
          city: "Nagoya",
          area: "Naka-ku",
          type: "Houses",
          developer: "Central Estate",
          status: "Sold out",
          totalUnits: 60,
          availableUnits: 0,
          priceMin: 62000000,
          priceMax: 88000000,
        },
      ];

      let filters = {
        search: "",
        status: "",
        city: "",
        type: "",
        avail: "",
        size: "",
        sortBy: "default",
      };
      let selectedId = null;

      function statusClass(status) {
        switch (status) {
          case "On sale":
            return "badge badge-status-active";
          case "Coming soon":
            return "badge badge-status-planning";
          case "Sold out":
            return "badge badge-status-closed";
          default:
            return "badge";
        }
      }

      function applyFilters() {
        const search = filters.search.toLowerCase();
        let result = newDevProperties.filter((p) => {
          if (
            search &&
            !(
              p.id.toLowerCase().includes(search) ||
              p.title.toLowerCase().includes(search) ||
              p.developer.toLowerCase().includes(search)
            )
          ) {
            return false;
          }
          if (filters.status && p.status !== filters.status) return false;
          if (filters.city && p.city !== filters.city) return false;
          if (filters.type && p.type !== filters.type) return false;
          if (filters.avail === "any" && (p.availableUnits || 0) <= 0)
            return false;
          if (filters.avail === "sold-out" && (p.availableUnits || 0) > 0)
            return false;
          if (filters.size) {
            const n = p.totalUnits || 0;
            if (filters.size === "small" && n >= 50) return false;
            if (filters.size === "mid" && (n < 50 || n > 150)) return false;
            if (filters.size === "large" && n <= 150) return false;
          }
          return true;
        });
        const sorters = {
          "title-asc": (a, b) => a.title.localeCompare(b.title),
          "units-desc": (a, b) => (b.totalUnits || 0) - (a.totalUnits || 0),
          "avail-desc": (a, b) =>
            (b.availableUnits || 0) - (a.availableUnits || 0),
          "price-asc": (a, b) => (a.priceMin || 0) - (b.priceMin || 0),
          "price-desc": (a, b) => (b.priceMin || 0) - (a.priceMin || 0),
        };
        if (sorters[filters.sortBy])
          result = [...result].sort(sorters[filters.sortBy]);
        return result;
      }

      function renderList() {
        const tbody = document.getElementById("projectBody");
        const empty = document.getElementById("projectEmpty");
        tbody.innerHTML = "";
        const data = applyFilters();
        if (!data.length) {
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";

        data.forEach((p) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>
              <div class="project-name">${p.title}</div>
              <div class="project-meta">${p.id} · ${p.area}</div>
            </td>
            <td>${p.city}</td>
            <td>${p.type}</td>
            <td>${p.developer}</td>
            <td><span class="${statusClass(p.status)}">${p.status}</span></td>
          `;
          tr.onclick = () => {
            selectedId = p.id;
            renderDetail();
          };
          tbody.appendChild(tr);
        });
      }

      function renderDetail() {
        const container = document.getElementById("detailContainer");
        const prop = newDevProperties.find((p) => p.id === selectedId);
        if (!prop) {
          container.innerHTML =
            '<div class="card-subtitle">No property selected.</div>';
          return;
        }

        const availabilityText = `${prop.availableUnits} available / ${prop.totalUnits} total units`;
        const priceText =
          prop.priceMin && prop.priceMax
            ? `${(prop.priceMin / 1000000).toFixed(1)}–${(prop.priceMax / 1000000).toFixed(1)}M JPY`
            : "TBD";

        container.innerHTML = `
          <div class="kv-row">
            <div class="kv-label">Property</div>
            <div>${prop.title} (${prop.id})</div>
          </div>
          <div class="kv-row">
            <div class="kv-label">Location</div>
            <div>${prop.city} · ${prop.area}</div>
          </div>
          <div class="kv-row">
            <div class="kv-label">Type</div>
            <div>${prop.type}</div>
          </div>
          <div class="kv-row">
            <div class="kv-label">Developer</div>
            <div>${prop.developer}</div>
          </div>
          <div class="kv-row">
            <div class="kv-label">Status</div>
            <div><span class="${statusClass(prop.status)}">${prop.status}</span></div>
          </div>
          <div class="kv-row">
            <div class="kv-label">Units</div>
            <div>${availabilityText}</div>
          </div>
          <div class="kv-row">
            <div class="kv-label">Headline price range</div>
            <div>${priceText}</div>
          </div>
        `;
      }

      function exportCsv() {
        const rows = [
          [
            "Property ID",
            "Title",
            "City",
            "Area",
            "Type",
            "Developer",
            "Status",
            "Available units",
            "Total units",
          ],
          ...applyFilters().map((p) => [
            p.id,
            p.title,
            p.city,
            p.area,
            p.type,
            p.developer,
            p.status,
            String(p.availableUnits),
            String(p.totalUnits),
          ]),
        ];

        const csv = rows
          .map((r) =>
            r.map((v) => `"${(v || "").replace(/"/g, '""')}"`).join(","),
          )
          .join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "yuushi_new_development_properties.csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        Toast.ok("CSV exported");
      }

      document.addEventListener("DOMContentLoaded", () => {
        document
          .getElementById("searchInput")
          .addEventListener("input", (e) => {
            filters.search = e.target.value;
            renderList();
          });
        document
          .getElementById("statusFilter")
          .addEventListener("change", (e) => {
            filters.status = e.target.value;
            renderList();
          });
        document
          .getElementById("cityFilter")
          .addEventListener("change", (e) => {
            filters.city = e.target.value;
            renderList();
          });
        ["typeFilter", "availFilter", "sizeFilter", "sortBy"].forEach((id) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.addEventListener("change", (e) => {
            filters[
              id === "sortBy"
                ? "sortBy"
                : id.replace("Filter", "")
            ] = e.target.value;
            renderList();
          });
        });
        document
          .getElementById("resetFiltersBtn")
          ?.addEventListener("click", () => {
            filters = {
              search: "",
              status: "",
              city: "",
              type: "",
              avail: "",
              size: "",
              sortBy: "default",
            };
            [
              "searchInput",
              "statusFilter",
              "cityFilter",
              "typeFilter",
              "availFilter",
              "sizeFilter",
            ].forEach((id) => {
              const el = document.getElementById(id);
              if (el) el.value = "";
            });
            const sb = document.getElementById("sortBy");
            if (sb) sb.value = "default";
            renderList();
          });
        document
          .getElementById("exportBtn")
          .addEventListener("click", exportCsv);
        renderList();
      });
    </script>

<div class="ux-toast-wrap" id="uxToastWrap" role="status" aria-live="polite"></div>
<div class="ux-modal" id="uxConfirmModal" role="dialog" aria-modal="true" aria-labelledby="uxConfirmTitle">
  <div class="ux-modal-box">
    <h3 id="uxConfirmTitle">Confirm</h3>
    <p id="uxConfirmMsg"></p>
    <div class="ux-modal-actions">
      <button type="button" class="ux-btn" id="uxConfirmCancel">Cancel</button>
      <button type="button" class="ux-btn primary" id="uxConfirmOk">Confirm</button>
    </div>
  </div>
</div>

<script>
(function(){
  if (window.UX) return; // idempotent
  const wrap = document.getElementById('uxToastWrap');
  const modal = document.getElementById('uxConfirmModal');
  const titleEl = document.getElementById('uxConfirmTitle');
  const msgEl = document.getElementById('uxConfirmMsg');
  const okBtn = document.getElementById('uxConfirmOk');
  const cancelBtn = document.getElementById('uxConfirmCancel');

  // ──── Toast ────────────────────────────────────────────────────
  function toast(msg, type){
    if(!wrap) return;
    const el = document.createElement('div');
    el.className = 'ux-toast ' + (type || 'info');
    const span = document.createElement('span');
    span.textContent = msg || '';
    const x = document.createElement('button');
    x.className = 'x'; x.type = 'button'; x.setAttribute('aria-label','Dismiss');
    x.textContent = '×';
    x.addEventListener('click', () => el.remove());
    el.appendChild(span); el.appendChild(x);
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 220); }, 3800);
  }
  window.Toast = {
    show: toast,
    ok:   (m) => toast(m, 'ok'),
    err:  (m) => toast(m, 'err'),
    info: (m) => toast(m, 'info'),
  };

  // ──── Confirm modal ───────────────────────────────────────────
  let _onOk = null;
  let _lastFocus = null;
  function closeConfirm(){
    modal.classList.remove('open');
    _onOk = null;
    if(_lastFocus && _lastFocus.focus) try { _lastFocus.focus(); } catch(e){}
  }
  okBtn.addEventListener('click', () => { const cb = _onOk; closeConfirm(); if(cb) cb(); });
  cancelBtn.addEventListener('click', closeConfirm);
  modal.addEventListener('click', (e) => { if(e.target === modal) closeConfirm(); });

  function openConfirm(opts){
    titleEl.textContent  = opts.title   || 'Confirm';
    msgEl.textContent    = opts.message || 'Are you sure?';
    okBtn.textContent    = opts.okLabel || 'Confirm';
    cancelBtn.textContent= opts.cancelLabel || 'Cancel';
    okBtn.className = 'ux-btn ' + (opts.danger ? 'danger' : 'primary');
    _onOk = typeof opts.onConfirm === 'function' ? opts.onConfirm : null;
    _lastFocus = document.activeElement;
    modal.classList.add('open');
    setTimeout(() => okBtn.focus(), 40);
  }

  window.UX = {
    confirm: openConfirm,
    toast,
    // Run action only after confirming if dirty
    guard(action){
      if(!window.UX_dirty){ if(typeof action === 'function') action(); return; }
      openConfirm({
        title: 'Discard unsaved changes?',
        message: 'You have edits that have not been saved. Leave anyway?',
        okLabel: 'Discard',
        danger: true,
        onConfirm(){ window.UX_dirty = false; if(typeof action === 'function') action(); }
      });
    },
    markClean(){ window.UX_dirty = false; document.body.classList.remove('ux-dirty'); },
    markDirty(){ window.UX_dirty = true;  document.body.classList.add('ux-dirty'); },
  };

  // ──── Esc closes any open modal (built-in + page modals) ──────
  document.addEventListener('keydown', (e) => {
    if(e.key !== 'Escape') return;
    if(modal.classList.contains('open')){ closeConfirm(); return; }
    document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
      const visible = getComputedStyle(m).display !== 'none' || m.classList.contains('show') || m.classList.contains('open');
      if(!visible) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Backdrop click closes existing page modals ──────────────
  document.querySelectorAll('.modal-backdrop, .modal-overlay').forEach(m => {
    if(m.__uxBound) return; m.__uxBound = true;
    m.addEventListener('click', (e) => {
      if(e.target !== m) return;
      m.classList.remove('open','show','active');
      m.style.display = 'none';
    });
  });

  // ──── Auto-track dirty on any [data-track-dirty] container ────
  document.addEventListener('input', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  document.addEventListener('change', (e) => {
    if(e.target.closest('[data-track-dirty]')) UX.markDirty();
  });
  window.addEventListener('beforeunload', (e) => {
    if(window.UX_dirty){ e.preventDefault(); e.returnValue = ''; }
  });

  // ──── Inline validation helper ────────────────────────────────
  window.UX.validate = function(form){
    let firstInvalid = null;
    form.querySelectorAll('.ux-field-error').forEach(n => n.remove());
    form.querySelectorAll('.ux-invalid').forEach(n => n.classList.remove('ux-invalid'));
    form.querySelectorAll('[required]').forEach(field => {
      const v = (field.value || '').trim();
      let bad = !v;
      if(!bad && field.type === 'email'){
        bad = !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
      }
      if(bad){
        field.classList.add('ux-invalid');
        const note = document.createElement('span');
        note.className = 'ux-field-error';
        note.textContent = field.dataset.errorMsg ||
          (field.type === 'email' ? 'Please enter a valid email.' : 'This field is required.');
        if(field.parentNode) field.parentNode.insertBefore(note, field.nextSibling);
        if(!firstInvalid) firstInvalid = field;
      }
    });
    if(firstInvalid){ firstInvalid.focus(); return false; }
    return true;
  };
})();
</script>
