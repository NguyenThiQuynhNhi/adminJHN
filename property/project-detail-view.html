<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Detail — New Development</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        /* ===== YUUSHI unified gold/white design tokens ===== */
        --bg-page: #f5f5f5;
        --bg-card: #ffffff;
        --bg-card-warm: #fffaf2;
        --bg-row-hover: #faf6ee;
        --bg-header-soft: #faf6ee;
        --text-primary: #1a1a1a;
        --text-muted: #7a6a5c;
        --text-label: #888;
        --text-link: #8a5a3b;
        --border-default: #e0e0e0;
        --border-warm: #eadccd;
        --border-soft: #f0f0f0;
        --color-primary: #8b7340;
        --color-primary-hover: #6d5a32;
        --color-primary-light: #c9a85c;
        --status-success-text: #2a7a2a;
        --status-success-bg: #d4f0d4;
        --status-warning-text: #c87a2a;
        --status-warning-bg: #fff3d4;
        --status-danger-text: #b23b3b;
        --status-danger-bg: #fbe9e9;
        --status-neutral-text: #666;
        --status-neutral-bg: #e8e8e8;
        --r-sm: 6px;
        --r-md: 8px;
        --r-lg: 12px;
        --r-full: 999px;
        --shadow-card: 0 10px 30px rgba(115, 72, 39, 0.05);
        --shadow-toast: 0 8px 24px rgba(0, 0, 0, 0.3);
        --shadow-modal: 0 18px 50px rgba(59, 47, 42, 0.28);
        --font-stack:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        /* ===== Legacy theme vars repointed to the new palette ===== */
        --bg-body: var(--bg-page);
        --border-subtle: var(--border-default);
        --border-strong: var(--border-warm);
        --accent: var(--color-primary);
        --accent-dark: var(--color-primary-hover);
        --accent-deep: var(--color-primary-hover);
        --gold: var(--color-primary-light);
        --text-main: var(--text-primary);
        --text-dim: var(--text-muted);
        --badge-green: var(--status-success-text);
        --badge-red: var(--status-danger-text);
        --badge-gray: var(--status-neutral-text);
        --badge-amber: var(--status-warning-text);
        --badge-blue: var(--color-primary);
        --badge-purple: var(--color-primary-light);
        --fs-h1: 22px;
        --fs-card-title: 14px;
        --fs-body: 13px;
        --fs-small: 12px;
        --fs-label: 11px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        padding: clamp(16px, 2.5vw, 24px);
        font-family: var(--font-stack);
        background: var(--bg-body);
        color: var(--text-main);
        font-size: var(--fs-body);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      h1 {
        margin: 0 0 4px;
        font-size: var(--fs-h1);
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .card {
        background: var(--bg-card);
        border-radius: var(--r-lg);
        border: 1px solid var(--border-subtle);
        padding: 18px;
        box-shadow: var(--shadow-card);
        margin-bottom: 16px;
      }
      .card-title {
        font-size: var(--fs-card-title);
        font-weight: 600;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border-soft);
      }
      .card-title i {
        color: var(--accent);
        font-size: 13px;
        width: 18px;
        text-align: center;
      }
      .card-title small {
        margin-left: auto;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-dim);
      }
      .btn {
        border-radius: var(--r-md);
        border: 1px solid var(--border-subtle);
        padding: 8px 14px;
        font-size: var(--fs-body);
        background: var(--bg-card);
        cursor: pointer;
        display: inline-flex;
        gap: 6px;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        font-family: inherit;
        font-weight: 500;
        min-height: 36px;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn:hover {
        background: var(--bg-row-hover);
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn-primary {
        background: var(--color-primary);
        border-color: var(--color-primary);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--color-primary-hover);
        border-color: var(--color-primary-hover);
      }
      .btn-ghost {
        background: transparent;
        border-color: transparent;
      }
      .btn-ghost:hover {
        background: var(--bg-row-hover);
      }
      .btn-sm {
        padding: 5px 10px;
        font-size: 12px;
        min-height: 30px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: var(--r-full);
        font-size: 11px;
        font-weight: 600;
        border: 1px solid transparent;
        white-space: nowrap;
      }
      .badge-published,
      .badge-onsale,
      .badge-yes {
        background: var(--status-success-bg);
        color: var(--status-success-text);
        border-color: var(--status-success-bg);
      }
      .badge-presale,
      .badge-amber,
      .badge-phased {
        background: var(--status-warning-bg);
        color: var(--status-warning-text);
        border-color: var(--status-warning-bg);
      }
      .badge-draft,
      .badge-private,
      .badge-gray {
        background: var(--status-neutral-bg);
        color: var(--status-neutral-text);
        border-color: var(--status-neutral-bg);
      }
      .badge-soldout,
      .badge-suspended,
      .badge-no,
      .badge-closed {
        background: var(--status-danger-bg);
        color: var(--status-danger-text);
        border-color: var(--status-danger-bg);
      }
      .badge-members {
        background: var(--bg-card-warm);
        color: var(--color-primary);
        border-color: var(--border-warm);
      }
      .badge-group {
        background: var(--bg-card-warm);
        color: var(--color-primary-hover);
        border-color: var(--border-warm);
        font-weight: 700;
      }
      .badge-paid {
        background: var(--status-warning-bg);
        color: var(--status-warning-text);
        border-color: var(--status-warning-bg);
      }

      /* ===== Slim top bar ===== */
      .topbar {
        position: sticky;
        top: 0;
        background: var(--bg-body);
        padding: 12px 0;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .topbar-left {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        min-width: 0;
      }
      .topbar-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-main);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 60vw;
      }

      .detail-hero {
        background: var(--bg-card-warm);
        border-radius: var(--r-lg);
        border: 1px solid var(--border-warm);
        padding: 22px;
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 16px;
        flex-wrap: wrap;
        box-shadow: var(--shadow-card);
      }
      .detail-thumb {
        width: 96px;
        height: 76px;
        border-radius: var(--r-lg);
        background: var(--color-primary);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        flex-shrink: 0;
        box-shadow: var(--shadow-card);
      }
      .detail-hero-info {
        flex: 1;
        min-width: 0;
      }
      .detail-name {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 6px;
        color: var(--text-main);
      }
      .detail-meta {
        font-size: var(--fs-small);
        color: var(--text-muted);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .detail-id-pill {
        font-family: ui-monospace, "Consolas", monospace;
        font-size: 11px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        padding: 2px 8px;
        border-radius: var(--r-sm);
        color: var(--text-muted);
      }
      .section-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 460px), 1fr));
        gap: 14px;
      }
      .kv-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 200px), 1fr));
        gap: 12px 16px;
      }
      .kv {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .kv-label {
        font-size: var(--fs-label);
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .kv-label .req {
        color: var(--badge-red);
        margin-left: 3px;
      }
      .kv-value {
        font-size: var(--fs-body);
        color: var(--text-main);
        word-break: break-word;
        min-height: 20px;
      }
      .kv-full {
        grid-column: 1 / -1;
      }
      .accord {
        border: 1px solid var(--border-subtle);
        border-radius: var(--r-md);
        margin-bottom: 8px;
        background: var(--bg-card-warm);
        overflow: hidden;
      }
      .accord-header {
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        font-weight: 600;
        font-size: 12.5px;
        color: var(--text-main);
        user-select: none;
      }
      .accord-header:hover {
        background: var(--bg-row-hover);
      }
      .accord-header i.fa-chevron-down {
        color: var(--text-muted);
        font-size: 11px;
        transition: transform 0.2s;
      }
      .accord.open .accord-header i.fa-chevron-down {
        transform: rotate(180deg);
      }
      .accord-body {
        padding: 12px 14px 14px;
        border-top: 1px solid var(--border-subtle);
        display: none;
      }
      .accord.open .accord-body {
        display: block;
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
      }
      .gallery-item {
        background: var(--bg-card-warm);
        border: 1px solid var(--border-warm);
        border-radius: var(--r-md);
        aspect-ratio: 4/3;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 22px;
        position: relative;
        overflow: hidden;
      }
      .gallery-item .cover-tag {
        position: absolute;
        top: 6px;
        left: 6px;
        background: var(--accent);
        color: #fff;
        font-size: 10px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: var(--r-sm);
      }
      .gallery-item .gallery-meta {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 10px;
        padding: 3px 6px;
      }
      .alert {
        padding: 10px 14px;
        border-radius: var(--r-md);
        font-size: 12.5px;
        margin-bottom: 14px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .alert i {
        margin-top: 1px;
      }
      .alert.info {
        background: var(--bg-card-warm);
        border: 1px solid var(--border-warm);
        color: var(--text-link);
      }
      .alert.warn {
        background: var(--status-warning-bg);
        border: 1px solid var(--status-warning-bg);
        color: var(--status-warning-text);
      }
      .alert.danger {
        background: var(--status-danger-bg);
        border: 1px solid var(--status-danger-bg);
        color: var(--status-danger-text);
      }
      .alert.success {
        background: var(--status-success-bg);
        border: 1px solid var(--status-success-bg);
        color: var(--status-success-text);
      }

      /* ===== Project Price Summary banner ===== */
      .price-summary {
        background: var(--bg-card-warm);
        border: 1px solid var(--color-primary-light);
        border-radius: var(--r-lg);
        padding: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 180px), 1fr));
        gap: 14px;
        margin-bottom: 14px;
      }
      .price-summary .ps-cell {
        min-width: 0;
      }
      .price-summary .ps-label {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--color-primary-hover);
        margin-bottom: 4px;
      }
      .price-summary .ps-value {
        font-size: 15px;
        font-weight: 700;
        color: var(--color-primary-hover);
      }
      .price-summary .ps-types {
        grid-column: 1 / -1;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        padding-top: 10px;
        border-top: 1px dashed var(--color-primary-light);
      }

      /* ===== Floor Plan Type tabs ===== */
      .fp-tabs {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-bottom: 12px;
        border-bottom: 1px solid var(--border-subtle);
        padding-bottom: 4px;
      }
      .fp-tab {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        padding: 8px 14px;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--text-muted);
        border-radius: var(--r-md) var(--r-md) 0 0;
        cursor: pointer;
        font-family: inherit;
        position: relative;
      }
      .fp-tab:hover {
        color: var(--text-main);
        background: var(--bg-row-hover);
      }
      .fp-tab.active {
        background: var(--bg-card-warm);
        color: var(--accent-deep);
        border-color: var(--color-primary-light);
        border-bottom-color: var(--bg-card-warm);
        margin-bottom: -1px;
      }
      .fp-tab.soldout {
        opacity: 0.65;
      }
      .fp-tab .badge-soldout {
        font-size: 9.5px;
        padding: 1px 6px;
        margin-left: 4px;
      }
      .fp-tab .badge-paid {
        font-size: 9.5px;
        padding: 1px 6px;
        margin-left: 4px;
      }
      .fp-pane {
        display: none;
      }
      .fp-pane.active {
        display: block;
      }

      /* Lot card (Group 6) */
      .lot-card {
        background: var(--bg-card-warm);
        border: 1px solid var(--border-subtle);
        border-radius: var(--r-lg);
        padding: 16px;
        margin-bottom: 12px;
      }
      .lot-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border-soft);
      }
      .lot-card-header .name {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .lot-card-header .actions {
        display: flex;
        gap: 6px;
      }

      .hidden {
        display: none !important;
      }

      /* ============ Points of Interest ============ */
      .poi-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .poi-meta {
        background: var(--status-success-bg);
        border: 1px solid var(--status-success-bg);
        color: var(--status-success-text);
        padding: 8px 12px;
        border-radius: var(--r-md);
        font-size: 12px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .poi-categories {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
        gap: 10px;
      }
      .poi-category {
        background: var(--bg-card-warm);
        border: 1px solid var(--border-subtle);
        border-radius: var(--r-md);
        overflow: hidden;
        --cat-color: var(--accent);
      }
      .poi-category.empty {
        opacity: 0.55;
      }
      .poi-cat-header {
        padding: 8px 12px;
        background: var(--bg-row-hover);
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12.5px;
        color: var(--text-main);
        border-left: 3px solid var(--cat-color);
      }
      .poi-cat-header i {
        color: var(--cat-color);
        font-size: 13px;
      }
      .poi-cat-header .poi-count {
        margin-left: auto;
        background: var(--cat-color);
        color: #fff;
        padding: 1px 8px;
        border-radius: var(--r-full);
        font-size: 10.5px;
        font-weight: 700;
        min-width: 22px;
        text-align: center;
      }
      .poi-items {
        padding: 4px 12px 8px;
      }
      .poi-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 5px 0;
        font-size: 12px;
        border-bottom: 1px dashed var(--border-soft);
      }
      .poi-item:last-child {
        border-bottom: 0;
      }
      .poi-item .poi-name {
        color: var(--text-main);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        flex: 1;
      }
      .poi-item .poi-dist {
        color: var(--text-muted);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        flex-shrink: 0;
        font-weight: 600;
      }
      .poi-empty {
        background: var(--bg-card-warm);
        border: 2px dashed var(--border-strong);
        border-radius: var(--r-md);
        padding: 28px 20px;
        text-align: center;
        color: var(--text-muted);
      }
      .poi-empty i {
        font-size: 32px;
        color: var(--accent);
        display: block;
        margin-bottom: 10px;
      }
      .poi-empty p {
        margin: 4px 0;
        font-size: 13px;
      }

      @media (max-width: 768px) {
        .topbar {
          flex-direction: column;
          align-items: stretch;
        }
        .topbar-title {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <!-- Slim top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <span class="badge badge-group" id="dGroupBadge">Group —</span>
        <span class="topbar-title" id="dTopTitle">Project Detail</span>
      </div>
      <button type="button" class="btn" id="btnBack" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> Back
      </button>
    </div>

    <div class="detail-hero">
      <div class="detail-thumb" id="dThumb"><i class="fas fa-city"></i></div>
      <div class="detail-hero-info">
        <h2 class="detail-name" id="dName">—</h2>
        <div class="detail-meta">
          <span class="detail-id-pill" id="dId">PRJ-—</span>
          <span id="dMetaAddress">—</span>
          <span>·</span><span id="dMetaSales">—</span> <span>·</span
          ><span id="dMetaPublish">—</span> <span>·</span
          ><span id="dMetaTx">—</span> <span>·</span
          ><span id="dMetaMembers">—</span>
        </div>
      </div>
    </div>

    <div id="dAlerts"></div>
    <div class="section-grid" id="dSections"></div>

    <script>
      // ====================================================================
      // READ-ONLY project (new-development) detail page.
      // Extracted from property/project-management.html — view mode only.
      // editMode is permanently false; all edit branches were dropped.
      // ====================================================================

      function goBack() {
        if (history.length > 1) history.back();
        else window.close();
      }

      // ========================================================================
      // OPTION SETS (needed by SEC schema + seed padding)
      // ========================================================================
      const OPT = {

          "Tokyo",
          "Osaka",
          "Kanagawa",

          ],
          Kyoto: ["Kyoto", "Uji", "Kameoka"],
          Hokkaido: ["Sapporo", "Hakodate", "Asahikawa"],
          Fukuoka: ["Fukuoka", "Kitakyushu", "Kurume"],
          Saitama: ["Saitama", "Kawaguchi", "Tokorozawa", "Kawagoe"],
          Chiba: ["Chiba", "Funabashi", "Matsudo", "Ichikawa"],

        layout: [
          "1K",

          "2DK",
          "2LDK",
          "2SLDK",
          "3DK",
          "3LDK",
          "3SLDK",

            if (t.priceMode === "range" && t.priceMax) {
              priceHi = Math.max(priceHi, t.priceMax);
            }
            if (t.areaMin) areaLo = Math.min(areaLo, t.areaMin);
            if (t.areaMax) areaHi = Math.max(areaHi, t.areaMax);
            if (t.layout) layouts.add(t.layout);
          });
          return {
            priceLo: isFinite(priceLo) ? priceLo : null,
            priceHi: isFinite(priceHi) ? priceHi : null,
            areaLo: isFinite(areaLo) ? areaLo : null,
            areaHi: isFinite(areaHi) ? areaHi : null,
            layouts: Array.from(layouts),
            count: types.length,
          };
        }
        if (p.group === 6) {
          const lots = p.lots || [];
          if (!lots.length)
            return {
              priceLo: null,
              priceHi: null,
              areaLo: null,
              areaHi: null,
              layouts: [],
            };
          let priceLo = Infinity,
            priceHi = -Infinity,
            areaLo = Infinity,
            areaHi = -Infinity;
          const layouts = new Set();
          lots.forEach((t) => {
            if (!t.priceTBD && t.price) {
              priceLo = Math.min(priceLo, t.price);
              priceHi = Math.max(priceHi, t.price);
            }
            if (t.totalFloorArea) {
              areaLo = Math.min(areaLo, t.totalFloorArea);
              areaHi = Math.max(areaHi, t.totalFloorArea);
            }
            if (t.layout) layouts.add(t.layout);
          });
          return {
            priceLo: isFinite(priceLo) ? priceLo : null,
            priceHi: isFinite(priceHi) ? priceHi : null,
            areaLo: isFinite(areaLo) ? areaLo : null,
            areaHi: isFinite(areaHi) ? areaHi : null,
            layouts: Array.from(layouts),
            count: lots.length,
          };
        }
        return {
          priceLo: null,
          priceHi: null,
          areaLo: null,
          areaHi: null,
          layouts: [],
        };
      }

      // ------------------------------------------------------------------------
      // Expiry calculator
      // ------------------------------------------------------------------------
      function expiryInfo(p) {
        if (!p.completionDate) return null;
        const completion = new Date(p.completionDate);
        const expiry = new Date(completion);
        expiry.setDate(expiry.getDate() + 365);
        const today = new Date();
        const daysLeft = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
        return { expiryDate: expiry.toISOString().slice(0, 10), daysLeft };
      }

      // ------------------------------------------------------------------------
      function resolveOpts(f, prop) {
        if (f.opts) return f.opts;
        if (f.optKey === "_groupPropType" && prop && GROUP_META[prop.group])
          return GROUP_META[prop.group].propTypes;
        if (f.optsByField && prop) {
          const v = prop[f.optsByField];
          if (f.optsByField === "prefecture") return OPT.cityByPref[v] || [];
        }
        return [];
      }

      function showIfPass(f, prop) {
        if (!f.showIf) return true;
        for (const k in f.showIf)
          if (!f.showIf[k].includes(prop[k])) return false;
        return true;
      }

      // Render one field as a kv item (VIEW-ONLY)
      function renderField(f, prop) {
        if (f.t === "header") {
          return `<div class="kv-full" style="grid-column:1/-1;font-weight:700;color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:0.05em;padding:6px 0 2px;border-top:1px dashed var(--border-subtle);margin-top:6px">${esc(f.l)}</div>`;
        }
        if (f.t === "note") {
          return `<div class="kv-full alert info" style="margin:6px 0 0">${esc(f.l)}</div>`;
        }
        if (f.t === "auto-summary") {
          return `<div class="kv-full">${renderInlinePriceSummary(prop)}</div>`;
        }
        const val = prop[f.k];
        const labelHtml = f.hideLabel
          ? ""
          : `<span class="kv-label">${esc(f.l)}${f.req ? '<span class="req">★</span>' : ""}</span>`;
        const fullCls = f.full ? " kv-full" : "";
        const valueHtml = renderViewField(f, val, prop);
        return `<div class="kv${fullCls}">${labelHtml}<div class="kv-value">${valueHtml}</div></div>`;
      }

      function renderViewField(f, val, prop) {
        if (f.t === "auto") return f.display || "—";
        if (f.t === "yen") return fmtYen(val);
        if (f.t === "num") return fmtNum(val);
        if (f.t === "percent") return fmtPct(val);
        if (f.t === "date") return fmtDate(val);
        if (f.t === "toggle") return badgeYesNo(!!val);
        if (f.t === "textarea")
          return `<div style="white-space:pre-wrap;line-height:1.55">${esc(val) || '<em style="color:var(--text-muted)">—</em>'}</div>`;
        if (f.t === "checks") {
          const arr = Array.isArray(val) ? val : [];
          if (!arr.length)
            return '<em style="color:var(--text-muted)">None selected</em>';
          return arr
            .map(
              (v) =>
                `<span class="badge badge-published" style="margin:2px 4px 2px 0">${esc(v)}</span>`,
            )
            .join("");
        }
        return esc(val) || "—";
      }

      // Inline price summary (small version inside Basic Info)
      function renderInlinePriceSummary(p) {
        const s = projectSummary(p);
        if (!s) return "";
        const priceTxt =
          s.priceLo && s.priceHi
            ? s.priceLo === s.priceHi
              ? fmtYenShort(s.priceLo)
              : `${fmtYenShort(s.priceLo)} – ${fmtYenShort(s.priceHi)}`
            : "TBA";
        const areaTxt =
          s.areaLo && s.areaHi
            ? s.areaLo === s.areaHi
              ? `${s.areaLo} m²`
              : `${s.areaLo} m² – ${s.areaHi} m²`
            : "—";
        const layoutTxt = s.layouts.length ? s.layouts.join(" / ") : "—";
        return `<div class="price-summary" style="margin-top:8px">
          <div class="ps-cell"><div class="ps-label">Overall Price Range</div><div class="ps-value">${priceTxt}</div></div>
          <div class="ps-cell"><div class="ps-label">Area Range</div><div class="ps-value">${areaTxt}</div></div>
          <div class="ps-cell"><div class="ps-label">Layout Range</div><div class="ps-value">${esc(layoutTxt)}</div></div>
        </div>`;
      }

      // ========================================================================
      // SECTION RENDERER
      // ========================================================================
      function renderSection(secKey, p) {
        const sec = SEC[secKey];
        if (!sec) return "";
        let inner;
        if (sec.custom === "fpTypes") inner = renderFpTypes(p);
        else if (sec.custom === "lots") inner = renderLots(p);
        else if (sec.custom === "poi") inner = renderPOI(p);
        else if (sec.custom === "media") inner = renderMedia(p);
        else if (sec.accord) inner = renderAmenities(sec, p);
        else {
          const items = (sec.fields || [])
            .filter((f) => showIfPass(f, p))
            .map((f) => renderField(f, p))
            .join("");
          inner = `<div class="kv-grid">${items}</div>`;
        }
        const wide = sec.full || sec.accord || sec.custom;
        return `
          <section class="card"${wide ? ' style="grid-column:1/-1"' : ""}>
            <div class="card-title"><i class="fas ${sec.icon}"></i> ${esc(sec.title)}</div>
            ${inner}
          </section>`;
      }

      function renderAmenities(sec, p) {
        const panelsHtml = sec.panels
          .map((pa, i) => {
            const arr = Array.isArray(p[pa.key]) ? p[pa.key] : [];
            const count = arr.length;
            const body = arr.length
              ? arr
                  .map(
                    (v) =>
                      `<span class="badge badge-published" style="margin:2px 4px 2px 0">${esc(v)}</span>`,
                  )
                  .join("")
              : '<em style="color:var(--text-muted)">None selected</em>';
            return `
            <div class="accord ${i === 0 ? "open" : ""}">
              <div class="accord-header" onclick="this.parentElement.classList.toggle('open')">
                <span>${esc(pa.title)} ${count ? `<span style="color:var(--accent);margin-left:4px">(${count})</span>` : ""}</span>
                <i class="fas fa-chevron-down"></i>
              </div>
              <div class="accord-body">${body}</div>
            </div>`;
          })
          .join("");
        const extra = sec.extra ? renderField(sec.extra, p) : "";
        return `${panelsHtml}<div style="margin-top:14px"><div class="kv-grid">${extra}</div></div>`;
      }

          .map(

            <div class="ps-types">${typeChips}</div>

        return `${summary}<div class="fp-tabs">${tabs}</div>${panes}`;

      const POI_CATEGORIES = [

        },

        },
        {

      function fmtDist(m) {
        return m >= 1000 ? (m / 1000).toFixed(2) + " km" : m + " m";
      }

      function renderPOI(p) {
        const poi = p.poi || {};
        const nearby = (poi.nearby || []).filter((x) => x.distM < 5000);
        const grouped = {};
        nearby.forEach((x) => {
          (grouped[x.cat] = grouped[x.cat] || []).push(x);
        });

        const meta = nearby.length
          ? `<div class="poi-meta">
              <i class="fas fa-circle-check" style="color:var(--badge-green)"></i>
              <strong>${nearby.length} POIs</strong> found within 5 km · Located ${esc(poi.locatedAt || "")}
              ${poi.locatedAddress ? `<span style="color:var(--text-dim);margin-left:8px">📍 ${esc(poi.locatedAddress)}</span>` : ""}
            </div>`
          : "";

        const categories = nearby.length
          ? POI_CATEGORIES.map((cat) => {
              const items = grouped[cat.key] || [];
              if (!items.length)
                return `
            <div class="poi-category empty">
              <div class="poi-cat-header" style="--cat-color:${cat.color}">
                <i class="fas ${cat.icon}"></i>
                <strong>${cat.label}</strong>
                <span class="poi-count">0</span>
              </div>
            </div>`;
              return `
            <div class="poi-category">
              <div class="poi-cat-header" style="--cat-color:${cat.color}">
                <i class="fas ${cat.icon}"></i>
                <strong>${cat.label}</strong>
                <span class="poi-count">${items.length}</span>
              </div>
              <div class="poi-items">
                ${items
                  .map(
                    (x) => `
                  <div class="poi-item">
                    <span class="poi-name">${esc(x.name)}</span>
                    <span class="poi-dist">${fmtDist(x.distM)} <span style="color:var(--text-dim)">· ${x.walkMin} min walk</span></span>
                  </div>`,
                  )
                  .join("")}
              </div>
            </div>`;
            }).join("")
          : `
          <div class="poi-empty">
            <i class="fas fa-location-crosshairs"></i>
            <p><strong>No POIs located yet.</strong></p>
            <p style="font-size:11.5px;color:var(--text-muted);margin:6px 0 0">Nearby Metro / Bus Station, Supermarket, School, Park and Hospital within 5 km of the project address have not been located for this listing.</p>
          </div>`;

        return `
          <div class="poi-header">
            <div class="kv-label" style="margin:0">📍 Points of Interest <span style="color:var(--text-dim);font-weight:500;text-transform:none;letter-spacing:0">(within 5 km · auto-detected)</span></div>
          </div>
          ${meta}
          <div class="poi-categories">${categories}</div>
        `;
      }

      // ========================================================================
      // MEDIA — read-only
      // ========================================================================
      function renderMedia(p) {
        const m = p.media || {};
        const photos = m.photoCount || 0;
        const videos = m.videoCount || 0;
        const tour = m.tour3d || "";
        const photoTiles = Array.from(
          { length: Math.min(photos, 8) },
          (_, i) => `
          <div class="gallery-item">
            <i class="fas fa-image"></i>
            ${i === 0 ? '<span class="cover-tag">Cover</span>' : ""}
            <span class="gallery-meta">project-${i + 1}.jpg</span>
          </div>`,
        ).join("");
        return `
          <div class="kv-grid" style="margin-bottom:14px">
            <div class="kv">
              <span class="kv-label">3D Tour</span>
              <div class="kv-value">${
                tour
                  ? `<a href="${escAttr(tour)}" target="_blank" rel="noopener" style="color:var(--accent)">${esc(tour)}</a>`
                  : "—"
              }</div>
            </div>
            <div class="kv"><span class="kv-label">Videos</span><div class="kv-value">${videos} file${videos !== 1 ? "s" : ""}</div></div>
            <div class="kv"><span class="kv-label">Photos</span><div class="kv-value">${photos} photo${photos !== 1 ? "s" : ""}</div></div>
          </div>
          ${photos ? `<div class="gallery-grid">${photoTiles}${photos > 8 ? `<div class="gallery-item"><span style="font-size:12px;color:var(--text-muted)">+${photos - 8} more</span></div>` : ""}</div>` : ""}
        `;
      }

      function thumbIcon(group) {
        return { 5: "fa-city", 6: "fa-house-chimney" }[group] || "fa-building";
      }

      // ========================================================================
      // RENDER (read-only) — hero + alerts + sections
      // ========================================================================
      function renderDetailPage() {
        const p = currentProj;
        if (!p) return;
        const group = p.group === 5 || p.group === 6 ? p.group : 5;
        const meta = GROUP_META[group];

        $("dGroupBadge").innerHTML = `<i class="fas ${meta.icon}"></i> ${meta.label}`;
        $("dTopTitle").textContent = p.name || "(Unnamed Project)";
        document.title = (p.name || "Project Detail") + " — Project Detail";
        $("dThumb").innerHTML = `<i class="fas ${thumbIcon(group)}"></i>`;
        $("dName").textContent = p.name || "(Unnamed)";
        $("dId").textContent = p.id || "—";
        $("dMetaAddress").textContent =
          [p.prefecture, p.city, p.chome].filter(Boolean).join(" · ") || "—";
        $("dMetaSales").innerHTML = badgeSales(p.salesStatus);
        $("dMetaPublish").innerHTML = badgePublish(p.publishStatus);
        $("dMetaTx").innerHTML = badgeTx(p.transactionType || "Buy");
        $("dMetaMembers").innerHTML = badgeMembers(p.membersOnly);

        const alerts = [];
        const e = expiryInfo(p);
        if (e) {
          if (e.daysLeft < 0)
            alerts.push({
              kind: "danger",
              icon: "fa-triangle-exclamation",
              msg: `<strong>EXPIRED</strong> — listing expired on ${e.expiryDate}.`,
            });
          else if (e.daysLeft <= 30)
            alerts.push({
              kind: "warn",
              icon: "fa-triangle-exclamation",
              msg: `<strong>EXPIRY WARNING — ${e.daysLeft} days remaining.</strong> Listing expires on ${e.expiryDate} (Completion ${p.completionDate} + 365 days).`,
            });
          else
            alerts.push({
              kind: "info",
              icon: "fa-clock",
              msg: `Listing auto-expires on <strong>${e.expiryDate}</strong> (Completion ${p.completionDate} + 365 days). ${e.daysLeft} days remaining.`,
            });
        }
        if (p.publishStatus === "Pending Review")
          alerts.push({
            kind: "warn",
            icon: "fa-hourglass-half",
            msg: "This project is awaiting approval.",
          });
        if (p.publishStatus === "Rejected")
          alerts.push({
            kind: "danger",
            icon: "fa-circle-xmark",
            msg: `This project was rejected. Reason: ${esc(p.rejectCategory || "—")}.${p.rejectNotes ? " " + esc(p.rejectNotes) : ""}`,
          });
        $("dAlerts").innerHTML = alerts
          .map(
            (a) =>
              `<div class="alert ${a.kind}"><i class="fas ${a.icon}"></i> <div>${a.msg}</div></div>`,
          )
          .join("");

        const secs = GROUP_SECS[group] || [];
        $("dSections").innerHTML = secs
          .map((k) => renderSection(k, p))
          .join("");
      }

      // ========================================================================
      // INIT — resolve the record then render
      // ========================================================================
      function resolveRecord() {
        const params = new URLSearchParams(window.location.search);
        const id =
          params.get("projectId") ||
          params.get("id") ||
          params.get("propertyId") ||
          "";

        // (a) sessionStorage passed record whose id matches
        try {
          const raw = sessionStorage.getItem("yuushi.viewRecord");
          if (raw) {
            const rec = JSON.parse(raw);
            if (rec && (!id || String(rec.id) === String(id))) return rec;
          }
        } catch (err) {
          /* ignore malformed sessionStorage */
        }

        // (b) lookup in projects by id
        if (id) {
          const found = projects.find((x) => String(x.id) === String(id));
          if (found) return found;
        }

        // (c) fallback to the first project
        return projects[0] || null;
      }

      function initDetailPage() {
        currentProj = resolveRecord();
        activeFpIndex = 0;
        renderDetailPage();
        window.scrollTo(0, 0);
      }

      initDetailPage();
    </script>
  </body>
</html>
