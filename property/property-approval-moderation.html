<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Property Approval &amp; Moderation</title>
    <style>
      :root{
        --bg-page:#f5f5f5;--bg-card:#ffffff;--bg-card-warm:#fffaf2;--bg-row-hover:#faf6ee;--bg-header-soft:#faf6ee;
        --text-primary:#1a1a1a;--text-muted:#7a6a5c;--text-label:#888;--text-link:#8a5a3b;
        --border-default:#e0e0e0;--border-warm:#eadccd;--border-soft:#f0f0f0;
        --color-primary:#8B7340;--color-primary-hover:#6d5a32;--color-primary-light:#c9a85c;
        --status-success-text:#2a7a2a;--status-success-bg:#d4f0d4;--status-warning-text:#c87a2a;--status-warning-bg:#fff3d4;--status-danger-text:#b23b3b;--status-danger-bg:#fbe9e9;--status-neutral-text:#666;--status-neutral-bg:#e8e8e8;
        --r-sm:6px;--r-md:8px;--r-lg:12px;--r-full:999px;
        --shadow-card:0 10px 30px rgba(115,72,39,.05);--shadow-toast:0 8px 24px rgba(0,0,0,.3);--shadow-modal:0 18px 50px rgba(59,47,42,.28);
        --font-stack:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--font-stack);
        background: var(--bg-page);
        color: var(--text-primary);
      }

      .page {
        padding: 24px 32px 32px;
      }

      .page-header {
        margin-bottom: 18px;
      }

      .page-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .page-subtitle {
        font-size: 13px;
        color: var(--text-muted);
        max-width: 720px;
      }

      .pill {
        margin-top: 6px;
        padding: 4px 10px;
        border-radius: var(--r-full);
        font-size: 11px;
        font-weight: 600;
        background: var(--status-warning-bg);
        color: var(--color-primary);
        display: inline-block;
      }

      .card {
        background: var(--bg-card-warm);
        border-radius: var(--r-lg);
        border: 1px solid var(--border-warm);
        padding: 14px 16px 16px;
        box-shadow: var(--shadow-card);
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .filters input,
      .filters select {
        border-radius: var(--r-full);
        border: 1px solid var(--border-warm);
        padding: 7px 12px;
        font-size: 12px;
        background: var(--bg-card-warm);
      }

      .select-wrapper {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .select-wrapper select {
        padding-right: 26px;
      }

      .select-wrapper::after {
        content: "▼";
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 9px;
        color: var(--text-muted);
        pointer-events: none;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 2.4fr) minmax(0, 2fr);
        gap: 16px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      thead {
        background: var(--bg-header-soft);
      }

      th,
      td {
        padding: 8px 6px;
        border-bottom: 1px solid var(--border-soft);
        text-align: left;
      }

      th {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        color: var(--text-muted);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 7px;
        border-radius: var(--r-full);
        font-size: 11px;
      }

      .status-pending {
        background: var(--status-warning-bg);
        color: var(--status-warning-text);
      }

      .status-approved {
        background: var(--status-success-bg);
        color: var(--status-success-text);
      }

      .status-suspended {
        background: var(--status-danger-bg);
        color: var(--status-danger-text);
      }

      .status-archived {
        background: var(--status-neutral-bg);
        color: var(--status-neutral-text);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 7px;
        border-radius: var(--r-full);
        font-size: 11px;
        background: var(--status-neutral-bg);
        color: var(--status-neutral-text);
      }

      .severity-high {
        background: var(--status-danger-bg);
        color: var(--status-danger-text);
      }

      .severity-medium {
        background: var(--status-warning-bg);
        color: var(--status-warning-text);
      }

      .severity-low {
        background: var(--status-neutral-bg);
        color: var(--status-neutral-text);
      }

      .prop-title {
        font-weight: 500;
      }

      .prop-meta {
        font-size: 11px;
        color: var(--text-muted);
      }

      .empty-state {
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        padding: 14px 0;
      }

      /* ===== universal pagination ===== */
      .result-count {
        font-size: 12px;
        color: var(--text-muted);
        margin: 4px 2px 10px;
      }
      .pager {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        margin-top: 14px;
      }
      .pager.hidden { display: none !important; }
      .pager button {
        min-width: 32px;
        height: 32px;
        padding: 0 10px;
        border-radius: var(--r-md);
        border: 1px solid var(--border-warm);
        background: var(--bg-card);
        color: var(--text-muted);
        font-size: 12px;
        font-family: inherit;
        cursor: pointer;
      }
      .pager button:hover:not(:disabled):not(.active) {
        border-color: var(--color-primary);
        color: var(--color-primary);
      }
      .pager button.active {
        background: var(--color-primary);
        border-color: var(--color-primary);
        color: #fff;
        font-weight: 700;
        cursor: default;
      }
      .pager button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .pager .pager-ellipsis {
        min-width: 22px;
        text-align: center;
        color: var(--text-muted);
        font-size: 12px;
      }

      .detail-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 2px;
      }

      .detail-value {
        font-size: 13px;
        margin-bottom: 6px;
      }

      .textarea-like {
        border-radius: var(--r-md);
        border: 1px solid var(--border-warm);
        background: var(--bg-card-warm);
        padding: 8px 9px;
        font-size: 12px;
        min-height: 60px;
        white-space: pre-line;
      }

      .btn {
        border-radius: var(--r-full);
        border: none;
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .btn-primary {
        background: var(--color-primary);
        color: #fff;
      }

      .btn-secondary {
        background: var(--bg-card-warm);
        color: var(--text-muted);
        border: 1px solid var(--border-warm);
      }

      .add-filter-btn {
        background: var(--color-primary);
        color: #fff;
        border: none;
        padding: 7px 16px;
        border-radius: var(--r-full);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        box-shadow: var(--shadow-card);
      }

      .add-filter-btn:hover {
        background: var(--color-primary-hover);
      }

      .reset-icon {
        width: 32px;
        height: 32px;
        border: 1px solid var(--border-warm);
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        background: var(--bg-card-warm);
        cursor: pointer;
        font-size: 13px;
      }

      .reset-icon:hover {
        border-color: var(--color-primary);
        color: var(--color-primary);
      }

      .sort-select {
        min-width: 170px;
        border-radius: var(--r-full);
        border: 1px solid var(--border-warm);
        background: var(--bg-header-soft);
        padding: 7px 28px 7px 12px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .view-options {
        display: inline-flex;
        gap: 6px;
        margin-left: 4px;
      }

      .view-btn {
        width: 34px;
        height: 34px;
        border-radius: var(--r-md);
        border: 1px solid var(--border-warm);
        background: var(--bg-card-warm);
        font-size: 11px;
        color: var(--text-muted);
        cursor: pointer;
      }

      .view-btn.active {
        background: var(--color-primary);
        color: #fff;
        border-color: var(--color-primary);
      }

      .view-btn:not(.active):hover {
        border-color: var(--color-primary);
        color: var(--color-primary);
      }

      .btn-sm {
        padding: 4px 10px;
        font-size: 11px;
      }

      /* ===== approval tabs + replicated detail-view chrome ===== */
      .hidden { display: none !important; }
      .mod-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
      .mod-tab { border: 1px solid var(--border-warm); background: var(--bg-card-warm); color: var(--text-muted); border-radius: var(--r-full); padding: 7px 16px; font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
      .mod-tab:hover { background: var(--bg-row-hover); }
      .mod-tab.active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }

      .detail-toolbar { position: sticky; top: 0; background: var(--bg-page); padding: 12px 0; z-index: 5; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
      .detail-toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .detail-toolbar-right { display: flex; gap: 8px; flex-wrap: wrap; }
      .detail-hero { background: var(--bg-card-warm); border-radius: var(--r-lg); border: 1px solid var(--border-warm); padding: 22px; display: flex; align-items: center; gap: 18px; margin-bottom: 16px; flex-wrap: wrap; box-shadow: var(--shadow-card); }
      .detail-thumb { width: 96px; height: 76px; border-radius: var(--r-lg); background: var(--color-primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; box-shadow: var(--shadow-card); }
      .detail-hero-info { flex: 1; min-width: 0; }
      .detail-name { font-size: 20px; font-weight: 700; margin: 0 0 6px; color: var(--text-primary); }
      .detail-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .detail-id-pill { font-family: ui-monospace, "Consolas", monospace; font-size: 11px; background: var(--bg-card); border: 1px solid var(--border-warm); padding: 2px 8px; border-radius: var(--r-sm); color: var(--text-muted); }
      .section-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 460px), 1fr)); gap: 14px; }
      .sec-card { background: var(--bg-card-warm); border: 1px solid var(--border-warm); border-radius: var(--r-lg); padding: 16px 18px; }
      .sec-title { font-size: 13.5px; font-weight: 700; color: var(--text-primary); margin: 0 0 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; gap: 8px; }
      .kv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 200px), 1fr)); gap: 12px 16px; }
      .kv { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
      .kv.kv-full { grid-column: 1 / -1; }
      .kv-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
      .kv-value { font-size: 13.5px; color: var(--text-primary); word-break: break-word; min-height: 18px; }
      .alert { display: flex; gap: 8px; align-items: flex-start; border-radius: var(--r-lg); padding: 10px 13px; font-size: 12.5px; margin-bottom: 12px; }
      .alert.warn { background: var(--status-warning-bg); border: 1px solid var(--status-warning-text); color: var(--status-warning-text); }
      .alert.info { background: var(--status-neutral-bg); border: 1px solid var(--status-neutral-text); color: var(--status-neutral-text); }
      .alert.danger { background: var(--status-danger-bg); border: 1px solid var(--status-danger-text); color: var(--status-danger-text); }
      .rej-reason { color: var(--status-danger-text); }
      .group-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: var(--r-full); font-size: 11px; font-weight: 600; background: var(--status-warning-bg); color: var(--color-primary); border: 1px solid var(--border-warm); }

      /* Property card layout for moderation detail (shared visual) */
      .property-card {
        width: 100%;
        max-width: 380px;
        margin: 4px auto 0;
        background: var(--bg-card);
        border: 1px solid var(--border-default);
        border-radius: var(--r-lg);
        overflow: hidden;
        box-shadow: var(--shadow-card);
        transition: all 0.2s ease;
        position: relative;
        cursor: default;
      }

      .property-card:hover {
        box-shadow: var(--shadow-card);
        transform: translateY(-4px);
      }

      .property-hero {
        position: relative;
        height: 200px;
        overflow: hidden;
      }

      .property-hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
      }

      .property-card:hover .property-hero img {
        transform: scale(1.05);
      }

      .property-hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.06),
          rgba(0, 0, 0, 0.55)
        );
      }

      .property-agent {
        position: absolute;
        top: 14px;
        left: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 2;
      }

      .property-agent-av {
        width: 28px;
        height: 28px;
        border-radius: var(--r-full);
        background: var(--color-primary);
        border: 2px solid var(--bg-card);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #fff;
        font-size: 12px;
      }

      .property-agent-name {
        color: #ffffff;
        font-size: 12px;
        font-weight: 600;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }

      .property-actions {
        position: absolute;
        top: 14px;
        right: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 2;
      }

      .property-btn-compare {
        background: rgba(255, 255, 255, 0.95);
        border: none;
        padding: 5px 11px;
        border-radius: 8px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 5px;
        opacity: 0;
        transform: translateX(16px);
        transition: all 0.2s ease;
        box-shadow: 0 2px 7px rgba(0, 0, 0, 0.15);
        pointer-events: none;
      }

      .property-card:hover .property-btn-compare {
        opacity: 1;
        transform: translateX(0);
        pointer-events: auto;
      }

      .property-btn-wish {
        width: 32px;
        height: 32px;
        background: rgba(255, 255, 255, 0.95);
        border: none;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 7px rgba(0, 0, 0, 0.18);
        cursor: pointer;
      }

      .property-btn-wish svg {
        width: 16px;
        height: 16px;
        stroke: var(--text-primary);
        fill: none;
      }

      .property-btn-wish.liked svg {
        fill: var(--status-danger-text);
        stroke: var(--status-danger-text);
      }

      .property-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 26px;
        height: 26px;
        background: rgba(255, 255, 255, 0.9);
        border: none;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.2s ease;
        z-index: 2;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      }

      .property-card:hover .property-arrow {
        opacity: 1;
      }

      .property-arrow.property-prev {
        left: 14px;
      }

      .property-arrow.property-next {
        right: 14px;
      }

      .property-dots {
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 5px;
        z-index: 2;
      }

      .property-dot {
        width: 6px;
        height: 6px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 999px;
        transition: all 0.2s ease;
      }

      .property-dot.active {
        background: var(--bg-card);
        width: 16px;
      }

      .property-info-overlay {
        position: absolute;
        inset-inline: 0;
        bottom: 0;
        padding: 0 14px 14px;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
      }

      .property-title-overlay {
        font-size: 14px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.25;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.7);
      }

      .property-loc {
        margin-top: 3px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.9);
      }

      .property-price-info {
        text-align: right;
      }

      .property-price {
        font-size: 15px;
        font-weight: 700;
        color: #ffffff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.7);
      }

      .property-price-sub {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.86);
      }

      .property-yield {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.95);
        margin-top: 1px;
      }

      .property-body {
        padding: 12px 14px 14px;
        background: var(--bg-card);
      }

      .property-specs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .property-spec {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .property-desc {
        font-size: 12px;
        color: var(--text-label);
        line-height: 1.5;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
    <style id="uxResponsiveSplitFix">
      /* Force stack 1 column: list full-width on top, detail below */
      .layout {
        grid-template-columns: minmax(0, 1fr) !important;
      }
      /* Compact tightening for very narrow viewports */
      @media (max-width: 900px) {
        .page {
          padding: 16px !important;
        }
      }
    </style>
    <style id="uxTableOverflowFix">
      /* Table overflow handling: keep text intact, only enable horizontal scroll on narrow viewport */
      @media (max-width: 1199px) {
        table {
          display: block;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
      }
    </style>
    <style id="uxBaselinePolish">
      /* Baseline UI polish — applies only where file CSS doesn't override */
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* Pointer cursor on interactive */
      button,
      .btn,
      [role="button"],
      select,
      input[type="checkbox"],
      input[type="radio"],
      input[type="submit"],
      input[type="button"],
      a[href],
      label[for] {
        cursor: pointer;
      }

      /* Disabled state */
      button:disabled,
      .btn:disabled,
      input:disabled,
      select:disabled,
      textarea:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      /* Focus-visible outline (a11y) */
      button:focus-visible,
      .btn:focus-visible,
      a:focus-visible,
      [role="button"]:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 2px solid var(--color-primary-light);
        outline-offset: 2px;
      }

      /* Inherit font family for form controls (fixes browser-default) */
      input,
      select,
      textarea,
      button {
        font-family: inherit;
      }

      /* Responsive media */
      img,
      svg,
      video {
        max-width: 100%;
        height: auto;
      }

      /* Subtle hover for buttons (only if no transition already set, gentle filter) */
      button:hover:not(:disabled),
      .btn:hover:not(:disabled) {
        filter: brightness(0.96);
        transition: filter 0.15s ease;
      }

      /* Smooth scrollbar on Webkit */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-header-soft);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-warm);
        border-radius: var(--r-sm);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-primary-light);
      }

      /* Selection highlight on-brand */
      ::selection {
        background: var(--color-primary-light);
        color: #fff;
      }

      /* HR baseline */
      hr {
        border: none;
        border-top: 1px solid var(--border-warm);
        margin: 12px 0;
      }

      /* Anchor baseline color matches brand (no underline by default to match flat UI) */
      a {
        color: var(--text-link);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="page" id="listPage">
      <div class="page-header">
        <div style="margin-bottom: 8px">
          <button
            type="button"
            class="btn btn-secondary"
            onclick="window.location.href = 'property-list-oversight.html'"
          >
            ← Back to Property List
          </button>
        </div>
        <div class="page-title">Property Approval &amp; Moderation</div>
      </div>

      <div class="mod-tabs">
        <button class="mod-tab active" id="tab-pending" type="button" onclick="switchTab('pending')">Pending</button>
        <button class="mod-tab" id="tab-rejected" type="button" onclick="switchTab('rejected')">Rejected</button>
      </div>

      <!-- PENDING tab -->
      <div class="card" id="pendingCard">
        <div class="filters">
          <input
            id="searchInput"
            type="text"
            placeholder="Search by property ID, title, agent"
          />
          <div class="select-wrapper">
            <select id="reasonFilter">
              <option value="">All reasons</option>
              <option value="Unverified agent">Unverified agent</option>
              <option value="Keyword flag">Keyword flag</option>
              <option value="Duplicate listing">Duplicate listing</option>
              <option value="System flag">System flag</option>
            </select>
          </div>
          <div class="select-wrapper">
            <select id="groupFilter">
              <option value="">All groups</option>
              <option value="Group 1 — Single Unit">Group 1 — Single Unit</option>
              <option value="Group 2 — Whole Building">Group 2 — Whole Building</option>
              <option value="Group 3 — Land">Group 3 — Land</option>
              <option value="Group 5 — New Dev Apartments">Group 5 — New Dev Apartments</option>
              <option value="Group 6 — New Dev Houses">Group 6 — New Dev Houses</option>
            </select>
          </div>
          <button class="add-filter-btn" id="clearFilterBtn" type="button">
            Remove Filters
          </button>
          <div class="select-wrapper" style="margin-left: auto">
            <select class="sort-select" id="sortSelectModeration">
              <option value="default">Newest first</option>
            </select>
          </div>
        </div>
        <div class="result-count" id="pendingCount">Showing 0 of 0 listings</div>
        <table>
          <thead>
            <tr>
              <th>Property</th>
              <th>Agent</th>
              <th>Reason</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="pendingBody"></tbody>
        </table>
        <div class="empty-state" id="pendingEmpty" style="display: none">
          No pending listings.
        </div>
        <div class="pager" id="pendingPager"></div>
      </div>

      <!-- REJECTED tab -->
      <div class="card hidden" id="rejectedCard">
        <div class="result-count" id="rejectedCount">Showing 0 of 0 listings</div>
        <table>
          <thead>
            <tr>
              <th>Property</th>
              <th>Agent</th>
              <th>Reason</th>
              <th>Status</th>
              <th>Reject category</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="rejectedBody"></tbody>
        </table>
        <div class="empty-state" id="rejectedEmpty" style="display: none">
          No rejected listings.
        </div>
        <div class="pager" id="rejectedPager"></div>
      </div>
    </div>

    <!-- DETAIL view (full width) — replicates the Property Management detail chrome -->
    <div class="page hidden" id="detailPage">
      <div class="detail-toolbar">
        <div class="detail-toolbar-left">
          <button class="btn btn-secondary" type="button" onclick="backToList()">
            <i class="fas fa-arrow-left"></i> Back
          </button>
          <span id="dStatusPill"></span>
        </div>
        <div class="detail-toolbar-right" id="detailActions"></div>
      </div>

      <div class="detail-hero">
        <div class="detail-thumb"><i class="fas fa-building"></i></div>
        <div class="detail-hero-info">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px">
            <h2 class="detail-name" id="dName" style="margin:0">—</h2>
            <span class="group-badge" id="dGroupBadge"><i class="fas fa-layer-group"></i> <span id="dGroup">—</span></span>
          </div>
          <div class="detail-meta">
            <span class="detail-id-pill" id="dId">—</span>
            <span id="dMetaAddr">—</span>
            <span>·</span>
            <span id="dMetaType">—</span>
            <span>·</span>
            <span id="dMetaPrice">—</span>
          </div>
        </div>
      </div>

      <div id="dAlerts"></div>
      <div class="section-grid" id="dSections"></div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

      // ---------- persistence ----------
      const LS_KEY = "yuushi.moderationQueue";
      function buildSeed() {
        return [
          { id: "P-1101", title: "Studio near Shibuya", agent: "Sakura Realty", agentEmail: "contact@sakura-realty.jp", status: "Pending", reason: "Unverified agent", severity: "Low", group: "Group 1 — Single Unit", prefecture: "Tokyo", city: "Shibuya", propType: "Apartment", price: "¥9,800,000", layout: "1R", sizeSqm: "21.5㎡", buildYear: "2018", agentLicense: "Pending verification", note: "Agent has not completed license verification. Listing is held pending KYC approval." },
          { id: "P-1102", title: "Luxury penthouse with ocean view", agent: "Hikari Homes", agentEmail: "info@hikari-homes.jp", status: "Pending", reason: "Keyword flag", severity: "Medium", group: "Group 5 — New Dev Apartments", prefecture: "Kanagawa", city: "Yokohama", propType: "Penthouse", price: "¥185,000,000", layout: "3LDK", sizeSqm: "142.0㎡", buildYear: "2022", flaggedKeyword: "違法", note: "Listing body contains a banned keyword: '違法'. Please review before approving." },
          { id: "P-1103", title: "1K near Osaka station", agent: "Osaka Prime Realty", agentEmail: "ops@osaka-prime.jp", status: "Pending", reason: "Duplicate listing", severity: "Medium", group: "Group 1 — Single Unit", prefecture: "Osaka", city: "Kita", propType: "Apartment", price: "¥7,200,000", layout: "1K", sizeSqm: "19.8㎡", buildYear: "2016", duplicateOf: "P-0892", note: "Potential duplicate of listing P-0892 (9/11 fields matched). Please review." },
          { id: "P-1104", title: "2LDK family apartment Yokohama", agent: "Bay Living Co.", agentEmail: "hello@bayliving.jp", status: "Pending", reason: "System flag", severity: "High", group: "Group 2 — Whole Building", prefecture: "Kanagawa", city: "Yokohama", propType: "Apartment", price: "¥42,500,000", layout: "2LDK", sizeSqm: "61.3㎡", buildYear: "2015", note: "System flagged: uploaded photos do not match the unit's registered floor plan." },
          { id: "P-1105", title: "Commercial space Shinjuku", agent: "Metro Properties", agentEmail: "info@metro-prop.jp", status: "Pending", reason: "System flag", severity: "Low", group: "Group 2 — Whole Building", prefecture: "Tokyo", city: "Shinjuku", propType: "Retail/Shop", price: "¥320,000,000", layout: "Open floor", sizeSqm: "210.0㎡", buildYear: "2009", note: "Flagged by system for unusual price vs area ratio." },
          { id: "P-1106", title: "Development plot Chiba", agent: "Greenfield Land Co.", agentEmail: "info@greenfield-land.jp", status: "Pending", reason: "Duplicate listing", severity: "Low", group: "Group 3 — Land", prefecture: "Chiba", city: "Funabashi", propType: "Land", price: "¥58,000,000", layout: "—", sizeSqm: "330.0㎡", buildYear: "—", duplicateOf: "P-0913", note: "Potential duplicate of land listing P-0913 (8/10 fields matched). Please review." },
          { id: "P-1107", title: "New build apartment Nagoya", agent: "Central Japan Realty", agentEmail: "sales@cj-realty.jp", status: "Pending", reason: "Unverified agent", severity: "Medium", group: "Group 5 — New Dev Apartments", prefecture: "Aichi", city: "Naka", propType: "Apartment", price: "¥38,400,000", layout: "2LDK", sizeSqm: "58.7㎡", buildYear: "2024", agentLicense: "Pending verification", note: "New developer account; license verification still in progress." },
          { id: "P-1108", title: "New detached house Saitama", agent: "Sunrise Homes", agentEmail: "contact@sunrise-homes.jp", status: "Pending", reason: "Keyword flag", severity: "Low", group: "Group 6 — New Dev Houses", prefecture: "Saitama", city: "Omiya", propType: "House", price: "¥46,900,000", layout: "4LDK", sizeSqm: "108.2㎡", buildYear: "2024", flaggedKeyword: "保証", note: "Listing body contains a flagged keyword: '保証'. Please review wording before approving." },
          // existing rejected examples
          { id: "P-1090", title: "Refurbished 1LDK Kyoto", agent: "Kyoto Estate Partners", agentEmail: "info@kyoto-estate.jp", status: "Rejected", reason: "Keyword flag", severity: "Medium", group: "Group 1 — Single Unit", prefecture: "Kyoto", city: "Nakagyo", propType: "Apartment", price: "¥21,500,000", layout: "1LDK", sizeSqm: "44.0㎡", buildYear: "2011", flaggedKeyword: "違法", rejectCategory: "Inappropriate content", rejectNotes: "Banned wording in the listing body; resubmit after removing it." },
          { id: "P-1091", title: "Duplicate land plot Ibaraki", agent: "Greenfield Land Co.", agentEmail: "info@greenfield-land.jp", status: "Rejected", reason: "Duplicate listing", severity: "Low", group: "Group 3 — Land", prefecture: "Ibaraki", city: "Tsukuba", propType: "Land", price: "¥18,900,000", layout: "—", sizeSqm: "280.0㎡", buildYear: "—", duplicateOf: "P-0771", rejectCategory: "Duplicate listing", rejectNotes: "Same parcel already listed under P-0771." },
        ].concat(buildFiller());
      }
      // Deterministic realistic filler so the pager always shows (queue padded to ≥60).
      function buildFiller() {
        const reasons = ["Unverified agent", "Keyword flag", "Duplicate listing", "System flag"];
        const groups = ["Group 1 — Single Unit", "Group 2 — Whole Building", "Group 3 — Land", "Group 5 — New Dev Apartments", "Group 6 — New Dev Houses"];
        const cities = [["Tokyo", "Setagaya"], ["Osaka", "Chuo"], ["Kanagawa", "Kawasaki"], ["Aichi", "Showa"], ["Fukuoka", "Hakata"], ["Hyogo", "Kobe"], ["Chiba", "Urayasu"], ["Saitama", "Kawagoe"]];
        const agents = ["Sakura Realty", "Hikari Homes", "Metro Properties", "Bay Living Co.", "Central Japan Realty", "Sunrise Homes", "Greenfield Land Co.", "Osaka Prime Realty"];
        const types = { "Group 1 — Single Unit": "Apartment", "Group 2 — Whole Building": "Apartment", "Group 3 — Land": "Land", "Group 5 — New Dev Apartments": "Apartment", "Group 6 — New Dev Houses": "House" };
        const layouts = ["1R", "1K", "1LDK", "2LDK", "3LDK", "4LDK"];
        const out = [];
        const total = 56; // 8 pending + 2 rejected + 56 filler = 66 entries
        for (let i = 0; i < total; i++) {
          const reason = reasons[i % reasons.length];
          const group = groups[i % groups.length];
          const city = cities[i % cities.length];
          const agent = agents[i % agents.length];
          const isLand = group === "Group 3 — Land";
          // ~1 in 5 filler entries are Rejected, the rest Pending — deterministic.
          const rejected = i % 5 === 4;
          const price = "¥" + (8 + (i * 7) % 90) + "," + String(100 + (i * 37) % 900) + ",000";
          const rec = {
            id: "P-" + (1200 + i),
            title: types[group] + " " + city[1] + " #" + (i + 1),
            agent: agent,
            agentEmail: "ops@" + agent.toLowerCase().replace(/[^a-z]+/g, "-").replace(/^-|-$/g, "") + ".jp",
            status: rejected ? "Rejected" : "Pending",
            reason: reason,
            severity: ["Low", "Medium", "High"][i % 3],
            group: group,
            prefecture: city[0],
            city: city[1],
            propType: types[group],
            price: price,
            layout: isLand ? "—" : layouts[i % layouts.length],
            sizeSqm: (isLand ? (200 + (i * 11) % 300) : (20 + (i * 9) % 120)).toFixed(1) + "㎡",
            buildYear: isLand ? "—" : String(2005 + (i % 19)),
            note: "Auto-flagged demo listing (" + reason + ") for queue volume.",
          };
          if (reason === "Unverified agent") rec.agentLicense = "Pending verification";
          if (reason === "Keyword flag") rec.flaggedKeyword = i % 2 ? "保証" : "違法";
          if (reason === "Duplicate listing") rec.duplicateOf = "P-0" + (600 + i);
          if (rejected) {
            rec.rejectCategory = ["Incomplete information", "Poor image quality", "Policy violation", "Invalid license", "Other"][i % 5];
            rec.rejectNotes = i % 2 ? "Resubmit after correcting the flagged issue." : "";
          }
          out.push(rec);
        }
        return out;
      }
      function migrateQueue(a) {
        // Keep stored data in sync with the 4 supported reasons + structured reject fields.
        let changed = false;
        a.forEach((p) => {
          if (p.reason === "User report") { p.reason = "System flag"; changed = true; }
          if (p.rejectionReason != null && p.rejectCategory == null) { p.rejectCategory = "Other"; p.rejectNotes = p.rejectionReason; changed = true; }
          if ("rejectionReason" in p) { delete p.rejectionReason; changed = true; }
        });
        return changed;
      }
      function loadQueue() {
        try { const v = localStorage.getItem(LS_KEY); if (v) { const a = JSON.parse(v); if (Array.isArray(a) && a.length) { if (migrateQueue(a)) { try { localStorage.setItem(LS_KEY, JSON.stringify(a)); } catch (e) {} } return a; } } } catch (e) {}
        const s = buildSeed();
        try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch (e) {}
        return s;
      }
      function persistQueue() { try { localStorage.setItem(LS_KEY, JSON.stringify(moderationQueue)); } catch (e) {} }
      let moderationQueue = loadQueue();

      const decisionLog = [];
      let filters = { search: "", reason: "", group: "" };
      let sortMode = "default";
      let currentTab = "pending";
      let selectedId = null;

      // ---------- universal pagination (fixed 50/page) ----------
      const PAGE_SIZE = 50;
      let pendingPage = 1;
      let rejectedPage = 1;

      // Render the "Showing X–Y of N listings" line + page controls.
      // Returns the slice of `data` for the current page. Clamps page in range.
      function paginate(data, page, countEl, pagerEl, onGo) {
        const total = data.length;
        const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
        if (page > totalPages) page = totalPages;
        if (page < 1) page = 1;
        const start = total === 0 ? 0 : (page - 1) * PAGE_SIZE;
        const end = Math.min(total, page * PAGE_SIZE);
        countEl.textContent = total === 0
          ? "Showing 0 of 0 listings"
          : "Showing " + (start + 1) + "–" + end + " of " + total + " listings";
        renderPager(pagerEl, page, totalPages, onGo);
        return { slice: data.slice(start, end), page: page };
      }

      function pageNumbers(current, totalPages) {
        // ≤7 pages: show all. Otherwise window with "…".
        if (totalPages <= 7) {
          const a = [];
          for (let i = 1; i <= totalPages; i++) a.push(i);
          return a;
        }
        const out = [1];
        let lo = Math.max(2, current - 1);
        let hi = Math.min(totalPages - 1, current + 1);
        if (current <= 3) { lo = 2; hi = 4; }
        if (current >= totalPages - 2) { lo = totalPages - 3; hi = totalPages - 1; }
        if (lo > 2) out.push("…");
        for (let i = lo; i <= hi; i++) out.push(i);
        if (hi < totalPages - 1) out.push("…");
        out.push(totalPages);
        return out;
      }

      function renderPager(pagerEl, current, totalPages, onGo) {
        // Hidden when everything fits on one page (≤50 results → 1 page).
        if (totalPages <= 1) { pagerEl.innerHTML = ""; pagerEl.classList.add("hidden"); return; }
        pagerEl.classList.remove("hidden");
        pagerEl.innerHTML = "";
        const mkBtn = (label, page, opts) => {
          const b = document.createElement("button");
          b.type = "button";
          b.textContent = label;
          if (opts && opts.disabled) b.disabled = true;
          if (opts && opts.active) b.classList.add("active");
          if (!(opts && opts.disabled) && !(opts && opts.active)) b.addEventListener("click", () => onGo(page));
          return b;
        };
        pagerEl.appendChild(mkBtn("Previous", current - 1, { disabled: current === 1 }));
        pageNumbers(current, totalPages).forEach((n) => {
          if (n === "…") {
            const s = document.createElement("span");
            s.className = "pager-ellipsis";
            s.textContent = "…";
            pagerEl.appendChild(s);
          } else {
            pagerEl.appendChild(mkBtn(String(n), n, { active: n === current }));
          }
        });
        pagerEl.appendChild(mkBtn("Next", current + 1, { disabled: current === totalPages }));
      }

      function severityClass(sev) { return sev === "High" ? "severity-high" : sev === "Medium" ? "severity-medium" : sev === "Low" ? "severity-low" : ""; }
      function statusClass(s) { return s === "Pending" ? "status-pending" : s === "Approved" ? "status-approved" : s === "Rejected" ? "status-suspended" : ""; }
      function logDecision(record, decision, note) {
        const ts = new Date().toISOString().slice(0, 16).replace("T", " ");
        decisionLog.push({ time: ts, propertyId: record.id, decision, note });
      }

      // ---------- tabs ----------
      function switchTab(tab) {
        currentTab = tab;
        // Reset the entered tab's page to 1 on switch (universal standard).
        if (tab === "pending") pendingPage = 1; else rejectedPage = 1;
        $("tab-pending").classList.toggle("active", tab === "pending");
        $("tab-rejected").classList.toggle("active", tab === "rejected");
        $("pendingCard").classList.toggle("hidden", tab !== "pending");
        $("rejectedCard").classList.toggle("hidden", tab !== "rejected");
        if (tab === "pending") renderPending(); else renderRejected();
      }

      // ---------- Pending table (search / reason filter) ----------
      function pendingFiltered() {
        const q = filters.search.toLowerCase();
        return moderationQueue.filter((p) =>
          p.status === "Pending" &&
          (!filters.reason || p.reason === filters.reason) &&
          (!filters.group || p.group === filters.group) &&
          (!q || p.id.toLowerCase().includes(q) || p.title.toLowerCase().includes(q) || p.agent.toLowerCase().includes(q)));
      }
      function renderPending() {
        const all = pendingFiltered();
        const res = paginate(all, pendingPage, $("pendingCount"), $("pendingPager"), (pg) => { pendingPage = pg; renderPending(); });
        pendingPage = res.page;
        const data = res.slice;
        $("pendingBody").innerHTML = data.map((p) => `
          <tr style="cursor:pointer" onclick="openDetail('${esc(p.id)}')">
            <td>${esc(p.title)}</td>
            <td>${esc(p.agent)}</td>
            <td>${esc(p.reason)}</td>
            <td><span class="status-pill ${statusClass(p.status)}">${esc(p.status)}</span></td>
          </tr>`).join("");
        $("pendingEmpty").style.display = all.length ? "none" : "block";
      }

      // ---------- Rejected table (read-only + rejection reason column) ----------
      function renderRejected() {
        const all = moderationQueue.filter((p) => p.status === "Rejected");
        const res = paginate(all, rejectedPage, $("rejectedCount"), $("rejectedPager"), (pg) => { rejectedPage = pg; renderRejected(); });
        rejectedPage = res.page;
        const data = res.slice;
        $("rejectedBody").innerHTML = data.map((p) => `
          <tr style="cursor:pointer" onclick="openDetail('${esc(p.id)}')">
            <td>${esc(p.title)}</td>
            <td>${esc(p.agent)}</td>
            <td>${esc(p.reason)}</td>
            <td><span class="status-pill ${statusClass(p.status)}">${esc(p.status)}</span></td>
            <td class="rej-reason">${esc(p.rejectCategory || "—")}</td>
            <td>${esc(p.rejectNotes || "—")}</td>
          </tr>`).join("");
        $("rejectedEmpty").style.display = all.length ? "none" : "block";
      }

      // ---------- detail view (replicated chrome from property-list-oversight) ----------
      function reasonContext(p) {
        switch (p.reason) {
          case "Unverified agent": return { label: "Agent verification", html: '<span class="status-pill status-suspended">Agent not verified</span>' };
          case "Keyword flag": return { label: "Flagged keyword", html: '<span class="rej-reason" style="font-weight:700">' + esc(p.flaggedKeyword || "—") + "</span>" };
          case "Duplicate listing": return { label: "Potential duplicate of", html: '<a href="#" onclick="return false">' + esc(p.duplicateOf || "—") + "</a>" };
          case "System flag": return { label: "System note", html: esc(p.note || "—") };
          default: return null;
        }
      }
      function kv(label, val, full) { return '<div class="kv' + (full ? " kv-full" : "") + '"><span class="kv-label">' + esc(label) + '</span><span class="kv-value">' + (val || "—") + "</span></div>"; }
      function secCard(title, icon, inner) { return '<div class="sec-card"><div class="sec-title"><i class="fas ' + icon + '"></i> ' + esc(title) + '</div><div class="kv-grid">' + inner + "</div></div>"; }

      function openDetail(id) {
        const p = moderationQueue.find((x) => x.id === id);
        if (!p) return;
        selectedId = id;
        $("dName").textContent = p.title;
        if (p.group) { $("dGroup").textContent = p.group; $("dGroupBadge").style.display = ""; }
        else { $("dGroupBadge").style.display = "none"; }
        $("dId").textContent = p.id;
        $("dMetaAddr").textContent = [p.prefecture, p.city].filter(Boolean).join(" · ") || "—";
        $("dMetaType").textContent = p.propType || "—";
        $("dMetaPrice").textContent = p.price || "—";
        $("dStatusPill").innerHTML = '<span class="status-pill ' + statusClass(p.status) + '">' + esc(p.status) + "</span>";

        const act = $("detailActions");
        if (p.status === "Pending") {
          act.innerHTML =
            '<button class="btn btn-primary" type="button" onclick="approveSelected()"><i class="fas fa-check"></i> Approve</button>' +
            '<button class="btn btn-danger" type="button" onclick="rejectSelected()"><i class="fas fa-xmark"></i> Reject</button>';
        } else {
          act.innerHTML = "";
        }

        const alerts = [];
        if (p.status === "Rejected" && p.rejectCategory) alerts.push({ kind: "danger", icon: "fa-ban", msg: "Rejected — " + esc(p.rejectCategory) });
        $("dAlerts").innerHTML = alerts.map((a) => '<div class="alert ' + a.kind + '"><i class="fas ' + a.icon + '"></i><div>' + a.msg + "</div></div>").join("");

        const rc = reasonContext(p);
        const overview = kv("Property", esc(p.title)) + kv("Property ID", esc(p.id)) + kv("Status", '<span class="status-pill ' + statusClass(p.status) + '">' + esc(p.status) + "</span>") + kv("Type", esc(p.propType));
        const details = kv("Prefecture", esc(p.prefecture)) + kv("City", esc(p.city)) + kv("Layout", esc(p.layout)) + kv("Size", esc(p.sizeSqm)) + kv("Build year", esc(p.buildYear)) + kv("Price", esc(p.price));
        const agent = kv("Agent", esc(p.agent)) + kv("Agent email", esc(p.agentEmail)) + (p.agentLicense ? kv("License", esc(p.agentLicense)) : "");
        const rejectKv = p.status === "Rejected"
          ? kv("Reject category", esc(p.rejectCategory || "—")) + kv("Notes", esc(p.rejectNotes || "—"), true)
          : "";
        const moderation = kv("Moderation reason", esc(p.reason)) + (rc ? kv(rc.label, rc.html) : "") + kv("Note", esc(p.note), true) + rejectKv;
        $("dSections").innerHTML =
          secCard("Listing overview", "fa-circle-info", overview) +
          secCard("Property details", "fa-building", details) +
          secCard("Agent", "fa-user-tie", agent) +
          secCard("Moderation", "fa-flag", moderation);

        $("listPage").classList.add("hidden");
        $("detailPage").classList.remove("hidden");
        window.scrollTo(0, 0);
      }
      function backToList() {
        selectedId = null;
        $("detailPage").classList.add("hidden");
        $("listPage").classList.remove("hidden");
        if (currentTab === "pending") renderPending(); else renderRejected();
      }
      function approveSelected() {
        const p = moderationQueue.find((x) => x.id === selectedId);
        if (!p) return;
        openDecisionModal({
          title: "Approve this listing?",
          subtitle: "Listing ID: " + p.id,
          danger: false,
          okLabel: "Approve",
          requireNote: false,
          noteLabel: "Audit note",
          notePlaceholder: "Optional internal note…",
          onConfirm(note) {
            p.status = "Approved";
            p.decisionNote = note || "";
            logDecision(p, "Approved", note || "");
            persistQueue();
            Toast.ok("Listing approved and published. Agent " + p.agent + " has been notified.");
            backToList();
          },
        });
      }
      function rejectSelected() {
        const p = moderationQueue.find((x) => x.id === selectedId);
        if (!p) return;

        const msgEl = document.getElementById("uxConfirmMsg");
        const okBtn = document.getElementById("uxConfirmOk");
        const cancelBtn = document.getElementById("uxConfirmCancel");

        // ──── Toast ────────────────────────────────────────────────────
        function toast(msg, type) {
          if (!wrap) return;
          const el = document.createElement("div");
          el.className = "ux-toast " + (type || "info");
          const span = document.createElement("span");
          span.textContent = msg || "";

          x.textContent = "×";

          el.appendChild(span);
          el.appendChild(x);
          wrap.appendChild(el);
          setTimeout(() => {
            el.style.opacity = "0";
            setTimeout(() => el.remove(), 220);
          }, 3800);
        }
        window.Toast = {
          show: toast,
          ok: (m) => toast(m, "ok"),
          err: (m) => toast(m, "err"),
          info: (m) => toast(m, "info"),

        let _onOk = null;

            try {

          const cb = _onOk;
          closeConfirm();
          if (cb) cb();

          if (e.target === modal) closeConfirm();

          msgEl.textContent = opts.message || "Are you sure?";

          _onOk = typeof opts.onConfirm === "function" ? opts.onConfirm : null;

            .querySelectorAll(".modal-backdrop, .modal-overlay")
            .forEach((m) => {

                m.classList.contains("show") ||
                m.classList.contains("open");
              if (!visible) return;
              m.classList.remove("open", "show", "active");
              m.style.display = "none";
            });
        });

        // ──── Backdrop click closes existing page modals ──────────────
        document
          .querySelectorAll(".modal-backdrop, .modal-overlay")
          .forEach((m) => {
            if (m.__uxBound) return;
            m.__uxBound = true;
            m.addEventListener("click", (e) => {
              if (e.target !== m) return;

            .querySelectorAll(".ux-invalid")
