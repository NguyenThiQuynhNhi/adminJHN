<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages — YUUSHI Support Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
      :root {
        --nav-bg: #1a2744; --nav-bg-hover: #243454; --nav-sub-bg: #14213a; --nav-text: #c8d1e0; --nav-text-muted: #7b8aa3;
        --accent: #c4714a; --accent-dark: #a55232; --accent-soft: #fef1e6;
        --bg-body: #f5f0e8; --bg-card: #fff; --bg-alt: #faf6f0;
        --border-subtle: #eadccd; --border-strong: #d9c8b4;
        --text-main: #3b2f2a; --text-muted: #7a6a5c; --text-dim: #9b8568;
        --green: #2f855a; --green-soft: #e6f6ef; --amber: #b7791f; --amber-soft: #fff6e0;
        --red: #c53030; --red-soft: #fde8e8; --blue: #2c5282; --blue-soft: #e0f2fe;
        --purple: #6b46c1; --purple-soft: #f3e8ff; --dgreen: #15803d; --grey: #6b7280; --grey-soft: #f3f4f6;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body { font-family: Arial, "Segoe UI", system-ui, sans-serif; background: var(--bg-body); color: var(--text-main); font-size: 13px; line-height: 1.5; display: flex; }
      a { color: inherit; text-decoration: none; }
      .sidebar { width: 248px; min-width: 248px; height: 100vh; background: var(--nav-bg); color: var(--nav-text); overflow-y: auto; flex-shrink: 0; }
      .sb-logo { padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 11px; }
      .sb-logo-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--accent); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 17px; }
      .sb-logo-text .t1 { font-size: 16px; font-weight: 700; color: #fff; display: block; }
      .sb-logo-text .t2 { font-size: 10.5px; color: var(--nav-text-muted); }
      .sb-item { display: flex; align-items: center; gap: 11px; padding: 11px 20px; color: var(--nav-text); font-size: 13.5px; cursor: pointer; border-left: 3px solid transparent; }
      .sb-item:hover { background: var(--nav-bg-hover); color: #fff; }
      .sb-item.active { background: var(--nav-bg-hover); color: #fff; font-weight: 600; border-left-color: var(--accent); }
      .sb-item i { width: 18px; text-align: center; font-size: 14px; }
      .sb-item.active i { color: var(--accent); }
      .sb-subnav { background: var(--nav-sub-bg); }
      .sb-sub { display: block; padding: 8px 20px 8px 52px; color: var(--nav-text); font-size: 12.5px; cursor: pointer; }
      .sb-sub:hover { color: #fff; background: var(--nav-bg-hover); }
      .sb-sub.active { color: var(--accent); font-weight: 600; }
      .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
      .topbar { height: 58px; flex-shrink: 0; background: #fff; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; padding: 0 24px; }
      .breadcrumb { font-size: 15px; font-weight: 700; flex: 1; }
      .acct-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
      .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
      .btn { border-radius: 7px; border: 1px solid var(--border-strong); padding: 8px 14px; font-size: 13px; background: #fff; cursor: pointer; display: inline-flex; gap: 6px; align-items: center; justify-content: center; color: var(--text-main); font-family: inherit; font-weight: 600; min-height: 36px; }
      .btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-dark); }
      .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-color: var(--accent-dark); color: #fff; }
      .btn-primary:hover { color: #fff; }
      .btn-sm { padding: 5px 9px; min-height: 28px; font-size: 11.5px; }
      input, select, textarea { border-radius: 7px; border: 1px solid var(--border-subtle); padding: 8px 11px; font-size: 13px; background: #fff; outline: none; font-family: inherit; width: 100%; min-height: 36px; }
      input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
      h2 { font-size: 20px; font-weight: 700; }
      .sub { font-size: 13px; color: var(--text-muted); }
      .badge { font-size: 10px; padding: 3px 8px; border-radius: 999px; font-weight: 700; border: 1px solid transparent; text-transform: uppercase; letter-spacing: 0.03em; }

      /* ===== Inbox 3-col ===== */
      .inbox { display: grid; grid-template-columns: 200px 320px 1fr; flex: 1; overflow: hidden; }
      @media (max-width: 1000px) { .inbox { grid-template-columns: 0 280px 1fr; } .folders { display: none; } }
      .folders { border-right: 1px solid var(--border-subtle); background: var(--bg-card); overflow-y: auto; padding: 12px 0; }
      .folder { display: flex; align-items: center; justify-content: space-between; padding: 9px 18px; cursor: pointer; font-size: 13px; }
      .folder:hover { background: var(--bg-alt); }
      .folder.active { background: var(--accent-soft); color: var(--accent-dark); font-weight: 700; border-left: 3px solid var(--accent); padding-left: 15px; }
      .folder .cnt { font-size: 11px; background: var(--grey-soft); color: var(--text-muted); padding: 1px 7px; border-radius: 999px; font-weight: 700; }
      .folder.active .cnt { background: var(--accent); color: #fff; }
      .folder .cnt.unread { background: var(--accent); color: #fff; }
      .conv-list { border-right: 1px solid var(--border-subtle); background: var(--bg-card); overflow-y: auto; display: flex; flex-direction: column; }
      .conv-toolbar { padding: 10px; border-bottom: 1px solid var(--border-subtle); display: flex; flex-direction: column; gap: 8px; position: sticky; top: 0; background: var(--bg-card); z-index: 2; }
      .conv-filters { display: flex; gap: 4px; }
      .cf-pill { font-size: 11px; padding: 4px 9px; border-radius: 999px; border: 1px solid var(--border-subtle); cursor: pointer; background: 0; font-weight: 600; color: var(--text-muted); }
      .cf-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
      .conv-item { padding: 11px 14px; border-bottom: 1px solid #f5ece0; cursor: pointer; display: flex; gap: 10px; }
      .conv-item:hover { background: var(--bg-alt); }
      .conv-item.active { background: var(--accent-soft); border-left: 3px solid var(--accent); padding-left: 11px; }
      .conv-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--blue); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
      .conv-avatar.admin { background: var(--nav-bg); }
      .conv-body { flex: 1; min-width: 0; }
      .conv-top { display: flex; justify-content: space-between; gap: 6px; }
      .conv-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .conv-time { font-size: 10.5px; color: var(--text-dim); white-space: nowrap; }
      .conv-preview { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .conv-tag { font-size: 9.5px; padding: 1px 7px; border-radius: 4px; background: var(--accent-soft); color: var(--accent-dark); font-weight: 600; margin-top: 3px; display: inline-block; }
      .unread-dot { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .chat { display: flex; flex-direction: column; overflow: hidden; background: var(--bg-alt); }
      .chat-header { padding: 12px 18px; border-bottom: 1px solid var(--border-subtle); background: #fff; display: flex; align-items: center; gap: 12px; }
      .chat-header .ttl { font-size: 14px; font-weight: 700; }
      .chat-header .meta { font-size: 11.5px; color: var(--text-muted); }
      .chat-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
      .translate-toggle { display: flex; align-items: center; gap: 6px; font-size: 11.5px; cursor: pointer; padding: 5px 9px; border-radius: 7px; border: 1px solid var(--border-subtle); background: #fff; }
      .translate-toggle.on { background: var(--green-soft); border-color: #b7e4cc; color: var(--green); font-weight: 700; }
      .chat-msgs { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
      .msg { max-width: 70%; padding: 10px 13px; border-radius: 14px; font-size: 13px; line-height: 1.5; }
      .msg.client { background: #ece6dd; align-self: flex-start; border-bottom-left-radius: 4px; }
      .msg.agent { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
      .msg-time { font-size: 10px; opacity: 0.7; margin-top: 4px; display: block; }
      .msg-sys { align-self: center; font-size: 11px; color: var(--text-dim); font-style: italic; padding: 4px 0; }
      .msg-file { display: flex; align-items: center; gap: 8px; padding: 6px; background: rgba(255,255,255,0.5); border-radius: 8px; margin-top: 4px; font-size: 12px; }
      .chat-quick { padding: 8px 16px; border-top: 1px solid var(--border-subtle); background: var(--bg-alt); display: flex; gap: 6px; flex-wrap: wrap; }
      .qr { font-size: 11.5px; padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border-subtle); background: #fff; cursor: pointer; }
      .qr:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-dark); }
      .chat-compose { padding: 12px 16px; border-top: 1px solid var(--border-subtle); background: #fff; }
      .compose-row { display: flex; gap: 8px; align-items: flex-end; }
      .compose-row textarea { min-height: 40px; max-height: 120px; resize: none; }
      .translate-status { font-size: 11px; color: var(--green); margin-bottom: 6px; }
      .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); }
      .empty-chat i { font-size: 42px; color: var(--text-dim); margin-bottom: 10px; }

      /* ===== Generic page content (campaigns/templates/analytics) ===== */
      .page { flex: 1; overflow-y: auto; padding: 22px 26px; }
      .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 16px; }
      .tab { background: 0; border: 0; padding: 9px 16px; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
      .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
      .card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
      .card-head { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid #f5ece0; margin-bottom: 14px; }
      .card-title { font-size: 14px; font-weight: 700; display: flex; gap: 8px; align-items: center; }
      .card-title i { color: var(--accent); }
      table.data { width: 100%; border-collapse: collapse; font-size: 12.5px; }
      .data thead { background: var(--bg-alt); }
      .data th, .data td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f5ece0; }
      .data th { font-size: 10.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
      .data tbody tr:hover { background: var(--bg-alt); }
      .b-onetime { background: var(--blue-soft); color: var(--blue); border:1px solid #bee3f8; }
      .b-drip { background: var(--purple-soft); color: var(--purple); border:1px solid #ddd6fe; }
      .b-automated { background: var(--green-soft); color: var(--green); border:1px solid #b7e4cc; }
      .b-draft { background: var(--grey-soft); color: var(--grey); border:1px solid #d1d5db; }
      .b-scheduled { background: var(--amber-soft); color: var(--amber); border:1px solid #fbd38d; }
      .b-active { background: var(--green-soft); color: var(--green); border:1px solid #b7e4cc; }
      .b-paused { background: var(--grey-soft); color: var(--grey); border:1px solid #d1d5db; }
      .b-completed { background: #bbf7d0; color: var(--dgreen); border:1px solid #86efac; }
      .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
      .kpi { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 14px; }
      .kpi-label { font-size: 10.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
      .kpi-value { font-size: 22px; font-weight: 800; margin-top: 5px; }
      .kpi-trend { font-size: 11px; color: var(--green); margin-top: 3px; }
      .chart-wrap { height: 260px; }
      .date-tabs { display: inline-flex; border: 1px solid var(--border-subtle); border-radius: 7px; overflow: hidden; }
      .date-tabs button { background: 0; border: 0; padding: 7px 13px; font-family: inherit; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-right: 1px solid var(--border-subtle); }
      .date-tabs button:last-child { border-right: 0; }
      .date-tabs button.active { background: var(--accent); color: #fff; }

      /* Campaign builder */
      .builder { display: grid; grid-template-columns: 180px 1fr; gap: 14px; }
      .blocks-palette { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 12px; height: fit-content; }
      .block-chip { padding: 10px; border: 1px dashed var(--border-strong); border-radius: 8px; margin-bottom: 8px; cursor: grab; font-size: 12px; font-weight: 600; background: var(--bg-alt); display: flex; align-items: center; gap: 8px; }
      .block-chip:hover { border-color: var(--accent); color: var(--accent-dark); }
      .canvas { background: var(--bg-card); border: 2px dashed var(--border-strong); border-radius: 10px; padding: 14px; min-height: 300px; }
      .canvas.drag-over { border-color: var(--accent); background: var(--accent-soft); }
      .canvas-block { border: 1px solid var(--border-subtle); border-radius: 8px; padding: 12px; margin-bottom: 10px; background: #fff; position: relative; }
      .cb-head { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
      .cb-head .drag { cursor: grab; }
      .cb-head .tools { margin-left: auto; display: flex; gap: 4px; }
      .cb-head .tools button { background: 0; border: 0; cursor: pointer; color: var(--text-muted); font-size: 12px; padding: 2px 4px; }
      .cb-head .tools button:hover { color: var(--accent); }
      .step-card { border: 1px solid var(--border-subtle); border-radius: 8px; padding: 14px; margin-bottom: 10px; background: var(--bg-alt); }
      .radio-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
      .radio-card { border: 1px solid var(--border-subtle); border-radius: 8px; padding: 12px; cursor: pointer; }
      .radio-card.selected { border-color: var(--accent); background: var(--accent-soft); }
      .radio-card .t { font-weight: 700; font-size: 13px; }
      .radio-card .d { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
      .fl { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin: 12px 0 5px; }
      .builder-steps { display: flex; gap: 4px; margin-bottom: 16px; }
      .bstep { flex: 1; text-align: center; padding: 8px; border-radius: 7px; font-size: 11.5px; font-weight: 600; background: var(--bg-alt); color: var(--text-muted); cursor: pointer; }
      .bstep.active { background: var(--accent); color: #fff; }

      .tmpl-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
      @media (max-width: 700px) { .tmpl-grid { grid-template-columns: 1fr; } .builder { grid-template-columns: 1fr; } }
      .tmpl-card { border: 1px solid var(--border-subtle); border-radius: 10px; padding: 14px; background: #fff; }
      .tmpl-card .tn { font-size: 14px; font-weight: 700; }
      .tmpl-badges { display: flex; gap: 5px; margin: 6px 0; flex-wrap: wrap; }
      .mini-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: var(--bg-alt); color: var(--text-muted); border: 1px solid var(--border-subtle); }
      .tmpl-snippet { font-size: 12px; color: var(--text-muted); margin: 6px 0; }
      .tmpl-cats { display: flex; flex-direction: column; gap: 2px; }
      .tmpl-cat { padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 12.5px; }
      .tmpl-cat:hover { background: var(--bg-alt); }
      .tmpl-cat.active { background: var(--accent-soft); color: var(--accent-dark); font-weight: 700; }

      .modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; }
      .modal-backdrop.open { display: flex; }
      .modal-box { background: #fff; border-radius: 12px; width: 520px; max-width: 100%; max-height: 92vh; display: flex; flex-direction: column; }
      .modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border-subtle); font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
      .modal-body { padding: 18px; overflow: auto; }
      .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border-subtle); display: flex; justify-content: flex-end; gap: 8px; }
      .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
      .toast { background: var(--green); color: #fff; padding: 10px 14px; border-radius: 7px; font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
      .toast.info { background: var(--blue); }
      .hidden { display: none !important; }
          /* ===== Admin-style beige sidebar (sync) ===== */
      .sidebar { background: #f8f4ed !important; color: #4a3f35 !important; border-right: 1px solid #e5d9c0; }
      .sb-logo { border-bottom: 1px solid #e5d9c0 !important; }
      .sb-logo-icon { background: #1a1a1a !important; color: #fff !important; }
      .sb-logo-text, .sb-logo-text .t1 { color: #1a1a1a !important; }
      .sb-logo-text .t2 { color: #8b6f47 !important; }
      .sb-item { color: #4a3f35 !important; }
      .sb-item:hover { background: #f0e6d2 !important; color: #1a1a1a !important; }
      .sb-item.active { background: #ede4d0 !important; color: #1a1a1a !important; border-left-color: #c4a25f !important; }
      .sb-item.active i { color: #c26b41 !important; }
      .sb-subnav { background: #efe6d4 !important; }
      .sb-sub { color: #6b5a48 !important; }
      .sb-sub:hover { background: #f0e6d2 !important; color: #1a1a1a !important; }
      .sb-sub.active { color: #c26b41 !important; }
    </style>
  </head>
  <body>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <header class="topbar"><div class="breadcrumb" id="bc">Messages · Inbox (Customers)</div><div style="margin-left:auto"><span class="acct-avatar">YT</span></div></header>
      <div class="content" id="content"></div>
    </main>

    <!-- Template editor modal -->
    <div class="modal-backdrop" id="tmplModal">
      <div class="modal-box">
        <div class="modal-header"><span>Create Template</span><button class="btn btn-sm" onclick="closeM('tmplModal')"><i class="fas fa-times"></i></button></div>
        <div class="modal-body">
          <label class="fl">Template Name *</label><input />
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><label class="fl">Category *</label><select><option>Tax Advisory</option><option>Legal Services</option><option>Property Management</option><option>Insurance</option><option>Mortgage Brokerage</option></select></div>
            <div><label class="fl">Scenario *</label><select><option>Initial Consultation</option><option>Service Proposals</option><option>Completion Notifications</option><option>Periodic Reports</option><option>Seasonal Greetings</option></select></div>
          </div>
          <label class="fl">Subject</label><input />
          <label class="fl">Body * <span style="font-weight:400;text-transform:none;color:var(--text-dim)">— tokens: [Customer_Name] [Company_Name] [Service_Name] [Date]</span></label>
          <textarea style="min-height:120px"></textarea>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><label class="fl">Language</label><select><option>Japanese</option><option>English</option></select></div>
            <div><label class="fl">Visibility</label><select><option>Save as Private</option><option>Share with team</option></select></div>
          </div>
        </div>
        <div class="modal-footer"><button class="btn" onclick="closeM('tmplModal')">Cancel</button><button class="btn btn-primary" onclick="closeM('tmplModal');toast('Template saved')">Save Template</button></div>
      </div>
    </div>
    <div class="toast-wrap" id="toastWrap"></div>

    <script>
      const SCREENS = [
        { id: "inboxCust", label: "Inbox (Customers)", icon: "fa-inbox" },
        { id: "inboxAdmin", label: "Inbox (Admin)", icon: "fa-shield-halved" },
        { id: "campaigns", label: "Campaigns", icon: "fa-bullhorn" },
        { id: "templates", label: "Templates", icon: "fa-file-lines" },
        { id: "analytics", label: "Analytics", icon: "fa-chart-line" },
      ];
      const SB_ITEMS = [
        { id: "dashboard", label: "Dashboard", icon: "fa-gauge-high", href: "index.html" },
        { id: "profile", label: "My Profile &amp; Services", icon: "fa-id-card-clip", href: "profile.html" },
        { id: "customers", label: "Leads &amp; Customers", icon: "fa-users", href: "customers.html" },
        { id: "needs", label: "Needs Search", icon: "fa-magnifying-glass", href: "needs-search.html" },
        { id: "messages", label: "Messages", icon: "fa-comments", href: "messages.html" },
        { id: "advertising", label: "Advertising", icon: "fa-rectangle-ad", href: "billing.html#ads" },

          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div><h2>Template Library</h2><div class="sub">Reusable message templates</div></div><button class="btn btn-primary" onclick="document.getElementById('tmplModal').classList.add('open')"><i class="fas fa-plus"></i> Create Template</button></div>
          <div style="display:grid;grid-template-columns:200px 1fr;gap:16px">
            <div class="card">
              <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">By Category</div>
              <div class="tmpl-cats">${["All categories","Tax Advisory","Legal Services","Property Management","Insurance","Mortgage Brokerage","Cleaning & Maintenance"].map((c,i)=>`<div class="tmpl-cat ${i===0?"active":""}" onclick="this.closest('.tmpl-cats').querySelectorAll('.tmpl-cat').forEach(x=>x.classList.remove('active'));this.classList.add('active')">${c}</div>`).join("")}</div>
              <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin:14px 0 8px">By Scenario</div>
              <div class="tmpl-cats">${["Initial Consultation","Service Proposals","Completion Notifications","Periodic Reports","Regulatory Updates","Seasonal Greetings"].map(c=>`<div class="tmpl-cat" onclick="this.closest('.tmpl-cats').querySelectorAll('.tmpl-cat').forEach(x=>x.classList.remove('active'));this.classList.add('active')">${c}</div>`).join("")}</div>
            </div>
            <div class="tmpl-grid">${TEMPLATES.map(t=>`<div class="tmpl-card">
              <div class="tn">${esc(t.name)}</div>
              <div class="tmpl-badges"><span class="mini-badge">${t.cat}</span><span class="mini-badge">${t.scen}</span><span class="mini-badge">${t.lang}</span></div>
              <div class="tmpl-snippet">${esc(t.snippet)}</div>
              <div style="display:flex;gap:5px"><button class="btn btn-sm btn-primary" onclick="toast('Template applied')">Use</button><button class="btn btn-sm" onclick="toast('Preview (demo)','info')">Preview</button><button class="btn btn-sm" onclick="document.getElementById('tmplModal').classList.add('open')">Edit</button><button class="btn btn-sm" onclick="toast('Duplicated')">Duplicate</button></div>
            </div>`).join("")}</div>
          </div>
        </div>`;
      }

      // ===== Analytics =====
      let perfChart = null;
      function renderAnalytics() {
        document.getElementById("content").innerHTML = `<div class="page">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div><h2>Messaging Analytics</h2><div class="sub">Performance across campaigns</div></div>
            <div class="date-tabs"><button class="active">This Week</button><button>This Month</button><button>Last 3 Months</button><button>Custom</button></div></div>
          <div class="kpi-row">
            <div class="kpi"><div class="kpi-label">Messages Sent</div><div class="kpi-value">242</div></div>
            <div class="kpi"><div class="kpi-label">Open Rate</div><div class="kpi-value">54%</div><div class="kpi-trend">▲ +6%</div></div>
            <div class="kpi"><div class="kpi-label">Click Rate</div><div class="kpi-value">18%</div><div class="kpi-trend">▲ +2%</div></div>
            <div class="kpi"><div class="kpi-label">Replies Received</div><div class="kpi-value">37</div></div>
            <div class="kpi"><div class="kpi-label">Unsubscribes</div><div class="kpi-value" style="color:var(--red)">3</div></div>
          </div>
          <div class="card"><div class="card-head"><div class="card-title"><i class="fas fa-chart-area"></i> Sent vs Opens vs Clicks</div></div><div class="chart-wrap"><canvas id="msgChart"></canvas></div></div>
          <div class="card"><div class="card-head"><div class="card-title"><i class="fas fa-table"></i> Campaign Performance</div></div>
            <table class="data"><thead><tr><th>Campaign</th><th>Type</th><th>Sent</th><th>Delivered</th><th>Opened</th><th>Clicked</th><th>Replied</th><th>Open%</th><th>Click%</th><th>Unsub</th></tr></thead>
            <tbody>
              <tr><td>Spring Tax Season Reminder</td><td>One-time</td><td>142</td><td>140</td><td>67</td><td>17</td><td>12</td><td>48%</td><td>12%</td><td>2</td></tr>
              <tr><td>New Client Welcome Series</td><td>Drip</td><td>76</td><td>76</td><td>46</td><td>17</td><td>18</td><td>61%</td><td>23%</td><td>1</td></tr>
              <tr><td>Proposal Follow-up Auto</td><td>Automated</td><td>24</td><td>24</td><td>13</td><td>4</td><td>7</td><td>55%</td><td>18%</td><td>0</td></tr>
            </tbody></table>
          </div>
          <div class="card"><div class="card-head"><div class="card-title"><i class="fas fa-link"></i> URL Click Tracking</div></div>
            <table class="data"><thead><tr><th>URL</th><th>Campaign</th><th>Total Clicks</th><th>Unique Clicks</th><th>Last Clicked</th></tr></thead>
            <tbody>
              <tr><td>yamamoto-tax.jp/inheritance</td><td>Spring Tax Season</td><td>34</td><td>28</td><td>2026-05-25</td></tr>
              <tr><td>yamamoto-tax.jp/book</td><td>Welcome Series</td><td>21</td><td>19</td><td>2026-05-26</td></tr>
            </tbody></table>
          </div>
          <div class="card"><div class="card-head"><div class="card-title"><i class="fas fa-user-slash"></i> Unsubscribe Management</div></div>
            <table class="data"><thead><tr><th>Customer Ref#</th><th>Unsubscribed</th><th>Reason</th><th style="text-align:right">Actions</th></tr></thead>
            <tbody>
              <tr><td>CUS-20260008</td><td>2026-05-20</td><td>Too many emails</td><td style="text-align:right"><button class="btn btn-sm" onclick="toast('Viewed','info')">View</button></td></tr>
              <tr><td>CUS-20260011</td><td>2026-05-18</td><td>—</td><td style="text-align:right"><button class="btn btn-sm" onclick="toast('Viewed','info')">View</button></td></tr>
              <tr><td>CUS-20260014</td><td>2026-05-15</td><td>No longer needed</td><td style="text-align:right"><button class="btn btn-sm" onclick="toast('Viewed','info')">View</button></td></tr>
            </tbody></table>
            <div style="font-size:11.5px;color:var(--text-muted);margin-top:10px"><i class="fas fa-circle-info"></i> Unsubscribed customers are automatically excluded from all campaigns and cannot be manually overridden.</div>
          </div>
        </div>`;
        setTimeout(() => {
          const ctx = document.getElementById("msgChart"); if (!ctx) return;
          if (perfChart) perfChart.destroy();
          perfChart = new Chart(ctx, {
            type: "line",
            data: { labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"], datasets: [
              { label: "Sent", data: [30,42,38,55,48,18,11], borderColor: "#c4714a", backgroundColor: "rgba(196,113,74,0.12)", fill: true, tension: 0.35 },
              { label: "Opens", data: [16,24,20,30,26,9,6], borderColor: "#2c5282", backgroundColor: "rgba(44,82,130,0.12)", fill: true, tension: 0.35 },
              { label: "Clicks", data: [5,8,6,11,9,3,2], borderColor: "#2f855a", backgroundColor: "rgba(47,133,90,0.12)", fill: true, tension: 0.35 },
            ]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "bottom" } }, scales: { y: { beginAtZero: true } } },
          });
        }, 50);
      }

      function go(id) {
        screen = id;
        document.querySelector(".breadcrumb").textContent = "Messages · " + SCREENS.find(s => s.id === id).label;
        renderSidebar();
        curConv = null;
        if (id === "inboxCust") renderInbox(false);
        else if (id === "inboxAdmin") renderInbox(true);
        else if (id === "campaigns") renderCampaigns();
        else if (id === "templates") renderTemplates();
        else if (id === "analytics") renderAnalytics();
      }
      window.go = go;
      function closeM(id){document.getElementById(id).classList.remove("open");}
      window.closeM=closeM;
      function toast(msg,kind){const el=document.createElement("div");el.className="toast "+(kind||"");el.textContent=msg;document.getElementById("toastWrap").appendChild(el);setTimeout(()=>el.remove(),3000);}
      window.toast=toast;
      document.querySelectorAll(".modal-backdrop").forEach(b=>b.addEventListener("click",e=>{if(e.target===b)b.classList.remove("open");}));
      renderSidebar();
      go("inboxCust");
    </script>
  </body>
</html>
