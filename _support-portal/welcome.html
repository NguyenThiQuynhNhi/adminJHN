<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Portal — Welcome</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f3ef;
        color: #3b2f2a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .welcome {
        max-width: 560px;
        text-align: center;
      }
      .icon-wrap {
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: linear-gradient(135deg, #2c5282, #1a365d);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        margin-bottom: 18px;
        box-shadow: 0 12px 32px rgba(44, 82, 130, 0.28);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      p {
        margin: 0 0 6px;
        font-size: 14px;
        color: #7a6a5c;
        line-height: 1.6;
      }
      .hint {
        margin-top: 20px;
        display: inline-block;
        padding: 10px 16px;
        background: #fffaf2;
        border: 1px dashed #d9c8b4;
        border-radius: 10px;
        font-size: 12.5px;
        color: #8b6f47;
      }
    </style>
  </head>
  <body>
    <div class="welcome">
      <div class="icon-wrap"><i class="fas fa-headset"></i></div>
      <h1>Support Portal</h1>
      <p>
        This is the shell for the support-account-facing application. Build
        modules under <code>support-portal/</code> and add them to the sidebar
        of <code>support-portal/index.html</code>.
      </p>
      <div class="hint">
        <i class="fas fa-info-circle"></i> Default landing page. Replace with a
        real support dashboard once available.
      </div>
    </div>
  </body>
</html>
