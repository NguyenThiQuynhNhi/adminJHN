<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — YUUSHI Support Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
      :root {
        --accent: #c4714a; --accent-dark: #a55232; --accent-soft: #fef1e6;
        --bg-body: #f5f0e8; --bg-card: #fff; --bg-alt: #faf6f0;
        --border-subtle: #eadccd; --border-strong: #d9c8b4;
        --text-main: #3b2f2a; --text-muted: #7a6a5c; --text-dim: #9b8568;
        --green: #2f855a; --amber: #b7791f; --red: #c53030; --navy: #1a2744;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Arial, "Segoe UI", system-ui, sans-serif; background: var(--bg-body); color: var(--text-main); font-size: 13px; line-height: 1.5; min-height: 100vh; padding: 28px 16px; }
      .wrap { max-width: 760px; margin: 0 auto; }
      .brand { display: flex; align-items: center; gap: 11px; justify-content: center; margin-bottom: 22px; }
      .brand-icon { width: 40px; height: 40px; border-radius: 9px; background: var(--accent); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
      .brand-text .t1 { font-size: 18px; font-weight: 700; color: var(--navy); }
      .brand-text .t2 { font-size: 11px; color: var(--text-muted); }

      .progress { display: flex; align-items: center; margin-bottom: 24px; }
      .pstep { flex: 1; text-align: center; }
      .pcircle { width: 34px; height: 34px; border-radius: 50%; background: #e5d9c0; color: var(--text-muted); display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; margin-bottom: 5px; }
      .pstep.active .pcircle { background: var(--accent); color: #fff; }
      .pstep.done .pcircle { background: var(--green); color: #fff; }
      .plabel { font-size: 11px; color: var(--text-muted); font-weight: 600; }
      .pstep.active .plabel { color: var(--accent); }
      .pbar { height: 3px; flex: 0.6; background: #e5d9c0; margin-bottom: 20px; border-radius: 2px; }
      .pbar.done { background: var(--green); }

      .card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 28px; box-shadow: 0 8px 28px rgba(115,72,39,0.06); }
      h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
      .sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

      .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
      @media (max-width: 680px) { .cat-grid { grid-template-columns: repeat(2, 1fr); } }
      .cat-card { border: 2px solid var(--border-subtle); border-radius: 12px; padding: 18px 10px; text-align: center; cursor: pointer; transition: all 0.15s; background: #fff; }
      .cat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
      .cat-card.selected { border-color: var(--accent); background: var(--accent-soft); }
      .cat-emoji { font-size: 30px; margin-bottom: 8px; }
      .cat-label { font-size: 12px; font-weight: 700; }

      label.fl { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin: 14px 0 5px; }
      label.fl:first-child { margin-top: 0; }
      .req { color: var(--red); }
      input, select, textarea { border-radius: 7px; border: 1px solid var(--border-subtle); padding: 9px 11px; font-size: 13px; background: #fff; color: var(--text-main); outline: none; font-family: inherit; width: 100%; min-height: 38px; }
      input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
      textarea { resize: vertical; min-height: 70px; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      @media (max-width: 600px) { .grid2 { grid-template-columns: 1fr; } }
      .err { font-size: 11px; color: var(--red); margin-top: 3px; display: none; }
      .invalid input, .invalid select, .invalid textarea { border-color: var(--red); }
      .invalid .err { display: block; }
      .hint { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

      .btn { border-radius: 7px; border: 1px solid var(--border-strong); padding: 10px 18px; font-size: 13px; background: #fff; cursor: pointer; display: inline-flex; gap: 6px; align-items: center; justify-content: center; color: var(--text-main); font-family: inherit; font-weight: 600; min-height: 40px; }
      .btn:hover { background: var(--accent-soft); }
      .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-color: var(--accent-dark); color: #fff; }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
      .actions { display: flex; justify-content: space-between; margin-top: 24px; }

      .pw-wrap { position: relative; }
      .pw-toggle { position: absolute; right: 10px; top: 9px; background: 0; border: 0; cursor: pointer; color: var(--text-muted); }
      .pw-strength { height: 5px; border-radius: 3px; background: #e5d9c0; margin-top: 6px; overflow: hidden; }
      .pw-strength > div { height: 100%; width: 0; transition: width 0.2s, background 0.2s; }
      .pw-label { font-size: 11px; margin-top: 3px; font-weight: 600; }
      .check-row { display: flex; gap: 8px; align-items: flex-start; margin-top: 12px; font-size: 12.5px; }
      .check-row input { width: 16px; height: 16px; min-height: 0; accent-color: var(--accent); margin-top: 2px; }
      .check-row a { color: var(--accent); text-decoration: underline; }

      .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5ece0; font-size: 13px; }
      .summary-row .k { color: var(--text-muted); }
      .summary-row .v { font-weight: 600; text-align: right; }

      .success { text-align: center; padding: 30px 10px; }
      .success i { font-size: 60px; color: var(--green); margin-bottom: 14px; }
      .free-input { margin-top: 12px; }
          /* ===== Admin-style beige sidebar (sync) ===== */
      .sidebar { background: #f8f4ed !important; color: #4a3f35 !important; border-right: 1px solid #e5d9c0; }
      .sb-logo { border-bottom: 1px solid #e5d9c0 !important; }
      .sb-logo-icon { background: #1a1a1a !important; color: #fff !important; }
      .sb-logo-text, .sb-logo-text .t1 { color: #1a1a1a !important; }
      .sb-logo-text .t2 { color: #8b6f47 !important; }
      .sb-item { color: #4a3f35 !important; }
      .sb-item:hover { background: #f0e6d2 !important; color: #1a1a1a !important; }
      .sb-item.active { background: #ede4d0 !important; color: #1a1a1a !important; border-left-color: #c4a25f !important; }
      .sb-item.active i { color: #c26b41 !important; }
      .sb-subnav { background: #efe6d4 !important; }
      .sb-sub { color: #6b5a48 !important; }
      .sb-sub:hover { background: #f0e6d2 !important; color: #1a1a1a !important; }
      .sb-sub.active { color: #c26b41 !important; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <div class="brand-icon">Y</div>
        <div class="brand-text"><div class="t1">YUUSHI</div><div class="t2">Support Account Registration</div></div>
      </div>

      <div class="progress" id="progress"></div>

      <div class="card" id="card"></div>
    </div>

    <script>
      const CATS = [
        { id: "law", emoji: "⚖️", label: "Law Professionals" },
        { id: "tax", emoji: "📊", label: "Tax Accountants" },
        { id: "repair", emoji: "🔧", label: "Repair Companies" },
        { id: "construction", emoji: "🏗️", label: "Construction Companies" },
        { id: "mortgage-p", emoji: "🏦", label: "Mortgage Providers" },
        { id: "mortgage-b", emoji: "💼", label: "Mortgage Brokers" },
        { id: "pm", emoji: "🏢", label: "Property Managers" },
        { id: "insurance", emoji: "🛡️", label: "Insurance Companies" },
        { id: "others", emoji: "➕", label: "Others" },
      ];
      const STEPS = ["Account Type", "Company Info", "Credentials", "Confirmation"];
      const state = { step: 1, cat: null, catOther: "", company: {}, creds: {} };

      function renderProgress() {
        document.getElementById("progress").innerHTML = STEPS.map((l, i) => {
          const n = i + 1;
          const cls = n === state.step ? "active" : n < state.step ? "done" : "";
          return `<div class="pstep ${cls}"><div class="pcircle">${n < state.step ? '<i class="fas fa-check"></i>' : n}</div><div class="plabel">${l}</div></div>${i < 3 ? `<div class="pbar ${n < state.step ? "done" : ""}"></div>` : ""}`;
        }).join("");
      }

      function render() {
        renderProgress();
        const c = document.getElementById("card");
        if (state.step === 1) {
          c.innerHTML = `
            <h1>What type of support service do you provide?</h1>
            <div class="sub">Select the category that best describes your business.</div>
            <div class="cat-grid">
              ${CATS.map(cat => `<div class="cat-card ${state.cat === cat.id ? "selected" : ""}" onclick="pickCat('${cat.id}')"><div class="cat-emoji">${cat.emoji}</div><div class="cat-label">${cat.label}</div></div>`).join("")}
            </div>
            ${state.cat === "others" ? `<div class="free-input"><label class="fl">Please specify your service type <span class="req">*</span></label><input id="catOther" value="${state.catOther}" placeholder="e.g. Home Staging, Surveying…" oninput="state.catOther=this.value" /></div>` : ""}
            <div class="actions"><span></span><button class="btn btn-primary" id="nextBtn" onclick="next()" ${state.cat ? "" : "disabled"}>Next <i class="fas fa-arrow-right"></i></button></div>`;
        }
        else if (state.step === 2) {
          const v = (k) => state.company[k] || "";
          c.innerHTML = `
            <h1>Company Information</h1>
            <div class="sub">Tell us about your business.</div>
            <div class="form-row"><label class="fl">Company Name <span class="req">*</span></label><input id="cName" maxlength="200" value="${v('name')}" /><div class="err">Required</div></div>
            <label class="fl">Company Name (Japanese)</label><input id="cNameJp" maxlength="200" value="${v('nameJp')}" placeholder="株式会社…" />
            <div class="grid2">
              <div class="form-row"><label class="fl">Business Registration No. <span class="req">*</span></label><input id="cReg" value="${v('reg')}" placeholder="e.g. 0123-01-012345" /><div class="err">Required</div></div>
              <div class="form-row"><label class="fl">Representative Name <span class="req">*</span></label><input id="cRep" value="${v('rep')}" /><div class="err">Required</div></div>
              <div><label class="fl">Representative Title</label><input id="cTitle" value="${v('title')}" placeholder="CEO / Director" /></div>
              <div><label class="fl">Established Year</label><input id="cYear" type="number" value="${v('year')}" placeholder="2010" /></div>
              <div><label class="fl">Number of Staff</label><select id="cStaff"><option ${v('staff')==='1–5'?'selected':''}>1–5</option><option ${v('staff')==='6–20'?'selected':''}>6–20</option><option ${v('staff')==='21–50'?'selected':''}>21–50</option><option ${v('staff')==='51–200'?'selected':''}>51–200</option><option ${v('staff')==='200+'?'selected':''}>200+</option></select></div>
              <div><label class="fl">Company Website</label><input id="cWeb" value="${v('web')}" placeholder="https://" /></div>
            </div>
            <label class="fl">Head Office Address <span class="req">*</span></label>
            <div class="form-row"><textarea id="cAddr" placeholder="Prefecture / City / Ward / Street / Building">${v('addr')}</textarea><div class="err">Required</div></div>
            <div class="grid2">
              <div class="form-row"><label class="fl">Phone Number <span class="req">*</span></label><input id="cPhone" value="${v('phone')}" placeholder="+81-3-1234-5678" /><div class="err">Required</div></div>
              <div class="form-row"><label class="fl">Business Email <span class="req">*</span></label><input id="cEmail" value="${v('email')}" placeholder="info@company.jp" /><div class="err">Valid email required</div></div>
            </div>
            <div class="actions"><button class="btn" onclick="back()"><i class="fas fa-arrow-left"></i> Back</button><button class="btn btn-primary" onclick="next()">Next <i class="fas fa-arrow-right"></i></button></div>`;
        }
        else if (state.step === 3) {
          c.innerHTML = `
            <h1>Login Credentials</h1>
            <div class="sub">Set up your account login.</div>
            <div class="form-row"><label class="fl">Login Email <span class="req">*</span></label><input id="lEmail" value="${state.creds.email || ''}" placeholder="login@company.jp" /><div class="err">Valid, unique email required</div></div>
            <label class="fl">Password <span class="req">*</span></label>
            <div class="pw-wrap"><input id="lPw" type="password" oninput="checkStrength()" placeholder="Min 8 characters" /><button class="pw-toggle" onclick="togglePw('lPw',this)"><i class="fas fa-eye"></i></button></div>
            <div class="pw-strength"><div id="pwBar"></div></div>
            <div class="pw-label" id="pwLabel"></div>
            <label class="fl">Confirm Password <span class="req">*</span></label>
            <div class="pw-wrap form-row" id="row-confirm"><input id="lPw2" type="password" onblur="checkMatch()" placeholder="Re-enter password" /><button class="pw-toggle" onclick="togglePw('lPw2',this)"><i class="fas fa-eye"></i></button><div class="err">Passwords do not match</div></div>
            <div class="check-row" id="row-t1"><input type="checkbox" id="agreeTerms" /><label for="agreeTerms">I agree to the <a>Terms of Service</a> <span class="req">*</span></label></div>
            <div class="check-row" id="row-t2"><input type="checkbox" id="agreePrivacy" /><label for="agreePrivacy">I agree to the <a>Privacy Policy</a> <span class="req">*</span></label></div>
            <div class="actions"><button class="btn" onclick="back()"><i class="fas fa-arrow-left"></i> Back</button><button class="btn btn-primary" onclick="next()">Next <i class="fas fa-arrow-right"></i></button></div>`;
        }
        else if (state.step === 4) {
          const cat = CATS.find(x => x.id === state.cat);
          const co = state.company;
          c.innerHTML = `
            <h1>Confirm Your Details</h1>
            <div class="sub">Please review before submitting.</div>
            <div style="background:var(--bg-alt);border-radius:10px;padding:16px">
              <div class="summary-row"><span class="k">Account Type</span><span class="v">${cat ? cat.emoji + " " + cat.label : "—"}${state.cat === "others" ? " (" + state.catOther + ")" : ""}</span></div>
              <div class="summary-row"><span class="k">Company Name</span><span class="v">${co.name || "—"}</span></div>
              <div class="summary-row"><span class="k">Registration No.</span><span class="v">${co.reg || "—"}</span></div>
              <div class="summary-row"><span class="k">Representative</span><span class="v">${co.rep || "—"}${co.title ? " · " + co.title : ""}</span></div>
              <div class="summary-row"><span class="k">Staff</span><span class="v">${co.staff || "—"}</span></div>
              <div class="summary-row"><span class="k">Address</span><span class="v">${co.addr || "—"}</span></div>
              <div class="summary-row"><span class="k">Phone</span><span class="v">${co.phone || "—"}</span></div>
              <div class="summary-row"><span class="k">Business Email</span><span class="v">${co.email || "—"}</span></div>
              <div class="summary-row"><span class="k">Login Email</span><span class="v">${state.creds.email || "—"}</span></div>
            </div>
            <div class="actions"><button class="btn" onclick="back()"><i class="fas fa-arrow-left"></i> Back</button><button class="btn btn-primary" onclick="submitReg()"><i class="fas fa-paper-plane"></i> Submit Registration</button></div>`;
        }
        else if (state.step === 5) {
          c.innerHTML = `
            <div class="success">
              <i class="fas fa-circle-check"></i>
              <h1>Registration submitted!</h1>
              <div class="sub" style="max-width:440px;margin:8px auto 0">YUUSHI admin will review your account within <strong>1–2 business days</strong>. You will be notified by email once approved.</div>
              <div style="margin-top:22px"><a class="btn btn-primary" href="index.html"><i class="fas fa-arrow-right"></i> Go to Dashboard (demo)</a></div>
            </div>`;
        }
      }

      function pickCat(id) { state.cat = id; render(); }
      window.pickCat = pickCat;

      function togglePw(id, btn) { const el = document.getElementById(id); el.type = el.type === "password" ? "text" : "password"; btn.innerHTML = `<i class="fas fa-eye${el.type === "text" ? "-slash" : ""}"></i>`; }
      window.togglePw = togglePw;

      function checkStrength() {
        const v = document.getElementById("lPw").value;
        let score = 0;
        if (v.length >= 8) score++;
        if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
        if (/\d/.test(v)) score++;
        if (/[^A-Za-z0-9]/.test(v)) score++;
        const levels = [["", "#e5d9c0", 0], ["Weak", "#c53030", 25], ["Fair", "#b7791f", 50], ["Strong", "#2f855a", 75], ["Very Strong", "#15803d", 100]];
        const [label, color, w] = levels[score];
        document.getElementById("pwBar").style.width = w + "%";
        document.getElementById("pwBar").style.background = color;
        document.getElementById("pwLabel").textContent = label;
        document.getElementById("pwLabel").style.color = color;
      }
      window.checkStrength = checkStrength;
      function checkMatch() {
        const a = document.getElementById("lPw").value, b = document.getElementById("lPw2").value;
        document.getElementById("row-confirm").classList.toggle("invalid", b && a !== b);
      }
      window.checkMatch = checkMatch;

      function next() {
        if (state.step === 1) {
          if (!state.cat) return;
          if (state.cat === "others" && !state.catOther.trim()) { alert("Please specify your service type"); return; }
        }
        if (state.step === 2) {
          const req = { cName: "name", cReg: "reg", cRep: "rep", cAddr: "addr", cPhone: "phone", cEmail: "email" };
          let ok = true;
          ["cName", "cNameJp", "cReg", "cRep", "cTitle", "cYear", "cStaff", "cWeb", "cAddr", "cPhone", "cEmail"].forEach(id => {
            const el = document.getElementById(id); if (el) state.company[{ cName: "name", cNameJp: "nameJp", cReg: "reg", cRep: "rep", cTitle: "title", cYear: "year", cStaff: "staff", cWeb: "web", cAddr: "addr", cPhone: "phone", cEmail: "email" }[id]] = el.value;
          });
          Object.keys(req).forEach(id => {
            const el = document.getElementById(id); const row = el.closest(".form-row");
            const bad = !el.value.trim() || (id === "cEmail" && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value));
            if (row) row.classList.toggle("invalid", bad);
            if (bad) ok = false;
          });
          if (!ok) return;
        }
        if (state.step === 3) {
          const email = document.getElementById("lEmail").value;
          const pw = document.getElementById("lPw").value, pw2 = document.getElementById("lPw2").value;
          let ok = true;
          const emailRow = document.getElementById("lEmail").closest(".form-row");
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { emailRow.classList.add("invalid"); ok = false; } else emailRow.classList.remove("invalid");
          if (pw.length < 8) { alert("Password must be at least 8 characters"); ok = false; }
          if (pw !== pw2) { document.getElementById("row-confirm").classList.add("invalid"); ok = false; }
          if (!document.getElementById("agreeTerms").checked || !document.getElementById("agreePrivacy").checked) { alert("Please agree to Terms and Privacy Policy"); ok = false; }
          if (!ok) return;
          state.creds.email = email;
        }
        state.step++;
        render();
      }
      window.next = next;
      function back() { if (state.step > 1) { state.step--; render(); } }
      window.back = back;
      function submitReg() { state.step = 5; render(); }
      window.submitReg = submitReg;

      render();
    </script>
  </body>
</html>
