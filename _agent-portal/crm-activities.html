<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Activities — YUUSHI Agent</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --nav-bg: #1a2744; --nav-bg-hover: #243454;
        --nav-text: #c8d1e0; --nav-text-muted: #7b8aa3;
        --accent: #1a6bd4; --accent-dark: #1456ae; --accent-soft: #e8f1fc;
        --terracotta: #c4714a;
        --bg-body: #f5f7fa; --bg-card: #ffffff; --bg-alt: #f9fafc;
        --border-subtle: #e5e9f0; --border-strong: #d4dae5;
        --text-main: #1f2937; --text-muted: #64748b; --text-dim: #94a3b8;
        --green: #16a34a; --green-soft: #dcfce7;
        --cyan: #0891b2; --cyan-soft: #cffafe;
        --amber: #d97706; --amber-soft: #fef3c7;
        --red: #dc2626; --red-soft: #fee2e2;
        --dark-green: #15803d; --dark-green-soft: #bbf7d0;
        --blue: #2563eb; --blue-soft: #dbeafe;
        --grey: #6b7280; --grey-soft: #f3f4f6;
        --navy: #1e3a8a;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
        background: var(--bg-body); color: var(--text-main);
        font-size: 13px; line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        display: flex;
      }
      a { color: inherit; text-decoration: none; }
      .sidebar {
        width: 200px; min-width: 200px; height: 100vh;
        background: var(--nav-bg); color: var(--nav-text);
        overflow-y: auto; flex-shrink: 0;
      }
      .sb-logo {
        padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.08);
        display: flex; align-items: center; gap: 10px;
      }
      .sb-logo-icon {
        width: 34px; height: 34px; border-radius: 8px; background: var(--accent);
        color: #fff; display: inline-flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 16px;
      }
      .sb-logo-text { font-size: 17px; font-weight: 700; color: #fff; }
      .sb-section { padding: 10px 0; }
      .sb-item {
        display: flex; align-items: center; gap: 11px;
        padding: 10px 20px; color: var(--nav-text);
        font-size: 13.5px; cursor: pointer;
        border-left: 3px solid transparent; transition: all 0.15s;
      }
      .sb-item:hover { background: var(--nav-bg-hover); color: #fff; }
      .sb-item.active {
        background: var(--nav-bg-hover); color: #fff; font-weight: 600;
        border-left-color: var(--accent);
      }
      .sb-item i { width: 18px; text-align: center; font-size: 14px; }
      .sb-item.active i { color: var(--accent); }

      .main {
        flex: 1; display: flex; flex-direction: column;
        height: 100vh; overflow: hidden;
      }
      .topbar {
        height: 56px; flex-shrink: 0; background: #fff;
        border-bottom: 1px solid var(--border-subtle);
        display: flex; align-items: center; padding: 0 22px; gap: 14px;
      }
      .topbar h1 { font-size: 17px; font-weight: 700; flex: 1; }
      .topbar-right { display: flex; align-items: center; gap: 14px; }
      .icon-btn {
        position: relative; width: 36px; height: 36px;
        border-radius: 50%; border: 1px solid var(--border-subtle);
        background: #fff; cursor: pointer;
        display: inline-flex; align-items: center; justify-content: center;
        color: var(--text-muted);
      }
      .icon-btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
      .bell-dot {
        position: absolute; top: 6px; right: 8px;
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--red); border: 2px solid #fff;
      }
      .avatar {
        width: 34px; height: 34px; border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: #fff; display: inline-flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 12px;
      }
      .content { flex: 1; overflow-y: auto; padding: 22px 26px; }

      h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
      h3 { font-size: 15px; font-weight: 700; }
      .sub { font-size: 12.5px; color: var(--text-muted); }

      .btn {
        border-radius: 6px; border: 1px solid var(--border-strong);
        padding: 8px 14px; font-size: 13px; background: #fff;
        cursor: pointer; display: inline-flex; gap: 6px;
        align-items: center; justify-content: center;
        color: var(--text-main); font-family: inherit; font-weight: 500;
        min-height: 36px; transition: all 0.15s;
      }
      .btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
      .btn-primary {
        background: var(--accent); border-color: var(--accent); color: #fff;
      }
      .btn-primary:hover { background: var(--accent-dark); color: #fff; }
      .btn-danger { color: var(--red); border-color: #fbcaca; }
      .btn-danger:hover { background: #fee2e2; color: var(--red); border-color: var(--red); }
      .btn-sm { padding: 5px 9px; font-size: 11.5px; min-height: 28px; }
      .btn-link {
        background: 0; border: 0; color: var(--accent);
        cursor: pointer; font-family: inherit; font-size: 12.5px;
        text-decoration: underline; padding: 2px 4px;
      }

      input, select, textarea {
        border-radius: 6px; border: 1px solid var(--border-subtle);
        padding: 8px 11px; font-size: 13px; background: #fff;
        color: var(--text-main); outline: none; font-family: inherit;
        width: 100%; min-height: 36px;
      }
      input:focus, select:focus, textarea:focus {
        border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
      }
      textarea { resize: vertical; min-height: 80px; }

      .page-header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
      }

      .filter-bar {
        background: var(--bg-card); border: 1px solid var(--border-subtle);
        border-radius: 8px; padding: 12px;
        display: grid; gap: 10px; margin-bottom: 14px;
      }
      .fb-5 { grid-template-columns: 2fr 1fr 1fr 1fr 1fr; }
      .fb-4 { grid-template-columns: 2fr 1fr 1fr 1fr; }
      .fb-3 { grid-template-columns: 2fr 1fr 1fr; }
      @media (max-width: 1100px) {
        .fb-5, .fb-4 { grid-template-columns: 1fr 1fr; }
        .fb-3 { grid-template-columns: 1fr 1fr; }
      }

      .card {
        background: var(--bg-card); border: 1px solid var(--border-subtle);
        border-radius: 8px; overflow: hidden;
      }
      table.data { width: 100%; border-collapse: collapse; font-size: 12.5px; }
      .data thead { background: var(--bg-alt); }
      .data th, .data td {
        padding: 10px 12px; text-align: left;
        border-bottom: 1px solid var(--border-subtle);
        vertical-align: middle;
      }
      .data th {
        font-size: 11px; font-weight: 700; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.04em;
        white-space: nowrap; cursor: pointer; user-select: none;
      }
      .data th .sort { opacity: 0.4; margin-left: 4px; font-size: 9px; }
      .data th.sort-asc .sort, .data th.sort-desc .sort { opacity: 1; color: var(--accent); }
      .data tbody tr:hover { background: var(--bg-alt); }
      .data td a { color: var(--accent); font-weight: 600; cursor: pointer; }
      .data td a:hover { text-decoration: underline; }
      .ellipsis { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      .badge {
        font-size: 10.5px; padding: 3px 8px; border-radius: 999px;
        font-weight: 700; border: 1px solid transparent; white-space: nowrap;
        display: inline-flex; align-items: center; gap: 4px;
        text-transform: uppercase; letter-spacing: 0.04em;
      }
      .b-blue, .b-scheduled, .b-callback, .b-low, .b-inprogress, .b-sent-call { background: var(--blue-soft); color: var(--blue); border-color: #bfdbfe; }
      .b-green, .b-completed, .b-answered, .b-received, .b-won { background: var(--green-soft); color: var(--green); border-color: #bbf7d0; }
      .b-grey, .b-cancelled, .b-noanswer, .b-open { background: var(--grey-soft); color: var(--grey); border-color: #e5e7eb; }
      .b-red, .b-noshow, .b-high, .b-overdue, .b-lost { background: var(--red-soft); color: var(--red); border-color: #fecaca; }
      .b-amber, .b-pending, .b-voicemail, .b-onhold, .b-med { background: var(--amber-soft); color: var(--amber); border-color: #fde68a; }
      .b-cyan, .b-sent { background: var(--cyan-soft); color: var(--cyan); border-color: #a5f3fc; }
      .b-dark-grey { background: #e5e7eb; color: #374151; border-color: #d1d5db; }
      .b-navy { background: #dbeafe; color: var(--navy); border-color: #bfdbfe; }

      .pagination {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px; border-top: 1px solid var(--border-subtle);
        font-size: 12.5px; color: var(--text-muted);
      }
      .pg-nav { display: flex; gap: 4px; }
      .pg-btn {
        min-width: 30px; height: 30px; border-radius: 5px;
        border: 1px solid var(--border-subtle); background: #fff;
        cursor: pointer; padding: 0 8px; font-size: 12px;
        color: var(--text-main); font-family: inherit;
      }
      .pg-btn:hover:not(:disabled) { background: var(--accent-soft); }
      .pg-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
      .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(15, 23, 42, 0.55);
        z-index: 200; display: none;
        align-items: center; justify-content: center; padding: 16px;
      }
      .modal-backdrop.open { display: flex; }
      .modal-box {
        background: #fff; border-radius: 10px;
        width: 500px; max-width: 100%; max-height: 92vh;
        display: flex; flex-direction: column;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      }
      .modal-header {
        padding: 14px 18px; border-bottom: 1px solid var(--border-subtle);
        display: flex; justify-content: space-between; align-items: center;
      }
      .modal-header h3 { margin: 0; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
      .modal-body { padding: 18px; overflow: auto; }
      .modal-footer {
        padding: 12px 18px; border-top: 1px solid var(--border-subtle);
        display: flex; justify-content: flex-end; gap: 8px;
      }
      .form-label {
        display: block; font-size: 11px; font-weight: 700;
        color: var(--text-muted); text-transform: uppercase;
        letter-spacing: 0.04em; margin-bottom: 4px; margin-top: 12px;
      }
      .form-label:first-child { margin-top: 0; }
      .req { color: var(--red); }
      .form-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      }
      .radio-row { display: flex; gap: 14px; padding-top: 4px; }
      .radio-row label {
        display: flex; align-items: center; gap: 6px;
        font-size: 13px; cursor: pointer; font-weight: 500;
      }
      .char-counter { text-align: right; font-size: 11px; color: var(--text-dim); margin-top: 2px; }

      .toast-wrap {
        position: fixed; bottom: 20px; right: 20px;
        z-index: 999; display: flex; flex-direction: column; gap: 8px;
      }
      .toast {
        background: var(--text-main); color: #fff;
        padding: 10px 14px; border-radius: 6px; font-size: 13px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      }
      .toast.success { background: var(--green); }
      .toast.error { background: var(--red); }

      .hidden { display: none !important; }

      @media (max-width: 768px) {
        .sidebar { width: 60px; min-width: 60px; }
        .sb-logo-text, .sb-item span { display: none; }
        .sb-item { justify-content: center; padding: 12px 0; }
      }

      .sb-sub.active { color: #c26b41 !important; }
    </style>
  </head>

    <script>
      // ============ Common helpers ============
      function esc(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]); }
      function yen(n) { return n ? "¥" + Number(n).toLocaleString() : "—"; }
      function toast(msg, kind) {
        const el = document.createElement("div");
        el.className = "toast " + (kind || "success");
        el.textContent = msg;
        document.getElementById("toastWrap").appendChild(el);
        setTimeout(() => el.remove(), 3000);
      }
      function closeModal(id) { document.getElementById(id).classList.remove("open"); }

        try {
          if (m === "viewings") {
            data = { client: $("fClient"), phone: $("fPhone"), prop: $("fProp"), date: $("fDate"), time: $("fTime"), duration: parseInt($("fDur")) || 60, status: $("fStatus"), notes: $("fNotes") || "" };
            if (!data.client || !data.prop || !data.date || !data.time) throw new Error("Required fields missing");
          } else if (m === "tasks") {
            data = { title: $("fTitle"), pri: $r("fPri"), status: $("fStatus"), due: $("fDue"), related: $("fLead") || $("fProp") || "—", relatedKind: $("fLead") ? "lead" : ($("fProp") ? "property" : "general"), created: rec?.created || todayStr(), notes: $("fNotes") || "" };
            if (!data.title || !data.due) throw new Error("Title and due date required");
          } else if (m === "jobs") {
            data = { title: $("fTitle"), client: $("fLead"), prop: $("fProp"), value: parseInt($("fValue")) || 0, stage: $("fStage"), closeDate: $("fClose"), created: rec?.created || todayStr(), notes: $("fNotes") || "" };
            if (!data.title || !data.client || !data.prop) throw new Error("Required fields missing");
          } else if (m === "calls") {
            data = { client: $("fClient"), phone: $("fPhone"), direction: $r("fDir"), dt: $("fDate") + " " + $("fTime"), duration: parseInt($("fDur")) || 0, durationDisp: $("fDur") ? $("fDur") + " min" : "—", outcome: $("fOutcome"), prop: $("fProp") || "", notes: $("fNotes") || "" };
            if (!data.phone) throw new Error("Phone required");
          } else if (m === "emails") {
            data = { direction: $r("fDir"), client: $("fClient"), email: $("fEmail"), subject: $("fSubject"), dt: $("fDate") + " " + $("fTime"), prop: $("fProp") || "", body: $("fBody") };
            if (!data.email || !data.subject || !data.body) throw new Error("Email, subject, body required");
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) throw new Error("Invalid email format");
          } else if (m === "sms") {
            data = { direction: $r("fDir"), client: $("fClient"), phone: $("fPhone"), dt: $("fDate") + " " + $("fTime"), prop: $("fProp") || "", message: $("fMessage") };
            if (!data.phone || !data.message) throw new Error("Phone and message required");
          } else if (m === "comments") {
            const lead = $("fLead"), prop = $("fProp"), job = $("fJob");
            data = { text: $("fText"), related: lead || prop || job || "—", relatedKind: lead ? "lead" : (prop ? "property" : (job ? "job" : "general")), created: rec?.created || (todayStr() + " 12:00"), updated: todayStr() + " 12:00" };
            if (!data.text) throw new Error("Comment required");
          }
        } catch (e) {
          toast(e.message, "error");
          return;
        }
        if (isEdit) {
          Object.assign(rec, data);
          toast(`${editingId} updated`);
        } else {
          const prefix = { viewings: "VW", tasks: "TK", jobs: "JB", calls: "CL", emails: "EM", sms: "SM", comments: "CM" }[m];
          arr.unshift({ id: nextId(prefix), ...data });
          toast(`${MODS[m].name.replace(/s$/, "")} added`);
        }
        closeModal("formModal");
        renderTable();
      }
      window.saveForm = saveForm;

      // ============ View modal ============
      function openView(id) {
        const m = currentMod;
        const r = MODS[m].data.find(x => x.id === id);
        if (!r) return;
        const t = MODS[m].name.replace(/s$/, "");
        document.getElementById("viewTitle").innerHTML = `<i class="fas ${MODS[m].icon}" style="color:var(--accent)"></i> ${t} · ${esc(r.id)}`;
        let body = "";
        if (m === "emails") {
          body = `
            <div style="background:var(--bg-alt);padding:12px;border-radius:6px;margin-bottom:14px;font-size:12.5px">
              <strong>${esc(r.direction)}</strong> · ${esc(r.dt)}<br>
              ${r.direction === "Sent" ? "To" : "From"}: <strong>${esc(r.client)}</strong> &lt;${esc(r.email)}&gt;
              ${r.prop ? `<br>Property: <a>${esc(r.prop)}</a>` : ""}
            </div>
            <div style="font-size:14px;font-weight:700;margin-bottom:8px">Subject: ${esc(r.subject)}</div>
            <div style="white-space:pre-wrap;font-size:13px;line-height:1.6;background:#fff;border:1px solid var(--border-subtle);border-radius:6px;padding:14px">${esc(r.body)}</div>`;
        } else if (m === "sms") {
          body = `
            <div style="background:var(--bg-alt);padding:12px;border-radius:6px;margin-bottom:14px;font-size:12.5px">
              <strong>${esc(r.direction)}</strong> · ${esc(r.dt)}<br>
              ${r.direction === "Sent" ? "To" : "From"}: <strong>${esc(r.client)}</strong> · ${esc(r.phone)}
              ${r.prop ? `<br>Property: <a>${esc(r.prop)}</a>` : ""}
            </div>
            <div style="background:${r.direction === "Sent" ? "var(--accent)" : "var(--bg-alt)"};color:${r.direction === "Sent" ? "#fff" : "var(--text-main)"};padding:14px;border-radius:14px;font-size:13.5px;line-height:1.5">${esc(r.message)}</div>`;
        } else if (m === "comments") {
          body = `
            <div style="background:var(--bg-alt);padding:12px;border-radius:6px;margin-bottom:14px;font-size:12.5px">
              Created: <strong>${esc(r.created)}</strong> · Last updated: ${esc(r.updated)}<br>
              Related to: <strong>${esc(r.related)}</strong> <span style="color:var(--text-muted)">(${esc(r.relatedKind)})</span>
            </div>
            <div style="white-space:pre-wrap;font-size:13.5px;line-height:1.6;background:#fff;border:1px solid var(--border-subtle);border-radius:6px;padding:14px">${esc(r.text)}</div>`;
        } else if (m === "jobs") {
          body = `
            <div style="background:var(--bg-alt);padding:12px;border-radius:6px;margin-bottom:14px;font-size:13px">
              <div style="font-size:15px;font-weight:700;margin-bottom:8px">${esc(r.title)}</div>
              <div>Client: <strong>${esc(r.client)}</strong></div>
              <div>Property: <strong>${esc(r.prop)}</strong></div>
              <div>Deal Value: <strong>${yen(r.value)}</strong></div>
              <div>Stage: <span class="badge b-${r.stage}">${r.stage}</span></div>
              <div>Close Date: ${esc(r.closeDate)} · Created: ${esc(r.created)}</div>
            </div>
            <div style="white-space:pre-wrap;font-size:13px;line-height:1.6">${esc(r.notes)}</div>`;
        }
        document.getElementById("viewBody").innerHTML = body;
        document.getElementById("viewModal").classList.add("open");
      }
      window.openView = openView;

      // ============ Init ============
      const hash = window.location.hash.replace("#", "");
      switchMod(MODS[hash] ? hash : "viewings");
    </script>
  </body>
</html>
