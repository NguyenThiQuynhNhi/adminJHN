<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon — YUUSHI Agent</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f0e8;
        color: #3b2f2a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .cs-card {
        background: #fff;
        border: 1px solid #eadccd;
        border-radius: 14px;
        padding: 36px 40px;
        max-width: 520px;
        width: 100%;
        text-align: center;
        box-shadow: 0 12px 32px rgba(115, 72, 39, 0.08);
      }
      .icon-wrap {
        width: 78px;
        height: 78px;
        border-radius: 18px;
        background: linear-gradient(135deg, #c4714a, #a55232);
        color: #fffaf3;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        margin-bottom: 18px;
        box-shadow: 0 10px 24px rgba(165, 82, 50, 0.28);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 700;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        background: #fef1e6;
        color: #c4714a;
        border: 1px solid #fcd9bf;
        border-radius: 999px;
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 14px;
      }
      p {
        margin: 0 0 8px;
        font-size: 13.5px;
        color: #7a6a5c;
        line-height: 1.6;
      }
      .progress-track {
        margin: 22px auto 6px;
        height: 6px;
        background: #f5ece0;
        border-radius: 999px;
        max-width: 260px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #c4714a, #c4a25f);
        width: 35%;
        border-radius: 999px;
      }
      .progress-text {
        font-size: 11.5px;
        color: #9b8568;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="cs-card">
      <div class="icon-wrap"><i class="fas" id="csIcon"></i></div>
      <span class="badge">Coming soon</span>
      <h1 id="csTitle">Module</h1>
      <p>This module is being built. You'll be notified when it's available.</p>
      <p style="font-size: 12px; color: #9b8568">
        In the meantime, head back to the
        <a
          href="#"
          onclick="goDashboard()"
          style="color: #c4714a; font-weight: 600; text-decoration: none"
          >Dashboard</a
        >.
      </p>
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
      <div class="progress-text">In development · ~35% complete</div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const moduleName = params.get("module") || "Module";
      const iconName = params.get("icon") || "fa-wrench";
      document.getElementById("csTitle").textContent = moduleName;
      document.title = moduleName + " — Coming Soon";
      document.getElementById("csIcon").classList.add(iconName);

      function goDashboard() {
        if (window.parent && window.parent !== window) {
          try {
            const frame =
              window.parent.document.getElementById("contentFrame");
            if (frame) {
              frame.src = "dashboard.html";
              window.parent.document
                .querySelectorAll(".menu-item")
                .forEach((el) => el.classList.remove("active"));
              const target = window.parent.document.querySelector(
                '.menu-item[data-content="dashboard.html"]',
              );
              if (target) target.classList.add("active");
              return;
            }
          } catch (e) {}
        }
        window.location.href = "dashboard.html";
      }
      window.goDashboard = goDashboard;
    </script>
